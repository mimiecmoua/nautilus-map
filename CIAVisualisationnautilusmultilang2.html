<script>
const DETAILED_CONTENT = {"0": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Île de Crespo</h3><h5>Extrait du livre</h5><p>Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l&#x27;île Crespo. Il espère que rien n&#x27;empêchera monsieur le professeur d&#x27;y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!</p></div>", "marinespecies": "<div class='modal-section'><h3>Île de Crespo</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Crespo Island</h3><h5>Book excerpt</h5><p>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p></div>", "marinespecies": "<div class='modal-section'><h3>Crespo Island</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "1": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Archipel des Pomotou</h3><h5>Extrait du livre</h5><p>Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.</p></div>", "marinespecies": "<div class='modal-section'><h3>Archipel des Pomotou</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Pomotou Archipelago</h3><h5>Book excerpt</h5><p>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p></div>", "marinespecies": "<div class='modal-section'><h3>Pomotou Archipelago</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "2": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Archipel des nouvelles Hébrides</h3><h5>Extrait du livre</h5><p>Et si maître Ned Land n&#x27;eut pas à se repentir de sa gloutonnerie en cette circonstance, c&#x27;est que l&#x27;huître est le seul mets qui ne provoque jamais d&#x27;indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d&#x27;un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l&#x27;archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l&#x27;île d&#x27;Aurou, qui, au moment des observations de midi, m&#x27;apparut comme une masse de bois verts, dominée par un pic d&#x27;une grande hauteur.</p></div>", "marinespecies": "<div class='modal-section'><h3>Archipel des nouvelles Hébrides</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>New Hebrides Archipelago</h3><h5>Book excerpt</h5><p>At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.</p></div>", "marinespecies": "<div class='modal-section'><h3>New Hebrides Archipelago</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "3": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>La Pouasie</h3><h5>Extrait du livre</h5><p>C&#x27;est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n&#x27;en ayons jamais d&#x27;autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?</p></div>", "marinespecies": "<div class='modal-section'><h3>La Pouasie</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Papua</h3><h5>Book excerpt</h5><p>it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!</p></div>", "marinespecies": "<div class='modal-section'><h3>Papua</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "4": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Cap Wessel</h3><h5>Extrait du livre</h5><p>La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n&#x27;avait plus de bornes, et de l&#x27;appareil, elle remontait aussitôt à l&#x27;ingénieur qui l&#x27;avait créé. Nous marchions directement vers l&#x27;ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.</p></div>", "marinespecies": "<div class='modal-section'><h3>Cap Wessel</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Forme la pointe du golfe de Carpentarie.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Forme la pointe du golfe de Carpentarie.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Cape Wessel</h3><h5>Book excerpt</h5><p>If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION C ient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l&#x27;île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c&#x27;est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.</p></div>", "marinespecies": "<div class='modal-section'><h3>Mer de Timor</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Timor Sea</h3><h5>Book excerpt</h5><p>The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.</p></div>", "marinespecies": "<div class='modal-section'><h3>Timor Sea</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "6": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Île Keeling</h3><h5>Extrait du livre</h5><p>Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l&#x27;heure. Si nous reconnaissions au passage les diverses variétés de poissons, c&#x27;est que ceux-ci, attirés par l&#x27;éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l&#x27;île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p></div>", "marinespecies": "<div class='modal-section'><h3>Île Keeling</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Visitée par Darwin et le capitaine Fitz-Roy.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Visitée par Darwin et le capitaine Fitz-Roy.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Keeling Island</h3><h5>Book excerpt</h5><p>If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.</p></div>", "marinespecies": "<div class='modal-section'><h3>Keeling Island</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Visited by Darwin and Captain Fitz-Roy.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Visited by Darwin and Captain Fitz-Roy.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "7": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Golfe du Bengale</h3><h5>Extrait du livre</h5><p>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l&#x27;Atlantique nord, un second dans l&#x27;Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l&#x27;Océan indien sud. Il est même probable qu&#x27;un sixième courant existait autrefois dans l&#x27;Océan indien nord, lorsque les mers Caspienne et d&#x27;Aral, réunies aux grands lacs de l&#x27;Asie, ne formaient qu&#x27;une seule et même étendue d&#x27;eau. Or, au point indiqué sur le planisphère, se déroulait l&#x27;un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d&#x27;Asie, s&#x27;arrondit dans le Pacifique nord jusqu&#x27;aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l&#x27;Océan. C&#x27;est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l&#x27;immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p></div>", "marinespecies": "<div class='modal-section'><h3>Golfe du Bengale</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Bay of Bengal</h3><h5>Book excerpt</h5><p>You may copy it, give it away or re-use it under the terms of the ces in the nineteenth century.</p><p><strong>Reference point:</strong> A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "8": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Afrique Est</h3><h5>Extrait du livre</h5><p>This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Afrique Est</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Point intermédiaire.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Point intermédiaire.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>East Africa Coast</h3><h5>Book excerpt</h5><p>And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.</p></div>", "marinespecies": "<div class='modal-section'><h3>East Africa Coast</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Intermediate point.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Intermediate point.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "9": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Sous l&#x27;isthme de Suez</h3><h5>Extrait du livre</h5><p>—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l&#x27;isthme de Suez n&#x27;est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d&#x27;écluses. Donc, la mer Rouge n&#x27;est pas encore le chemin qui nous ramènera en Europe. —Aussi, n&#x27;ai-je pas dit que nous reviendrions en Europe.</p></div>", "marinespecies": "<div class='modal-section'><h3>Sous l&#x27;isthme de Suez</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Beneath the Isthmus of Suez</h3><h5>Book excerpt</h5><p>“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.</p></div>", "marinespecies": "<div class='modal-section'><h3>Beneath the Isthmus of Suez</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "10": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>L&#x27;archipel grec</h3><h5>Extrait du livre</h5><p>Ils venaient retirer les filets qui avaient été mis à la traîne pendant la nuit. Ces marins appartenaient évidemment à des nations différentes, bien que le type européen fût indiqué chez tous. Je reconnus, à ne pas me tromper, des Irlandais, des Français, quelques Slaves, un Grec ou un Candiote. Du reste, ces hommes étaient sobres de paroles, et n&#x27;employaient entre eux que ce bizarre idiome dont je ne pouvais pas même soupçonner l&#x27;origine. Aussi, je dus renoncer à les interroger.</p></div>", "marinespecies": "<div class='modal-section'><h3>L&#x27;archipel grec</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Passage du Nautilus dans l&#x27;archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l&#x27;ancienne île de Crète.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Passage du Nautilus dans l&#x27;archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l&#x27;ancienne île de Crète.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>The Greek Archipelago</h3><h5>Book excerpt</h5><p>This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.</p></div>", "marinespecies": "<div class='modal-section'><h3>The Greek Archipelago</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> The Nautilus passes through the Greek Archipelago; Aronnax observes the fish of these waters, with an evocation of the ancient island of Crete.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> The Nautilus passes through the Greek Archipelago; Aronnax observes the fish of these waters, with an evocation of the ancient island of Crete.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "11": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Méditerranée</h3><h5>Extrait du livre</h5><p>Voici une conserve d&#x27;holoturies qu&#x27;un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d&#x27;anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu&#x27;en gourmet, tandis que le capitaine Nemo m&#x27;enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j&#x27;extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l&#x27;Océan.</p></div>", "marinespecies": "<div class='modal-section'><h3>Méditerranée</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Mediterranean Sea</h3><h5>Book excerpt</h5><p>You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA C</p></div>", "marinespecies": "<div class='modal-section'><h3>Mediterranean Sea</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "12": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>L&#x27;Atlantide</h3><h5>Extrait du livre</h5><p>Puis, ramassant un morceau de pierre crayeuse, il s&#x27;avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L&#x27;Atlantide, l&#x27;ancienne Méropide de Théopompe, l&#x27;Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D&#x27;Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d&#x27;Avezac, je l&#x27;avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C&#x27;était donc cette région engloutie qui existait en dehors de l&#x27;Europe, de l&#x27;Asie, de la Libye, au-delà des colonnes d&#x27;Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l&#x27;ancienne Grèce! L&#x27;historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c&#x27;est Platon lui-même.</p></div>", "marinespecies": "<div class='modal-section'><h3>L&#x27;Atlantide</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Atlantis</h3><h5>Book excerpt</h5><p>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p></div>", "marinespecies": "<div class='modal-section'><h3>Atlantis</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "13": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>La mer des Sargasses</h3><h5>Extrait du livre</h5><p>Peut-être. Quoi qu&#x27;il en soit, le lendemain, le Nautilus, ayant quitté son port d&#x27;attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l&#x27;Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s&#x27;était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.</p></div>", "marinespecies": "<div class='modal-section'><h3>La mer des Sargasses</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Traversée de la mer des Sargasses par le Nautilus.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Traversée de la mer des Sargasses par le Nautilus.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>The Sargasso Sea</h3><h5>Book excerpt</h5><p>This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.</p></div>", "marinespecies": "<div class='modal-section'><h3>The Sargasso Sea</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Crossing of the Sargasso Sea by the Nautilus.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Crossing of the Sargasso Sea by the Nautilus.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "14": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Afrique Nord</h3><h5>Extrait du livre</h5><p>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Afrique Nord</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Direction le pôle Sud.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Direction le pôle Sud.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>North Africa Coast</h3><h5>Book excerpt</h5><p>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p></div>", "marinespecies": "<div class='modal-section'><h3>North Africa Coast</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Heading towards the South Pole.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Heading towards the South Pole.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "15": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Amérique Sud</h3><h5>Extrait du livre</h5><p>Il évitait même de traiter ce sujet, sur lequel je crus devoir l&#x27;entreprendre un jour. Par une magnifique soirée du 30 juillet, c&#x27;est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s&#x27;ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l&#x27;Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned he marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "20": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Amérique Sud centrale</h3><h5>Extrait du livre</h5><p>Cependant, personne ne doutait encore du succès, et pas un matelot du bord n&#x27;eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l&#x27;équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Amérique Sud centrale</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Point intermédiaire</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Point intermédiaire</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Central South America Coastline</h3><h5>Book excerpt</h5><p>It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps because there was not enough water for him! suggested the greater part of the crew).</p></div>", "marinespecies": "<div class='modal-section'><h3>Central South America Coastline</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Intermediate point</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Intermediate point</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "21": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Martinique et Guadeloupe</h3><h5>Extrait du livre</h5><p>Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l&#x27;eau n&#x27;eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d&#x27;îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J&#x27;aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d&#x27;une île à l&#x27;autre, fut très-décontenancé.</p></div>", "marinespecies": "<div class='modal-section'><h3>Martinique et Guadeloupe</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Martinique and Guadeloupe</h3><h5>Book excerpt</h5><p>Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened.</p></div>", "marinespecies": "<div class='modal-section'><h3>Martinique and Guadeloupe</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Attack by a colossal giant squid, eight meters long.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Attack by a colossal giant squid, eight meters long.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "22": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Amérique Nord</h3><h5>Extrait du livre</h5><p>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Amérique Nord</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Point intermédiaire</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Point intermédiaire</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>North America Contour</h3><h5>Book excerpt</h5><p>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p></div>", "marinespecies": "<div class='modal-section'><h3>North America Contour</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Intermediate point</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Intermediate point</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "23": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Île Lucayes</h3><h5>Extrait du livre</h5><p>Alors la vie animale n&#x27;était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s&#x27;élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n&#x27;éclairaient pas jusqu&#x27;au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d&#x27;hydrophytes digne d&#x27;un monde de Titans.</p></div>", "marinespecies": "<div class='modal-section'><h3>Île Lucayes</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Entrée dans le Gulf Stream.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Entrée dans le Gulf Stream.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Lucayan Island</h3><h5>Book excerpt</h5><p>Alors la vie animale n&#x27;était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s&#x27;élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n&#x27;éclairaient pas jusqu&#x27;au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d&#x27;hydrophytes digne d&#x27;un monde de Titans.</p></div>", "marinespecies": "<div class='modal-section'><h3>Lucayan Island</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Entering the Gulf Stream.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Entering the Gulf Stream.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "24": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Cap Hatteras</h3><h5>Extrait du livre</h5><p>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l&#x27;iris brillait comme un feu, des sciènes longues d&#x27;un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j&#x27;ai déjà parlé, des coriphènes bleus, relevés d&#x27;or et d&#x27;argent, des perroquets, vrais arcs-en-ciel de l&#x27;Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d&#x27;écailles, des batrachoïdes recouverts d&#x27;une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d&#x27;un éclat doux, que Lacépède a consacrés à l&#x27;aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J&#x27;ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l&#x27;éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "25": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Long Island</h3><h5>Extrait du livre</h5><p>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l&#x27;attendait sous le vent. Les feux furent poussés; l&#x27;hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l&#x27;Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu&#x27;il commandait.</p></div>", "marinespecies": "<div class='modal-section'><h3>Long Island</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Lo
