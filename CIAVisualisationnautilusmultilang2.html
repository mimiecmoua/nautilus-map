p can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "26": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Terre Neuve</h3><h5>Extrait du livre</h5><p>Il descend au sud, longe l&#x27;Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l&#x27;Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l&#x27;une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l&#x27;équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s&#x27;élève au nord sur les côtes américaines, s&#x27;avance jusqu&#x27;à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l&#x27;Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l&#x27;un, aidé par l&#x27;alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l&#x27;autre, après avoir attiédi les rivages de l&#x27;Irlande et de la Norvége, va jusqu&#x27;au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C&#x27;est sur ce fleuve de l&#x27;Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l&#x27;heure.</p></div>", "marinespecies": "<div class='modal-section'><h3>Terre Neuve</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Newfoundland</h3><h5>Book excerpt</h5><p>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p></div>", "marinespecies": "<div class='modal-section'><h3>Newfoundland</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "27": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Irlande</h3><h5>Extrait du livre</h5><p>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l&#x27;horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l&#x27;un à l&#x27;autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C&#x27;étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l&#x27;abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l&#x27;agréable pour l&#x27;utile.</p></div>", "marinespecies": "<div class='modal-section'><h3>Irlande</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>Ireland</h3><h5>Book excerpt</h5><p>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea th</p></div>", "marinespecies": "<div class='modal-section'><h3>Ireland</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "28": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Manche</h3><h5>Extrait du livre</h5><p>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d&#x27;épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d&#x27;Hercule, qui devait être d&#x27;une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p></div>", "marinespecies": "<div class='modal-section'><h3>Manche</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Complot d&#x27;évasion</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Complot d&#x27;évasion</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>English Channel</h3><h5>Book excerpt</h5><p>You may copy it ng>Reference point:</strong> Escape plot</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "29": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Angleterre Sud</h3><h5>Extrait du livre</h5><p>Il évitait même de traiter ce sujet, sur lequel je crus devoir l&#x27;entreprendre un jour. Par une magnifique soirée du 30 juillet, c&#x27;est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s&#x27;ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l&#x27;Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d&#x27;autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu&#x27;ici inaccessibles aux regards de l&#x27;homme.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Angleterre Sud</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Complot d&#x27;évasion</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Complot d&#x27;évasion</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>South of England Coast</h3><h5>Book excerpt</h5><p>You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA C</p></div>", "marinespecies": "<div class='modal-section'><h3>South of England Coast</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Escape plot</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Escape plot</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "30": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Contour Angleterre Nord</h3><h5>Extrait du livre</h5><p>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.</p></div>", "marinespecies": "<div class='modal-section'><h3>Contour Angleterre Nord</h3><h5>Espèces maritimes mentionnées</h5><p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p><p><strong>Contexte :</strong> Complot d&#x27;évasion</p></div>", "science19c": "<div class='modal-section'><h3>Découvertes scientifiques du XIXe siècle</h3><p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p><p><strong>Point d’appui :</strong> Complot d&#x27;évasion</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparaison entre 1866 et aujourd’hui</h3><p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p><p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p></div>"}, "en": {"bookexcerpt": "<div class='modal-section'><h3>North of England Coast</h3><h5>Book excerpt</h5><p>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p></div>", "marinespecies": "<div class='modal-section'><h3>North of England Coast</h3><h5>Marine species mentioned</h5><p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p><p><strong>Context:</strong> Escape plot</p></div>", "science19c": "<div class='modal-section'><h3>19th-century scientific discoveries</h3><p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p><p><strong>Reference point:</strong> Escape plot</p></div>", "compare1866today": "<div class='modal-section'><h3>Comparison between 1866 and today</h3><p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p><p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p></div>"}}, "31": {"fr": {"bookexcerpt": "<div class='modal-section'><h3>Côtes de la Norvège</h3><h5>Extrait du livre</h5><p>And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.</p></div>", "marinespecies": "<d
