<script>
const DETAILED_CONTENT = {"0": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île de Crespo&#x27;, &#x27;en&#x27;: &#x27;Crespo Island&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l&#x27;île Crespo. Il espère que rien n&#x27;empêchera monsieur le professeur d&#x27;y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!&quot;, &#x27;en&#x27;: &#x27;The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île de Crespo&#x27;, &#x27;en&#x27;: &#x27;Crespo Island&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.&quot;, &#x27;en&#x27;: &#x27;Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.&quot;, &#x27;en&#x27;: &#x27;Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île de Crespo&#x27;, &#x27;en&#x27;: &#x27;Crespo Island&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l&#x27;île Crespo. Il espère que rien n&#x27;empêchera monsieur le professeur d&#x27;y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!&quot;, &#x27;en&#x27;: &#x27;The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île de Crespo&#x27;, &#x27;en&#x27;: &#x27;Crespo Island&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.&quot;, &#x27;en&#x27;: &#x27;Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Début de l&#x27;aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.&quot;, &#x27;en&#x27;: &#x27;Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "1": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des Pomotou&#x27;, &#x27;en&#x27;: &#x27;Pomotou Archipelago&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.&quot;, &#x27;en&#x27;: &#x27;However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is form</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des Pomotou&#x27;, &#x27;en&#x27;: &#x27;Pomotou Archipelago&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.&quot;, &#x27;en&#x27;: &#x27;This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.&quot;, &#x27;en&#x27;: &#x27;This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des Pomotou&#x27;, &#x27;en&#x27;: &#x27;Pomotou Archipelago&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.&quot;, &#x27;en&#x27;: &#x27;However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is form</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des Pomotou&#x27;, &#x27;en&#x27;: &#x27;Pomotou Archipelago&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.&quot;, &#x27;en&#x27;: &#x27;This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d&#x27;îles.&quot;, &#x27;en&#x27;: &#x27;This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "2": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des nouvelles Hébrides&#x27;, &#x27;en&#x27;: &#x27;New Hebrides Archipelago&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Et si maître Ned Land n&#x27;eut pas à se repentir de sa gloutonnerie en cette circonstance, c&#x27;est que l&#x27;huître est le seul mets qui ne provoque jamais d&#x27;indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d&#x27;un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l&#x27;archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l&#x27;île d&#x27;Aurou, qui, au moment des observations de midi, m&#x27;apparut comme une masse de bois verts, dominée par un pic d&#x27;une grande hauteur.&quot;, &#x27;en&#x27;: &#x27;At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des nouvelles Hébrides&#x27;, &#x27;en&#x27;: &#x27;New Hebrides Archipelago&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.&#x27;, &#x27;en&#x27;: &#x27;Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.&#x27;, &#x27;en&#x27;: &#x27;Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des nouvelles Hébrides&#x27;, &#x27;en&#x27;: &#x27;New Hebrides Archipelago&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Et si maître Ned Land n&#x27;eut pas à se repentir de sa gloutonnerie en cette circonstance, c&#x27;est que l&#x27;huître est le seul mets qui ne provoque jamais d&#x27;indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d&#x27;un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l&#x27;archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l&#x27;île d&#x27;Aurou, qui, au moment des observations de midi, m&#x27;apparut comme une masse de bois verts, dominée par un pic d&#x27;une grande hauteur.&quot;, &#x27;en&#x27;: &#x27;At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Archipel des nouvelles Hébrides&#x27;, &#x27;en&#x27;: &#x27;New Hebrides Archipelago&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.&#x27;, &#x27;en&#x27;: &#x27;Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.&#x27;, &#x27;en&#x27;: &#x27;Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "3": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;La Pouasie&#x27;, &#x27;en&#x27;: &#x27;Papua&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;C&#x27;est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n&#x27;en ayons jamais d&#x27;autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?&quot;, &#x27;en&#x27;: &#x27;it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;La Pouasie&#x27;, &#x27;en&#x27;: &#x27;Papua&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.&#x27;, &#x27;en&#x27;: &#x27;Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.&#x27;, &#x27;en&#x27;: &#x27;Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;La Pouasie&#x27;, &#x27;en&#x27;: &#x27;Papua&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;C&#x27;est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n&#x27;en ayons jamais d&#x27;autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?&quot;, &#x27;en&#x27;: &#x27;it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;La Pouasie&#x27;, &#x27;en&#x27;: &#x27;Papua&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.&#x27;, &#x27;en&#x27;: &#x27;Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.&#x27;, &#x27;en&#x27;: &#x27;Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "4": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Cap Wessel&#x27;, &#x27;en&#x27;: &#x27;Cape Wessel&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n&#x27;avait plus de bornes, et de l&#x27;appareil, elle remontait aussitôt à l&#x27;ingénieur qui l&#x27;avait créé. Nous marchions directement vers l&#x27;ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.&quot;, &#x27;en&#x27;: &#x27;If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTE</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Cap Wessel&#x27;, &#x27;en&#x27;: &#x27;Cape Wessel&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Forme la pointe du golfe de Carpentarie.&#x27;, &#x27;en&#x27;: &#x27;Forms the tip of the Gulf of Carpentaria.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Forme la pointe du golfe de Carpentarie.&#x27;, &#x27;en&#x27;: &#x27;Forms the tip of the Gulf of Carpentaria.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Cap Wessel&#x27;, &#x27;en&#x27;: &#x27;Cape Wessel&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n&#x27;avait plus de bornes, et de l&#x27;appareil, elle remontait aussitôt à l&#x27;ingénieur qui l&#x27;avait créé. Nous marchions directement vers l&#x27;ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.&quot;, &#x27;en&#x27;: &#x27;If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTE</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Cap Wessel&#x27;, &#x27;en&#x27;: &#x27;Cape Wessel&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Forme la pointe du golfe de Carpentarie.&#x27;, &#x27;en&#x27;: &#x27;Forms the tip of the Gulf of Carpentaria.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Forme la pointe du golfe de Carpentarie.&#x27;, &#x27;en&#x27;: &#x27;Forms the tip of the Gulf of Carpentaria.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "5": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Mer de Timor&#x27;, &#x27;en&#x27;: &#x27;Timor Sea&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l&#x27;île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c&#x27;est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.&quot;, &#x27;en&#x27;: &#x27;The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Mer de Timor&#x27;, &#x27;en&#x27;: &#x27;Timor Sea&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.&quot;, &#x27;en&#x27;: &#x27;A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.&quot;, &#x27;en&#x27;: &#x27;A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Mer de Timor&#x27;, &#x27;en&#x27;: &#x27;Timor Sea&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l&#x27;île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c&#x27;est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.&quot;, &#x27;en&#x27;: &#x27;The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Mer de Timor&#x27;, &#x27;en&#x27;: &#x27;Timor Sea&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.&quot;, &#x27;en&#x27;: &#x27;A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Un homme de l&#x27;équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.&quot;, &#x27;en&#x27;: &#x27;A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "6": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Keeling&#x27;, &#x27;en&#x27;: &#x27;Keeling Island&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l&#x27;heure. Si nous reconnaissions au passage les diverses variétés de poissons, c&#x27;est que ceux-ci, attirés par l&#x27;éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l&#x27;île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.&quot;, &#x27;en&#x27;: &#x27;If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Keeling&#x27;, &#x27;en&#x27;: &#x27;Keeling Island&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Visitée par Darwin et le capitaine Fitz-Roy.&#x27;, &#x27;en&#x27;: &#x27;Visited by Darwin and Captain Fitz-Roy.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Visitée par Darwin et le capitaine Fitz-Roy.&#x27;, &#x27;en&#x27;: &#x27;Visited by Darwin and Captain Fitz-Roy.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Keeling&#x27;, &#x27;en&#x27;: &#x27;Keeling Island&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l&#x27;heure. Si nous reconnaissions au passage les diverses variétés de poissons, c&#x27;est que ceux-ci, attirés par l&#x27;éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l&#x27;île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.&quot;, &#x27;en&#x27;: &#x27;If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Keeling&#x27;, &#x27;en&#x27;: &#x27;Keeling Island&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Visitée par Darwin et le capitaine Fitz-Roy.&#x27;, &#x27;en&#x27;: &#x27;Visited by Darwin and Captain Fitz-Roy.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Visitée par Darwin et le capitaine Fitz-Roy.&#x27;, &#x27;en&#x27;: &#x27;Visited by Darwin and Captain Fitz-Roy.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "7": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Golfe du Bengale&#x27;, &#x27;en&#x27;: &#x27;Bay of Bengal&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l&#x27;Atlantique nord, un second dans l&#x27;Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l&#x27;Océan indien sud. Il est même probable qu&#x27;un sixième courant existait autrefois dans l&#x27;Océan indien nord, lorsque les mers Caspienne et d&#x27;Aral, réunies aux grands lacs de l&#x27;Asie, ne formaient qu&#x27;une seule et même étendue d&#x27;eau. Or, au point indiqué sur le planisphère, se déroulait l&#x27;un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d&#x27;Asie, s&#x27;arrondit dans le Pacifique nord jusqu&#x27;aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l&#x27;Océan. C&#x27;est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l&#x27;immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand </p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Golfe du Bengale&#x27;, &#x27;en&#x27;: &#x27;Bay of Bengal&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.&quot;, &#x27;en&#x27;: &#x27;A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.&quot;, rurent à la porte du salon.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand </p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Golfe du Bengale&#x27;, &#x27;en&#x27;: &#x27;Bay of Bengal&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.&quot;, &#x27;en&#x27;: &#x27;A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C&#x27;était la mort des villes indiennes.&quot;, &#x27;en&#x27;: &#x27;A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "8": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Est&#x27;, &#x27;en&#x27;: &#x27;East Africa Coast&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &#x27;This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.&#x27;, &#x27;en&#x27;: &#x27;And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Est&#x27;, &#x27;en&#x27;: &#x27;East Africa Coast&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Est&#x27;, &#x27;en&#x27;: &#x27;East Africa Coast&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &#x27;This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.&#x27;, &#x27;en&#x27;: &#x27;And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Est&#x27;, &#x27;en&#x27;: &#x27;East Africa Coast&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "9": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &quot;Sous l&#x27;isthme de Suez&quot;, &#x27;en&#x27;: &#x27;Beneath the Isthmus of Suez&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l&#x27;isthme de Suez n&#x27;est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d&#x27;écluses. Donc, la mer Rouge n&#x27;est pas encore le chemin qui nous ramènera en Europe. —Aussi, n&#x27;ai-je pas dit que nous reviendrions en Europe.&quot;, &#x27;en&#x27;: &#x27;“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &quot;Sous l&#x27;isthme de Suez&quot;, &#x27;en&#x27;: &#x27;Beneath the Isthmus of Suez&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.&quot;, &#x27;en&#x27;: &#x27;Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.&quot;, &#x27;en&#x27;: &#x27;Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &quot;Sous l&#x27;isthme de Suez&quot;, &#x27;en&#x27;: &#x27;Beneath the Isthmus of Suez&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l&#x27;isthme de Suez n&#x27;est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d&#x27;écluses. Donc, la mer Rouge n&#x27;est pas encore le chemin qui nous ramènera en Europe. —Aussi, n&#x27;ai-je pas dit que nous reviendrions en Europe.&quot;, &#x27;en&#x27;: &#x27;“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &quot;Sous l&#x27;isthme de Suez&quot;, &#x27;en&#x27;: &#x27;Beneath the Isthmus of Suez&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.&quot;, &#x27;en&#x27;: &#x27;Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Passage par l&#x27;Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l&#x27;isthme de Suez, puis chasse du dugong.&quot;, &#x27;en&#x27;: &#x27;Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "10": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &quot;L&#x27;archipel grec&quot;, &#x27;en&#x27;: &#x27;The Greek Archipelago&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ils venaient retirer les filets qui avaient été mis à la traîne pendant la nuit. Ces marins appartenaient évidemment à des nations différentes, bien que le type européen fût indiqué chez tous. Je reconnus, à ne pas me tromper, des Irlandais, des Français, quelques Slaves, un Grec ou un Candiote. Du reste, ces hommes étaient sobres de paroles, et n&#x27;employaient entre eux que ce bizarre idiome dont je ne pouvais pas même soupçonner l&#x27;origine. Aussi, je dus renoncer à les interroger.&quot;, &#x27;en&#x27;: &#x27;This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &quot;L&#x27;archipel grec&quot;, &#x27;en&#x27;: &#x27;The Greek Archipelago&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &q and of Crete.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "11": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Méditerranée&#x27;, &#x27;en&#x27;: &#x27;Mediterranean Sea&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Voici une conserve d&#x27;holoturies qu&#x27;un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d&#x27;anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu&#x27;en gourmet, tandis que le capitaine Nemo m&#x27;enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j&#x27;extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l&#x27;Océan.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credit</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Méditerranée&#x27;, &#x27;en&#x27;: &#x27;Mediterranean Sea&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.&#x27;, &#x27;en&#x27;: &#x27;The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.&#x27;, &#x27;en&#x27;: &#x27;The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Méditerranée&#x27;, &#x27;en&#x27;: &#x27;Mediterranean Sea&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Voici une conserve d&#x27;holoturies qu&#x27;un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d&#x27;anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu&#x27;en gourmet, tandis que le capitaine Nemo m&#x27;enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j&#x27;extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l&#x27;Océan.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credit</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Méditerranée&#x27;, &#x27;en&#x27;: &#x27;Mediterranean Sea&#x27;}</h3>\n                <h5>Marine species 7;Atlantide, l&#x27;ancienne Méropide de Théopompe, l&#x27;Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D&#x27;Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d&#x27;Avezac, je l&#x27;avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C&#x27;était donc cette région engloutie qui existait en dehors de l&#x27;Europe, de l&#x27;Asie, de la Libye, au-delà des colonnes d&#x27;Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l&#x27;ancienne Grèce! L&#x27;historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c&#x27;est Platon lui-même.&quot;, &#x27;en&#x27;: &#x27;Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &quot;L&#x27;Atlantide&quot;, &#x27;en&#x27;: &#x27;Atlantis&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.&quot;, &#x27;en&#x27;: &quot;Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.&quot;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.&quot;, &#x27;en&#x27;: &quot;Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.&quot;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &quot;L&#x27;Atlantide&quot;, &#x27;en&#x27;: &#x27;Atlantis&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Puis, ramassant un morceau de pierre crayeuse, il s&#x27;avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L&#x27;Atlantide, l&#x27;ancienne Méropide de Théopompe, l&#x27;Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D&#x27;Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d&#x27;Avezac, je l&#x27;avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C&#x27;était donc cette région engloutie qui existait en dehors de l&#x27;Europe, de l&#x27;Asie, de la Libye, au-delà des colonnes d&#x27;Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l&#x27;ancienne Grèce! L&#x27;historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c&#x27;est Platon lui-même.&quot;, &#x27;en&#x27;: &#x27;Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &quot;L&#x27;Atlantide&quot;, &#x27;en&#x27;: &#x27;Atlantis&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.&quot;, &#x27;en&#x27;: &quot;Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.&quot;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Vision de l&#x27;Atlantide, localisation cartographique approximative d&#x27;après le trajet du roman.&quot;, &#x27;en&#x27;: &quot;Vision of Atlantis; approximate cartographic location based on the novel&#x27;s route.&quot;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "13": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;La mer des Sargasses&#x27;, &#x27;en&#x27;: &#x27;The Sargasso Sea&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Peut-être. Quoi qu&#x27;il en soit, le lendemain, le Nautilus, ayant quitté son port d&#x27;attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l&#x27;Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s&#x27;était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.&quot;, &#x27;en&#x27;: &#x27;This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;La mer des Sargasses&#x27;, &#x27;en&#x27;: &#x27;The Sargasso Sea&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Traversée de la mer des Sargasses par le Nautilus.&#x27;, &#x27;en&#x27;: &#x27;Crossing of the Sargasso Sea by the Nautilus.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><str
