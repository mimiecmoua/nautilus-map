elated to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Traversée de la mer des Sargasses par le Nautilus.&#x27;, &#x27;en&#x27;: &#x27;Crossing of the Sargasso Sea by the Nautilus.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Traversée de la mer des Sargasses par le Nautilus.&#x27;, &#x27;en&#x27;: &#x27;Crossing of the Sargasso Sea by the Nautilus.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "14": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Nord&#x27;, &#x27;en&#x27;: &#x27;North Africa Coast&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.&quot;, &#x27;en&#x27;: &#x27;It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Nord&#x27;, &#x27;en&#x27;: &#x27;North Africa Coast&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Direction le pôle Sud.&#x27;, &#x27;en&#x27;: &#x27;Heading towards the South Pole.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Direction le pôle Sud.&#x27;, &#x27;en&#x27;: &#x27;Heading towards the South Pole.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Nord&#x27;, &#x27;en&#x27;: &#x27;North Africa Coast&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.&quot;, &#x27;en&#x27;: &#x27;It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Afrique Nord&#x27;, &#x27;en&#x27;: &#x27;North Africa Coast&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Direction le pôle Sud.&#x27;, &#x27;en&#x27;: &#x27;Heading towards the South Pole.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Direction le pôle Sud.&#x27;, &#x27;en&#x27;: &#x27;Heading towards the South Pole.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "15": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud&#x27;, &#x27;en&#x27;: &#x27;South America Outline&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Il évitait même de traiter ce sujet, sur lequel je crus devoir l&#x27;entreprendre un jour. Par une magnifique soirée du 30 juillet, c&#x27;est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s&#x27;ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l&#x27;Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d&#x27;autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu&#x27;ici inaccessibles aux regards de l&#x27;homme.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII A</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud&#x27;, &#x27;en&#x27;: &#x27;South America Outline&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</ S CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAP</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud (retour)&#x27;, &#x27;en&#x27;: &#x27;South America Coastline (return)&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire - Patagonie, Uruguay - Le Nautilus maintient sa direction au Nord.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire - Patagonie, Uruguay - Le Nautilus maintient sa direction au Nord.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud (retour)&#x27;, &#x27;en&#x27;: &#x27;South America Coastline (return)&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: None, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAP</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud (retour)&#x27;, &#x27;en&#x27;: &#x27;South America Coastline (return)&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire - Patagonie, Uruguay - Le Nautilus maintient sa direction au Nord.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire - Patagonie, Uruguay - Le Nautilus maintient sa direction au Nord.&#x27;, &#x27;en&#x27;: &#x27;Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "20": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud centrale&#x27;, &#x27;en&#x27;: &#x27;Central South America Coastline&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Cependant, personne ne doutait encore du succès, et pas un matelot du bord n&#x27;eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l&#x27;équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine.&quot;, &#x27;en&#x27;: &#x27;It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps beca</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud centrale&#x27;, &#x27;en&#x27;: &#x27;Central South America Coastline&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud centrale&#x27;, &#x27;en&#x27;: &#x27;Central South America Coastline&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Cependant, personne ne doutait encore du succès, et pas un matelot du bord n&#x27;eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l&#x27;équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l&#x27;ouest, et s&#x27;engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu&#x27;il valait mieux fréquenter les eaux profondes, et s&#x27;éloigner des continents ou des îles dont l&#x27;animal avait toujours paru éviter l&#x27;approche, «sans doute parce qu&#x27;il n&#x27;y avait pas assez d&#x27;eau pour lui!» disait le maître d&#x27;équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine.&quot;, &#x27;en&#x27;: &#x27;It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps beca</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Sud centrale&#x27;, &#x27;en&#x27;: &#x27;Central South America Coastline&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "21": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Martinique et Guadeloupe&#x27;, &#x27;en&#x27;: &#x27;Martinique and Guadeloupe&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l&#x27;eau n&#x27;eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d&#x27;îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J&#x27;aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d&#x27;une île à l&#x27;autre, fut très-décontenancé.&quot;, &#x27;en&#x27;: &#x27;Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Martinique et Guadeloupe&#x27;, &#x27;en&#x27;: &#x27;Martinique and Guadeloupe&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.&#x27;, &#x27;en&#x27;: &#x27;Attack by a colossal giant squid, eight meters long.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.&#x27;, &#x27;en&#x27;: &#x27;Attack by a colossal giant squid, eight meters long.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Martinique et Guadeloupe&#x27;, &#x27;en&#x27;: &#x27;Martinique and Guadeloupe&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l&#x27;eau n&#x27;eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d&#x27;îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J&#x27;aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d&#x27;une île à l&#x27;autre, fut très-décontenancé.&quot;, &#x27;en&#x27;: &#x27;Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Martinique et Guadeloupe&#x27;, &#x27;en&#x27;: &#x27;Martinique and Guadeloupe&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.&#x27;, &#x27;en&#x27;: &#x27;Attack by a colossal giant squid, eight meters long.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.&#x27;, &#x27;en&#x27;: &#x27;Attack by a colossal giant squid, eight meters long.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "22": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Nord&#x27;, &#x27;en&#x27;: &#x27;North America Contour&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.&quot;, &#x27;en&#x27;: &#x27;It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Nord&#x27;, &#x27;en&#x27;: &#x27;North America Contour&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Amérique Nord&#x27;, &#x27;en&#x27;: &#x27;North America Contour&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-H           <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Point intermédiaire&#x27;, &#x27;en&#x27;: &#x27;Intermediate point&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "23": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Lucayes&#x27;, &#x27;en&#x27;: &#x27;Lucayan Island&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Alors la vie animale n&#x27;était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s&#x27;élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n&#x27;éclairaient pas jusqu&#x27;au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d&#x27;hydrophytes digne d&#x27;un monde de Titans.&quot;, &#x27;en&#x27;: None}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Île Lucayes&#x27;, &#x27;en&#x27;: &#x27;Lucayan Island&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le p entronotes-nègres dont j&#x27;ai déjà parlé, des coriphènes bleus, relevés d&#x27;or et d&#x27;argent, des perroquets, vrais arcs-en-ciel de l&#x27;Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d&#x27;écailles, des batrachoïdes recouverts d&#x27;une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d&#x27;un éclat doux, que Lacépède a consacrés à l&#x27;aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J&#x27;ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l&#x27;éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent </p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Cap Hatteras&#x27;, &#x27;en&#x27;: &#x27;Cape Hatteras&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.&#x27;, &#x27;en&#x27;: &#x27;Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wid #x27;fr&#x27;: &#x27;Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.&#x27;, &#x27;en&#x27;: &#x27;Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wide and two hundred and ten miles deep.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "25": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Long Island&#x27;, &#x27;en&#x27;: &#x27;Long Island&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l&#x27;attendait sous le vent. Les feux furent poussés; l&#x27;hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l&#x27;Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu&#x27;il commandait.&quot;, &#x27;en&#x27;: &#x27;If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twen leux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Long Island&#x27;, &#x27;en&#x27;: &#x27;Long Island&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l&#x27;attendait sous le vent. Les feux furent poussés; l&#x27;hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l&#x27;Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu&#x27;il commandait.&quot;, &#x27;en&#x27;: &#x27;If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE F</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Long Island&#x27;, &#x27;en&#x27;: &#x27;Long Island&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.&#x27;, &#x27;en&#x27;: &#x27;Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.&#x27;, &#x27;en&#x27;: &#x27;Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "26": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Terre Neuve&#x27;, &#x27;en&#x27;: &#x27;Newfoundland&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Il descend au sud, longe l&#x27;Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l&#x27;Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l&#x27;une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l&#x27;équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s&#x27;élève au nord sur les côtes américaines, s&#x27;avance jusqu&#x27;à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l&#x27;Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l&#x27;un, aidé par l&#x27;alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l&#x27;autre, après avoir attiédi les rivages de l&#x27;Irlande et de la Norvége, va jusqu&#x27;au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C&#x27;est sur ce fleuve de l&#x27;Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l&#x27;heure.&quot;, &#x27;en&#x27;: &#x27;What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; s</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Terre Neuve&#x27;, &#x27;en&#x27;: &#x27;Newfoundland&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.&#x27;, &#x27;en&#x27;: &#x27;Southern tip of the Newfoundland bank - P  route de l&#x27;Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l&#x27;un, aidé par l&#x27;alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l&#x27;autre, après avoir attiédi les rivages de l&#x27;Irlande et de la Norvége, va jusqu&#x27;au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C&#x27;est sur ce fleuve de l&#x27;Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l&#x27;heure.&quot;, &#x27;en&#x27;: &#x27;What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; s</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Terre Neuve&#x27;, &#x27;en&#x27;: &#x27;Newfoundland&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.&#x27;, &#x27;en&#x27;: &#x27;Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.&#x27;, &#x27;en&#x27;: &#x27;Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "27": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Irlande&#x27;, &#x27;en&#x27;: &#x27;Ireland&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l&#x27;horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l&#x27;un à l&#x27;autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C&#x27;étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l&#x27;abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l&#x27;agréable pour l&#x27;utile.&quot;, &#x27;en&#x27;: &#x27;“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the </p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Irlande&#x27;, &#x27;en&#x27;: &#x27;Ireland&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.&#x27;, &#x27;en&#x27;: &#x27;The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.&#x27;, &#x27;en&#x27;: &#x27;The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n tioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &#x27;Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.&#x27;, &#x27;en&#x27;: &#x27;The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &#x27;Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.&#x27;, &#x27;en&#x27;: &#x27;The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "28": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Manche&#x27;, &#x27;en&#x27;: &#x27;English Channel&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d&#x27;épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d&#x27;Hercule, qui devait être d&#x27;une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I C</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Manche&#x27;, &#x27;en&#x27;: &#x27;English Channel&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Manche&#x27;, &#x27;en&#x27;: &#x27;English Channel&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d&#x27;épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d&#x27;Hercule, qui devait être d&#x27;une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I C</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Manche&#x27;, &#x27;en&#x27;: &#x27;English Channel&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "29": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Sud&#x27;, &#x27;en&#x27;: &#x27;South of England Coast&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Il évitait même de traiter ce sujet, sur lequel je crus devoir l&#x27;entreprendre un jour. Par une magnifique soirée du 30 juillet, c&#x27;est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s&#x27;ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l&#x27;Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d&#x27;autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu&#x27;ici inaccessibles aux regards de l&#x27;homme.&quot;, &#x27;en&#x27;: &#x27;You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII A</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Sud&#x27;, &#x27;en&#x27;: &#x27;South of England Coast&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong s: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII A</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Sud&#x27;, &#x27;en&#x27;: &#x27;South of England Coast&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "30": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Nord&#x27;, &#x27;en&#x27;: &#x27;North of England Coast&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.&quot;, &#x27;en&#x27;: &#x27;It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Nord&#x27;, &#x27;en&#x27;: &#x27;North of England Coast&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Nord&#x27;, &#x27;en&#x27;: &#x27;North of England Coast&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: &quot;Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d&#x27;un endroit à un autre avec une vélocité surprenante, puisque à trois jours d&#x27;intervalle, le Governor-Higginson et le Cristobal-Colon l&#x27;avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l&#x27;Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l&#x27;Atlantique comprise entre les États-Unis et l&#x27;Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l&#x27;ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l&#x27;Helvetia étaient de dimension inférieure à lui, bien qu&#x27;ils mesurassent cent mètres de l&#x27;étrave à l&#x27;étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l&#x27;Umgullick, n&#x27;ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l&#x27;atteignent.&quot;, &#x27;en&#x27;: &#x27;It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Contour Angleterre Nord&#x27;, &#x27;en&#x27;: &#x27;North of England Coast&#x27;}</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This section can host a synthesis of the marine species mentioned in the text related to this stop.</p>\n                <p><strong>Context:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "science19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This stop can be connected to the rise of oceanography, exploration narratives, cartography, and natural sciences in the nineteenth century.</p>\n                <p><strong>Reference point:</strong> {&#x27;fr&#x27;: &quot;Complot d&#x27;évasion&quot;, &#x27;en&#x27;: &#x27;Escape plot&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, these marine worlds were still partly unknown and belonged to the realm of scientific wonder.</p>\n                <p>Today, satellites, GIS, submarines, sensors, and bathymetric imaging allow a far more precise understanding of these environments.</p>\n            "}}, "31": {"fr": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Côtes de la Norvège&#x27;, &#x27;en&#x27;: &#x27;Coast of Norway&#x27;}</h3>\n                <h5>Extrait du livre</h5>\n                <p>{&#x27;fr&#x27;: None, &#x27;en&#x27;: &#x27;And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.&#x27;}</p>\n            ", "marinespecies": "\n                <h3>{&#x27;fr&#x27;: &#x27;Côtes de la Norvège&#x27;, &#x27;en&#x27;: &#x27;Coast of Norway&#x27;}</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette rubrique peut accueillir une synthèse des espèces évoquées dans le passage lié à cette escale.</p>\n                <p><strong>Contexte :</strong> {&#x27;fr&#x27;: &#x27;Fin du voyage pour le professeur Aronnax, Conseil et Ned Land&#x27;, &#x27;en&#x27;: &#x27;End of the journey for Professor Aronnax, Conseil, and Ned Land&#x27;}</p>\n            ", "science19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Cette escale peut être reliée à l’essor de l’océanographie, des récits d’exploration, de la cartographie et des sciences naturelles au XIXe siècle.</p>\n                <p><strong>Point d’appui :</strong> {&#x27;fr&#x27;: &#x27;Fin du voyage pour le professeur Aronnax, Conseil et Ned Land&#x27;, &#x27;en&#x27;: &#x27;End of the journey for Professor Aronnax, Conseil, and Ned Land&#x27;}</p>\n            ", "compare1866today": "\n                <h3>Comparaison entre 1866 et aujourd’hui</h3>\n                <p>En 1866, ces mondes marins restaient encore partiellement inconnus et relevaient du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les satellites, SIG, sous-marins, capteurs et images bathymétriques permettent une lecture bien plus précise de ces milieux.</p>\n            "}, "en": {"bookexcerpt": "\n                <h3>{&#x27;fr&#x27;: &#x27;Côtes de la Norvège&#x27;, &#x27;en&#x27;: &#x27;Coast of Norway&#x27;}</h3>\n                <h5>Book excerpt</h5>\n                <p>{&#x27;fr&#x27;: None, &#x27;en&#x27;: &#x27;And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.&#x27;}</p>\n            ", "marinespecies": "\n
