<script>
const ENRICHED_CONTENT = {"0": {"fr": "\n            <h3>Île de Crespo</h3>\n            <p><b>Lecture enrichie :</b> Cette escale ouvre véritablement l’odyssée du Nautilus. Elle installe le ton du roman : fascination scientifique, puissance du regard naturaliste et sentiment de basculement dans un monde sous-marin autonome.</p>\n            <p><b>Contexte littéraire :</b> Jules Verne fait ici sentir que l’aventure n’est pas seulement géographique ; elle est aussi intellectuelle. Le lecteur entre dans une cartographie poétique où chaque étape devient un fragment de savoir et d’imaginaire.</p>\n            <p><b>Piste d’interprétation :</b> On peut lire ce moment comme l’entrée dans un musée vivant des mers, où Aronnax devient à la fois témoin, savant et narrateur.</p>\n        ", "en": "\n            <h3>Crespo Island</h3>\n            <p><b>Enhanced reading:</b> This stop truly opens the Nautilus odyssey. It sets the tone of the novel: scientific wonder, the strength of the naturalist gaze, and the feeling of entering a self-contained underwater world.</p>\n            <p><b>Literary context:</b> Jules Verne suggests that the adventure is not only geographic but also intellectual. The reader enters a poetic cartography where each stop becomes a fragment of knowledge and imagination.</p>\n            <p><b>Interpretive path:</b> This moment can be read as the entrance into a living museum of the seas, where Aronnax becomes witness, scholar, and storyteller at once.</p>\n        "}, "1": {"fr": "\n            <h3>Archipel des Pomotou</h3>\n            <p><b>Lecture enrichie :</b> Cette étape développe l’idée d’immensité océanique. L’archipel apparaît comme une constellation insulaire qui transforme l’espace marin en réseau de repères dispersés.</p>\n            <p><b>Contexte géopoétique :</b> Verne donne à voir le Pacifique comme un ensemble de mondes minuscules mais reliés, où la mer devient un tissu d’îles, de récits et de trajectoires.</p>\n        ", "en": "\n            <h3>Pomotou Archipelago</h3>\n            <p><b>Enhanced reading:</b> This stop deepens the sense of oceanic vastness. The archipelago appears as an insular constellation, turning marine space into a network of scattered landmarks.</p>\n            <p><b>Geopoetic context:</b> Verne presents the Pacific as a set of tiny yet connected worlds, where the sea becomes a fabric of islands, stories, and trajectories.</p>\n        "}, "2": {"fr": "\n            <h3>Archipel des nouvelles Hébrides</h3>\n            <p><b>Lecture enrichie :</b> Ici, le voyage du Nautilus croise l’histoire des grandes explorations. L’escale relie le roman vernien aux récits de découverte européens et à la mémoire des navigateurs.</p>\n            <p><b>Contexte historique :</b> La mention de Quiros, Bougainville et Cook inscrit le parcours fictif dans une archive réelle de la navigation mondiale.</p>\n        ", "en": "\n            <h3>New Hebrides Archipelago</h3>\n            <p><b>Enhanced reading:</b> Here, the Nautilus journey intersects with the history of major explorations. This stop connects Verne’s fiction to European discovery narratives and the memory of navigators.</p>\n            <p><b>Historical context:</b> The mention of Quiros, Bougainville, and Cook anchors the fictional route within the real archive of global navigation.</p>\n        "}};
const ADVANCED_CONTENT = {"0": {"fr": {"historical": "\n                <h3>Contexte historique</h3>\n                <p>Cette ouverture du voyage s’inscrit dans une culture du XIXe siècle fascinée par l’exploration, les profondeurs marines et la classification du vivant.</p>\n            ", "symbolic": "\n                <h3>Analyse symbolique</h3>\n                <p>L’escale inaugure un passage du monde connu vers un univers immergé, presque mythique, où le Nautilus devient un espace de retrait, de savoir et de puissance.</p>\n            ", "geopoetic": "\n                <h3>Lecture géopoétique</h3>\n                <p>L’île fonctionne comme un seuil narratif : elle ne vaut pas seulement pour sa position sur la carte, mais pour l’imaginaire marin qu’elle déclenche.</p>\n            ", "data_nav": "\n                <h3>Données & navigation</h3>\n                <p>Ce point marque l’un des premiers grands repères du trajet. Il articule coordonnées, récit d’exploration et mise en route de la logique cartographique du Nautilus.</p>\n            "}, "en": {"historical": "\n                <h3>Historical context</h3>\n                <p>This opening stage belongs to a nineteenth-century culture fascinated by exploration, ocean depths, and the classification of living beings.</p>\n            ", "symbolic": "\n                <h3>Symbolic analysis</h3>\n                <p>This stop marks a passage from the known world to an immersed, almost mythical universe, where the Nautilus becomes a space of retreat, knowledge, and power.</p>\n            ", "geopoetic": "\n                <h3>Geopoetic reading</h3>\n                <p>The island works as a narrative threshold: it matters not only for its location on the map, but for the marine imagination it sets in motion.</p>\n            ", "data_nav": "\n                <h3>Data & navigation</h3>\n                <p>This point marks one of the first major landmarks of the route. It connects coordinates, exploration narrative, and the cartographic logic of the Nautilus.</p>\n            "}}};

function showLoader() {
    const loader = document.getElementById("dataLoaderOverlay");
    if (loader) loader.style.display = "flex";
}

function hideLoader() {
    const loader = document.getElementById("dataLoaderOverlay");
    if (loader) loader.style.display = "none";
}

function openModalWithContent(title, content) {
    document.getElementById("logbookModalLabel").innerHTML = title;
    document.getElementById("logbookModalBody").innerHTML = content;
    const modal = new bootstrap.Modal(document.getElementById("logbookModal"));
    modal.show();
}

document.addEventListener("click", function(e) {
    const toggleBtn = e.target.closest(".submenu-toggle-btn");
    if (toggleBtn) {
        const menuId = toggleBtn.getAttribute("data-menu-id");
        const menu = document.getElementById(menuId);
        if (menu) {
            menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
        }
        return;
    }

    const logbookBtn = e.target.closest(".living-logbook-btn");
    if (logbookBtn) {
        const stop = logbookBtn.getAttribute("data-stop");
        const lang = logbookBtn.getAttribute("data-lang") || "fr";

        const title = lang === "fr" ? "Journal de bord vivant" : "Living Logbook";
        const fallback = lang === "fr"
            ? "<p>Contenu enrichi bientôt disponible pour cette escale.</p>"
            : "<p>Enhanced content coming soon for this stop.</p>";

        const content = (ENRICHED_CONTENT[stop] && ENRICHED_CONTENT[stop][lang])
            ? ENRICHED_CONTENT[stop][lang]
            : fallback;

        openModalWithContent(title, content);
        return;
    }

    const actionBtn = e.target.closest(".submenu-action");
    if (actionBtn) {
        const stop = actionBtn.getAttribute("data-stop");
        const lang = actionBtn.getAttribute("data-lang") || "fr";
        const action = actionBtn.getAttribute("data-action");

        showLoader();

        setTimeout(() => {
            hideLoader();

            const titles = {
                fr: {
                    historical: "Contexte historique",
                    symbolic: "Analyse symbolique",
                    geopoetic: "Lecture géopoétique",
                    data_nav: "Données & navigation"
                },
                en: {
                    historical: "Historical context",
                    symbolic: "Symbolic analysis",
                    geopoetic: "Geopoetic reading",
                    data_nav: "Data & navigation"
                }
            };

            const fallback = lang === "fr"
                ? "<p>Traitement terminé. Le contenu détaillé pour cette rubrique sera ajouté bientôt.</p>"
                : "<p>Processing complete. Detailed content for this section will be added soon.</p>";

            let content = fallback;
            if (ADVANCED_CONTENT[stop] && ADVANCED_CONTENT[stop][lang] && ADVANCED_CONTENT[stop][lang][action]) {
                content = ADVANCED_CONTENT[stop][lang][action];
            }

            openModalWithContent(titles[lang][action] || "Exploration IA", content);
        }, 1200);

        return;
    }
});
</script>
