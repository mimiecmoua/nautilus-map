<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n                <h3>Île de Crespo</h3>\n                <h5>Extrait du livre</h5>\n                <p>Le début de l’aventure met en place la chasse sous-marine, la forêt immergée et la sensation d’un monde inconnu soudain rendu visible par le Nautilus.</p>\n                <p>Cette escale agit comme une scène inaugurale : elle fait entrer le lecteur dans une expérience de plongée à la fois scientifique, narrative et spectaculaire.</p>\n            ", "marine_species": "\n                <h3>Île de Crespo</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Cette séquence évoque un bestiaire sous-marin foisonnant, avec notamment l’idée d’une faune étonnante observée au plus près, dans un milieu encore mystérieux pour le lecteur du XIXe siècle.</p>\n                <p>La monstrueuse araignée de mer sert aussi d’effet dramatique, entre observation naturaliste et sensation romanesque.</p>\n            ", "science_19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Le roman dialogue avec l’essor de l’océanographie, du relevé cartographique, des sciences naturelles et des techniques de plongée qui nourrissent l’imaginaire scientifique du temps.</p>\n                <p>Le Nautilus condense cette modernité : navigation autonome, observation continue et exploration de milieux extrêmes.</p>\n            ", "compare_1866_today": "\n                <h3>Comparaison entre 1866 et aujourd'hui</h3>\n                <p>En 1866, les profondeurs marines restent largement inconnues et relèvent encore en partie du merveilleux scientifique.</p>\n                <p>Aujourd’hui, les sous-marins, la cartographie numérique, la biologie marine et l’imagerie des fonds océaniques permettent une connaissance bien plus précise, même si l’océan conserve une part de mystère.</p>\n            "}, "en": {"book_excerpt": "\n                <h3>Crespo Island</h3>\n                <h5>Book excerpt</h5>\n                <p>The beginning of the adventure introduces the underwater hunt, the submarine forest, and the sensation of an unknown world suddenly made visible by the Nautilus.</p>\n                <p>This stop works as an opening scene, bringing the reader into an experience that is at once scientific, narrative, and spectacular.</p>\n            ", "marine_species": "\n                <h3>Crespo Island</h3>\n                <h5>Marine species mentioned</h5>\n                <p>This sequence evokes an abundant underwater bestiary, especially through the idea of remarkable fauna observed up close in an environment still mysterious to a nineteenth-century reader.</p>\n                <p>The monstrous sea spider also serves as a dramatic effect, somewhere between naturalist observation and novelistic sensation.</p>\n            ", "science_19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>The novel engages with the rise of oceanography, cartographic surveying, natural sciences, and diving techniques that shaped the scientific imagination of the time.</p>\n                <p>The Nautilus condenses that modernity through autonomous navigation, continuous observation, and the exploration of extreme environments.</p>\n            ", "compare_1866_today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, the ocean depths were still largely unknown and partly belonged to the realm of scientific wonder.</p>\n                <p>Today, submarines, digital mapping, marine biology, and deep-sea imaging offer much more precise knowledge, even though the ocean still keeps part of its mystery.</p>\n            "}}, "1": {"fr": {"book_excerpt": "\n                <h3>Archipel des Pomotou</h3>\n                <h5>Extrait du livre</h5>\n                <p>L’escale souligne l’étendue de l’archipel et sa dispersion géographique, ce qui nourrit l’impression d’un Pacifique immense, fractionné en mondes insulaires.</p>\n            ", "marine_species": "\n                <h3>Archipel des Pomotou</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Le passage insiste surtout sur l’espace océanique et insulaire, mais il s’inscrit dans une logique vernienne où la biodiversité marine reste toujours à l’arrière-plan du voyage.</p>\n            ", "science_19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Les archipels du Pacifique sont au cœur des savoirs du XIXe siècle sur la géographie, les courants, les récifs et les classifications naturelles du vivant.</p>\n            ", "compare_1866_today": "\n                <h3>Comparaison entre 1866 et aujourd'hui</h3>\n                <p>En 1866, ces espaces restent difficiles à cartographier avec précision à grande échelle. Aujourd’hui, les satellites et les SIG permettent de lire instantanément la structure fine des archipels et des lagons.</p>\n            "}, "en": {"book_excerpt": "\n                <h3>Pomotou Archipelago</h3>\n                <h5>Book excerpt</h5>\n                <p>This stop emphasizes the extent of the archipelago and its geographic dispersion, reinforcing the impression of a vast Pacific broken into insular worlds.</p>\n            ", "marine_species": "\n                <h3>Pomotou Archipelago</h3>\n                <h5>Marine species mentioned</h5>\n                <p>The passage mainly stresses oceanic and insular space, yet it still belongs to Verne’s broader logic in which marine biodiversity remains a constant horizon of the journey.</p>\n            ", "science_19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>Pacific archipelagos stood at the center of nineteenth-century knowledge about geography, currents, reefs, and the natural classification of living beings.</p>\n            ", "compare_1866_today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>In 1866, such spaces remained difficult to map precisely on a large scale. Today, satellites and GIS tools allow the fine structure of archipelagos and lagoons to be read almost instantly.</p>\n            "}}, "2": {"fr": {"book_excerpt": "\n                <h3>Archipel des nouvelles Hébrides</h3>\n                <h5>Extrait du livre</h5>\n                <p>Le passage relie directement le voyage du Nautilus à la mémoire des explorateurs européens et à la chronologie des découvertes du Pacifique.</p>\n            ", "marine_species": "\n                <h3>Archipel des nouvelles Hébrides</h3>\n                <h5>Espèces maritimes mentionnées</h5>\n                <p>Ici, le texte valorise davantage l’inscription historique et géographique du lieu que le détail zoologique, mais le milieu marin demeure le cadre actif du récit.</p>\n            ", "science_19c": "\n                <h3>Découvertes scientifiques du XIXe siècle</h3>\n                <p>Ce type d’escale rappelle combien la géographie du XIXe siècle dépend encore des récits d’exploration, des relevés nautiques et des grandes expéditions maritimes.</p>\n            ", "compare_1866_today": "\n                <h3>Comparaison entre 1866 et aujourd'hui</h3>\n                <p>Les savoirs de 1866 s’appuient sur des journaux d’expédition, des cartes et des observations de terrain. Aujourd’hui, ces espaces sont documentés par des bases géographiques mondiales, l’imagerie spatiale et des relevés océanographiques continus.</p>\n            "}, "en": {"book_excerpt": "\n                <h3>New Hebrides Archipelago</h3>\n                <h5>Book excerpt</h5>\n                <p>This passage directly connects the Nautilus journey to the memory of European explorers and to the chronology of Pacific discoveries.</p>\n            ", "marine_species": "\n                <h3>New Hebrides Archipelago</h3>\n                <h5>Marine species mentioned</h5>\n                <p>Here the text emphasizes the historical and geographic inscription of the place more than zoological detail, though the marine environment remains the active setting of the narrative.</p>\n            ", "science_19c": "\n                <h3>19th-century scientific discoveries</h3>\n                <p>This kind of stop reminds us that nineteenth-century geography still depended heavily on exploration narratives, nautical surveys, and major maritime expeditions.</p>\n            ", "compare_1866_today": "\n                <h3>Comparison between 1866 and today</h3>\n                <p>The knowledge of 1866 relied on expedition journals, maps, and field observation. Today, these spaces are documented through global geographic databases, satellite imagery, and continuous oceanographic surveys.</p>\n            "}}};

function showLoader() {
    const loader = document.getElementById("dataLoaderOverlay");
    if (loader) loader.style.display = "flex";
}

function hideLoader() {
    const loader = document.getElementById("dataLoaderOverlay");
    if (loader) loader.style.display = "none";
}

function openModalWithContent(title, content) {
    document.getElementById("logbookModalLabel").innerHTML = title;
    document.getElementById("logbookModalBody").innerHTML = content;
    const modal = new bootstrap.Modal(document.getElementById("logbookModal"));
    modal.show();
}

document.addEventListener("click", function(e) {
    const toggleBtn = e.target.closest(".submenu-toggle-btn");
    if (toggleBtn) {
        const menuId = toggleBtn.getAttribute("data-menu-id");
        const menu = document.getElementById(menuId);
        if (menu) {
            menu.style.display = (menu.style.display === "none" || menu.style.display === "") ? "block" : "none";
        }
        return;
    }

    const actionBtn = e.target.closest(".submenu-action");
    if (actionBtn) {
        const stop = actionBtn.getAttribute("data-stop");
        const lang = actionBtn.getAttribute("data-lang") || "fr";
        const action = actionBtn.getAttribute("data-action");
        const group = actionBtn.getAttribute("data-group");

        const titles = {
            fr: {
                book_excerpt: "Extrait du livre",
                marine_species: "Espèces maritimes mentionnées",
                science_19c: "Découvertes scientifiques du XIXe siècle",
                compare_1866_today: "Comparaison entre 1866 et aujourd'hui"
            },
            en: {
                book_excerpt: "Book excerpt",
                marine_species: "Marine species mentioned",
                science_19c: "19th-century scientific discoveries",
                compare_1866_today: "Comparison between 1866 and today"
            }
        };

        const fallback = lang === "fr"
            ? "<p>Traitement terminé. Le contenu détaillé pour cette rubrique sera ajouté bientôt.</p>"
            : "<p>Processing complete. Detailed content for this section will be added soon.</p>";

        const content = (
            DETAILED_CONTENT[stop] &&
            DETAILED_CONTENT[stop][lang] &&
            DETAILED_CONTENT[stop][lang][action]
        ) ? DETAILED_CONTENT[stop][lang][action] : fallback;

        if (group === "ai") {
            showLoader();

            setTimeout(() => {
                hideLoader();
                openModalWithContent(titles[lang][action] || "Exploration IA", content);
            }, 2400);
        } else {
            openModalWithContent(titles[lang][action] || "Journal de bord vivant", content);
        }

        return;
    }
});
</script>
