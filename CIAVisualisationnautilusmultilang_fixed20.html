uding the octopus and squid.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of geography, Matthew Maury, an American naval officer, made significant contributions to oceanography. He developed methods for analyzing logbook data from ships' voyages to create detailed charts of ocean currents, which he published in his \"Physical Atlas\" (1855).</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>The discipline of electricity saw important developments during this period as well. Michael Faraday, a British scientist, conducted groundbreaking research on electromagnetism and electrochemistry. His inventions included the electric motor (1821) and the dynamo (1831). Another notable figure was James Clerk Maxwell, who formulated the classical theory of electromagnetism, including Maxwell's equations (1864-1865).</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in advancing knowledge during this time. One such expedition was the Challenger Expedition (1872-1876), which aimed to study the geology, zoology, and physics of the ocean floor. The expedition used advanced instruments like the dredge net and deep-sea sounding apparatus to collect</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ South of England Coast</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the _Nautilus_ stopped south of the English coast, a region teeming with diverse marine life such as common dolphins, harbor seals, and various species of fish like cod and bass. The crew observed these creatures from the Nautilus' windows, a novel technology at the time that provided a glimpse into the underwater world. In contrast to modern technology, their observations were limited by the capabilities of the submarine's electric lights and the physical limitations of the observation chambers.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Fast forward to 2025, the same region off the English coast is monitored by autonomous underwater vehicles (AUVs) equipped with advanced sonar systems and high-resolution cameras. These AUVs can map the seafloor in detail, providing insights into the distribution and abundance of marine species such as blue whales, which were rarely seen during Captain Nemo's time. Additionally, advances in genetic sequencing have allowed scientists to identify new species discovered in this region, like the deep-sea anglerfish (Melanocetus johnsonii), a creature that would have been unimaginable to Jules Verne and his readers.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo's _Nautilus_ relied on sailing and electric propulsion to navigate the waters. Modern submarines, such as the British Astute-class, employ nuclear power for propulsion, allowing them to remain submerged for extended periods while maintaining high speeds. These submarines also use sophisticated sonar systems to detect and avoid obstacles, a significant improvement over the _Nautilus_' reliance on Captain Nemo's intuition.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 2025, communication technology has advanced significantly compared to the telegraph used by Captain Nemo. Modern submarines are equipped with satellite communications, enabling them to maintain contact with surface ships and transmit data in real-time. This advancement allows for more efficient coordination between submarines and surface vessels during missions, a far cry from the isolation experienced by the crew of the _Nautilus_.</p></div>\n          </div>\n        </div>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Les savants de l'époque ont fait des avancées importantes dans le domaine de la zoologie marine, notamment Louis Agassiz en Suisse et Jean-Baptiste Lamarck en France. Ils ont étudié les cétacés et ont décrit des espèces nouvelles, comme le baleine bleue et le rorqual.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière d'électricité, Michael Faraday en Angleterre a effectué de nombreuses expériences sur l'induction électromagnétique et la pile électrique. Il a inventé le générateur électromotrice et a étudié les propriétés des courants électriques alternatifs et continus.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la géographie, l'expédition Challenger (1872-1876) a collecté des données sur les mers du monde entier, incluant celles du Pacifique. Elle a étudié les profondeurs, la topographie marine et la faune marine, y compris les cétacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la chimie, Marcellin Berthelot en France a effectué des recherches sur la chimie organique et la chimie physique. Il a étudié les réactions chimiques et a développé des méthodes pour déterminer les compositions de certains gaz.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant cette période, les expéditions scientifiques ont utilisé divers instruments, tels que les microscopes, les thermomètres, les baromètres</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, lors de l'escale du Nautilus dans les mers du Nord, le Cristobal-Colon a observé une espèce cétacée exceptionnelle, dont la vitesse de déplacement était surprenante. Cette espèce n'a jamais été identifiée avec certitude.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2025 : Dans cette même région, des chercheurs ont observé en 2018 une espèce de cétacés, le rorqual bleu, qui peut atteindre des vitesses de déplacement allant jusqu'à 50 km/h. Des études génétiques ont révélé que ce rorqual bleu est un descendant du mystérieux cétacé observé par le Cristobal-Colon en 1866.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, lorsque le Nautilus a observé diverses espèces marines dans les mers du Nord, il n'y avait pas de moyens de communication instantanée pour partager ces observations avec d'autres navires ou scientifiques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2025 : Aujourd'hui, lorsque des chercheurs observent des espèces marines dans les mers du Nord, ils peuvent partager leurs découvertes en temps réel grâce aux télécommunications instantanées et à Internet. Par exemple, en 2017, des données sur la population de baleine bleue ont été partagées entre chercheurs d'Europe et d'Amérique du Nord grâce à une plateforme de partage de données en temps réel.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, lorsque le Nautilus a observé des espèces marines dans les mers du Nord, il n'y avait pas de moyens de localiser précisément ces espèces grâce à des technologies telles que la sonar ou l'ADCP (Acoustic Doppler Current Profiler).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2025 : Aujourd'hui, lorsque des chercheurs observent des espèces marines dans les mers du Nord, ils peuvent utiliser des technologies telles que le sonar et l'ADCP pour localiser précisément ces espèces. Par exemple, en 2018, des chercheurs ont utilisé un sonar pour localiser une colonie de baleines bleues dans la mer du Nord.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, lorsque le Nautilus a observé diverses espèces marines dans les mers du Nord, il n'y avait pas de moyens de préserver et d'étudier ces espèces en détail.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2025 : Aujourd'hui, lorsque des chercheurs observent des espèces marines dans les mers du Nord, ils peuvent utiliser des techniques telles que la biopsie pour prélever des échantillons de tissus et étudier ces espèces en détail. Par exemple, en 2017, des chercheurs ont utilisé une biopsie pour étudier les cellules de la peau d'une baleine bleue dans la mer du Nord.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>North of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the key figures in marine zoology was Georges Cuvier, who classified over 40,000 species and established the principles of comparative anatomy. His work laid the foundation for understanding the diversity of life in the oceans.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of biology, Charles Darwin's \"On the Origin of Species\" was published in 1859, proposing the theory of evolution by natural selection. Although not directly mentioned in the passage, this theory would have a profound impact on the understanding of marine life and its evolution.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Jean-Baptiste Lamarck's work on invertebrates, such as the \"Hydre\" (1802), also contributed to the study of marine zoology. Meanwhile, in chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, including his work on electromagnetic induction and the development of the first electric motor.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in these advancements. The HMS Challenger expedition (1872-1876) was one of the most significant, mapping the ocean floor, discovering new species, and collecting samples to study. These expeditions often used advanced instruments like diving bells, nets, and sounding lines to collect data about the oceans and their inhabitants.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In terms of communication, the laying of the Atlantic cable in 1866, as hinted at in the passage, marked a significant milestone in the era, facilitating rapid global communication and potentially contributing to the spread of news about marine discoveries.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ North of England Coast</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the North Sea teemed with a variety of marine life, including fish, seabirds, and occasional sightings of whales. The Nautilus, Jules Verne's fictional submarine, observed these species through its portholes, much like modern-day research vessels equipped with remotely operated vehicles (ROVs) do today. In contrast, the technology available in 1866 was limited; the Nautilus relied on hand-cranked propellers and simple observation equipment, while modern vessels use sonar systems, satellite navigation, and advanced imaging tools to study marine ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, news of a rare species sighting could travel slowly due to the newly laid Atlantic cable, causing excitement among scientists and sailors alike. Today, in 2025, instant global communication via the internet allows for immediate sharing of scientific discoveries, such as the identification of new marine species or the tracking of migratory patterns. For example, the discovery of the elusive Greenland shark, a species thought to have been extinct until its rediscovery in 2016, would have reached a global audience within minutes in 2025.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus encountered stories and rumors about a mysterious flying creature that was said to have delayed telegrams in the Atlantic Ocean. Today, in 2025, such tales would be replaced by reports of underwater robots that have explored the deepest parts of the ocean, like the James Cameron-piloted DEEPSEA CHALLENGE submersible or the remotely operated vehicle (ROV) used during the National Geographic expedition to the Mariana Trench in 2012.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, in 1866, the discovery of a rare marine species could lead to an \"arms race\" among nations, as they raced to catch and study the creature. Today, in 2025, international cooperation is more common, with scientists sharing data and working together to protect and understand the world's oceans. For instance, the Census of Marine Life, a global initiative that ran from 2000 to 2010, aimed to assess the diversity, distribution, and abundance of marine life, providing valuable insights into the health of our planet's oceans.</p></div>\n          </div>\n        </div>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>«Maelstrom! Maelstrom!» s'écriait-il!</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ces dangereux parages de la côte norwégienne? Le _Nautilus_ était-il</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Hippocampe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sciène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pintadine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Alcyon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasse</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Côtes de la Norvège</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les découvertes scientifiques ont été abondantes et ont apporté de nombreuses avancées dans divers domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, le naturaliste français Jean-Baptiste Lamarck avait déjà identifié plusieurs espèces marines en Norvège au début du siècle. En 1864, l'expédition Challenger a exploré les mers norvégiennes et a découvert de nouvelles espèces marines, notamment des cétacés et des crustacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En électricité, Michael Faraday a effectué de nombreuses expériences à Londres en 1864, découvrant les lois de l'induction électromagnétique et inventant le générateur électrique à aimant permanent. En Norvège, Kristian Birkeland a également réalisé des recherches sur la magnétisme terrestre et a découvert les auroras polaires en 1869.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition norvégienne de Fridtjof Nansen à travers le pôle Nord a commencé en 1866. Cette expédition a permis d'avancer notre compréhension de la glaciation et du climat polaire.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Jean-Baptiste Dumas a effectué des recherches sur les lois atomiques dans les années 1860. En Norvège, le chimiste Christian Christiansen a également travaillé sur la chimie organique et a découvert plusieurs nouvelles molécules.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Côtes de la Norvège</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Navigation : En 1866, le _Nautilus_ a utilisé une propulsion hydraulique pour naviguer le long des côtes norvégiennes. Aujourd'hui, en 2025, les navires utilisent généralement des moteurs diesel ou électriques pour la propulsion, comme le sous-marin nucléaire français _Le Triomphant_.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Espèces observées : En 1866, Aronnax et ses compagnons ont observé plusieurs espèces marines, notamment la baleine, le cachalot, le narval, la raie, l'hippocampe, la sciène, la pintadine et le poulet de mer. Aujourd'hui, en 2025, ces espèces sont encore présentes dans cette région, mais des espèces invasives, telles que les anguilles royales asiatiques, ont également été observées, menaçant la biodiversité locale.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Technologies : En 1866, le _Nautilus_ n'avait pas de système de communication radio ou satellite pour communiquer avec les autres navires. Aujourd'hui, en 2025, les navires sont équipés de systèmes de communication satellitaire permettant de communiquer en temps réel avec d'autres navires et les stations terrestres.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Dangers marins : En 1866, le _Nautilus_ a manqué de peu d'être capturé dans un maelstrom, une tempête marine violente et dangereuse. Aujourd'hui, en 2025, les navires doivent également faire face à des dangers marins tels que les ours polaires, les glaces flottantes et les vagues géantes, qui peuvent être causées par des phénomènes météorologiques extrêmes ou des activités humaines telles que l'exploration pétrolière.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Coast of Norway</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“The maelstrom! the maelstrom!” Could a more dreadful word in a more dreadful situation have sounded in our ears! We were then upon the dangerous coast of Norway. Was the Nautilus being drawn into this gulf at the moment our boat was going to leave its sides? We knew that at the tide the pent-up waters between the islands of Ferroe and Loffoden rush with irresistible violence, forming a whirlpool from which no vessel ever escapes.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Croaker</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Soft coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasso</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Coast of Norway</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: Georges Cuvier (1769-1832) and Henri Marie Ducrotay de Blainville (1777-1850) were prominent figures in marine zoology during this period. They made important contributions to the classification of marine life, including fish species. The study of fishes was particularly significant as it helped expand our understanding of aquatic ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography and Oceanography: In 1864, the Challenger Expedition took place, a British scientific voyage that explored the world's oceans. Its primary goal was to map the ocean floor and study marine life. The expedition provided valuable data about the geography of the seabed, deep-sea organisms, and the distribution of coral reefs.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: Michael Faraday (1791-1867) was a British scientist who made significant contributions to the understanding of electromagnetism and electrochemistry. His discoveries included the principles behind the electric motor, generator, and the chemistry of diamagnetic materials. Faraday's work paved the way for future advancements in electricity-related technologies.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: Jean-Baptiste de Lamarck (1744-1829) and Charles Darwin (1809-1882) were influential figures in the field of chemistry and biology, respectively. Although primarily known for his work on evolution, Darwin also made contributions to marine biogeography through his studies of coral reefs. Jean-Baptiste L</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Coast of Norway</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus, Captain Nemo's submarine, navigated the treacherous coast of Norway, observing various marine species such as whales, sperm whales, narwhals, rays, seahorses, croakers, pearl oysters, and octopuses. The crew, consisting of Professor Aronnax, Conseil, and Ned Land, were unaware of the existence of DNA, a fundamental molecule that carries genetic information in every living organism, discovered by James Watson and Francis Crick in 1953.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, researchers exploring the same Norwegian coast would have access to advanced technologies like DNA sequencing machines, enabling them to study these marine species at a molecular level. For instance, they could analyze the genetic diversity of sperm whales, which are known for their large brains and complex social structures, or investigate the unique adaptations of narwhals, whose tusks may contain nanostructures that can be used in medical imaging technologies.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the crew's knowledge about marine ecosystems was limited compared to modern times. They were unaware of the concept of marine protected areas (MPAs), which are now crucial for preserving biodiversity and maintaining healthy ocean ecosystems. In Norway, there are numerous MPAs established to protect important habitats such as kelp forests and cold-water coral reefs.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 2025, researchers would use satellite imagery and AI algorithms to monitor these MPAs effectively, ensuring their conservation efforts are targeted and efficient. For example, they could use remote sensing data to track the movements of whales within the protected areas, helping to minimize human-whale interactions and reduce the risk of entanglement in fishing gear. Additionally, they might employ autonomous underwater vehicles (AUVs) to explore deep-sea environments without disturbing fragile ecosystems, providing valuable insights into the biodiversity and ecology of these areas.</p></div>\n          </div>\n        </div>"}}};

                science_19c:        "🔬 19th-century scientific discoveries",
                compare_1866_today: "⚗️ Comparison between 1866 and today"
            }
        };

        const fallback = lang === "fr"
            ? "<p>Contenu disponible bientôt.</p>"
            : "<p>Content coming soon.</p>";

        const content = (
            DETAILED_CONTENT[stop] &&
            DETAILED_CONTENT[stop][lang] &&
            DETAILED_CONTENT[stop][lang][action]
        ) ? DETAILED_CONTENT[stop][lang][action] : fallback;

        if (group === "ai") {
            showLoader();

        } else {

});
