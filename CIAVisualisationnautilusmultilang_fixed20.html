sées qui correspondent à l'extrait cité de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les explorations océanographiques ont permis de découvrir de nombreuses espèces marines inconnues jusqu'alors, notamment en Méditerranée et dans les eaux autour des îles Canaries, où le Nautilus aurait pu naviguer selon l'intrigue du roman. Des savants tels que Lacépède ont contribué à la connaissance de ces espèces.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Géographie : Les cartes et les recherches géographiques ont permis d'avancer dans la compréhension de la géographie mondiale et des régions inexplorées, notamment en ce qui concerne l'Atlantique, où se trouve l'Atlantide selon le roman. Des géographes tels que D'Anville, Malte-Brun et Humboldt ont contribué à la cartographie et à la compréhension de ces régions.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Électricité : Les progrès dans l'étude de l'électricité ont permis de comprendre les phénomènes électriques naturels, notamment ceux liés aux phénomènes océaniques. Des savants tels que Faraday ont contribué à la compréhension de ces phénomènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expéditions scientifiques : Les expéditions scientifiques ont permis d'explorer des régions inconnues et de recueillir des données sur la faune, la flore, la géologie et la météorologie</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ L'Atlantide</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, le Nautilus de Jules Verne naviguait dans l'Atlantique Nord, observant des espèces marines telles que les cétacés, requins, raies, épaulards, dorades, pieuvres, coquillages et homards. Aujourd'hui, en 2025, des études de biologie marine ont révélé l'existence de nouvelles espèces dans la même région, comme le mégalodon (requin géant disparu depuis longtemps) grâce aux technologies d'écoute acoustique avancées.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, les connaissances sur l'Atlantide étaient basées sur des légendes et théories antiques. Aujourd'hui, avec l'avènement de la géophysique et de la cartographie marine, il est possible d'étudier la structure du fond marin et les mouvements tectoniques qui pourraient avoir pu créer ou détruire des continents comme l'Atlantide.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, le Nautilus était équipé de technologies de navigation rudimentaires, comprenant un baromètre et une boussole. Aujourd'hui, les navires utilisent des systèmes GPS et d'autres technologies de positionnement pour naviguer avec précision dans l'océan.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, Jules Verne décrit l'Atlantide comme portant \"les irrécusables témoignages de sa catastrophe\". Aujourd'hui, les études sur la pollution marine et le changement climatique révèlent que certaines régions marines sont en crise, avec des déversements d'huile, des déchets plastiques et des changements dans la composition de l'air et de l'eau. Cela menace les espèces marines observées par le Nautilus, comme les cétacés, qui sont sensibles aux pollutions sonores et chimiques.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Atlantis</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Swordfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sea Bream</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Shell</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Jellyfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Sea anemone</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Kelp</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Aquatic plant</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Atlantis</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 1866-1870 period, several significant scientific discoveries and advancements were made that relate to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: French naturalist Jean Louis Rodolphe Agassiz (1807-1873) was a pioneer in marine zoology, particularly focusing on glacial theory and the study of fossilized fish. His work contributed to the understanding of geological changes and the evolution of life forms. In 1864, he led an expedition to the United States to investigate glaciation and the distribution of freshwater fish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: English chemist Michael Faraday (1791-1867) made groundbreaking contributions to the field of electrochemistry during this period. He discovered electromagnetic induction, dielectric and diamagnetic effects, and established the principles of electrolysis. His work laid the foundation for the development of electric motors, generators, and batteries.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: British scientist William Thomson (Lord Kelvin) (1824-1907) made significant advancements in the understanding of electricity and thermodynamics. He formulated a mathematical model for electromagnetic fields and developed the first practical electric telegraph system. In 1862, he proposed the absolute zero temperature theory, which is essential to understanding the behavior of matter at low temperatures.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Geology: French naturalist Georges Cuvier (1769-1832) and French zoologist Henri Marie Ducrotay de Lacépède (1756-1825) made significant contributions to the field of geology during an earlier period but were still influential in the 1860s. C</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Atlantis</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, during the Nautilus' stop at the approximate cartographic location of Atlantis, Captain Nemo and his crew observed various marine species such as cetaceans, sharks, rays, swordfish, sea bream, octopuses, shells, and lobsters. The technology available was limited, with the main source of light being torches or lanterns, and communication relied on verbal language or hand signals.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, a similar journey would reveal significantly advanced technologies. For instance, underwater drones equipped with high-resolution cameras and sonar systems could be deployed to explore the depths and map the seafloor with greater accuracy than the Nautilus' manual charting. Additionally, communication technology has evolved, enabling real-time data sharing among researchers worldwide.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the understanding of marine ecology was still in its infancy. The observed species were primarily identified based on their physical characteristics and behavior, with little knowledge about their interrelationships or roles within the ecosystem. In contrast, by 2025, advancements in genetics and molecular biology have allowed for more precise identification of marine species, as well as insights into their genetic diversity, evolutionary history, and ecological interactions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, in 1866, the concept of Atlantis was still a matter of debate among scholars, with some considering it a mythical place. However, by 2025, advancements in archaeology and underwater exploration have led to the discovery of numerous submerged cities and civilizations, sparking renewed interest in the possible existence of Atlantis. While no definitive evidence has been found yet, ongoing research continues to explore the possibility that such a lost civilization might exist somewhere on the ocean floor.</p></div>\n          </div>\n        </div>"}}, "13": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>La mer des Sargasses</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Dauphin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 llenger a collecté des échantillons de sargasses dans l'Atlantique Nord et a découvert une grande diversité de vie marine y résidant.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière de zoologie marine, les scientifiques ont également étudié les espèces de poissons, de crustacés et d'autres animaux marins présents dans la mer des Sargasses. En 1862, le naturaliste français Henri Marie Ducrotay de Blainville a décrit une nouvelle espèce de requin, le requin-baleine à longues dents (Rhincodon typus), qui est communément trouvé dans ces eaux.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En outre, la mer des Sargasses a également été un sujet d'intérêt pour les scientifiques en matière de géographie et de chimie. En 1867, l'expédition française de l'Astrolabe a exploré cette région et a collecté des données sur la circulation océanique dans l'Atlantique. De plus, les scientifiques ont également étudié la composition chimique de la sargasse elle-même, qui</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ La mer des Sargasses</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Navigation du Nautilus : En 1866, le Nautilus navigait à la vue de la mer, avec une direction vers l'Atlantique. En 2025, un navire équipé de GPS et de systèmes d'aide à la navigation peut suivre des cartes numériques précises pour atteindre la même zone.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Espèces observées : En 1866, les espèces observées par le Nautilus étaient principalement des baleines, dauphins, marsouins, cétacés, requins, raies, thons et poissons volants. En 2025, ces mêmes espèces sont encore présentes dans la mer des Sargasses, mais leurs populations peuvent être affectées par les changements climatiques et les pollutions marines.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Découvertes : En 1866, la mer des Sargasses était une région peu connue des scientifiques. Aujourd'hui, elle est un sujet d'étude pour de nombreux chercheurs en écologie marine et en océanographie, qui ont découvert que les sargasses sont en partie causées par des pollutions provenant des côtes américaines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Technologies : En 1866, le Nautilus était un navire fictif dans le roman de Jules Verne. Aujourd'hui, il n'existe pas encore de navires réels équipés de la technologie du Nautilus (submersible à propulsion nucléaire), mais les sous-marins modernes sont équipés de sonars et de caméras pour explorer les fonds marins.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>The Sargasso Sea</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; ma le des Poissons\" published between 1803 and 1804.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday (1791-1867) was a British scientist who made groundbreaking discoveries in the fields of electromagnetism, electrochemistry, and chemistry. His work on electrolysis, published in 1834, helped</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ The Sargasso Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus sailed through the Sargasso Sea, a vast expanse of floating seaweed located in the North Atlantic Ocean. The crew observed various marine species such as whales, dolphins, porpoises, sharks, rays, tuna, and flying fish. In contrast, by 2025, advancements in marine technology have allowed for more comprehensive studies of this unique ecosystem.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the exact cause of the Sargasso Sea's seaweed accumulation remained a mystery. However, by 2025, scientists discovered that the seaweed, known as Sargassum, is primarily carried by ocean currents and wind, with nutrient-rich waters providing ideal conditions for its growth.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus crew could only observe marine life from a distance. By 2025, remote operating vehicles (ROVs) and autonomous underwater vehicles (AUVs) have been developed, allowing scientists to explore the deep sea and study marine species in greater detail without human divers. For instance, these technologies have contributed significantly to understanding the behavior of the giant oceanic manta ray, a species that was also observed by the Nautilus crew in 1866.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Sargasso Sea's biodiversity was relatively unknown. By 2025, advances in genetics and molecular biology have enabled scientists to identify new marine species and better understand their roles within the ecosystem. For example, research on the Sargassum fish, a small teleost fish that feeds on the seaweed, has provided insights into its adaptation to this unique environment.</p></div>\n          </div>\n        </div>"}}, "14": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Afrique Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Afrique Nord</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à ce passage de l'extrait du roman. À cette époque, les savants tels que Georges Cuvier, Jean-Baptiste Lamarck et Louis Agassiz travaillaient sur la zoologie marine en Europe. En Amérique du Nord, Charles Darwin était un naturaliste célèbre pour ses travaux sur l'évolution des espèces, notamment son livre \"L'Origine des Espèces\" publié en 1859.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière de zoologie marine, les observations de cet animal étrange ont été faites à plusieurs reprises par différents navires, comme le Cristobal-Colon, l'Helvetia et le Shannon. Cet animal est probablement un cétacé, mais sa vitesse extraordinaire, qui permettrait au même individu d'être observé sur deux points séparés par plus de 700 lieues marines à trois jours d'intervalle, n'a pas été confirmée par les scientifiques de l'époque.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En outre, la découverte de l'électricité et ses applications sont également importantes dans ce contexte. Michael Faraday, un chimiste britannique, a travaillé sur l'électrochimie et l'électromagnétisme au cours des années 1830 et 1840. Les navires de la West India and Pacific steam navigation Company et de la Compagnie Nationale utilisaient peut-être des instruments électriques pour faciliter leur navigation, ce qui permettrait d'expliquer comment différents navires ont pu observer cet</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Contour Afrique Nord</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Navigation : En 1866, les navires de croisière tels que le Cristobal-Colon utilisaient la voile et la vapeur pour se déplacer sur des milliers de lieues marines. Aujourd'hui en 2025, les navires utilisent principalement des moteurs diesel ou électriques plus efficaces, permettant une vitesse et une manœuvrabilité supérieures. Par exemple, le record de vitesse pour un navire passe-crabe est détenu par le Mayflower Autonomous Ship, qui a atteint 16 nœuds (29 km/h) en 2020.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Communication : En 1866, la communication entre les navires était limitée aux signaux de fumée et aux messages envoyés par courrier postal. Aujourd'hui, les navires sont équipés de radios, téléphones satellitaires et internet, permettant une communication instantanée avec d'autres navires et les terres. Par exemple, en 2019, un navire a pu envoyer des images sous-marines en temps réel via le satellite.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Espèces marines : En 1866, les espèces marines observées étaient décrites pour la plupart à l'aide de descriptions subjectives et de comparaisons avec d'autres animaux terrestres. Aujourd'hui, grâce aux technologies de l'information géographique (GIS), des images sous-marines et des analyses génétiques, les espèces marines peuvent être étudiées en détail pour comprendre leur comportement, leur distribution et leur interaction avec l'environnement. Par exemple, en 2019, des chercheurs ont utilisé des images satellites pour suivre la migration annuelle d'une colonie de manchots.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Technologies sous-marines : En 1866, les technologies sous-marines étaient limitées à des submersibles tels que le Nautilus dans le roman de Jules Verne, qui était un concept fictif. Aujourd'hui, les submersibles réels existent et sont utilisés pour explorer l'océan profond. Par exemple, en 2019, des scientifiques ont utilisé le submersible Nautile pour explorer la fosse des Mariannes, découvrant de nouvelles espèces marines et étudiant les écosystèmes sous-marins.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>North Africa Coast</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North Africa Coast</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: The study of marine life, particularly fish, was a major focus during this period. Notable scientists like Georges Cuvier (1769-1832) and Jean-Baptiste de Lamarck (1744-1829) made significant contributions to the field. Cuvier, known as the father of comparative anatomy, described various marine species based on their fossil remains. Meanwhile, in the 1860s, Pierre-Joseph van Beneden (1809-1894) and Alphonse Milne-Edwards (1835-1900) were studying cephalopods, including squids, which might have some resemblance to the creature mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century witnessed numerous scientific expeditions aimed at mapping the world and exploring uncharted territories. For instance, the French expedition led by Jules Dumont d'Urville (1790-1842) discovered Adélie Land in Antarctica in 1840. Meanwhile, the British Challenger Expedition (1872-1876) was instrumental in collecting data on marine life and geology from various parts of the world's oceans.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The understanding and application of electricity were also advancements of the 19th century. Michael Faraday (1791-1867), a British scientist, made significant contributions to electromagnetism and electrochemistry. He discovered electromagnetic induction in</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ North Africa Coast</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus was equipped with formidable fishing apparatus to catch various marine species during their journey towards the South Pole. The crew's excitement grew when they learned about a sighting of the elusive flying fish three weeks prior in the North Pacific Ocean. This discovery was significant as it was one of the earliest recorded observations of this species outside its traditional tropical habitats, due to advancements in shipping routes and communication through the Atlantic cable.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, marine research vessels are equipped with advanced sonar technology and autonomous underwater drones that can map and study vast areas of the ocean floor, including the North Africa coast. These technologies have led to the discovery of new marine species, such as the yeti crab (Kiwa hirsuta) found in hydrothermal vents, and the observation of the Great Barrier Reef's coral bleaching events due to climate change.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, communication was limited by the Atlantic cable, making news of marine discoveries travel slowly. Today, in 2025, real-time data from oceanic research is shared globally through satellite networks and online databases, allowing for immediate collaboration and analysis among scientists worldwide. This rapid exchange of information has greatly accelerated our understanding of marine ecosystems and the challenges they face.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, while the Nautilus in 1866 relied on traditional fishing methods to study marine life, modern research vessels use non-invasive techniques such as remote sensing and biopsy darts to minimize disturbance to marine ecosystems. This approach ensures that future generations can continue to learn from and appreciate the wonders of the ocean, just as the crew of the Nautilus did in 1866.</p></div>\n          </div>\n        </div>"}}, "15": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Amérique Sud</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Sud</h5>\n                    <p>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>", "compar x;font-size:1.3rem;'>🐚 Ptéropode</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>⭐ Astérie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Alcyon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Formation coralligène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Morse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Otarie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#2 breuses découvertes importantes. Il a inventé le générateur électromagnétique et a étudié les propriétés des courants électriques. Son travail a été crucial pour la compréhension de l'électricité et de ses applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, Alexander von Humboldt a mené une expédition dans les Andes sud-américaines pour étudier le climat, la flore et la faune de cette région. Ses recherches ont conduit à des avancées significatives en géologie, botanique et zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, John Dalton a développé la théorie atomique, qui explique la composition des éléments chimiques et leur comportement chimique. Cette théorie a été cruciale pour l'avancement de la chimie et a permis de comprendre les réactions chimiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les découvertes scient</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Navigation : En 1866, le Nautilus doublait le cap Horn à bord d'une frégate à voile, atteignant cette escale avec une vitesse prodigieuse grâce à ses mains et ses voiles. En 2025, des navires de croisière modernes, équipés de propulseurs électriques et d'hélices à pas variable, peuvent également doubler le cap Horn avec une vitesse accrue en utilisant leur système de positionnement GPS.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Espèces marines : En 1866, les espèces observées dans cette région comprenaient des baleines, marsouins, cétacés, baleinoptères, raies, moules, tritons et ptéropodes. Aujourd'hui, malgré l'impact de la pollution et de la surpêche, une grande variété de cétacés et d'autres espèces marines peuvent toujours être observées dans cette zone, grâce à des découvertes récentes sur les migrations des animaux marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences et technologie : En 1866, la connaissance des océans était encore limitée, et le Nautilus explorait de manière pionnière des zones inconnues pour l'homme. Aujourd'hui, grâce à des satellites d'observation de la Terre, de nombreuses informations sur les océans sont disponibles en temps réel, permettant une meilleure compréhension de leur écosystème et des effets de la pollution.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Écologie marine : En 1866, le Nautilus observait des espèces marines dans un état naturel, sans intervention humaine significative. Aujourd'hui, les activités humaines telles que la pêche et l'exploitation minière ont un impact important sur les écosystèmes marins. Les scientifiques travaillent actuellement à réduire ces impacts en développant des pratiques de gestion durable des ressources marines, telles que la pêche responsable et le respect des zones protégées.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Horn</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The frigate skirted the south-east coast of America with great</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>rapidity. The 3rd of July we were at the opening of the Straits of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Magellan, level with Cape Vierges. But Commander Farragut would not</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>take a tortuous passage, but doubled Cape Horn.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Fin Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Triton shell</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Sea butterfly</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>⭐ Starfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Jellyfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Soft coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral formation</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Walrus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Manatee</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Sea lion</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatross</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Horn</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: The study of marine life was a major focus during this period. Georges Cuvier (1769-1832), a French naturalist, is renowned for his work on comparative anatomy and paleontology. He classified many marine species and laid the foundations for modern vertebrate taxonomy. Jean-Baptiste de Lamarck (1744-1829) proposed the theory of evolution before Charles Darwin, suggesting that organisms change over time in response to their environment.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable figure is Henri Marie Ducrotay de Blainville (1777-1850), who described several marine species, including the narwhal mentioned in the passage. The narwhal, a large whale with a distinctive long, spiraled tusk, was often associated with myths and legends, leading some sailors to believe it could not pass through narrow straits like the Straits of Magellan or Cape Horn.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: Exploration and mapping of remote regions, such as the Straits of Magellan and Cape Horn, were significant during this era. The Straits of Magellan, discovered by Ferdinand Magellan in 1520, became a major shipping route connecting the Atlantic and Pacific Oceans. In the 19th century, expeditions led by explorers like Robert FitzRoy (1805-1865) continued to chart these waters, improving understanding of the region's geography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cape Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus observed various marine species during its stop at Cape Horn, including whales, porpoises, cetaceans, fin whales, rays, mussels, triton shells, and sea butterflies. Modern-day scientists have discovered new species in this region as well, such as the giant squid (Architeuthis dux) and the Patagonian toothfish (Dissostichus eleginoides).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to 1866, the year 2025 has seen significant advancements in marine technology. Autonomous underwater vehicles (AUVs) are now commonplace for deep-sea exploration. For instance, the Remotely Operated Vehicle (ROV) Jason, operated by Woods Hole Oceanographic Institution, has made numerous discoveries in the deep sea, including hydrothermal vents and new species.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus crew expressed skepticism about the narwhal's ability to pass through the Straits of Magellan due to its size. However, in 2025, satellite tracking technology allows scientists to monitor the movements of various whale species, including the narwhal, across vast distances and different marine environments.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, while Jules Verne's novel describes the Nautilus' crew encountering many marine species during its voyage, modern-day researchers have a more comprehensive understanding of marine ecosystems and biodiversity. For example, the Census of Marine Life (CoML) project, active from 2000 to 2010, aimed to document all known marine life in order to better understand their roles within ecosystems and the threats they face. In contrast to the Nautilus' crew, modern researchers can use this wealth of information to study and conserve marine species more effectively.</p></div>\n          </div>\n        </div>"}}, "17": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pôle Sud</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>C'est votre capitaine Cook, à vous autres, Français. Infortuné savant! Avoir bravé les banquises du pôle Sud, les coraux de l'Océanie, les cannibales du Pacifique, pour périr misérablement dans un train de chemin de fer! Si cet homme énergique a pu réfléchir pendant les dernières secondes de son existence, vous figurez-vous quelles ont dû être ses suprêmes pensées!» En parlant ainsi, le capitaine Nemo semblait ému, et je porte cette émotion à son actif. Puis, la carte à la main, nous revîmes les travaux du navigateur français, ses voyages de circumnavigation, sa double tentative au pôle Sud qui amena la découverte des terres Adélie et Louis-Philippe, enfin ses levés hydrographiques des principales îles de l'Océanie.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleinoptère</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Triton</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Ptéropode</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); gin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatros</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Pingouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Manchot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Pétrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pôle Sud</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, de nombreuses découvertes scientifiques ont été réalisées par des savants tels que Georges Cuvier, Jean-Baptiste Lamarck, Charles Darwin et Henri Marie Ducrotay de Broglie (Lacépède) dans les domaines de la zoologie marine, de la géographie, de la chimie et de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la zoologie marine, des expéditions scientifiques ont permis de découvrir de nouvelles espèces d'animaux marins, notamment dans les eaux du Pacifique Sud. En 1869, l'expédition française de Jules Dumont d'Urville a exploré la Terre Adélie et la Terre Louis-Philippe en Antarctique, découvrant une grande variété de faune marine inconnue jusqu'alors.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué des recherches pionnières sur les électroaimants et la génération d'électricité à partir de sources naturelles telles que les courants marins. En 1865, il a démontré que l'électricité pouvait être utilisée pour produire des effets mécaniques, ce qui a ouvert la voie à de nombreuses applications pratiques de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les progrès ont été faits dans le domaine des analyses chimiques et de la synthèse de nouveaux composés. En 1867, Jean-Baptiste Dumas a découvert l'azote az</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pôle Sud</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Navigation : En 1866, le Nautilus de Jules Verne était équipé d'un moteur à vapeur pour naviguer vers le Pôle Sud. Aujourd'hui en 2025, les navires utilisent des moteurs électriques plus efficaces et écologiques, tels que les moteurs à hydrolien ou à batterie, qui permettent de réduire leur empreinte carbone.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Espèces marines : En 1866, Nemo observait des espèces comme la baleine, le marsouin, le cétacé, le baleinoptère, la raie, le moule, le triton et le ptéropode. Aujourd'hui en 2025, grâce aux progrès de l'écologie marine, des études ont été menées pour identifier et protéger de nouvelles espèces marines dans la région du Pôle Sud, telles que le krill Antarctique ou les manchots empereur.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Découvertes : En 1866, Nemo faisait référence aux coraux de l'Océanie, mais aujourd'hui en 2025, grâce aux avancées en biologie marine et à la technologie sous-marine, des découvertes importantes ont été faites sur les coraux du Pôle Sud, tels que le corail de l'empereur (Empetra spp.).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Technologies : En 1866, Nemo utilisait une carte pour suivre la route du Nautilus. Aujourd'hui en 2025, les navires utilisent des systèmes de positionnement par satellite (GPS) pour naviguer avec précision et sécurité dans tous les endroits du monde, y compris le Pôle Sud.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>South Pole</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“This D’Urville was one of your great sailors,” said the Captain to me,</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“one of your most intelligent navigators. He is the Captain Cook of you</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Frenchmen. Unfortunate man of science, after having braved the icebergs</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>of the South Pole, the coral reefs of Oceania, the cannibals of the</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Fin Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39 ckground:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Manatee</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Sea lion</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatross</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South Pole</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the most influential figures in natural history was Georges Cuvier, a French zoologist and paleontologist who played a crucial role in establishing comparative anatomy as a discipline. He made numerous contributions to marine zoology, including classifying over 40,000 species during his career.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin's groundbreaking work \"On the Origin of Species\" was published in 1859, but its ideas were already shaping scientific thought in the 1860s. Darwin proposed the theory of evolution by natural selection, which revolutionized understanding of life on Earth and had far-reaching implications for geography, biology, and anthropology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable scientist was Jean Baptiste de Lamarck, who developed the concept of inheritance of acquired characteristics, although his ideas were later disproven. Nonetheless, he contributed to the development of evolutionary theory.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of electricity, Michael Faraday conducted extensive research on electromagnetism and electrochemistry in the 1830s and 1840s. His discoveries included the principles of electromagnetic induction and the creation of the first electric motor and generator.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in advancing knowledge during this period. The French explorer Jules Dumont d'Urville, mentioned in the passage, led several voyages of discovery, including two to the Antarctic region (1837-1840 and 1840-1842). His second voyage resulted in the first confirmed sighting of the Antarctic continent by a European.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ South Pole</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus, under Captain Nemo's command, became trapped in the ice pack at the South Pole. This was a common occurrence during that era as ships lacked modern icebreaker technology. In contrast, in 2025, advanced icebreaker vessels equipped with radar and satellite imagery can navigate through the Antarctic ice pack, ensuring safer passage even during harsh winter conditions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo observed various marine species such as whales, porpoises, and triton shells at the South Pole. However, these sightings were unusual due to the extreme cold and lack of understanding about marine life in this region. In 2025, scientific expeditions have discovered a diverse ecosystem beneath the Antarctic ice shelves, home to species like the Antarctic minke whale, Weddell seal, and krill swarms. These discoveries were made possible through advanced submersible technology and improved knowledge of marine biology.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo navigated using traditional charts and compasses. In 2025, autonomous underwater vehicles (AUVs) and remotely operated underwater vehicles (ROVs) are used for exploration and mapping the deep-sea floor around the South Pole. These technologies provide detailed data about the seafloor topography, hydrothermal vents, and marine life, contributing significantly to our understanding of the Antarctic region.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo expressed sorrow for the fate of French navigator Jules Dumont d'Urville who perished in a railway accident. In 2025, though we have made significant strides in transportation technology, the challenges of exploration and survival in extreme environments like the South Pole remain. However, advancements in artificial intelligence, robotics, and biotechnology are being explored to enhance our ability to study these environments safely and effectively.</p></div>\n          </div>\n        </div>"}}, "18": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Horn (retour)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>L'Atlantique! vaste étendue d'eau dont la superficie couvre vingt-cinq</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>millions de milles carrés, longue de neuf mille milles sur une</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>largeur moyenne de deux mille sept cents. Importante mer presque</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ignorée des anciens, sauf peut-être des Carthaginois, ces Hollandais</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait
