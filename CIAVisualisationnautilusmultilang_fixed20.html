18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus sailed through the phosphorescent waters of the Gulf Stream, which rivaled the electric power of their watch-light during stormy weather. Today, bioluminescent organisms are still present in the Gulf Stream, but advancements in technology have enabled researchers to study these creatures more closely, revealing new insights into their behavior and evolution.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus navigated through the waters of Cape Hatteras without modern navigation tools. Today, ships passing by Cape Hatteras utilize advanced GPS systems, weather prediction models, and real-time satellite data to ensure safe and efficient travel, minimizing potential hazards and reducing the impact on marine ecosystems.</p></div>\n          </div>\n        </div>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la période 1866-1870, les progrès scientifiques ont été significatifs dans plusieurs domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, des expéditions telles que celle de l'HMS Challenger (1872-1876) ont permis d'étendre notre connaissance sur les espèces marines et leur habitat. Des scientifiques tels que Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont contribué à la classification des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses expériences sur les électroaimants, les batteries et les réactions chimiques électriques. Ses travaux ont permis d'améliorer la compréhension des phénomènes électriques et ont ouvert la voie à de nouvelles applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition de Nils Adolf Erik Nordenskiöld (1870-1874) a permis de cartographier les régions polaires et d'étendre nos connaissances sur la glaciation. Des scientifiques tels que Alexander von Humboldt et Charles Lyell ont également contribué à l'avancement des connaissances en géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les travaux de Dmitri Mendeleev ont abouti à la création de la table périodique des éléments, qui a permis d'organiser les éléments chimiques et de prédire leurs propriétés. Les expériences de Louis Pasteur ont également contribu</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Long Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Navigation : En 1866, le Nautilus de Captain Nemo navigait à la vapeur, guidé par un pilote dans un canot. En 2025, des navires automatiques équipés de systèmes GPS et d'IA peuvent naviguer sans aucun pilote humain sur Long Island.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Espèces observées : En 1866, Nemo observait diverses espèces marines telles que le narval, les cétacés, le saumon, la morue, la murène, le gobie, le corail et le zoophyte. En 2025, des technologies d'exploration sous-marine avancées permettent de détecter et d'identifier une grande variété d'espèces marines, dont certaines encore inconnues en 1866, telles que les échidnochélides ou les céphalopodes géants.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences et technologie : En 1866, la connaissance des océans était limitée par la technologie disponible. Les marins dépendaient de leur observation directe pour identifier les espèces marines et leurs habitats. En 2025, l'utilisation de sonars, de robots sous-marins, et d'autres technologies permettent une exploration plus approfondie des océans, y compris la détection de phénomènes tels que les éruptions volcaniques sous-marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Écologie marine : En 1866, les effets de la pollution sur les espèces marines étaient inconnus. Les coraux et les zoophytes observés par Nemo étaient probablement en bonne santé car il n'y avait pas encore de pollution massive dans l'océan. En 2025, la pollution marine est un problème majeur. Les coraux sont menacés par la pollution chimique et les changements climatiques, tandis que des espèces telles que les baleines et les dauphins ont été exposées à de nombreux polluants toxiques.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The _Abraham Lincoln_ answered by hoisting the American colours three times, whose thirty-nine stars shone resplendent from the mizzen-peak; then modifying its speed to take the narrow channel marked by buoys placed in the inner bay formed by Sandy Hook Point, it coasted the long sandy beach, where some thousands of spectators gave it one final cheer. The escort of boats and tenders still followed the frigate, and did not leave her until they came abreast of the lightship, whose two lights marked the entrance of New York Channel. Six bells struck, the pilot got into his boat, and rejoined the little schooner which was waiting under our lee, the fires were made up, the screw beat the waves more rapidly, the frigate skirted the low yellow coast of Long Island; and at eight bells, after having lost sight in the north-west of the lights of Fire Island, she ran at full steam on to the dark waters of the Atlantic. CHAPTER IV NED LAND Captain Farragut was a good seaman, worthy of the frigate he commanded. His vessel and he were one.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the given passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, marine zoological explorations increased significantly, led by scientists like Jean-Baptiste de Lamarck, Georges Cuvier, and Henri Marie Ducrotay de Blainville. They made important contributions to the understanding of marine life, including the classification and description of numerous new species. In geography, Matthew Maury's hydrography studies contributed to the mapping of ocean currents, which would have been crucial for naval navigation, as seen in the passage with the _Abraham Lincoln_ navigating through New York Channel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: The 19th century witnessed the rise of organic chemistry, with chemists like Justus von Liebig and August Wilhelm von Hofmann making significant contributions to understanding the composition and reactions of organic compounds. In addition, Michael Faraday's work on electromagnetism and electrochemistry laid the foundation for future advancements in electricity and energy storage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The 1860s saw several important breakthroughs in the field of electricity. James Clerk Maxwell formulated his famous equations that described how electric and magnetic fields interact, while Thomas Edison was working on improving the incandescent light bulb, a technology that would revolutionize lighting in the following decades.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Biology: Charles Darwin's \"On the Origin of Species\" was published in 1859, proposing the theory of evolution by natural selection. Although outside the given timeframe, it had a profound impact on the scientific community and our understanding of life on Earth. Similarly, French zoologist Louis</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Long Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the _Abraham Lincoln_ navigated through Long Island's waters, guided by buoys and lightships to mark safe passage. The ship was powered by steam engines, a significant technological advancement of the time. On this journey, Captain Nemo observed various marine species such as Narwhals, Cetaceans, Salmon, Cod, Morays, Gobies, Corals, and Zoophytes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, autonomous vessels equipped with advanced GPS systems navigate Long Island's waters, eliminating the need for physical buoys or lightships. The marine life remains largely unchanged, but new species have been discovered through underwater drones and genetic sequencing technologies. For instance, the Long Island Sound Green Sturgeon, a critically endangered species, was rediscovered in 2019 after being thought extinct for over a century.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the _Abraham Lincoln_ was escorted by numerous boats and tenders, reflecting the limited communication and navigation technologies available. In 2025, unmanned surface vessels (USVs) and autonomous underwater vehicles (AUVs) are commonly used for surveillance, research, and even shipping operations, reducing the need for human-crewed vessels.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of marine ecology, in 1866, understanding of marine ecosystems was still in its infancy. The scientific community was just beginning to understand the importance of coral reefs and their biodiversity. In contrast, in 2025, satellite imagery and advanced oceanographic research have significantly expanded our knowledge of marine ecosystems. For example, scientists now understand that coral reefs are crucial for maintaining global biodiversity and protecting coastlines from storm surges.</p></div>\n          </div>\n        </div>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Louis Agassiz, un zoologiste suisse, a étudié la glaciation et la théorie de la dérive des continents. Il a également contribué à la classification des poissons marins. En marine, le naturaliste français Jean-Baptiste Lamarck, ainsi que son compatriote Georges Cuvier, ont décrit de nombreuses espèces marines, y compris celles que le Professeur Aronnax note dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la géographie et la météorologie, les chercheurs ont commencé à comprendre le rôle des courants marins, notamment le Gulf Stream, décrit ici comme un courant chaud qui traverse l'Atlantique et se divise en deux bras vers le 43e degré. Le physicien Michael Faraday a également étudié la thermodynamique des courants marins et leur influence sur les climats.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, pendant cette période, l'utilisation d'instruments scientifiques tels que les baromètres, les thermomètres et les instruments de navigation ont permis aux expéditions scientifiques telles que celle du HMS Challenger (1872-1876) de collecter des données précises sur la géographie, la zoologie marine, la chimie et l'électricité des océans. Ces expéditions ont permis d'étendre notre connaissance du monde marin et ont contribué à la révolution scientifique de cette époque.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Terre Neuve</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, lorsque le Nautilus atteint Terre-Neuve, les chercheurs n'avaient pas encore découvert le phénomène du Gulf Stream à cet endroit. Aujourd'hui en 2025, grâce aux avancées de la recherche océanographique, on sait que le Gulf Stream se détache des côtes américaines et se dirige vers Terre-Neuve, comme décrit dans le roman de Jules Verne.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, les chercheurs du Nautilus ont observé la présence de cétacés, notamment le narval et des coraux au large de Terre-Neuve. Aujourd'hui en 2025, grâce aux techniques d'écologie marine avancées, on sait que ces espèces sont toujours présentes dans la région, mais également qu'elles font face à des menaces telles que la surpêche et le réchauffement climatique.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, les chercheurs du Nautilus n'avaient pas accès aux technologies de communication modernes pour transmettre leurs observations. Aujourd'hui en 2025, grâce à Internet et aux réseaux sociaux, les scientifiques peuvent partager rapidement leurs découvertes avec le monde entier, ce qui permet d'améliorer la connaissance de l'océan et de mettre en place des mesures de conservation plus efficaces.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, lorsque le Gulf Stream atteint Terre-Neuve, il était un phénomène naturel qui jouait un rôle important dans la circulation des eaux océaniques. Aujourd'hui en 2025, grâce aux modèles de prévision numérique du climat (MPC), on sait que le Gulf Stream est également sensible aux changements climatiques et qu'il peut être affecté par des événements tels que les tempêtes ou la pollution maritime.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Newfoundland</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life flourished during this period. Georges Cuvier (1769-1832), a prominent French naturalist, made significant contributions to comparative anatomy and paleontology. His work on fossilized marine animals provided insights into the extinction and evolution of species. Jean Baptiste de Lamarck (1744-1829) and Pierre-Joseph van Beneden (1809-1893), both Belgian zoologists, also contributed to our understanding of marine invertebrates and the classification of mollusks.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations of the world's oceans, including the Newfoundland Bank mentioned in the passage. British naval officer Matthew Maury (1806-1873) made significant contributions to oceanography and hydrography. His work on the \"Charts of the Atlantic Ocean\" provided important data on currents, winds, and marine life distribution.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1867), a British chemist and physicist, made groundbreaking discoveries in electricity and electrochemistry. His work on electromagnetic induction and the discovery of benzene contributed to the development of the field of chemistry during this period.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial for the advancement of marine zoology, geography, and other sciences. For example, the dredge, a device used to collect samples from the ocean floor, became</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Newfoundland</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus, under Professor Aronnax's command, encountered a diverse marine life at the southern tip of Newfoundland Bank. The crew observed Narwhals, a species known for its unique tusk, and various Cetaceans, but no specific identification was provided in Jules Verne's novel. Coral was also noted, likely indicating shallow waters where coral reefs could grow.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, advancements in marine biology have led to the discovery of over 60,000 species worldwide, many yet to be named. At Newfoundland, scientists have identified and studied the Narwhal population in detail, discovering that their tusks are actually sensory organs used for navigation and communication. Additionally, new technologies like underwater drones and genetic sequencing have enabled researchers to study Cetaceans more closely, including their migration patterns and behaviors. Coral reefs, once thought to be static, are now understood to be dynamic ecosystems that can adapt to changing environmental conditions.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the ships' bottoms appeared like battlefields due to the numerous shipwrecks encrusted on the seafloor. These wrecks were likely made of iron and copper, materials commonly used in shipbuilding at the time.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>By 2025, advancements in material science have led to the development of ships with hulls made from lightweight, durable, and environmentally friendly materials like carbon fiber reinforced polymers (CFRP). This has reduced the risk of shipwrecks and the environmental impact of shipping in sensitive marine ecosystems such as Newfoundland. Furthermore, advancements in remote sensing technology have enabled scientists to map and monitor underwater landscapes, providing insights into the distribution and preservation of shipwrecks for historical and archaeological studies.</p></div>\n          </div>\n        </div>"}}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Hippocampe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Irlande</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs avancées scientifiques ont été réalisées qui correspondent à ce passage de l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le naturaliste français Georges Cuvier a étudié la zoologie marine et a classifié de nombreux animaux marins, y compris les madréporaires (coraux) mentionnés dans le texte. En outre, il a développé des méthodes pour identifier l'origine géologique des roches.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin, un naturaliste britannique, a proposé la théorie de l'évolution par sélection naturelle en 1859, qui explique comment les espèces peuvent évoluer et se diversifier sur une longue période. Cette théorie pourrait être impliquée dans la description des arbres exotiques mentionnés, tels que les mimosas, les ficus, les casuarinas, les teks, les hibiscus, les pendanus, et les palmiers, qui semblent être mélangés à profusion.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le chimiste britannique Michael Faraday a fait des découvertes importantes dans le domaine de l'électricité. Il a notamment inventé la pile électrique en 1839 et étudié les propriétés de l'électrolyte, ce qui pourrait être lié à la brise légère qui berce les guirlandes de lianes dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, des expéditions scientifiques ont été menées pendant cette période pour explorer et étudier différents endroits du monde, y compris l'océan Pacifique où se trouve probablement l'île décrite dans le texte. L'</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Irlande</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, l'île visitée par le Nautilus était inconnue pour la science, étant décrite comme formée de corail madréporique et rochers granitiques. Aujourd'hui en 2025, des recherches marines avancées ont permis de déterminer que cette île correspond à l'archipel des Skelligs, un site d'intérêt naturel protégé depuis les années 1980.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, le Nautilus n'avait pas accès à la technologie de navigation satellitaire, ce qui l'obligeait à se baser sur des observations visuelles pour déterminer sa position. Aujourd'hui en 2025, les navires sont équipés de GPS et de systèmes d'information géographique, ce qui permet une navigation plus précise et sécuritaire.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, le Nautilus observait des espèces marines telles que la baleine, le marsouin, le squale, l'hippocampe, le poulpe, le crabe et le corail, mais il n'avait pas accès à la technologie de détection acoustique sous-marine. Aujourd'hui en 2025, les chercheurs marins utilisent des hydrophones et d'autres équipements pour étudier ces espèces et leurs habitats plus profondément.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, les arbres observés par le Nautilus étaient décrits comme des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mais il n'y avait pas de connaissances sur leur espèce précise ou leur importance écologique. Aujourd'hui en 2025, les chercheurs utilisent des techniques d'identification botanique avancées et des bases de données de référence pour identifier ces espèces et étudier leur rôle dans l'écosystème local.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 1 -1875) contributed to geography by exploring remote regions, mapping previously uncharted territories, and formulating theories about the Earth's history and processes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Instruments: The development of scientific instruments played a crucial role in advancing knowledge during this period. For example, the invention of the microscope enabled scientists to observe minute details of living organisms, while the development of the barometer helped researchers understand atmospheric pressure and weather patterns. Additionally, improvements in navigation technology, such as the</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Ireland</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus encountered a diverse marine life off the Irish coast, including whales, porpoises, sharks, seahorses, octopuses, crabs, and corals. The crew's interactions with these species were primarily observational, as scientific understanding of marine ecology was still developing. For instance, the discovery of DNA structure, a fundamental breakthrough in biology, would not occur until 1953 by James Watson and Francis Crick.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, advanced technology allows for more comprehensive studies of marine life at this same location. Genetic sequencing techniques have been employed to understand the genetic diversity of various species encountered, such as the discovery of the first complete porpoise genome in 2018. Furthermore, autonomous underwater vehicles (AUVs) equipped with cameras and sensors are used for non-invasive observation of marine life, reducing the need for human divers to interact directly with wildlife.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus' crew observed pearl fisheries from a distance, but their knowledge about pearl farming was limited. The first successful pearl cultivation using mollusk nuclei and bead implantation techniques was not developed until 1905 by Kokichi Mikimoto in Japan.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>By 2025, pearl farming has evolved significantly, with the use of biotechnology to enhance production efficiency. For example, genetically modified oysters are being developed to produce larger and more valuable pearls, while also reducing the environmental impact associated with traditional pearl farming practices. Additionally, 3D printing technology is being used to create synthetic pearls that mimic natural ones in appearance and properties, offering a sustainable alternative to traditional pearl farming methods.</p></div>\n          </div>\n        </div>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;bord nd:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasse</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Manche</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont marqué l'histoire des sciences. Dans ce passage, on peut identifier trois disciplines : la zoologie marine, l'électricité et la géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Le passage fait référence à des vêtements spécifiques pour plonger dans les eaux profondes, qui sont différents de ceux inventés au XVIIIe siècle. À cette époque, les savants comme Cuvier et Lacépède ont contribué à la connaissance de la faune maritime en réalisant de nombreuses descriptions et classifications d'espèces marines. En 1862, un biologiste français, Alphonse Milne-Edwards, a fondé le Muséum national d'histoire naturelle de Toulon pour étudier les espèces méditerranéennes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le passage mentionne des lamelles de cuivre qui protègent contre la poussée des eaux, ce qui peut être lié à l'utilisation de matériaux isolants pour protéger les humains lorsqu'ils travaillent avec de l'électricité. Michael Faraday, un scientifique anglais célèbre pour ses travaux sur l'électricité et le magnétisme, a découvert la loi de Faraday en 1834 qui établit une relation entre la force électromotrice et l'intensité du courant électrique.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Le passage suggère que les vêtements sont adaptés pour naviguer dans des eaux profondes, ce qui implique une</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Manche</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, lors de l'escale du Nautilus dans la Manche, les vêtements utilisés par Nemo pour sa plongée sous-marine étaient des pantalons et une veste en tissu, renforcés de lamelles de cuivre et chaussures en plomb. Aujourd'hui, en 2025, les scaphandres utilisés par les plongeurs professionnels sont équipés d'une combinaison de plongée souple en matériaux synthétiques imperméables, tels que le neoprène ou le lycra. Ces combinaisons ont remplacé les vêtements en tissu et les chaussures en plomb, offrant une meilleure protection contre la pression et l'eau.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, Nemo observait diverses espèces marines dans la Manche, notamment des baleines, cachalots, marsouins, narvals, requins, raies, hippocampes et scienes. Aujourd'hui, grâce aux avancées en écologie marine, de nombreuses espèces marines ont été découvertes et identifiées, dont certaines ne sont pas encore mentionnées dans le roman de Jules Verne. Par exemple, on a découvert la requine-tigre (Galeocerdo cuvier) en 1828, la raie à pattes blanches (Raja alba) en 1758 et l'hippocampe (Vampyroteuthis infernalis) en 1903.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, Nemo utilisait un scaphandre simple pour plonger sous-marinement, qui permettait à ses poumons de fonctionner librement. Aujourd'hui, les plongeurs professionnels utilisent des équipements plus sophistiqués tels que la plongée autonome avec oxygène (SCUBA), qui utilise un bouteille d'air comprimé pour permettre à l'utilisateur de respirer sous-marinément pendant des périodes prolongées.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, Nemo observait la mer et les espèces marines avec une curiosité scientifique, mais sans les comprendre réellement. Aujourd'hui, grâce aux avancées en sciences marines, nous avons un meilleur connaissance de l'océan et des espèces qui y vivent. Par exemple, on a découvert que la mer est une source importante de carbone et d'oxygène pour la planète, et que les espèces marines sont en danger à cause du réchauffement climatique et de la pollution.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>English Channel</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerp
