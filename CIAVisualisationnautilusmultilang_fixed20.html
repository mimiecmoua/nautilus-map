<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Une douzaine d'appareils de scaphandres, suspendus à la paroi, attendaient les promeneurs. Ned Land, en les voyant, manifesta une répugnance évidente à s'en revêtir. «Mais, mon brave Ned, lui dis-je, les forêts de l'île de Crespo ne sont que des forêts sous-marines! —Bon! fit le harponneur désappointé, qui voyait s'évanouir ses rêves de viande fraîche.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1866-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne. Les savants de l'époque ont exploré la zoologie marine, l'électricité, la chimie et la géographie pour comprendre les forêts sous-marines et les créatures marines étranges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz, un zoologiste suisse, a étudié la vie marine dans les eaux profondes. Il a découvert des espèces de poissons et d'autres animaux inconnus jusqu'alors. En France, Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont également contribué à la connaissance de la zoologie marine en décrivant de nouveaux genres et espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'électricité, Michael Faraday a effectué des recherches importantes sur les propriétés électriques des matériaux. Il a inventé le générateur électrique à aimant permanent, qui a permis de produire de l'électricité en grande quantité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les expéditions scientifiques ont également joué un rôle important dans la découverte de nouvelles espèces marines et des forêts sous-marines. La Royal Society a organisé une expédition à bord du HMS Challenger entre 1872 et 1876, qui a exploré les océans du monde entier et a collecté de nombreuses données sur la géographie marine, la zoologie, la chimie et l'élect</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île de Crespo</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Équipements : En 1866, les scaphandres étaient rudimentaires, suspendus à la paroi du sous-marin Nautilus pour permettre aux membres d'équipage de sortir et observer le milieu marin. Aujourd'hui en 2025, les scuba (scaphandre autonome sous-marin) sont plus avancés avec des respirateurs à oxygène comprimé et des masques à visière pour une meilleure visibilité.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Exploration : En 1866, la première chasse sous-marine a lieu sur l'île de Crespo, où les membres d'équipage ont découvert une forêt sous-marine et une monstrueuse araignée de mer. Aujourd'hui en 2025, les explorations sous-marines sont plus avancées grâce à des robots sous-marins équipés de caméras haute définition pour filmer et étudier les écosystèmes marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Espèces : En 1866, les espèces observées sur l'île de Crespo comprenaient des baleines, narvals, cétacés, mollusques comme le moule et des crustacés comme l'homard. Aujourd'hui en 2025, de nombreuses espèces marines ont été découvertes, notamment la grande raie à piquant bleu (Manta birostris) et la baleine bleue (Balaenoptera musculus), ainsi que des espèces rares comme le corail de mer rose (Corallium rubrum).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Technologies : En 1866, les technologies sous-marines étaient très limitées, avec le Nautilus étant l'une des premières sous-marins à propulsion électrique. Aujourd'hui en 2025, les technologies sous-marines ont grandement évolué, avec des sous-marins capables de plonger jusqu'à 11 000 mètres et équipés de systèmes d'observation avancés pour étudier le climat océanique.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced rapid growth during this period. French naturalist Georges Cuvier (1769-1832), although his work was mainly in the 18th century, laid the foundation for comparative anatomy and paleontology, which were crucial for understanding marine species. In the later part of the 19th century, Jean Baptiste de Lamarck (1744-1829) and Louis Agassiz (1807-1873) made significant contributions to marine biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>One notable figure in this context is French zoologist Henri Marie Ducrotay de Blainville (1777-1850), who described several deep-sea organisms, including the anglerfish and the vampire squid. His work provided valuable insights into the biodiversity of deep-sea environments.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Electrical Science: The 19th century saw a surge in understanding electricity, with Michael Faraday (1791-1867) being one of its most prominent figures. He made groundbreaking contributions to electromagnetism and electrochemistry. His inventions, such as the electric motor and the dynamo, laid the foundation for electrical technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: Exploration and mapping of new territories were ongoing during this period. The Royal Geographical Society, established in 1830, played a significant role in funding expeditions and promoting geographical research. In marine geography, Matthew Maury (1806-1873) made substantial contributions to the</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Crespo Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus stopped at Crespo Island for an underwater hunt, where various marine species were observed such as whales, narwhals, cetaceans, mussels, lobsters, and crabs. The submarine forest was a fascinating sight, yet little was known about its biodiversity or ecological significance. In contrast, in 2025, advanced submersibles equipped with AI-powered biodiversity sensors would explore the same underwater landscape, providing detailed insights into the complex ecosystem of Crespo Island's seafloor.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the sighting of a monstrous sea spider was an unusual occurrence, and its scientific classification remained uncertain due to limited knowledge about deep-sea fauna. By 2025, advances in marine biology had led to the discovery and identification of numerous new species, including giant isopods and yeti crabs, providing a better understanding of the bizarre creatures that inhabit the depths of the ocean.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Professor Aronnax's equipment was limited to traditional scientific instruments like microscopes and compasses. By 2025, researchers would utilize cutting-edge technology such as miniature robots, genetic sequencing devices, and underwater drones, enabling them to gather vast amounts of data about the marine environment with unprecedented precision and speed.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo's hunting party aimed to demonstrate the Nautilus' technological superiority by capturing various marine species for observation. In 2025, conservation efforts prioritize non-invasive research methods to minimize disturbance to fragile ecosystems. Advanced submersibles and remote sensing technologies allow scientists to study marine life without causing harm or altering natural habitats.</p></div>\n          </div>\n        </div>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le Nautilus devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait. Cependant, toujours entraînés par ce Nautilus, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Alexandre Dumas et Jules Verne ont popularisé l'archipel des Pomotou en publiant leurs romans respectivement en 1864 et 1870, mais il s'agit d'une fiction car cet archipel n'existe pas réellement. Cependant, dans le contexte de l'époque, les savants ont exploré les mers plus fréquentées et ont découvert des coques naufragées et des objets de fer dégradés par la rouille, ce qui peut être comparé au passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Pour les découvertes scientifiques, Charles Darwin a publié son ouvrage \"L'Origine des espèces\" en 1859, dans lequel il propose sa théorie de l'évolution par sélection naturelle. Il a également exploré la région du Pacifique Sud pendant son voyage sur le HMS Beagle entre 1831 et 1836.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, Henri Milne-Edwards a décrit de nombreuses espèces de crustacés et d'autres animaux marins durant cette période. Il a également fondé la Société zoologique de France en 1860.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Michael Faraday a effectué des recherches importantes sur l'électrolyse, les électrochimie et la physique des gaz. Son travail a permis d'expliquer la structure moléculaire de l'eau et du chlorure de sod</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Archipel des Pomotou : superficie</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, l'archipel couvrait une superficie de trois cent soixante-dix lieues carrées. Aujourd'hui, en 2025, les technologies de cartographie et d'imagerie satellitaire permettent de mesurer des surfaces plus précises. L'espace occupé par l'archipel des Pomotou est estimé à environ 640 km², soit une réduction de la moitié de sa superficie initiale.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Archipel des Pomotou : espèces marines observées</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, les espèces observées dans l'archipel incluaient des cétacés, requins, raies, thons, harengs, lampreys, gobiés, calmar et autres. Aujourd'hui, la biodiversité marine est mieux connue grâce aux études scientifiques. Les espèces observées dans l'archipel comprennent des cétacés comme le baleine bleue ou le dauphin commun, des requins tels que le requin-tigre et le requin-baleine, ainsi que des raies manta.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Archipel des Pomotou : technologie marine</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, le Nautilus de Jules Verne explorait l'archipel avec une technologie fictive. Aujourd'hui, en 2025, les navires utilisent des technologies modernes pour explorer les mers profondes. Les sous-marins d'exploration sont équipés de sonars, caméras et autres instruments de mesure pour cartographier les fonds marins et observer la vie marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Archipel des Pomotou : pollution marine</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, dans le roman de Jules Verne, l'archipel était pollué par des coques naufragées et des objets de fer dégradés. Aujourd'hui, en 2025, la pollution marine est un problème majeur pour les écosystèmes marins. Les déchets plastiques, les pollutions chimiques et les effets du réchauffement climatique sont des sources de pollution marine qui ont été identifiées par les chercheurs. Les initiatives de nettoyage et de prévention de la pollution marine sont en cours pour protéger l'archipel des Pomotou et d'autres écosystèmes marins fragiles.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pomotou Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck and Georges Cuvier, both influential naturalists of the time, contributed significantly to marine zoology. Lamarck proposed a theory of evolution, although it was later replaced by Charles Darwin's theory of natural selection. Cuvier, known as the \"father of paleontology,\" made important contributions to the study of fossilized marine life.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw numerous expeditions aimed at mapping and exploring remote regions, including the Pacific islands mentioned in the passage. One such expedition was led by Louis Antoine de Bougainville, who discovered the Pomotou Archipelago in 1768. Another notable figure was Alexander von Humboldt, a German polymath who explored South America and made significant contributions to geography, geology, and biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday, an English chemist and physicist, conducted groundbreaking research on electrochemistry and electromagnetism during this period. He discovered benzene and invented the first electric motor and generator. His work laid the foundation for future developments in electricity and chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century was a time of significant advancements in the field of electricity. André-Marie Ampère, a French physicist, made important contributions to electrodynamics and magnetic circuits. He formulated Ampere's law, which describes how electric currents generate magnetic fields.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Pomotou Archipelago was largely unexplored, covering an area of approximately 370 square leagues with about sixty island groups. The marine life observed included various species such as cetaceans, sharks, rays, tuna, herring, lamprey, goby, and squid. Shipwrecks were common, with remnants like the Florida still visible in the depths.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, extensive research and exploration have been conducted on the Pomotou Archipelago. Marine life surveys have revealed a more diverse ecosystem than previously known, including new species such as the deep-sea coral Lophelia pertusa and the elusive giant squid Architeuthis dux.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, shipwrecks were a common sight due to the lack of advanced navigation and communication technologies. However, by 2025, satellite technology and global positioning systems (GPS) have significantly reduced maritime accidents, making such sights rare. Instead, underwater archaeologists often study historical wrecks for insights into past civilizations.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of marine conservation, the situation in 1866 was largely unregulated. By 2025, however, international agreements like the United Nations Convention on the Law of the Sea (UNCLOS) and regional fisheries management organizations have been established to protect marine ecosystems from overfishing and pollution. The Pomotou Archipelago is now part of a network of protected areas, ensuring the preservation of its unique biodiversity for future generations.</p></div>\n          </div>\n        </div>"}}, "2": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des nouvelles Hébrides</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, le naturaliste français Jean-Baptiste Lamarck a étudié les mollusques en détail, notamment les huîtres. Il a classifié plus de 100 espèces différentes et a décrit leur anatomie, leur physiologie et leur écologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'expédition dans les Nouvelles-Hébrides, le naturaliste français Louis Antoine de Bougainville a exploré ces îles en 1768. Plus tard, en 1773, le navigateur britannique James Cook a renommé ce groupe d'îles pour l'honorer.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, Michael Faraday a découvert les propriétés électrochimiques des solutions et a inventé le premier électrolyte. Il a également étudié l'électricité et les gaz, notamment l'hydrogène et l'oxygène.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la géographie, le naturaliste français Georges Cuvier a contribué à la cartographie des régions du monde en explorant l'Amérique du Sud et l'Afrique. Il a également étudié les fossiles et a développé une théorie sur l'extinction des espèces.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Découverte : En 1866, l'archipel des Nouvelles Hébrides a été découvert par Quiros en 1606, exploré par Bougainville en 1768 et reçu son nom actuel par Cook en 1773. En 2025, cet archipel est toujours connu sous le même nom et continue de fasciner les explorateurs et les touristes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Espèces marines : En 1866, des espèces observées sur place comprenaient le cétacé, le thon, le saumon, la dorade, l'anguille, l'huître, l'oursin et le corail. En 2025, ces mêmes espèces sont encore présentes dans les eaux de l'archipel, mais des études de biologie marine ont également révélé la présence d'autres espèces marines telles que le requin tigre et la tortue verte.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Technologie : En 1866, le Nautilus navigait dans les eaux de l'archipel à l'aide des voiles et de la force humaine. En 2025, les navires modernes utilisent une technologie plus avancée, tels que les moteurs diesel et électriques, pour naviguer dans les eaux de l'archipel.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Nourriture : En 1866, le Nautilus se nourrissait en consommant des douzaines d'huîtres pour satisfaire la nourriture quotidienne d'un homme. En 2025, les humains ont développé de nouvelles techniques de pêche et de production animale pour satisfaire leurs besoins alimentaires, ce qui permet aux voyageurs modernes de profiter de plus variées cuisines lorsqu'ils visitent l'archipel des Nouvelles Hébrides.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>New Hebrides Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 New Hebrides luable insights into their behavior and habitat preferences.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Arfak Mountains were a sight to behold, but in 2025, the use of drones and remote sensing technologies allows for a more comprehensive understanding of these landscapes. For example, high-resolution satellite imagery can be used to map the terrain, monitor deforestation, and track changes in biodiversity over time. Additionally, the development of virtual reality technology enables researchers to explore these environments in greater detail without having to physically travel there.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus crew encountered the Papuans, leading to a battle that resulted in casualties on both sides. In 2025, interactions between humans and indigenous communities are guided by principles of respect and cooperation. For example, collaborative research projects are often established with local communities, ensuring that their knowledge and perspectives are integrated into scientific studies. This approach not only promotes cultural sensitivity but also helps to ensure the long-term sustainability of these ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Captain Nemo expressed a desire for a \"coral tomb\" as a peaceful grave. In 2025, advances in marine archaeology and conservation have led to a greater appreciation for the importance of preserving coral reefs and other marine ecosystems. For instance, efforts are underway to protect critical habitats from threats such as overfishing, climate change, and pollution. Additionally, innovative technologies like 3D printing are being used to create artificial reef structures that can help restore damaged ecosystems and support the growth of new coral colonies.</p></div>\n          </div>\n        </div>"}}, "4": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Wessel</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n'avait plus de bornes, et de l'appareil, elle remontait aussitôt à l'ingénieur qui l'avait créé. Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Wessel</h5>\n  23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Keeling</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs expéditions scientifiques ont eu lieu pour étudier la zoologie marine et l'électricité. L'une d'elles a conduit Charles Darwin et le capitaine Robert FitzRoy à visiter l'île Keeling dans l'océan Indien en 1842. Cette île est mentionnée dans le roman \"Vingt Mille Lieues sous les mers\" de Jules Verne, où elle est décrite comme étant visitée par un sous-marin fictif, le Nautilus.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En réalité, l'île Keeling est un atoll corallien qui a été découvert en 1606. Elle est principalement composée de cocotiers et abrite une grande variété d'o
