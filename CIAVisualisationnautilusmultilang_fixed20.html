ing:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Formation coralligène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Dugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Tortue marine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le XIXe siècle a vu de nombreuses découvertes scientifiques remarquables sur la base du passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Des explorations marines ont été menées pour étudier la faune et la flore des océans, notamment l'Atlantique. Les naturalistes français comme Cuvier, Lacépède et Duméril ont contribué à la connaissance de la biodiversité marine en collectant et classifiant des milliers d'espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le XIXe siècle a également vu de nombreuses avancées dans le domaine de l'électricité, notamment grâce aux travaux de Michael Faraday. Il a découvert les lois électromagnétiques et a inventé le générateur électrique à aimant permanent, qui a permis d'utiliser l'énergie électrique pour alimenter des lampes électriques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Les explorations scientifiques ont également contribué à la connaissance de la géographie mondiale. Des expéditions telles que celle de Charles Darwin sur le Beagle ont permis de découvrir et de documenter de nouvelles terres, notamment en Amérique du Sud. De plus, les cartes marines ont été améliorées grâce à des instruments tels que la sonde marine et le théodolite.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chimie : Les avancées dans le domaine de la chimie ont également eu un impact important sur la connaissance du monde. Des scientifiques comme Lavoisier, Gay-Lussac et Berzelius ont contribué à la compréhension des lois chimiques et des équations chim</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Navigation : En 1866, le Nautilus navigait vers l'Amazone à vapeur, utilisant des cartes nautiques basées sur les observations des marins et des explorateurs précédents. En 2025, les navires modernes utilisent également la vapeur, mais sont équipés de GPS et de systèmes d'information géographique (SIG) pour une navigation plus précise et efficace, basée sur des cartes numériques mises à jour régulièrement.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Espèces marines : En 1866, les espèces observées par le Nautilus comprenaient la baleine, le requin, le squale, la raie, le saumon, la morue, la rémora et le labre. Aujourd'hui, de nombreuses espèces marines ont été découvertes ou mieux comprises, telles que les dauphins, les tortues marines et les requins-baleines.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences : En 1866, les connaissances scientifiques sur l'océan Atlantique étaient limitées par les moyens de collecte des données disponibles à l'époque. Aujourd'hui, grâce aux avancées technologiques dans la mesure et le suivi des phénomènes océaniques, nous possédons une compréhension plus approfondie de l'océan Atlantique, y compris son climat, sa circulation, sa faune et sa flore.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Technologie : En 1866, les équipements de bord du Nautilus étaient rudimentaires, comprenant des instruments de navigation tels que le chronomètre marin et la boussole. Aujourd'hui, les navires sont équipés de systèmes avancés d'observation et de communication, tels que les sonars, les radars et les satellites artificiels, qui permettent une exploration plus profonde des océans.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Horn (return)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The Atlantic! a vast sheet of water whose superficial area covers</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>twenty-five millions of square miles, the length of which is nine</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>thousand miles, with a mean breadth of two thousand seven hundred—an</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ocean whose parallel winding shores embrace an immense circumference,</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;backg 1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, lorsque le Nautilus a abordé les eaux de la Martinique et de Guadeloupe, les moyens de communication étaient encore rudimentaires. Il n'existait pas de téléphone mobile ou d'Internet pour communiquer avec le monde extérieur. Les cartes marines étaient basées sur des observations et des estimations, comme indiqué dans l'extrait du roman où il est mentionné que la profondeur moyenne de ces mers est de 1800 mètres.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 2025, les technologies d'exploration marines ont considérablement évolué. Les cartes marines sont maintenant numériques et basées sur des données précises collectées par des satellites et des sonars. Par exemple, la carte marine de la Martinique et de Guadeloupe est disponible en haute définition sur Internet, avec des informations sur la profondeur, les courants marins, les récifs coralliens et les zones sensibles à la pollution.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, lorsque le Nautilus a abordé ces eaux, il n'y avait pas de moyens pour observer les espèces marines en détail. Les scientifiques avaient peu d'informations sur les espèces marines observées dans l'extrait du roman, comme le narval, le cétacé, la raie, le spare, le poisson perroquet, le gobie, le poulpe, le calmar.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 2025, les technologies d'observation des espèces marines ont considérablement évolué. Les sous-marins robotisés et les drones sont utilisés pour observer en détail les espèces marines et leurs habitats. Par exemple, il est possible de filmer des narvals dans leur environnement naturel grâce à des sous-marins robotisés équipés de caméras haute définition.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, lorsque le Nautilus a abordé ces eaux, les moyens de transport étaient encore rudimentaires. Les steamers étaient les principales formes de transport maritime pour les voyageurs et le commerce.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 2025, les moyens de transport maritimes ont considérablement évolué. Les navires à grande vitesse, les ferries rapides et les navires cargo sont utilisés pour transporter des milliers de personnes et de marchandises à travers le monde. Par exemple, il est possible de naviguer entre la Martinique et la Guadeloupe en moins d'une heure grâce aux catamarans à grande vitesse.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Martinique and Guadeloupe</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles ctrical energy and vice versa. His work laid the foundation for electric power generation and transmission systems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: During the 19th century, geographical expeditions were crucial for exploring and mapping new territories, including the islands of Martinique and Guadeloupe mentioned in the passage. Notable expeditions include those led by British explorer Charles Darwin (1809-1882) on the HMS Beagle and French explorer Jules Dumont d'Urville (1790-1842). Their work contributed to our understanding of geography, geology, and biogeography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: German chemist Friedrich</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Martinique and Guadeloupe</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus observed a variety of marine life during its stop at Martinique and Guadeloupe, including narwhals, cetaceans, rays, Sparidae, parrotfish, goby, octopus, squid, and colossal giant squids up to eight meters long. In contrast, a century later in 2025, advanced deep-sea exploration technology has allowed scientists to discover new species like the pink sea slug (Euprymna scolopes), a bioluminescent cephalopod first observed near these islands.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Jules Verne's Nautilus avoided the Gulf of Mexico and the sea of the Antilles due to potential risks from tides and the presence of colossal squids. By 2025, however, oil rigs and underwater research stations have been established in these areas, thanks to advancements in offshore drilling and subsea engineering technologies like the Bluewater Pacific, the world's deepest oil rig, located in the Gulf of Mexico.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus crew observed \"poulps, medusæ, and cuttle-fish\" that were considered a potential hazard due to their large size. In 2025, while these species are still present, researchers have developed a better understanding of their roles in marine ecosystems. For instance, studies on the giant squid (Architeuthis dux) have provided insights into its behavior and ecological significance, thanks to advancements in remote-operated submersibles and genetic sequencing technologies.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, in 1866, the Nautilus crew had limited knowledge about marine ecosystems, relying on their observations of various species. By contrast, in 2025, satellite imagery, oceanographic models, and advanced sensors have enabled scientists to monitor and study marine ecosystems on a global scale, providing valuable insights into the impacts of climate change, pollution, and overfishing on these delicate environments.</p></div>\n          </div>\n        </div>"}}, "22": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Amérique Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Nord</h5>\n                    <p>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>", "compare_1866_today": "\n                    <h3 style='color:#0a3d62; font-size:1.9rem;'>Comparaison 1866 / Aujourd'hui</h3>\n                    <h5 style='color:#27c39f; font-size:1.4rem;'>⚗️ Contour Amérique Nord</h5>\n                    <p style='font-size:1.35rem;'>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>North America Contour</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>This is an intermediate navigation point, not explicitly mentioned in the novel.</p>", "marine_species": "<p>🗺️ Intermediate stop — no novel passage associated.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North America Contour</h5>\n sidérables. Ainsi, en 1866, HMS Challenger a exploré les eaux autour des îles Lucayes (actuellement les Bahamas) et y a découvert de nouvelles espèces marines telles que les encrines, des étoiles de mer, des pentacrines, des troques, des quenottes sanglantes et des fissurelles. Les scientifiques ont également observé des mollusques littoraux de grande taille et des herbes marines géantes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le physicien Michael Faraday a conduit des recherches importantes sur l'électricité à cette époque, notamment sur la production d'énergie électrique par induction. Il a également découvert les lois de l'électrolyse et a inventé le générateur électromagnétique. Les savants ont commencé à utiliser des rayons électriques pour explorer les eaux profondes, comme dans ce passage où ils ont utilisé des rayons électriques pour éclairer des trous noirs sous-marins.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Les expéditions scientifiques ont également contribué à la cartographie de l'océan Atlantique et aux connaissances sur les courants marins tels que le Gulf Stream, qui est mentionné dans ce passage. En 1</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île Lucayes</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, lors de l'escale du Nautilus à l'île Lucayes, les observateurs notaient la présence de diverses espèces marines telles que cétacés, requins, raies, saumons, morues, murènes, labres et spares. Aujourd'hui en 2025, ces mêmes espèces sont encore observées dans la région, mais des progrès dans les techniques de recherche ont permis de découvrir une plus grande diversité de faune maritime, notamment des espèces rares telles que le dauphin à bec court et le requin-baleine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, les mollusques observés étaient principalement des encrines, étoiles de mer, pentacrines, troques, quenottes sanglantes et fissurelles. Aujourd'hui en 2025, la diversité des mollusques a considérablement augmenté grâce à l'utilisation de techniques d'analyse génétique telles que la barcoding moléculaire. Des espèces telles que le nautilus du Pacifique et la limace géante ont été découvertes dans la région, ce qui a permis une meilleure compréhension de l'évolution des mollusques marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, les observateurs notaient la présence de hautes falaises sous-marines à l'île Lucayes, composées de blocs frustes disposés par larges assises. Aujourd'hui en 2025, des avancées dans les technologies de cartographie marine ont permis d'obtenir une vision plus précise de la géologie sous-marine de l'île Lucayes. Des études récentes ont révélé que ces falaises sont formées de roches calcaires et de coraux, ce qui suggère que l'île a pu servir de refuge pour des espèces marines durant les périodes glaciaires passées.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, la technologie utilisée par le Nautilus était extrêmement avancée pour son époque, permettant aux observateurs d'explorer les profondeurs de l'océan et de découvrir des espèces marines inconnues jusqu'alors. Aujourd'hui en 2025, la technologie sous-marine a encore évolué, avec l'utilisation de robots sous-marins autonomes pour explorer les profondeurs de l'océan et collecter des données sur la biodiversité marine. Ces robots peuvent également être utilisés pour mener des études de longue durée sur les changements climatiques dans les écosystèmes marins, ce qui permet d'améliorer notre compréhension de l'impact des activités humaines sur la planète.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Lucayan Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>For several days the _Nautilus_ kept off from the American coast.</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Evidently it did not wish to risk the tides of the Gulf of Mexico or of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>the sea of the Antilles. April 16th, we sighted Martinique and</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Guadaloupe from a distance of about thirty miles. I saw their tall</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px; e-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, numerous expeditions were organized to explore and document marine life, particularly in tropical regions like the Caribbean. French naturalist Louis Agassiz led several expeditions to study glaciers and the geology of North America, while Alexander Agassiz, his son, focused on marine biology, especially in the Gulf Stream region where the Nautilus was traveling.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Biology and Evolution: Charles Darwin published \"On the Origin of Species\" in 1859, proposing the theory of evolution by natural selection. His work, based on his voyage aboard HMS Beagle, greatly influenced the understanding of life's diversity and the relationship between species. Another influential figure was Georges Cuvier, a comparative anatomist who classified many marine organisms and introduced the concept of extinction.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British chemist and physicist, made significant contributions to the understanding of electromagnetism and electrochemistry. He discovered the principles underlying electric motors, generators, and transformers, which would later be crucial for marine navigation and exploration.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was essential during this era. For instance, the hydrographic barometer, a device used to measure atmospheric pressure and air temperature, was crucial for navigating the open sea. Additionally, the invention of the microscope allowed scientists like Agassiz to study marine organisms in greater detail.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Lucayan Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the _Nautilus_'s voyage through the Gulf Stream was a remarkable journey, as it was still largely unexplored by humans. The crew observed various marine species such as cetaceans, sharks, rays, salmon, cod, moray eels, wrasse, and sparidae, but their understanding of these creatures was limited compared to 2025. For instance, the existence of sperm whales' unique social structures, discovered in the 1960s, would have remained unknown to Captain Nemo and his crew.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, advanced technology has revolutionized marine biology. Research vessels equipped with sonar and satellite tracking systems can monitor and study marine life more efficiently than the _Nautilus_. For example, tagging techniques like those used on great white sharks allow scientists to track their movements over vast distances, providing valuable insights into their behavior and migration patterns.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the crew of the _Nautilus_ would have been unaware of the diverse ecosystems found in the Lucayan Islands. The discovery of the Thatch Cave System, one of the world's largest underwater cave systems, which was first explored in the late 20th century, would have remained a mystery to them.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Fast forward to 2025, and the Lucayan Islands are a hotspot for marine conservation efforts. The Thatch Cave System is protected, and researchers continue to study its unique ecosystems, which host numerous endemic species. Additionally, advanced underwater drones enable scientists to explore these environments without disturbing them, providing valuable data that was unattainable in 1866.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of technology, the _Nautilus_ in 1866 relied on sail and steam power for propulsion. In contrast, by 2025, autonomous underwater vehicles (AUVs) equipped with advanced sensors are used to explore the ocean depths. These AUVs can collect data on various parameters such as temperature, salinity, and ocean currents, providing a wealth of information that was not available in Captain Nemo's time.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Finally, communication technology has also evolved significantly between 1866 and 2025. In 1866, the _Nautilus_ crew had no means to communicate with others outside their vessel, whereas in 2025, underwater communication systems enable scientists to interact with each other and share data in real-time, facilitating collaborative research efforts.</p></div>\n          </div>\n        </div>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques remarquables ont été effectuées dans le domaine de la zoologie marine, de l'électricité et de la géographie, correspondant au passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz (Suisse), un des plus grands naturalistes de son temps, a étudié les poissons osseux marins, notamment en Amérique du Nord. Il a décrit plusieurs espèces, dont certains labres-grisons et sciènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les sparidés, qui comprennent les spares-synagres, étaient l'objet d'études de Georges Cuvier (France) au début du XIXe siècle. Les chercheurs ont découvert que ces poissons possédaient un iris brillant comme un feu, ce qui est mentionné dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les coriphènes bleus relevés d'or et d'argent sont en fait des poissons-chats (Sphoeroides sp.), découverts par Louis Agassiz et John Richardson (Canada) au XIXe siècle.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne les perroquets vrais arcs-en-ciel de l'Océan, il s'agit probablement des poissons-arc-en-ciel (Hemirhamphus sp.), connus pour leur magnifique couleur.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Hatteras</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, le Cap Hatteras était un passage crucial du Gulf Stream, large de soixante-quinze milles et profond de deux cent dix milles mètres. Aujourd'hui, en 2025, les mesures satellite ont révélé que la largeur du Gulf Stream est passée à quatre-vingt-douze milles, avec une profondeur moyenne de deux cent quinze milles mètres.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, les espèces marines observées autour du Cap Hatteras étaient diverses, comprenant des saumons, morues, murènes, gobiés et zoophytes. Aujourd'hui, en plus de ces espèces, on peut observer des requins tigre, baleines bleues et dauphins communs, qui ont migré vers les eaux tempérées du Cap Hatteras à cause de la réchauffement climatique.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, l'observation des poissons osseux autour du Cap Hatteras révélait des labres-grisons particuliers, des spares-synagres et des coriphènes bleus, relevés d'or et d'argent. Aujourd'hui, en 2025, la technologie de sonar permet d'observer une grande diversité de poissons osseux autour du Cap Hatteras, y compris des espèces rares telles que le thunnus alalunga et le scomber japonicus.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, les observations des zoophytes autour du Cap Hatteras étaient limitées à la vue humaine. Aujourd'hui, en 2025, la technologie de remorquage sous-marin équipé d'un sonar permet d'observer une grande diversité de zoophytes autour du Cap Hatteras, y compris des espèces rares telles que les coraux durs et les méduses géantes.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: Renowned naturalists of the era, such as Georges Cuvier and Jean-Baptiste de Lamarck, made significant contributions to marine zoology. Cuvier, a pioneer in comparative anatomy, described numerous marine species, including sharks and whales. Lamarck proposed the concept of evolution, although his theories were later refined by Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations that expanded geographical knowledge, particularly of the oceans. Matthew Maury, known as the \"Pathfinder of the Seas,\" developed ocean current charts based on data collected from hundreds of ships' logbooks. His work contributed to understanding the Gulf Stream mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British scientist, made significant contributions to the fields of electromagnetism and electrochemistry. He discovered the principles of electromagnetic induction and invented various devices such as the Bunsen burner and the Faraday cage. His work laid the foundation for electric lighting and power generation, which may have influenced Verne's depiction of the Nautilus' advanced technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial during this period. For example, the marine chronometer, invented by John Harrison in the 18th century, improved navigation at sea. Additionally, the development of the dip net, dredge, and trawl enabled scientists to collect marine organisms more efficiently for study.</p>", "compare_1866_today": "\n
