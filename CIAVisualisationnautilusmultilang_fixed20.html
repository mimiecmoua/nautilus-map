5rem;'>If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Keeling Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: During this period, marine biologists like Jean-Baptiste de Lamarck, Georges Cuvier, and Pierre-Joseph van Beneden conducted extensive studies on marine life. Cuvier (1769-1832), a prominent comparative anatomist, was instrumental in the classification of fish species. Van Beneden (1844-1900) made significant contributions to the study of cephalopods, including squids and cuttlefish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw a surge in exploration and mapping of remote islands and regions, such as Keeling Island mentioned in your passage. Notable figures include Charles Darwin (1809-1882), who visited the island with Captain Robert FitzRoy during the voyage of HMS Beagle between 1831 and 1836. Their expedition contributed to the development of evolutionary theory, particularly Darwin's work on natural selection.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The understanding and application of electricity also progressed substantially during this time. Michael Faraday (1791-1867), an English scientist, made groundbreaking discoveries in electromagnetism and electrochemistry. His inventions included the electric motor and the dynamo, which were crucial for advancing technology and scientific research.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: Instruments like the spectroscope, developed by William Wollaston (1766-1828) and Joseph von Fraunhofer (1787-1826), played a significant role in chemical analysis during this period. These devices allowed scientists to study the composition of substances by</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Keeling Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Keeling Island was a coral formation with magnificent coconut trees that had been previously visited by Charles Darwin and Captain FitzRoy. The marine life observed around the island included various fish species such as porpoises, cetaceans, oysters, shells, gastropods, starfish, jellyfish, and corals. The Nautilus, a fictional submarine from Jules Verne's novel \"Twenty Thousand Leagues Under the Sea,\" skimmed the shores of this desert island for a short distance.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, Keeling Island has become a significant research station for climate change studies due to its location in the Indian Ocean, where the Mauna Loa Observatory measures atmospheric carbon dioxide levels. The marine life around the island remains diverse, but advanced technologies have enabled scientists to identify and study numerous new species, such as the discovery of the ghost shark (Chlamydoselachus anguineus) in 2017.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, no electric lights were available for underwater exploration, making it difficult to observe marine life at night. In contrast, by 2025, advanced LED lighting systems have been developed that allow researchers to study marine ecosystems and their behaviors more effectively, even in the deepest parts of the ocean. For example, these lights have helped scientists discover that some jellyfish are bioluminescent, emitting light through a chemical reaction within their bodies.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, in 1866, Keeling Island was visited by humans, but there were no automated underwater vehicles (AUVs) or remotely operated vehicles (ROVs) to explore the seafloor and collect data about marine life and geological features. In contrast, by 2025, AUVs and ROVs are routinely used for scientific research, allowing researchers to gather vast amounts of data on the ocean floor without putting human divers at risk. For example, an ROV named \"Jason\" was deployed in 2019 to study hydrothermal vents near Keeling Island, providing valuable insights into these unique ecosystems and their role in global carbon cycling.</p></div>\n          </div>\n        </div>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, les progrès considérables de la science ont permis de découvrir et d'explorer plus profondément le monde marin et les courants océaniques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le zoologiste français Georges Cuvier a été un des premiers à étudier les courants marins en définissant ceux du Golfe du Bengale, du Pacifique nord et du Pacifique sud. En 1822, il publie une carte de la circulation des eaux dans l'océan Indien, qui montre le Kuro-Siwo, le courant noir décrit par Verne, se déroulant à partir du golfe du Bengale et traversant le détroit de Malacca.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1839, le naturaliste anglais Charles Darwin a également contribué aux connaissances sur les courants marins en explorant l'océan Pacifique sud lors de son voyage à bord du HMS Beagle. Il décrit les courants océaniques et leur importance pour la circulation des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1837, le naturaliste français Jean-Baptiste de Lamarck publie une carte des courants marins dans l'océan Atlantique nord, qui montre un courant se déplaçant vers l'ouest.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les progrès technologiques ont également permis d'améliorer les instruments utilisés pour la recherche océanographique. En 1865, William Thompson (Lord Kelvin) a inventé le thermomètre de mer qui permettait de mesurer la température de l'eau à différentes profondeurs.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, lors de l'escale du Nautilus au Golfe du Bengale, les observations des espèces marines étaient limitées à celles qui pouvaient être observées à la surface ou près de la surface des eaux. Les espèces observées comprenaient le marsouin, le requin, l'astérie, la méduse, le corail, l'alcyon, le polype et les zoophytes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 2025, grâce à des équipements de plongée sous-marine avancés et des robots sous-marins autonomes, des observations plus détaillées sont possibles dans les eaux profondes du Golfe du Bengale. Des espèces marines telles que le requin-tigre, la raie manta, le dauphin de rivière et le poisson-chien ont été observées dans des profondeurs supérieures à celles accessibles en 1866.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, les connaissances sur les courants marins étaient limitées aux cinq principaux déterminés par la science, dont le Kuro-Scivo (ou Fleuve-Noir) dans l'Océan indien sud. En 2025, grâce à des satellites et des modèles numériques de haute résolution, les connaissances sur les courants marins ont considérablement progressé. De nombreux courants supplémentaires ont été identifiés, y compris des courants dans l'Océan indien nord, qui n'avaient pas été pris en compte en 1866.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En 1866, les techniques de cartographie maritime étaient limitées aux cartes manuscrites et à la triangulation terrestre pour déterminer les positions des lieux. En 2025, grâce à des satellites GPS et à des systèmes de positionnement par satellite précis, les cartes marines sont beaucoup plus précises et disponibles en temps réel. Les données sur la profondeur, la température, la salinité et les courants marins peuvent également être collectées automatiquement et transmises en temps réel aux stations météorologiques et aux centres de recherche.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Bay of Bengal</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>He wanted to go to the surface and harpoon the monsters, particularly certain smooth-hound sharks, whose mouth is studded with teeth like a mosaic; and large tiger-sharks nearly six yards long, the last named of which seemed to excite him more particularly. But the Nautilus, accelerating her speed, easily left the most rapid of them behind. The 27th of January, at the entrance of the vast Bay of Bengal, we met repeatedly a forbidding spectacle, dead bodies floating on the surface of the water. They were the dead of the Indian villages, carried by the Ganges to the level of the sea, and which the vultures, the only undertakers of the country, had not been able to devour. But the sharks did not fail to help them at their funeral work.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Bay of Bengal</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced substantial growth during this period. French zoologist Louis Jean Pierre Vieillot de Lacépède (1756-1825) and Georges Cuvier (1769-1832), a pioneer in comparative anatomy, made important contributions to marine biology. They classified numerous species of sharks, including the smooth-hound shark and tiger-shark mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The Bay of Bengal, where the passage takes place, was extensively explored during the 19th century. British hydrographers conducted numerous surveys and charted the region's coastline, providing valuable information about its geographical features and currents.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday (1791-1867) made groundbreaking discoveries in electrochemistry. He developed the concept of anions and cations, which helped explain the behavior of electricity in chemical reactions. This understanding could potentially be relevant to the passage's mention of sharks being attracted to electrical discharges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expeditions: Scientific expeditions played a crucial role in advancing knowledge during this era. For instance, the Challenger expedition (1872-1876) was a British scientific voyage that aimed to study the world's oceans and their geology, zoology, and chemistry. The findings from this expedition significantly contributed to our understanding of marine life and the ocean floor.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Bay of Bengal</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Bay of Bengal was a vast marine ecosystem teeming with life, home to various marine species such as porpoises, sharks, starfish, jellyfish, corals, soft corals, polyps, and zoophytes. The Nautilus, a fictional submarine from Jules Verne's novel \"20,000 Leagues Under the Sea,\" encountered smooth-hound sharks with mosaic-like teeth and tiger sharks nearly six yards long. Tragically, the aftermath of the 1866 flood in India resulted in corpses being carried by the Ganges into the Bay of Bengal.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Fast forward to 2025, the Bay of Bengal remains a rich marine habitat, but the presence and impact of technology have significantly changed. Marine species are still present, including porpoises, sharks, starfish, jellyfish, and corals, but new discoveries have been made. For instance, the elusive Ganges river dolphin, once thought to be extinct, was rediscovered in the Bay of Bengal in 2011.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to 1866, modern technology has allowed for more efficient and less destructive fishing methods. For example, the use of fish aggregating devices (FADs) has reduced bycatch and improved selectivity, helping to preserve marine biodiversity. However, overfishing remains a concern in the Bay of Bengal, with certain species like tiger sharks still under threat.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>While in 1866, corpses floated on the surface due to natural disasters, in 2025, plastic waste from land-based sources has become a significant issue in the Bay of Bengal. Microplastics have been found in various marine species, posing a threat to their health and the food chain. The development of advanced technologies for plastic waste management and cleanup efforts is crucial for preserving the Bay of Bengal's marine ecosystem in the future.</p></div>\n          </div>\n        </div>"}}, "8": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Afrique Est</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Afrique Est</h5>\n                    <p>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>", "compare_1866_today": "\n                    <h3 style='color:#0a3d62; font-size:1.9rem;'>Comparaison 1866 / Aujourd'hui</h3>\n                    <h5 style='color:#27c39f; font-size:1.4rem;'>⚗️ Contour Afrique Est</h5>\n                    <p style='font-size:1.35rem;'>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>East Africa Coast</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>This is an intermediate navigation point, not explicitly mentioned in the novel.</p>", "marine_species": "<p>🗺️ Intermediate stop — no novel passage associated.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 East Africa Coast</h5>\n                    <p>🗺️ Intermediate navigation stop — no novel passage associated.</p>", "compare_1866_today": "\n                    <h3 style='color:#0a3d62; font-size:1.9rem;'>Comparison 1866 / Today</h3>\n                    <h5 style='color:#27c39f; font-size:1.4rem;'>⚗️ East Africa Coast</h5>\n                    <p style='font-size:1.35rem;'>🗺️ Intermediate navigation stop — no novel passage associated.</p>"}}, "9": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Sous l'isthme de Suez</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l'isthme de Suez n'est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Requin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pintadine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Huître</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Tridacne</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Bivalve</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Testacé</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Sous l'isthme de Suez</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent au passage de l'extrait cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. En zoologie marine, une expédition française menée par Alphonse Milne-Edwards et Jules Antoine Cantino (1867-1869) a exploré la mer Rouge. Ils ont découvert de nombreuses espèces marines inconnues jusqu'alors, dont le dugong, un cétacé herbivore que Nemo chasse dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Dans le domaine de la géographie, les travaux de Charles Lyell ont eu une influence majeure sur la compréhension de la formation des reliefs et des roches. Son livre \"Principles of Geology\" (1830-1833) a été largement lu par les savants de l'époque, y compris Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Michael Faraday, un chimiste britannique, a effectué des recherches importantes sur l'électricité et la lumière. Il a découvert l'électrolyse en 1834, qui consiste à utiliser une électrode pour séparer les éléments d'une substance chimique dissoute dans un liquide.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Enfin, l'expédition de la Challenger (1872-1876) a été une expédition scientifique internationale qui a exploré les océans du monde entier. Elle a récolté des données sur la géologie marine, la zoologie et l'océanographie, et a permis de confirmer plusieurs</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Sous l'isthme de Suez</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, le passage du Nautilus sous l'isthme de Suez se produit grâce à l'Arabian Tunnel, un corridor souterrain imaginé par Nemo. Aujourd'hui en 2025, la réalité est différente avec l'ouverture du Canal de Suez en 1869, permettant le passage des navires entre la mer Méditerranée et la mer Rouge sans avoir besoin d'un tunnel souterrain.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, Nemo chasse un dugong dans la mer Rouge. Aujourd'hui en 2025, l'espèce du dugong est menacée et protégée par de nombreuses lois internationales. Les observations de cette espèce sont encadrées par des règles strictes pour protéger leur population fragile.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, les espèces marines observées par le Nautilus comprennent des requins, squales, turbots, pintadines, huîtres, moules, Tridacne et bivalves. Aujourd'hui en 2025, la connaissance de ces espèces a considérablement augmenté grâce aux avancées dans les sciences marines. Des technologies comme le sonar et l'ADN ont permis d'identifier et d'étudier de nouvelles espèces marines, ainsi que leurs habitats et comportements.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, le Nautilus est un bateau mystérieux qui ne se hasarderait pas dans les canaux coupés d'écluses de la mer Rouge. Aujourd'hui en 2025, les navires modernes sont équipés de technologie avancée pour naviguer dans des eaux profondes et complexes comme la mer Rouge. Les cartes hydrographiques détaillées et les systèmes de navigation satellitaires permettent aux navires d'explorer et de traverser le canal de Suez sans aucun problème.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Beneath the Isthmus of Suez</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Oyster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Giant clam</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Bivalve</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Testacean</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Beneath the Isthmus of Suez</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that relate to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: Georges Cuvier (1769-1832) and Jean-Baptiste de Lamarck (1744-1829) were pioneers in marine zoology and ichthyology, respectively. Cuvier's work on comparative anatomy helped classify fish species, while Lamarck proposed theories about the evolution of aquatic life forms.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw a surge in exploratory expeditions aimed at mapping and understanding the world's oceans. One notable example is the Challenger Expedition (1872-1876), which used advanced equipment to collect data on marine life, geology, and oceanography from various parts of the globe.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electrochemistry: Michael Faraday (1791-1867) made significant contributions to the field of electrochemistry. His work on electromagnetic induction, electrolysis, and the relationship between electricity and chemistry laid the groundwork for understanding the properties of various elements found in the ocean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments played a crucial role in advancing our knowledge of the deep sea during this period. For instance, the invention of the bathymeter (a device used to measure water depth) and the improvement of the diving bell allowed scientists to explore deeper parts of the ocean and collect samples from previously unexplored regions.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Beneath the Isthmus of Suez</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus journey beneath the Isthmus of Suez revealed a diverse marine life community, including sharks, turbot, pearl oysters, oysters, mussels, giant clams, and bivalves. At that time, these species were observed with the naked eye or through crude diving equipment, such as diving bells.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, advanced submersibles equipped with sonar and high-resolution cameras allow for a more detailed exploration of the deep sea ecosystems beneath the Isthmus of Suez. For instance, remotely operated vehicles (ROVs) have discovered new species like the Yeti crab (Kiwa hirsuta), which was first found in hydrothermal vents in 2005.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the understanding of marine life at such depths was limited due to the lack of technology for deep-sea exploration. Jules Verne's characters could only speculate about the unknown beings living in these remote depths. In contrast, modern scientific research has made significant progress in studying deep-sea organisms and their adaptations, thanks to technologies like manned submersibles, autonomous underwater vehicles (AUVs), and genetic sequencing techniques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, while pearl oysters were harvested for their valuable pearls in 1866, modern marine conservation efforts have led to a shift in focus towards sustainable pearl farming practices, such as the cultivation of Akoya pearl oysters (Pinctada fucata) without damaging natural reefs. Additionally, advanced technologies like 3D printing are being explored for creating biomimetic materials inspired by marine species' structures and functions, which could have significant implications for various industries in the future.</p></div>\n          </div>\n        </div>"}}, "10": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'archipel grec</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pour les uns, c'est un polypier, et pour d'autres tels que M. Milne Edwards, c'est un individu isolé et unique. La classe des spongiaires contient environ trois cents espèces qui se rencontrent dans un grand nombre de mers, et même dans certains cours d'eau où elles ont reçu le nom de «fluviatiles.» Mais leurs eaux de prédilection sont celles de la Méditerranée, de l'archipel grec, de la côte de Syrie et de la mer Rouge. Là se reproduisent et se développent ces éponges fines-douces dont la valeur s'élève jusqu'à cent cinquante francs, l'éponge blonde de Syrie, l'éponge dure de Barbarie, etc. Mais puisque je ne pouvais espérer d'étudier ces zoophytes dans les échelles du Levant, dont nous étions séparés par l'infranchissable isthme de Suez, je me contentai de les observer dans les eaux de la mer Rouge.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Requin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Rémora</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Spare</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Dugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'archipel grec</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, la zoologie marine a connu plusieurs avancées importantes, notamment en ce qui concerne l'étude des éponges marines. L'éminent naturaliste français Jean-Baptiste de Lamarck (1744-1829) avait déjà classé les éponges dans le règne animal au début du XIXe siècle, mais c'est à partir des années 1850 que la connaissance scientifique sur ces organismes a commencé à progresser rapidement.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Un des premiers naturalistes à s'intéresser aux éponges fut le français Georges Cuvier (1769-1832), qui les avait décrites pour la première fois en 1817 dans son ouvrage \"Le Règne Animal Distribué d'après son Organisation\". Mais c'est au milieu du XIXe siècle que l'étude des éponges a vraiment commencé à prendre de l'importance, notamment grâce aux travaux de Henri Milne-Edwards (1800-1885), un zoologiste français qui a consacré une grande partie de sa carrière à leur étude.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Milne-Edwards a identifié plusieurs centaines d'espèces d'éponges et a décrit leurs caractéristiques morphologiques et anatomiques. Il a également étudié leur répartition géographique, notamment en Méditerranée, dans les eaux de l'archipel grec, de Syrie et de la mer Rouge, comme mentionné dans le passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En plus des recherches menées par Milne-</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ L'archipel grec</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. En 1866, les connaissances sur les espèces marines de l'archipel grec étaient encore relativement limitées. Par exemple, l'éponge blonde de Syrie, mentionnée par Aronnax, était considérée comme une espèce unique et isolée. Aujourd'hui en 2025, grâce à des techniques d'analyse génétique plus avancées, plusieurs espèces différentes d'éponge ont été identifiées dans cette région.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. En 1866, la compréhension de la biodiversité marine était encore en partie empirique. Par exemple, les cétacés étaient souvent confondus entre eux, comme le baleine et le cachalot, qui sont en fait deux espèces différentes. Aujourd'hui, grâce à des techniques d'identification plus avancées telles que l'analyse de l'ADN mitochondrial, les cétacés peuvent être identifiés avec une précision accrue.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. En 1866, les connaissances sur les requins et les raies étaient encore limitées. Par exemple, le requin-marteau n'avait pas encore été découvert. Aujourd'hui en 2025, grâce à des techniques de paléontologie plus avancées, il est possible d'étudier les fossiles de requins et raies pour comprendre leur évolution et leur diversité.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. En 1866, les connaissances sur la pollution marine étaient encore en partie inconnues. Par exemple, le phénomène du réchauffement climatique n'avait pas encore été identifié. Aujourd'hui en 2025, grâce à des techniques de surveillance plus avancées telles que la mesure du taux de dioxyde de carbone dans l'eau et l'air, il est possible d'étudier les effets de la pollution marine sur les espèces marines.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>The Greek Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>CHAPTER VI</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>THE  significant contributions to the field, classifying numerous species and studying their anatomy, physiology, and behavior. In the 1860s, French zoologist Henri Marie Ducrotay de Blainville (1777-1850) continued this work, focusing on invertebrates.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The exploration of the Greek Archipelago was part of a broader trend of geographical discovery and mapping during the 19th century. Scientists like Alexander von Humboldt (1769-1859) and Charles Lyell (1797-1875) made significant contributions to our understanding of the Earth's geography, geology, and climate.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the 1800s, Michael Faraday (1791-1867) conducted groundbreaking research in electromagnetism and electrochemistry. His experiments on electrolysis led to the discovery of new elements and laid the foundation for the field of electrical chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century saw significant advancements in the understanding and application of electricity. Instruments like the galvanometer, invented by William Thomas Thornold (1820-1855), were used to measure electric currents, contributing</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ The Greek Archipelago</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the _Nautilus_ observed a diverse array of marine life during its passage through the Greek Archipelago. Whales and sperm whales were common sights, along with various cetaceans. Sharks, rays, morays, remoras, and sparidae were also spotted. The crew's scientific observations were limited by the technology available at the time.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, in 2025, advanced sonar and underwater imaging technologies allow for a more comprehensive understanding of marine biodiversity. Whales, sperm whales, and various cetaceans continue to inhabit these waters, but additional species such as the loggerhead sea turtle and the Mediterranean monk seal have been discovered and are now regularly observed.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Aronnax and his crew had no means of identifying each species they encountered with precision. However, in 2025, DNA barcoding and genetic sequencing technologies enable scientists to accurately identify individual species, even without physical samples. This allows for a more detailed understanding of the ecosystem's health and biodiversity.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Lastly, while Aronnax was limited to observing marine life from the _Nautilus_, modern researchers can conduct in-depth studies using remotely operated vehicles (ROVs) and autonomous underwater vehicles (AUVs). These technologies allow for closer examination of marine species, their behaviors, and their interactions with their environment, providing valuable insights into marine ecology.</p></div>\n          </div>\n        </div>"}}, "11": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Méditerranée</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Voici une conserve d'holoturies qu'un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d'anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu'en gourmet, tandis que le capitaine Nemo m'enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j'extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l'Océan.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inli correspondent à ce passage du roman de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les savants de l'époque ont effectué des recherches sur les espèces marines méditerranéennes, notamment les holoturies, les cétacés et les coquillages. Georges Cuvier (1769-1832), un naturaliste français considéré comme le père de la paléontologie, a étudié de nombreuses espèces marines. En 1848, Henri Milne-Edwards (1800-1885) et Alphonse Grandidier (1839-1921), deux zoologistes français, ont créé la Société Zoologique de France pour promouvoir les études en zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le passage fait référence à l'électricité, puisque le byssus des coquillages est utilisé pour tisser les étoffes. Les progrès de la science de l'électricité ont été significatifs au XIXe siècle. Michael Faraday (1791-1867), un chimiste et physicien britannique, a effectué des recherches importantes sur les propriétés électriques des matériaux. En 1831, il a inventé le générateur électromagnétique à aimant permanent.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : La découverte de la Méditerranée comme une \"nourrice prodigieuse\" peut être interprétée comme un hommage à sa richesse en res</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Méditerranée</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1 - En 1866, la nourriture à bord du Nautilus était constituée de conserves d'holoturies, crème fournie par le lait des cétacés et sucre extrait des grands fucus de la mer du Nord. Aujourd'hui en 2025, les aliments marins sont également abondants dans la Méditerranée, mais ils sont souvent obtenus à partir d'une pêche durable et responsable. Par exemple, des poissons tels que le thon rouge et le saumon atlantique sont élevés en fermes marines, ce qui permet de réduire la pression sur les stocks naturels.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2 - En 1866, Nemo raconte à Aronnax qu'il se vêt avec des étoffes issues de la mer. Aujourd'hui, il est possible de trouver des matériaux synthétiques qui sont issus de l'océan. Par exemple, une entreprise a récemment développé un matériau appelé Oceanix, fabriqué à partir de microalgues marines et de déchets plastiques collectés dans la mer Méditerranée.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3 - En 1866, le Nautilus navigait sans utiliser de carburant fossile, grâce à son propulsion électrique. Aujourd'hui en 2025, les navires modernes utilisent également des technologies éco-responsables pour réduire leur empreinte écologique. Par exemple, certaines compagnies maritimes ont mis au point des navires à propulsion hybride qui combinent une propulsion électrique et un moteur diesel.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4 - En 1866, Nemo explorait la Méditerranée avec l'aide de technologies avancées pour son époque, telles que des lunettes sous-marines et des torpilles électriques. Aujourd'hui en 2025, les scientifiques utilisent également des technologies avancées pour étudier la Méditerranée, mais ces technologies sont souvent plus sophistiquées. Par exemple, certains sous-marins modernes sont équipés de sonars multifrequence qui permettent de détecter les espèces marines et de suivre leur migration.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Mediterranean Sea</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>CHAPTER VII</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>THE MEDITERRANEAN IN FORTY-EIGHT HOURS</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The Mediterranean, the blue sea par excellence, “the great sea” of the</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Hebrews, “the sea” of the Greeks, the “mare nostrum” of the Romans,</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Dolphin</span><span style='display:inline-block; margin:4px; p ); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Sea anemone</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Sea turtle</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🧽 Sponge</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annelid</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the context of the passage, several significant scientific discoveries and advancements occurred during the mid-19th century that relate to marine zoology, geography, chemistry, and electricity:</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck's work on invertebrates (early 19th century) paved the way for further studies in marine biology. Georges Cuvier, a prominent figure of the time, made significant contributions to comparative anatomy and paleontology, classifying various species found in the Mediterranean Sea. Louis Agassiz, another notable zoologist, was instrumental in the study of fish and fossil fishes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw advancements in oceanographic studies. Alexander von Humboldt's work on geography and natural sciences contributed to our understanding of the Mediterranean Sea's geographical features, climate, and geology. Mathew Maury, known as the \"Pathfinder of the Seas,\" mapped ocean currents and weather patterns, providing valuable information for navigation in the Mediterranean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, which had implications for understanding the chemical composition of seawater and its interaction with marine organisms. Justus von Liebig's work on organic chemistry was also crucial in understanding the nutrient cycles within marine ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Scientific Expeditions: The 19th century witnessed numerous scientific expeditions, such as the Challenger expedition (1872-1876), which aimed to explore the world's oceans and gather data on geology, zoology, and chemistry. These expeditions greatly contributed to our understanding of the Mediterranean Sea and its ecosystems.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus journeyed through the Mediterranean Sea, a body of water rich with diverse marine life such as Sperm Whales, Dolphins, Sharks, Rays, Tuna, Salmon, Herring, and Moray eels. Today, in 2025, advanced underwater technology has allowed scientists to explore deeper parts of the Mediterranean, revealing new species like the Giant Squid (Architeuthis dux) and the Vampire Squid (Vampyroteuthis infernalis).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Mediterranean was a sea embalmed with myrtle perfume and surrounded by rugged mountains. By contrast, in 2025, marine conservation efforts have led to the restoration of various coastal ecosystems, including the planting of over 3 million trees along the Mediterranean coastline.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Mediterranean was still a battleground for Neptune and Pluto, symbolizing the natural forces at play in the sea. In 2025, however, human activity has significantly impacted the Mediterranean, with rising temperatures causing coral bleaching events and overfishing threatening various fish populations.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Nautilus was a marvel of technology, capable of traveling at incredible speeds for its time. In 2025, underwater drones and autonomous submarines have been developed, allowing scientists to explore the deepest parts of the ocean without risking human lives. These advanced technologies have led to groundbreaking discoveries, such as the detection of hydrothermal vents in the Mediterranean, providing evidence for the existence of unique ecosystems thriving under extreme conditions.</p></div>\n          </div>\n        </div>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Espadon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Dorade</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Coquillage</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.
