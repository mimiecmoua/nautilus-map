const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l'île Crespo. Il espère que rien n'empêchera monsieur le professeur d'y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!"}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "1": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d'îles.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "2": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "3": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "C'est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n'en ayons jamais d'autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?"}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!"}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "4": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n'avait plus de bornes, et de l'appareil, elle remontait aussitôt à l'ingénieur qui l'avait créé. Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Forme la pointe du golfe de Carpentarie.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Forms the tip of the Gulf of Carpentaria.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "5": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Un homme de l'équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "6": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Visitée par Darwin et le capitaine Fitz-Roy.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Visited by Darwin and Captain Fitz-Roy.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "7": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C'était la mort des villes indiennes.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "8": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Point intermédiaire.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Intermediate point.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "9": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l'isthme de Suez n'est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Passage par l'Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l'isthme de Suez, puis chasse du dugong.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "10": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Ils venaient retirer les filets qui avaient été mis à la traîne pendant la nuit. Ces marins appartenaient évidemment à des nations différentes, bien que le type européen fût indiqué chez tous. Je reconnus, à ne pas me tromper, des Irlandais, des Français, quelques Slaves, un Grec ou un Candiote. Du reste, ces hommes étaient sobres de paroles, et n'employaient entre eux que ce bizarre idiome dont je ne pouvais pas même soupçonner l'origine. Aussi, je dus renoncer à les interroger."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Passage du Nautilus dans l'archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l'ancienne île de Crète.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: The Nautilus passes through the Greek Archipelago; Aronnax observes the fish of these waters, with an evocation of the ancient island of Crete.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "11": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Voici une conserve d'holoturies qu'un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d'anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu'en gourmet, tandis que le capitaine Nemo m'enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j'extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l'Océan."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "12": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Vision de l'Atlantide, localisation cartographique approximative d'après le trajet du roman.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Vision of Atlantis; approximate cartographic location based on the novel's route.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "13": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Traversée de la mer des Sargasses par le Nautilus.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Crossing of the Sargasso Sea by the Nautilus.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "14": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Direction le pôle Sud.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Heading towards the South Pole.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "15": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Point intermédiaire\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTE  manière à doubler le cap Horn. L'équipage lui donna raison à l'unanimité. Et en effet, était-il probable que l'on pût rencontrer le narwal dans ce détroit resserré?"}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Direction la Banquise - Le Nautilus avait repris son imperturbable direction vers le sud.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A P APTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "20": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Cependant, personne ne doutait encore du succès, et pas un matelot du bord n'eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l'équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Point intermédiaire\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps because there was not enough water for him! suggested the greater part of the crew)."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Intermediate point\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "21": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l'eau n'eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d'îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J'aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d'une île à l'autre, fut très-décontenancé."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Attack by a colossal giant squid, eight meters long.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "22": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Point intermédiaire\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Intermediate point\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "23": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Entrée dans le Gulf Stream.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "Excerpt unavailable for this stop."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Entering the Gulf Stream.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "24": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN te : Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "26": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "27": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "28": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Complot d'évasion\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER V auteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Complot d'évasion\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Complot d'évasion\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century scientific discoveries", "content": "Context: Escape plot\n\nCard 3 — under development."}, "compare_1866_today": {"title": "⚗️ Comparison 1866 / today", "content": "Card 4 — under development."}}}, "31": {"fr": {"book_excerpt": {"title": "📖 Extrait du livre", "content": "Extrait indisponible pour cette escale."}, "marine_species": {"title": "🐙 Espèces marines mentionnées", "content": "Fiche 2 — en cours de développement."}, "science_19c": {"title": "🔬 Découvertes scientifiques du XIXe siècle", "content": "Contexte : Fin du voyage pour le professeur Aronnax, Conseil et Ned Land\n\nFiche 3 — en cours de développement."}, "compare_1866_today": {"title": "⚗️ Comparaison 1866 / aujourd'hui", "content": "Fiche 4 — en cours de développement."}}, "en": {"book_excerpt": {"title": "📖 Book excerpt", "content": "And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour."}, "marine_species": {"title": "🐙 Marine species mentioned", "content": "Card 2 — under development."}, "science_19c": {"title": "🔬 19th-century const ROWS_DATA        = [{"Escales du Nautilus": {"fr": "Île de Crespo", "en": "Crespo Island"}, "Date": {"fr": "1er Décembre 1866", "en": "December 1st, 1866"}, "Latitude_Décimal": 33.18497, "Longitude_Décimal": 169.85446, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.", "en": "Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider."}, "passage_roman": {"fr": "Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l'île Crespo. Il espère que rien n'empêchera monsieur le professeur d'y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!", "en": "The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Archipel des Pomotou", "en": "Pomotou Archipelago"}, "Date": {"fr": "11 Décembre 1866", "en": "December 11th, 1866"}, "Latitude_Décimal": 9.48786, "Longitude_Décimal": 177.83569, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d'îles.", "en": "This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups."}, "passage_roman": {"fr": "Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.", "en": "However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Archipel des nouvelles Hébrides", "en": "New Hebrides Archipelago"}, "Date": {"fr": "25 Décembre 1866", "en": "December 25th, 1866"}, "Latitude_Décimal": -16.0667, "Longitude_Décimal": 164.5333, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Découverte par Quiros
