argin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Manatee</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Sea lion</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatross</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Horn</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: The study of marine life was a major focus during this period. Georges Cuvier (1769-1832), a French naturalist, is renowned for his work on comparative anatomy and paleontology. He classified many marine species and laid the foundations for modern vertebrate taxonomy. Jean-Baptiste de Lamarck (1744-1829) proposed the theory of evolution before Charles Darwin, suggesting that organisms change over time in response to their environment.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable figure is Henri Marie Ducrotay de Blainville (1777-1850), who described several marine species, including the narwhal mentioned in the passage. The narwhal, a large whale with a distinctive long, spiraled tusk, was often associated with myths and legends, leading some sailors to believe it could not pass through narrow straits like the Straits of Magellan or Cape Horn.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: Exploration and mapping of remote regions, such as the Straits of Magellan and Cape Horn, were significant during this era. The Straits of Magellan, discovered by Ferdinand Magellan in 1520, became a major shipping route connecting the Atlantic and Pacific Oceans. In the 19th century, expeditions led by explorers like Robert FitzRoy (1805-1865) continued to chart these waters, improving understanding of the region's geography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cape Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison: Science and Technology**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Jules Verne's Imagination vs Current Discoveries:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's 20,000 Leagues Under the Sea (1866), Captain Nemo's Nautilus was equipped with advanced technology for its time, including an electric propulsion system and a periscope. While these technologies were fictional at the time, they have since become reality. Modern submarines use electric motors for silent underwater navigation, and periscopes are used for visual observation from submerged positions. Additionally, the Nautilus's ability to dive deep into the ocean was a fascinating concept in 1866, but today, manned and unmanned deep-sea submersibles can reach depths far greater than the Nautilus ever did.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Current Scientific Realities:</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>The scientific understanding of marine life and the ocean's ecosystem has significantly advanced since 1866. For instance, the existence of the giant squid, a creature mentioned by sailors as a mythical beast, was not confirmed until the early 20th century. Today, we have a much more comprehensive understanding of various marine species, including their behavior, habitats, and roles in the ecosystem. Furthermore, advancements in technology have enabled scientists to explore deeper parts of the ocean, leading to discoveries of new species and features on the seafloor.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison: Marine Ecology**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. State of Oceans in 1866 vs Today:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the oceans were relatively pristine compared to today. Pollution was minimal, overfishing was not a significant issue, and climate change had not yet become a pressing concern. On the other hand, modern oceans face numerous challenges, including pollution</p></div>\n          </div>\n        </div>"}}, "17": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pôle Sud</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>C'est votre capitaine Cook, à vous autres, Français. Infortuné savant! Avoir bravé les banquises du pôle Sud, les coraux de l'Océanie, les cannibales du Pacifique, pour périr misérablement dans un train de chemin de fer! Si cet homme énergique a pu réfléchir pendant les dernières secondes de son existence, vous figurez-vous quelles ont dû être ses suprêmes pensées!» En parlant ainsi, le capitaine Nemo semblait ému, et je porte cette émotion à son actif. Puis, la carte à la main, nous revîmes les travaux du navigateur français, ses voyages de circumnavigation, sa double tentative au pôle Sud qui amena la découverte des terres Adélie et Louis-Philippe, enfin ses levés hydrographiques des principales îles de l'Océanie.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleinoptère</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Triton</sp e et de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la zoologie marine, des expéditions scientifiques ont permis de découvrir de nouvelles espèces d'animaux marins, notamment dans les eaux du Pacifique Sud. En 1869, l'expédition française de Jules Dumont d'Urville a exploré la Terre Adélie et la Terre Louis-Philippe en Antarctique, découvrant une grande variété de faune marine inconnue jusqu'alors.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué des recherches pionnières sur les électroaimants et la génération d'électricité à partir de sources naturelles telles que les courants marins. En 1865, il a démontré que l'électricité pouvait être utilisée pour produire des effets mécaniques, ce qui a ouvert la voie à de nombreuses applications pratiques de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les progrès ont été faits dans le domaine des analyses chimiques et de la synthèse de nouveaux composés. En 1867, Jean-Baptiste Dumas a découvert l'azote az</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pôle Sud</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Nemo, dans son vaisseau le Nautilus, était équipé de technologies avancées pour l'époque, tels que des canons sous-marins et des moteurs électriques. Cependant, aujourd'hui, les découvertes scientifiques ont évolué considérablement. Les navires sont équipés de sonars pour la détection d'espèces marines, de drones sous-marins pour l'exploration et la collecte de données, ainsi que de systèmes de navigation GPS et de communication satellitaires. De plus, les technologies permettent aujourd'hui d'effectuer des recherches en profondeur de l'océan, ce qui était impossible à l'époque de Jules Verne.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>L'état des océans et des espèces marines a considérablement changé entre 1866 et aujourd'hui. En 1866, les espèces observées par Nemo étaient abondantes et variées, notamment des baleines, marsouins, cétacés, baléonoptères, raies, moules, tritons et ptéropodes. Cependant, aujourd'hui, de nombreuses espèces marines sont menacées par le réchauffement climatique, la pollution, la surpêche et les changements dans leur habitat. Par exemple, certaines espèces de baleines sont en voie de disparition en raison du bris des barrières acoustiques naturelles qui les protègent des chasseurs, tandis que d'autres espèces de poiss</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>South Pole</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“This D’Urville was one of your great sailors,” said the Captain to me,</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“one of your most intelligent navigators. He is the Captain Cook of you</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Frenchmen. Unfortunate man of science, after having braved the icebergs</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>of the South Pole, the coral reefs of Oceania, the cannibals of the</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Fin Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display: rder-radius:20px;font-size:1.3rem;'>🦭 Walrus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Manatee</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Sea lion</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatross</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South Pole</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the most influential figures in natural history was Georges Cuvier, a French zoologist and paleontologist who played a crucial role in establishing comparative anatomy as a discipline. He made numerous contributions to marine zoology, including classifying over 40,000 species during his career.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin's groundbreaking work \"On the Origin of Species\" was published in 1859, but its ideas were already shaping scientific thought in the 1860s. Darwin proposed the theory of evolution by natural selection, which revolutionized understanding of life on Earth and had far-reaching implications for geography, biology, and anthropology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable scientist was Jean Baptiste de Lamarck, who developed the concept of inheritance of acquired characteristics, although his ideas were later disproven. Nonetheless, he contributed to the development of evolutionary theory.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of electricity, Michael Faraday conducted extensive research on electromagnetism and electrochemistry in the 1830s and 1840s. His discoveries included the principles of electromagnetic induction and the creation of the first electric motor and generator.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in advancing knowledge during this period. The French explorer Jules Dumont d'Urville, mentioned in the passage, led several voyages of discovery, including two to the Antarctic region (1837-1840 and 1840-1842). His second voyage resulted in the first confirmed sighting of the Antarctic continent by a European.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ South Pole</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: What Nemo knew/imagined vs current discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's 20,000 Leagues Under the Sea (1866), Captain Nemo exhibits a remarkable understanding of marine life and underwater technology for his time. He possesses advanced knowledge about various marine species such as whales, porpoises, cetaceans, fin whales, rays, mussels, triton shells, and sea butterflies. However, compared to the present day (2025), Nemo's technological capabilities are significantly less sophisticated.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 2025, advancements in marine technology have revolutionized our understanding of the deep sea. Submersibles like the DEEPSEA CHALLENGE and JAMES ROSS have enabled scientists to explore greater depths than Nemo's Nautilus ever could. These modern submersibles are equipped with state-of-the-art sensors, cameras, and robotic arms that allow for detailed observations and collection of samples from the deep ocean. Additionally, advancements in satellite technology have provided us with a better understanding of global ocean currents, temperatures, and ecosystems.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of oceans and species in 1866 vs today (warming, pollution, overfishing, endangered species)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the state of the world's oceans was largely unknown due to limited exploration and understanding of marine ecosystems. The South Pole, which Nemo's Nautilus encounters, was a relatively unexplored region, with little known about its marine life or environmental conditions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Fast forward to 2025, the oceans face numerous challenges due to human activities. Global warming has led to rising sea</p></div>\n          </div>\n        </div>"}}, "18": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Horn (retour)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>L'Atlantique! vaste étendue d'eau dont la superficie couvre vingt-cinq</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>millions de milles carrés, longue de neuf mille milles sur une</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>largeur moyenne de deux mille sept cents. Importante mer presque</p><p style=  style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Formation coralligène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Dugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Tortue marine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le XIXe siècle a vu de nombreuses découvertes scientifiques remarquables sur la base du passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Des explorations marines ont été menées pour étudier la faune et la flore des océans, notamment l'Atlantique. Les naturalistes français comme Cuvier, Lacépède et Duméril ont contribué à la connaissance de la biodiversité marine en collectant et classifiant des milliers d'espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le XIXe siècle a également vu de nombreuses avancées dans le domaine de l'électricité, notamment grâce aux travaux de Michael Faraday. Il a découvert les lois électromagnétiques et a inventé le générateur électrique à aimant permanent, qui a permis d'utiliser l'énergie électrique pour alimenter des lampes électriques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Les explorations scientifiques ont également contribué à la connaissance de la géographie mondiale. Des expéditions telles que celle de Charles Darwin sur le Beagle ont permis de découvrir et de documenter de nouvelles terres, notamment en Amérique du Sud. De plus, les cartes marines ont été améliorées grâce à des instruments tels que la sonde marine et le théodolite.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chimie : Les avancées dans le domaine de la chimie ont également eu un impact important sur la connaissance du monde. Des scientifiques comme Lavoisier, Gay-Lussac et Berzelius ont contribué à la compréhension des lois chimiques et des équations chim</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo possédait une connaissance approfondie de la géographie maritime et des dimensions de l'Atlantique, établissant les dimensions correctes pour cette époque (25 millions de milles carrés, longueur de 9 000 milles sur une largeur moyenne de 2 700 milles). Cependant, dans le roman, il n'y a pas de référence à la théorie de la plate-tectonique qui est un concept scientifique majeur découvert au XXe siècle.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les technologies de navigation étaient limitées et basées sur des instruments tels que le chronomètre à mer, la boussole et les cartes nautiques. Aujourd'hui, nous avons accès à des systèmes GPS précis, des satellites météorologiques et océanographiques, ainsi qu'à des cartes numériques très détaillées qui offrent une connaissance plus approfondie de l' ientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Lucayan Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, numerous expeditions were organized to explore and document marine life, particularly in tropical regions like the Caribbean. French naturalist Louis Agassiz led several expeditions to study glaciers and the geology of North America, while Alexander Agassiz, his son, focused on marine biology, especially in the Gulf Stream region where the Nautilus was traveling.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Biology and Evolution: Charles Darwin published \"On the Origin of Species\" in 1859, proposing the theory of evolution by natural selection. His work, based on his voyage aboard HMS Beagle, greatly influenced the understanding of life's diversity and the relationship between species. Another influential figure was Georges Cuvier, a comparative anatomist who classified many marine organisms and introduced the concept of extinction.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British chemist and physicist, made significant contributions to the understanding of electromagnetism and electrochemistry. He discovered the principles underlying electric motors, generators, and transformers, which would later be crucial for marine navigation and exploration.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was essential during this era. For instance, the hydrographic barometer, a device used to measure atmospheric pressure and air temperature, was crucial for navigating the open sea. Additionally, the invention of the microscope allowed scientists like Agassiz to study marine organisms in greater detail.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Lucayan Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Submarine Technology**: In Jules Verne's \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus was a technologically advanced submarine, capable of diving to great depths and traveling at high speeds underwater. While this was purely fictional in 1866, modern-day submersibles like the Deepsea Challenger and Triton 3300/3 have been developed, albeit not with the same level of autonomy or destructive power as the Nautilus. However, these vehicles are used for scientific exploration, deep-sea mining, and underwater archaeology.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. **Sonar and Navigation**: The Nautilus was equipped with advanced sonar technology that allowed it to navigate the ocean floor and detect marine life. While sonar technology was in its infancy during Verne's time, today's ships and submarines use highly sophisticated sonars for navigation, mapping the seafloor, and locating underwater objects or animals. Additionally, Global Positioning System (GPS) technology enables precise location determination, something that was not available in 1866.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. **Communication**: In the novel, the Nautilus had a telegraphic system for communicating with other ships and coastal stations. While this was an imaginative leap at the time, today's submarines use encrypted satellite communication systems for maintaining contact with surface vessels and command centers.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Ocean Health**: In 1866, the ocean's health was relatively unknown due to a lack of scientific understanding</p></div>\n          </div>\n        </div>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques remarquables ont été effectuées dans le domaine de la zoologie marine, de l'électricité et de la géographie, correspondant au passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz (Suisse), un des plus grands naturalistes de son temps, a étudié les poissons osseux marins, notamment en Amérique du Nord. Il a décrit plusieurs espèces, dont certains labres-grisons et sciènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les sparidés, qui comprennent les spares-synagres, étaient l'objet d'études de Georges Cuvier (France) au début du XIXe siècle. Les chercheurs ont découvert que ces poissons possédaient un iris brillant comme un feu, ce qui est mentionné dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les coriphènes bleus relevés d'or et d'argent sont en fait des poissons-chats (Sphoeroides sp.), découverts par Louis Agassiz et John Richardson (Canada) au XIXe siècle.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne les perroquets vrais arcs-en-ciel de l'Océan, il s'agit probablement des poissons-arc-en-ciel (Hemirhamphus sp.), connus pour leur magnifique couleur.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Hatteras</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de son époque pour l'époque (1866) sur la navigation, les courants marins et les espèces marines. Il mentionne la largeur du Gulf Stream à 65 milles et sa profondeur à 210 mètres, ce qui correspond aux mesures de l'époque. Aujourd'hui (2025), grâce aux progrès de la technologie, nous avons une connaissance plus précise des courants marins et des océans en général. Par exemple, le Gulf Stream est maintenant cartographié avec une grande précision grâce à l'utilisation de satellites et de modèles numériques de la circulation océanique. De plus, les connaissances sur les espèces marines ont également évolué en raison de la découverte de nouvelles espèces et des avancées dans le domaine de la génétique moléculaire.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière de technologie, il est intéressant de noter que Nemo dispose d'un sous-marin extrêmement avancé pour l'époque, le Nautilus, qui lui permet de naviguer à grande profondeur et de découvrir des espèces marines inconnues. Aujourd'hui (2025), les sous-marins sont encore plus avancés et permettent d'explorer les océans avec une précision et une efficacité jamais vues auparavant. De plus, la technologie numérique permet de modéliser les océans et de suivre en temps</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: Renowned naturalists of the era, such as Georges Cuvier and Jean-Baptiste de Lamarck, made significant contributions to marine zoology. Cuvier, a pioneer in comparative anatomy, described numerous marine species, including sharks and whales. Lamarck proposed the concept of evolution, although his theories were later refined by Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations that expanded geographical knowledge, particularly of the oceans. Matthew Maury, known as the \"Pathfinder of the Seas,\" developed ocean current charts based on data collected from hundreds of ships' logbooks. His work contributed to understanding the Gulf Stream mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British scientist, made significant contributions to the fields of electromagnetism and electrochemistry. He discovered the principles of electromagnetic induction and invented various devices such as the Bunsen burner and the Faraday cage. His work laid the foundation for electric lighting and power generation, which may have influenced Verne's depiction of the Nautilus' advanced technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial during this period. For example, the marine chronometer, invented by John Harrison in the 18th century, improved navigation at sea. Additionally, the development of the dip net, dredge, and trawl enabled scientists to collect marine organisms more efficiently for study.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cape Hatteras</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:1 e in global climate patterns, affecting weather across continents. Additionally, Nemo's Nautilus did not have the ability to collect scientific data or analyze samples from the ocean floor, capabilities that modern research vessels employ routinely.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine Biodiversity: In 1866, Verne observed several marine species during the Nautilus's voyage, including salmon, cod, moray, goby, and zoophyte. While these species still exist today, their populations have been significantly impacted by human activities. Overfishing, pollution,</p></div>\n          </div>\n        </div>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;fo ems, and can remain submerged for extended periods.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Underwater Communication: In the novel, communication underwater was limited to flag signals or the use of harpoons to tap on the hull of the ship. Today, underwater communication has evolved significantly, with sonar systems, acoustic modems, and even optical fiber cables being used for data transmission between submarines and surface vessels. Additionally, advancements in robotics have led to the development of autonomous underwater vehicles (AUVs) capable of collecting vast amounts of data without human intervention.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Navigation Systems: In 1866, Nemo's Nautilus relied on a combination of celestial navigation and the use of charts for navigation. Today, modern submarines utilize Global Positioning System (GPS) technology, which provides precise location information anywhere on Earth. Furthermore, advanced sonar systems allow submarines to create detailed maps of the ocean floor, enabling them to navigate complex underwater environments with greater accuracy.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (Warming, Pollution, Overf</p></div>\n          </div>\n        </div>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Louis Agassiz, un zoologiste suisse, a étudié la glaciation et la théorie de la dérive des continents. Il a également contribué à la classification des poissons marins. En marine, le naturaliste français Jean-Baptiste Lamarck, ainsi que son compatriote Georges Cuvier, ont décrit de nombreuses espèces marines, y compris celles que le Professeur Aronnax note dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la géographie et la météorologie, les chercheurs ont commencé à comprendre le rôle des courants marins, notamment le Gulf Stream, décrit ici comme un courant chaud qui traverse l'Atlantique et se divise en deux bras vers le 43e degré. Le physicien Michael Faraday a également étudié la thermodynamique des courants marins et leur influence sur les climats.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, pendant cette période, l'utilisation d'instruments scientifiques tels que les baromètres, les thermomètres et les instruments de navigation ont permis aux expéditions scientifiques telles que celle du HMS Challenger (1872-1876) de collecter des données précises sur la géographie, la zoologie marine, la chimie et l'électricité des océans. Ces expéditions ont permis d'étendre notre connaissance du monde marin et ont contribué à la révolution scientifique de cette époque.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Terre Neuve</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, n'avait pas connaissance de la nature exacte des courants marins qu'il naviguit, car les découvertes scientifiques sur les courants océaniques étaient encore en développement à cette époque. Aujourd'hui, grâce aux avancées technologiques, nous sommes en mesure de suivre et de comprendre les courants marins avec précision. Par exemple, le Gulf Stream, décrit dans l'extrait du roman, a été étudié en détail grâce à des satellites météorologiques et océanographiques qui fournissent des données sur la température, la salinité et les courants marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Nemo utilisait des instruments de navigation tels que le compas, la brasse et la boussole pour déterminer sa position, alors qu'aujourd'hui, nous disposons d'outils tels que les GPS, les cartes électroniques et les satellites pour naviguer. De plus, Nemo n'avait pas connaissance des propriétés sous-marines telles que la pression, la température et la densité de l'eau, alors qu'aujourd'hui, nous disposons d'instruments tels que les sonars, les robots sous-marins et les instruments de mesure pour étudier ces propriétés.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque le Nautilus navigait dans l'Atlantique Nord, il observait des espèces marines telles que le narval, les cétacés</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Newfoundland</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life flourished during this period. Georges Cuvier (1769-1832), a prominent French naturalist, made significant contributions to comparative anatomy and paleontology. His work on fossilized marine animals provided insights into the extinction and evolution of species. Jean Baptiste de Lamarck (1744-1829) and Pierre-Joseph van Beneden (1809-1893), both Belgian zoologists, also contributed to our understanding of marine invertebrates and the classification of mollusks.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations of the world's oceans, including the Newfoundland Bank mentioned in the passage. British naval officer Matthew Maury (1806-1873) made significant contributions to oceanography and hydrography. His work on the \"Charts of the Atlantic Ocean\" provided important data on currents, winds, and marine life distribution.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1867), a British chemist and physicist, made groundbreaking discoveries in electricity and electrochemistry. His work on electromagnetic induction and the discovery of benzene contributed to the development of the field of chemistry during this period.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial for the advancement of marine zoology, geography, and other sciences. For example, the dredge, a device used to collect samples from the ocean floor, became</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Newfoundland</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Title: Comparison of Jules Verne's 1866 Oceanic Description and Contemporary Marine Reality</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- In \"20,000 Leagues Under the Sea,\" Captain Nemo, through his advanced Nautilus submarine, showcased a futuristic understanding of underwater exploration compared to 1866. The Nautilus, equipped with sonar-like capabilities and powerful lights, was a testament to Verne's foresight in imagining technology that would not become commonplace until the 20th century.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Today, modern submarines and remotely operated underwater vehicles (ROVs) have surpassed Nemo's Nautilus, with advanced sonar systems, high-resolution cameras, and autonomous navigation capabilities. Additionally, scientists have discovered deep-sea species and hydrothermal vents that were unknown in Verne's time, thanks to technological advancements and increased exploration.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- In 1866, as Professor Aronnax observed, the oceans were relatively unexplored, with marine life abundant but largely untouched by human activities. However, Verne's description of the Newfoundland bank as a battlefield reflects an early understanding of marine debris, albeit not caused by human pollution at that time.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Fast forward to 2025, oceans face numerous threats including climate change, pollution, overfishing, and habitat destruction. Warming ocean temperatures have led to the extinction or displacement of many marine species, while pollution and overfishing continue to pose significant challenges to marine ecosystems. The Newfoundland bank, once a rich biodiversity hotspot, now faces threats from industrial fishing and climate change-induced shifts in</p></div>\n          </div>\n        </div>"}}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Hippocampe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Irlande</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs avancées scientifiques ont été réalisées qui correspondent à ce passage de l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le naturaliste français Georges Cuvier a étudié la zoologie marine et a classifié de nombreux animaux marins, y compris les madréporaires (coraux) mentionnés dans le texte. En outre, il a développé des méthodes pour identifier l'origine géologique des roches.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin, un naturaliste britannique, a proposé la théorie de l'évolution par sélection naturelle en 1859, qui explique comment les espèces peuvent évoluer et se diversifier sur une longue période. Cette théorie pourrait être impliquée dans la description des arbres exotiques mentionnés, tels que les mimosas, les ficus, les casuarinas, les teks, les hibiscus, les pendanus, et les palmiers, qui semblent être mélangés à profusion.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le chimiste britannique Michael Faraday a fait des découvertes importantes dans le domaine de l'électricité. Il a notamment inventé la pile électrique en 1839 et étudié les propriétés de l'électrolyte, ce qui pourrait être lié à la brise légère qui berce les guirlandes de lianes dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, des expéditions scientifiques ont été menées pendant cette période pour explorer et étudier différents endroits du monde, y compris l'océan Pacifique où se trouve probablement l'île décrite dans le texte. L'</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Irlande</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, était un personnage de fiction qui utilisait des technologies avancées pour son époque (1866). Il navigua dans une sous-marine autopropulsée, avait accès à des cartes et des informations détaillées sur les océans, et pouvait observer la faune marine avec l'aide de sa coque transparente. En 2025, ces technologies existent mais ont été améliorées de manière spectaculaire. Les sous-marins modernes sont équipés d'équipements de navigation et d'observation avancés, tels que des sonars à haute résolution, des caméras sous-marines 4K, et des robots sous-marins autonome pour explorer les fonds marins. Les cartes des océans ont été améliorées grâce aux données collectées par des satellites et des instruments de mesure en mer.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière de connaissances scientifiques, Nemo avait une bonne compréhension de l'anatomie et de la physiologie des espèces marines observées. Cependant, il ignorait les découvertes récentes sur la biodiversité marine, la génétique moléculaire et la biologie marine. Aujourd'hui, nous avons une meilleure compréhension de la vie marine et des interactions entre les espèces. Nous avons également développé des outils pour étudier la biodiversité marine, tels que les ADN barcoding et l'analyse génétique des populations marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,1 ography by exploring remote regions, mapping previously uncharted territories, and formulating theories about the Earth's history and processes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Instruments: The development of scientific instruments played a crucial role in advancing knowledge during this period. For example, the invention of the microscope enabled scientists to observe minute details of living organisms, while the development of the barometer helped researchers understand atmospheric pressure and weather patterns. Additionally, improvements in navigation technology, such as the</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Ireland</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's \"20,000 Leagues Under the Sea,\" Captain Nemo showcases an advanced understanding of marine technology for his time, as he pilots the Nautilus, a submarine equipped with innovative features such as underwater propulsion, diving capabilities, and sonar-like devices. Today, these concepts have significantly evolved, with modern submersibles like the Deepsea Challenger and Triton 36000/2
