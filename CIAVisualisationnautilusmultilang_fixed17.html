<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Une douzaine d'appareils de scaphandres, suspendus à la paroi, attendaient les promeneurs. Ned Land, en les voyant, manifesta une répugnance évidente à s'en revêtir. «Mais, mon brave Ned, lui dis-je, les forêts de l'île de Crespo ne sont que des forêts sous-marines! —Bon! fit le harponneur désappointé, qui voyait s'évanouir ses rêves de viande fraîche.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1866-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne. Les savants de l'époque ont exploré la zoologie marine, l'électricité, la chimie et la géographie pour comprendre les forêts sous-marines et les créatures marines étranges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz, un zoologiste suisse, a étudié la vie marine dans les eaux profondes. Il a découvert des espèces de poissons et d'autres animaux inconnus jusqu'alors. En France, Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont également contribué à la connaissance de la zoologie marine en décrivant de nouveaux genres et espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'électricité, Michael Faraday a effectué des recherches importantes sur les propriétés électriques des matériaux. Il a inventé le générateur électrique à aimant permanent, qui a permis de produire de l'électricité en grande quantité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les expéditions scientifiques ont également joué un rôle important dans la découverte de nouvelles espèces marines et des forêts sous-marines. La Royal Society a organisé une expédition à bord du HMS Challenger entre 1872 et 1876, qui a exploré les océans du monde entier et a collecté de nombreuses données sur la géographie marine, la zoologie, la chimie et l'élect</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île de Crespo</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de l'époque pour la navigation sous-marine, grâce à son sous-marin technologiquement avancé. Il était capable d'explorer les profondeurs marines et de naviguer avec précision. Aujourd'hui, les techniques de navigation sous-marine ont évolué considérablement, notamment avec l'utilisation de sonars et de robots sous-marins pour explorer les océans. De plus, la technologie permet maintenant d'explorer des profondeurs encore plus importantes que celles atteintes par le Nautilus.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo utilise des scaphandres pour plonger dans l'océan, mais il n'y a pas de mention de l'oxygène ou d'autres systèmes respiratoires nécessaires pour survivre sous-marinément pendant de longues périodes. Aujourd'hui, les scaphandres modernes sont équipés de systèmes de rechargement d'oxygène qui permettent aux plongeurs de rester sous-marinément pendant des heures ou des jours.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, l'île de Crespo est décrite comme une forêt sous-marine abondante en espèces marines telles que les baleines, narvals, cétacés, mollusques et crustacés. Aujourd'hui, la surpêche, le réchauffement climatique et la pollution ont entraîné une diminution significative de la biod</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced rapid growth during this period. French naturalist Georges Cuvier (1769-1832), although his work was mainly in the 18th century, laid the foundation for comparative anatomy and paleontology, which were crucial for understanding marine species. In the later part of the 19th century, Jean Baptiste de Lamarck (1744-1829) and Louis Agassiz (1807-1873) made significant contributions to marine biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>One notable figure in this context is French zoologist Henri Marie Ducrotay de Blainville (1777-1850), who described several deep-sea organisms, including the anglerfish and the vampire squid. His work provided valuable insights into the biodiversity of deep-sea environments.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Electrical Science: The 19th century saw a surge in understanding electricity, with Michael Faraday (1791-1867) being one of its most prominent figures. He made groundbreaking contributions to electromagnetism and electrochemistry. His inventions, such as the electric motor and the dynamo, laid the foundation for electrical technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: Exploration and mapping of new territories were ongoing during this period. The Royal Geographical Society, established in 1830, played a significant role in funding expeditions and promoting geographical research. In marine geography, Matthew Maury (1806-1873) made substantial contributions to the</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Crespo Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In the context of Jules Verne's \"20,000 Leagues Under the Sea,\" set in 1866, Captain Nemo's submarine, the Nautilus, showcases an advanced understanding of science and technology for its time. The Nautilus, a nuclear-powered vessel with advanced diving capabilities, predates the development of such technology by several decades. Today, in 2025, we have harnessed this technology, with nuclear submarines being commonplace in military operations. However, the Nautilus' propulsion system remains a work of fiction, as we currently rely on electric, diesel-electric, or hybrid power systems for underwater vehicles.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of marine ecology, Verne's descriptions offer an interesting contrast to today's reality. The underwater hunt in the forests of Crespo Island introduces various marine species such as whales, narwhals, cetaceans, mussels, lobsters, and crabs. While these species exist today, their populations and habitats have been significantly impacted by human activities. Overfishing, pollution, and climate change have led to declining populations of many marine species, with some becoming endangered or extinct. For instance, the blue whale, a species encountered by Professor Aronnax, is now more protected than hunted, due to its endangered status.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>The ocean's health in 1866 was relatively pristine compared to today. Pollution was minimal, and overfishing was not yet a significant issue. However, the advent of industrialization, urbanization, and increased maritime activities have led to an unprecedented degradation of marine ecosystems. Warming oceans due to climate change pose a particular threat, as they affect species' distributions, food chains, and overall biod</p></div>\n          </div>\n        </div>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le Nautilus devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait. Cependant, toujours entraînés par ce Nautilus, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Alexandre Dumas et Jules Verne ont popularisé l'archipel des Pomotou en publiant leurs romans respectivement en 1864 et 1870, mais il s'agit d'une fiction car cet archipel n'existe pas réellement. Cependant, dans le contexte de l'époque, les savants ont exploré les mers plus fréquentées et ont découvert des coques naufragées et des objets de fer dégradés par la rouille, ce qui peut être comparé au passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Pour les découvertes scientifiques, Charles Darwin a publié son ouvrage \"L'Origine des espèces\" en 1859, dans lequel il propose sa théorie de l'évolution par sélection naturelle. Il a également exploré la région du Pacifique Sud pendant son voyage sur le HMS Beagle entre 1831 et 1836.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, Henri Milne-Edwards a décrit de nombreuses espèces de crustacés et d'autres animaux marins durant cette période. Il a également fondé la Société zoologique de France en 1860.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Michael Faraday a effectué des recherches importantes sur l'électrolyse, les électrochimie et la physique des gaz. Son travail a permis d'expliquer la structure moléculaire de l'eau et du chlorure de sod</p>", "compare_1866_toda  that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck and Georges Cuvier, both influential naturalists of the time, contributed significantly to marine zoology. Lamarck proposed a theory of evolution, although it was later replaced by Charles Darwin's theory of natural selection. Cuvier, known as the \"father of paleontology,\" made important contributions to the study of fossilized marine life.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw numerous expeditions aimed at mapping and exploring remote regions, including the Pacific islands mentioned in the passage. One such expedition was led by Louis Antoine de Bougainville, who discovered the Pomotou Archipelago in 1768. Another notable figure was Alexander von Humboldt, a German polymath who explored South America and made significant contributions to geography, geology, and biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday, an English chemist and physicist, conducted groundbreaking research on electrochemistry and electromagnetism during this period. He discovered benzene and invented the first electric motor and generator. His work laid the foundation for future developments in electricity and chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century was a time of significant advancements in the field of electricity. André-Marie Ampère, a French physicist, made important contributions to electrodynamics and magnetic circuits. He formulated Ampere's law, which describes how electric currents generate magnetic fields.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination versus Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine technology: In 20,000 Leagues Under the Sea (1866), Captain Nemo piloted the Nautilus, a technologically advanced submarine that could dive to great depths and travel at high speeds. While Verne's imagination was remarkable for its time, modern-day submersibles far surpass the capabilities of the Nautilus. Today's deep-sea submersibles can reach depths of over 10,000 meters and are equipped with advanced sonar systems, remotely operated vehicles (ROVs), and high-resolution cameras for exploring and documenting marine life and underwater landscapes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Communication technology: In Verne's novel, the Nautilus was equipped with a telegraph that allowed Nemo to communicate with various ports around the world. While this was an impressive feat for 1866, modern submarines use sophisticated communication systems, including satellite phones and data links, enabling real-time communication between vessels and shore stations.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Navigation technology: In Verne's novel, the Nautilus relied on traditional navigation methods such as charts, compasses, and sextants. Today, submarines use advanced navigation systems that combine GPS, inertial navigation, and satellite imagery to precisely locate their position and track their course.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine ecosystems: In Verne's time, the marine environment was relatively unexplored, and many species were yet to be discovered or classified. The Pomotou Archipelago described in the novel likely represented a prist</p></div>\n          </div>\n        </div>"}}, "2": {"fr": {"book_excerpt": "\n :12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, le naturaliste français Jean-Baptiste Lamarck a étudié les mollusques en détail, notamment les huîtres. Il a classifié plus de 100 espèces différentes et a décrit leur anatomie, leur physiologie et leur écologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'expédition dans les Nouvelles-Hébrides, le naturaliste français Louis Antoine de Bougainville a exploré ces îles en 1768. Plus tard, en 1773, le navigateur britannique James Cook a renommé ce groupe d'îles pour l'honorer.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, Michael Faraday a découvert les propriétés électrochimiques des solutions et a inventé le premier électrolyte. Il a également étudié l'électricité et les gaz, notamment l'hydrogène et l'oxygène.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la géographie, le naturaliste français Georges Cuvier a contribué à la cartographie des régions du monde en explorant l'Amérique du Sud et l'Afrique. Il a également étudié les fossiles et a développé une théorie sur l'extinction des espèces.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='paddi ncluding ocean warming, acidification, pollution, overfishing, and the endangerment of various species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Comparison of Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. State of Oceans and Species in 1866 vs Today:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, during Captain Nemo's journey, the ocean was relatively unexplored, and marine life was abundant. The Nautilus encountered various species such as porpoises, cetaceans, o</p></div>\n          </div>\n        </div>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, les progrès considérables de la science ont permis de découvrir et d'explorer plus profondément le monde marin et les courants océaniques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le zoologiste français Georges Cuvier a été un des premiers à étudier les courants marins en définissant ceux du Golfe du Bengale, du Pacifique nord et du Pacifique sud. En 1822, il publie une carte de la circulation des eaux dans l'océan Indien, qui montre le Kuro-Siwo, le courant noir décrit par Verne, se déroulant à partir du golfe du Bengale et traversant le détroit de Malacca.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1839, le naturaliste anglais Charles Darwin a également contribué aux connaissances sur les courants marins en explorant l'océan Pacifique sud lors de son voyage à bord du HMS Beagle. Il décrit les courants océaniques et leur importance pour la circulation des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1837, le naturaliste français Jean-Baptiste de Lamarck publie une carte des courants marins dans l'océan Atlantique nord, qui montre un courant se déplaçant vers l'ouest.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les progrès technologiques ont également permis d'améliorer les instruments utilisés pour la recherche océanographique. En 1865, William Thompson (Lord Kelvin) a inventé le thermomètre de mer qui permettait de mesurer la température de l'eau à différentes profondeurs.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo était conscient des courants marins principaux dans le monde, mais sa connaissance restait limitée par les moyens de son époque. Aujourd'hui, grâce à l'avancée des technologies scientifiques, nous disposons d'outils plus performants pour étudier les courants océaniques. Les satellites et les modèles numériques permettent une observation précise et régulière de ces phénomènes naturels. Par exemple, la technologie du radar altimétrique à bord des satellites permet de mesurer la hauteur de la surface marine avec une précision de quelques millimètres. De plus, les modèles numériques permettent de simuler le comportement des courants marins sur de longues périodes et de prédire leur évolution future.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo utilise une connaissance limitée des courants pour explorer l'océan, mais aujourd'hui, les navires sont équipés de systèmes de positionnement global (GPS) permettant d'effectuer des voyages précis et efficaces. De plus, la technologie du sonar permet de détecter et de cartographier le relief sous-marin avec une précision inégalée.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les océans étaient peu connus et peu étudiés. Les populations de nombreuses espèces marines étaient abondantes, mais la pollution et la surpêche n'avaient pas encore commencé à avoir un impact significatif sur l'écosystème marin. Aujourd'hui, les océans sont menac</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Bay of Bengal</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>He wanted to go to the surface and harpoon the monsters, particularly certain smooth-hound sharks, whose mouth is studded with teeth like a mosaic; and large tiger-sharks nearly six yards long, the last named of which seemed to excite him more particularly. But the Nautilus, accelerating her speed, easily left the most rapid of them behind. The 27th of Januar hemistry, Michael Faraday (1791-1867) made groundbreaking discoveries in electrochemistry. He developed the concept of anions and cations, which helped explain the behavior of electricity in chemical reactions. This understanding could potentially be relevant to the passage's mention of sharks being attracted to electrical discharges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expeditions: Scientific expeditions played a crucial role in advancing knowledge during this era. For instance, the Challenger expedition (1872-1876) was a British scientific voyage that aimed to study the world's oceans and their geology, zoology, and chemistry. The findings from this expedition significantly contributed to our understanding of marine life and the ocean floor.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Bay of Bengal</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Comparison between Jules Verne's description in 20,000 Leagues Under the Sea (1866) and current scientific reality (2025) on two axes:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and technology: what Captain Nemo knew/imagined vs current discoveries</p><p style='margin:0 0 14px 0; font-size:1. ,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, imaginait l'existence d'un tunnel sous l'isthme de Suez pour traverser la mer Rouge. Aujourd'hui, en 2025, nous avons développé des technologies plus avancées telles que les tunnels sous-marins et les canaux artificiels qui permettent à travers le canal de Suez d'assurer une liaison maritime entre la mer Méditerranée et la mer Rouge.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Nemo utilisait des technologies de propulsion hydrauliques pour faire avancer le Nautilus sous l'eau. Aujourd'hui, les navires de guerre et commerciaux modernes utilisent des moteurs à combustion interne, des turbines à gaz ou des moteurs électriques pour naviguer sous-marinement.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo possède une connaissance avancée des espèces marines observées telles que les requins, les squales, les turbots, etc. Cependant, aujourd'hui, la science marine a fait des progrès considérables dans la compréhension de ces espèces et leur écologie, grâce à l'utilisation d'outils tels que la génétique moléculaire et les technologies d'imagerie sous-marine.</p><p st and ichthyology, respectively. Cuvier's work on comparative anatomy helped classify fish species, while Lamarck proposed theories about the evolution of aquatic life forms.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw a surge in exploratory expeditions aimed at mapping and understanding the world's oceans. One notable example is the Challenger Expedition (1872-1876), which used advanced equipment to collect data on marine life, geology, and oceanography from various parts of the globe.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electrochemistry: Michael Faraday (1791-1867) made significant contributions to the field of electrochemistry. His work on electromagnetic induction, electrolysis, and the relationship between electricity and chemistry laid the groundwork for understanding the properties of various elements found in the ocean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments played a crucial role in advancing our knowledge of the deep sea during this period. For instance, the invention of the bathymeter (a device used to measure water depth) and the improvement of the diving bell allowed scientists to explore deeper parts of the ocean and collect samples from previously unexplored regions.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Beneath the Isthmus of Suez</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195 nt-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Méditerranée</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo était conscient de la diversité des espèces marines qu'il observait, mais son connaissances scientifiques étaient limitées par les connaissances de l'époque. Aujourd'hui, grâce aux progrès de la biologie moléculaire et de la génomique, nous avons une compréhension plus approfondie des relations entre ces espèces et leur évolution. Par exemple, nous savons maintenant que les cétacés ont un rôle important dans la régulation du carbone dans l'océan.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo utilise des technologies de pointe pour naviguer sous-marin, tels que le Nautilus qui pouvait plonger à grande profondeur et se déplacer rapidement. Aujourd'hui, les robots sous-marins sont utilisés pour explorer l'océan profond, mais ils ne peuvent pas se déplacer aussi rapidement que le Nautilus de Nemo.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n  style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦔 Sea urchin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Sea anemone</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Sea turtle</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🧽 Sponge</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annelid</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the context of the passage, several significant scientific discoveries and advancements occurred during the mid-19th century that relate to marine zoology, geography, chemistry, and electricity:</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck's work on invertebrates (early 19th century) paved the way for further studies in marine biology. Georges Cuvier, a prominent figure of the time, made significant contributions to comparative anatomy and paleontology, classifying various species found in the Mediterranean Sea. Louis Agassiz, another notable zoologist, was instrumental in the study of fish and fossil fishes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw advancements in oceanographic studies. Alexander von Humboldt's work on geography and natural sciences contributed to our understanding of the Mediterranean Sea's geographical features, climate, and geology. Mathew Maury, known as the \"Pathfinder of the Seas,\" mapped ocean currents and weather patterns, providing valuable information for navigation in the Mediterranean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, which had implications for understanding the chemical composition of seawater and its interaction with marine organisms. Justus von Liebig's work on organic chemistry was also crucial in understanding the nutrient cycles within marine ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Scientific Expeditions: The 19th century witnessed numerous scientific expeditions, such as the Challenger expedition (1872-1876), which aimed to explore the world's oceans and gather data on geology, zoology, and chemistry. These expeditions greatly contributed to our understanding of the Mediterranean Sea and its ecosystems.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's novel \"Twenty Thousand Leagues Under the Sea,\" Captain Nemo, the inventor of the Nautilus, showcases an advanced understanding of marine technology for his time. The Nautilus was equipped with various innovative features such as underwater propulsion, diving capabilities to great depths, and advanced navigation systems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, by 2025, marine technology has significantly evolved. Submersibles like the Nautilus are now common in deep-sea research, and autonomous underwater vehicles (AUVs) have been developed for exploration and data collection. Additionally, advancements in sonar technology allow scientists to map the ocean floor and study marine life without physically being present. Oceanographic research vessels are also equipped with sophisticated instruments to measure water temperature, salinity, and other parameters, providing a more comprehensive understanding of the ocean's ecosystems.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, as described by Verne, the Mediterranean Sea was depicted as a pristine and vibrant marine environment teeming with various species like Sperm Whales, Dolphins, Sharks, Rays, Tuna, Salmon, Herring, and Moray. However, due to human activities over the past century, the state of the Mediterranean Sea has drastically changed.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Today, the Mediterranean faces numerous challenges such as warming waters, pollution, overfishing, and habitat destruction. Warming waters are causing coral bleaching events and altering marine ecosystems. Pollution from industrial waste, plastic debris, and sewage discharge threatens marine life and human health. Overfishing has led to the depletion of many fish populations, while endangered species such as the Mediterranean Monk Seal and Loggerhead Turtle face threats from</p></div>\n          </div>\n        </div>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Espadon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3re (39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Hydrophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'Atlantide</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à l'extrait cité de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les explorations océanographiques ont permis de découvrir de nombreuses espèces marines inconnues jusqu'alors, notamment en Méditerranée et dans les eaux autour des îles Canaries, où le Nautilus aurait pu naviguer selon l'intrigue du roman. Des savants tels que Lacépède ont contribué à la connaissance de ces espèces.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Géographie : Les cartes et les recherches géographiques ont permis d'avancer dans la compréhension de la géographie mondiale et des régions inexplorées, notamment en ce qui concerne l'Atlantique, où se trouve l'Atlantide selon le roman. Des géographes tels que D'Anville, Malte-Brun et Humboldt ont contribué à la cartographie et à la compréhension de ces régions.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Électricité : Les progrès dans l'étude de l'électricité ont permis de comprendre les phénomènes électriques naturels, notamment ceux liés aux phénomènes océaniques. Des savants tels que Faraday ont contribué à la compréhension de ces phénomènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expéditions scientifiques : Les expéditions scientifiques ont permis d'explorer des régions inconnues et de recueillir des données sur la faune, la flore, la géologie et la météorologie</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ L'Atlantide</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Dans \"L'Épave du Nautilus\", Jules Verne décrit Nemo comme un inventeur avancé pour son époque, possédant un sous-marin équipé d'une technologie qui lui permet de naviguer dans les plus profondes parties des océans. Aujourd'hui, bien que nous n'ayons pas de Nautilus réel, la science et la technologie ont avancé considérablement depuis 1866. Les sous-marins modernes sont équipés d'un échosonar, d'une caméra sous-marine et d'autres instruments permettant de naviguer dans les profondeurs des océans sans avoir besoin de ressortir à la surface pour obtenir des informations. De plus, l'exploration sous-marine a été facilitée par l'utilisation de robots sous-marins autonomes et de sonars multifrequence.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Dans le roman, Verne décrit les océans comme étant peu pollués et peu touchés par le réchauffement climatique. En 1866, la pollution des océans n'était pas encore un problème majeur, alors que la surpêche était déjà un problème en Europe et aux États-Unis. Aujourd'hui, les océans sont confrontés à de nombreux défis environnementaux tels que le réchauffement climatique, la pollution marine, la surpêche et l'extinction des espèces marines. Les océans sont devenus plus chauds en raison du changement climatique, ce qui a un impact nég</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Atlantis</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inlin zoology, particularly focusing on glacial theory and the study of fossilized fish. His work contributed to the understanding of geological changes and the evolution of life forms. In 1864, he led an expedition to the United States to investigate glaciation and the distribution of freshwater fish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: English chemist Michael Faraday (1791-1867) made groundbreaking contributions to the field of electrochemistry during this period. He discovered electromagnetic induction, dielectric and diamagnetic effects, and established the principles of electrolysis. His work laid the foundation for the development of electric motors, generators, and batteries.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: British scientist William Thomson (Lord Kelvin) (1824-1907) made significant advancements in the understanding of electricity and thermodynamics. He formulated a mathematical model for electromagnetic fields and developed the first practical electric telegraph system. In 1862, he proposed the absolute zero temperature theory, which is essential to understanding the behavior of matter at low temperatures.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Geology: French naturalist Georges Cuvier (1769-1832) and French zoologist Henri Marie Ducrotay de Lacépède (1756-1825) made significant contributions to the field of geology during an earlier period but were still influential in the 1860s. C</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Atlantis</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine Technology: In 20,000 Leagues Under the Sea (1866), Captain Nemo's Nautilus was a remarkable depiction of an advanced submarine, far ahead of its time. The Nautilus, with its innovative design and underwater exploration capabilities, foreshadowed the development of real-life submarines in the 20th century. Today, submarine technology has significantly evolved, with autonomous underwater vehicles (AUVs) and remotely operated underwater vehicles (ROVs) being used for scientific research, oil exploration, and military purposes. However, unlike the Nautilus, these modern submarines are not powered by electricity generated from a nuclear reactor as described in Verne's novel.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Sonar Technology: Jules Verne also introduced sonar technology through Captain Nemo's use of \"electric torpedoes\" to locate and attack ships. Although the concept was not entirely accurate, it was a prescient depiction of active sonar systems used today for navigation, object detection, and communication in underwater environments. Modern sonars employ advanced algorithms and high-resolution imaging to provide detailed information about marine life and the ocean floor, contributing significantly to marine ecology research.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Ocean Health: In 1866, when Jules Verne wrote 20,000 Leagues Under the Sea, little was known about the impact of human activities on marine ecosystems. The novel describes a pristine ocean with diverse and abundant marine life, including cetaceans, sharks, rays, swordfish, sea b</p></div>\n          </div>\n        </div>"}}, "13": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>La mer des Sargasses</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c idden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, découvrait l'océan avec des connaissances limitées pour l'époque. Il utilisait une technologie rudimentaire basée sur la vapeur, alors que nous avons maintenant accès à des technologies plus avancées telles que les satellites et les robots sous-marins. Aujourd'hui, grâce aux satellites, nous pouvons observer l'océan en temps réel et cartographier ses fonds marins avec une précision inégalée. En revanche, Nemo n'avait pas accès à ces informations, car les satellites n'existaient pas encore.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- De plus, dans le roman, Nemo utilise des projectiles pour chasser les cétacés, sans prendre en compte leurs habitats et populations. Aujourd'hui, nous sommes conscients que ces animaux sont vulnérables à la surpêche et nous cherchons à les protéger en adoptant des pratiques de pêche durable.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, 2px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Otarie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatros</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Pingouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Manchot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Pétrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les découvertes scientifiques ont connu une croissance spectaculaire. Dans le domaine de la zoologie marine, des expéditions ont été menées pour explorer les mers inexplorées, notamment autour de l'Antarctique et du cap Horn. Un des principaux biologistes marins de l'époque était Jean-Baptiste Lamarck, qui a décrit de nombreuses espèces marines nouvelles. En outre, le naturaliste français Isidore Geoffroy Saint-Hilaire a mené une expédition autour du monde pour étudier la faune marine.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses découvertes importantes. Il a inventé le générateur électromagnétique et a étudié les propriétés des courants électriques. Son travail a été crucial pour la compréhension de l'électricité et de ses applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, Alexander von Humboldt a mené une expédition dans les Andes sud-américaines pour étudier le climat, la flore et la faune de cette région. Ses recherches ont conduit à des avancées significatives en géologie, botanique et zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, John Dalton a développé la théorie atomique, qui explique la composition des éléments chimiques et leur comportement chimique. Cette théorie a été cruciale pour l'avancement de la chimie et a permis de comprendre les réactions chimiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les découvertes scient</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le commandant du Nautilus, possédait une connaissance avancée de son époque pour l'époque (1866) sur les espèces marines qu'il observait. Il était capable de distinguer des cétacés tels que la baleine et le marsouin, ainsi que des baleinoptères et des raies. Cependant, il ne savait pas encore parler de ptéropodes ou de tritons, qui sont des espèces inconnues à l'époque de Jules Verne. Aujourd'hui en 2025, grâce aux progrès de la science et de la technologie, nous avons une connaissance plus approfondie de ces espèces marines et même des espèces encore plus rares ou inconnues à l'époque de Jules Verne. Par exemple, les ptéropodes sont maintenant bien connus et classés dans le phylum Brachiopoda, tandis que les tritons (Triton) ne sont pas des espèces marines, mais plutôt des amphibiens d'eau douce.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Le Nautilus était un sous-marin imaginaire équipé de technologies avancées pour l'époque, tels que la propulsion électrique et la capacité de plonger jusqu'à 300 mètres sous la mer. Aujourd'hui, les sous-marins réels sont équipés de technologies encore plus avancées, telles que des systèmes d'imagerie haute définition pour l'étude des océans et des systèmes de navigation automatisés.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Horn</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The frigate skirted the south-east coast of America with great</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>rapidity. The 3rd of July we were at the opening of the Straits of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Magellan, level with Cape Vierges. But Commander Farragut would not</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>take a tortuous passage, but doubled Cape Horn.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Fin Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#2
