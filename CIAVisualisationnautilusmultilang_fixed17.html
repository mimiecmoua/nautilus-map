        </div>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin: n><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasse</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Manche</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont marqué l'histoire des sciences. Dans ce passage, on peut identifier trois disciplines : la zoologie marine, l'électricité et la géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Le passage fait référence à des vêtements spécifiques pour plonger dans les eaux profondes, qui sont différents de ceux inventés au XVIIIe siècle. À cette époque, les savants comme Cuvier et Lacépède ont contribué à la connaissance de la faune maritime en réalisant de nombreuses descriptions et classifications d'espèces marines. En 1862, un biologiste français, Alphonse Milne-Edwards, a fondé le Muséum national d'histoire naturelle de Toulon pour étudier les espèces méditerranéennes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le passage mentionne des lamelles de cuivre qui protègent contre la poussée des eaux, ce qui peut être lié à l'utilisation de matériaux isolants pour protéger les humains lorsqu'ils travaillent avec de l'électricité. Michael Faraday, un scientifique anglais célèbre pour ses travaux sur  temperatures and ocean acidification</p></div>\n          </div>\n        </div>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Les savants de l'époque ont fait des avancées importantes dans le domaine de la zoologie marine, notamment Louis Agassiz en Suisse et Jean-Baptiste Lamarck en France. Ils ont étudié les cétacés et ont décrit des espèces nouvelles, comme le baleine bleue et le rorqual.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière d'électricité, Michael Faraday en Angleterre a effectué de nombreuses expériences sur l'induction électromagnétique et la pile électrique. Il a inventé le générateur électromotrice et a étudié les propriétés des courants électriques alternatifs et continus.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la géographie, l'expédition Challenger (1872-1876) a collecté des données sur les mers du monde entier, incluant celles du Pacifique. Elle a étudié les profondeurs, la topographie marine et la faune marine, y compris les cétacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la chimie, Marcellin Berthelot en France a effectué des recherches sur la chimie organique et la chimie physique. Il a étudié les réactions chimiques et a développé des méthodes pour déterminer les compositions de certains gaz.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant cette période, les expéditions scientifiques ont utilisé divers instruments, tels que les microscopes, les thermomètres, les baromètres</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences et technologie : Nemo, le capitaine du Nautilus, imaginait une technologie avancée pour son temps, avec un sous-marin capable de plonger à des profondeurs considérables, naviguer rapidement et efficacement, et disposant d'une connaissance avancée des espèces marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Aujourd'hui, les technologies ont évolué en utilisant des matériaux plus résistants, des systèmes de propulsion plus efficaces, et des équipements de détection et d'exploration sous-marine avancés.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Par exemple, les sous-marins modernes sont capables de plonger jusqu'à plusieurs milliers de mètres de profondeur, et disposent de systèmes de navigation GPS précis.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div styl ent caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the key figures in marine zoology was Georges Cuvier, who classified over 40,000 species and established the principles of comparative anatomy. His work laid the foundation for understanding the diversity of life in the oceans.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of biology, Charles Darwin's \"On the Origin of Species\" was published in 1859, proposing the theory of evolution by natural selection. Although not directly mentioned in the passage, this theory would have a profound impact on the understanding of marine life and its evolution.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Jean-Baptiste Lamarck's work on invertebrates, such as the \"Hydre\" (1802), also contributed to the study of marine zoology. Meanwhile, in chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, including his work on electromagnetic induction and the development of the first electric motor.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in these advancements. The HMS Challenger expedition (1872-1876) was one of the most significa ovations were far ahead of the actual technological capabilities of the mid-19th century. In contrast, modern submarines utilize nuclear power for propulsion, highly advanced sonars, and complex navigation systems that allow them to traverse vast oceanic expanses with precision. Additionally, contemporary submersibles are capable of diving deeper than the Nautilus, reaching the deepest parts of the ocean such as the Mariana Trench.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Modern marine science has made significant strides in understanding the oceans' ecosystems and their inhabitants. For example, genetic sequencing technology has provided insights into the evolutionary history of marine species, while remote-operated vehicles (ROVs) and autonomous underwater vehicles (AUVs) have enabled scientists to explore even the most remote and inhospitable environments without putting human lives at risk.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Jules Verne's description of the ocean environment was largely based on the limited knowledge available during that period. The novel mentions various marine species but provides little insight into the health or state of the oceans themselves. Conversely, in 2025, we face numerous challenges affecting the global marine ecosystem.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Overfishing has depleted many fish populations and disrupted food chains, leading to a decline in biodiversity. Poll</p></div>\n          </div>\n        </div>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>«Maelstrom! Maelstrom!» s'écriait-il!</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ces dangereux parages de la côte norwégienne? Le _Nautilus_ était-il</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f; découvertes scientifiques ont été abondantes et ont apporté de nombreuses avancées dans divers domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, le naturaliste français Jean-Baptiste Lamarck avait déjà identifié plusieurs espèces marines en Norvège au début du siècle. En 1864, l'expédition Challenger a exploré les mers norvégiennes et a découvert de nouvelles espèces marines, notamment des cétacés et des crustacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En électricité, Michael Faraday a effectué de nombreuses expériences à Londres en 1864, découvrant les lois de l'induction électromagnétique et inventant le générateur électrique à aimant permanent. En Norvège, Kristian Birkeland a également réalisé des recherches sur la magnétisme terrestre et a découvert les auroras polaires en 1869.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition norvégienne de Fridtjof Nansen à travers le pôle Nord a commencé en 1866. Cette expédition a permis d'avancer notre compréhension de la glaciation et du climat polaire.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Jean-Baptiste Dumas a effectué des recherches sur les lois atomiques dans les années 1860. En Norvège, le chimiste Christian Christiansen a également travaillé sur la chimie organique et a découvert plusieurs nouvelles molécules.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Côtes de la Norvège</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n uffement climatique.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo avait également une connaissance limitée du plongeon sous-marin en utilisant des ballons remplis d'hélium pour descendre jusqu'à la profondeur nécessaire. Aujourd'hui, les plongeurs modernes utilisent des combinaisons de plongée autonome et des</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Coast of Norway</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“The maelstrom! the maelstrom!” Could a more dreadful word in a more dreadful situation have sounded in our ears! We were then upon the dangerous coast of Norway. Was the Nautilus being drawn into this gulf at the moment our boat was going to leave its sides? We knew that at the tide the pent-up waters between the islands of Ferroe and Loffoden rush with irresistible violence, forming a whirlpool from which no vessel ever escapes.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Croaker</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Soft coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasso</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Coast of Norway</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: Georges Cuvier (1769-1832) and Henri Marie Ducrotay de Blainville (1777-1850) were prominent figures in marine zoology during this period. They made important contributions to the classification of marine life, including fish species. The study of fishes was particularly significant as it helped expand our understanding of aquatic ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography and Oceanography: In 1864, the Challenger Expedition took place, a British scientific voyage that explored the world's oceans. Its primary goal was to map the ocean floor and study marine life. The expedition provided valuable data about the geography of the seabed, deep-sea organisms, and the distribution of coral reefs.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: Michael Faraday (1791-1867) was a British scientist who made significant contributions to the understanding of electromagnetism and electrochemistry. His discoveries included the principles behind the electric motor, generator, and the chemistry of diamagnetic materials. Faraday's work paved the way for future advancements in electricity-related technologies.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: Jean-Baptiste de Lamarck (1744-1829) and Charles Darwin (1809-1882) were influential figures in the field of chemistry and biology, respectively. Although primarily known for his work on evolution, Darwin also made contributions to marine biogeography through his studies of coral reefs. Jean-Baptiste L</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Coast of Norway</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Title: A Comparative Analysis of Jules Verne's \"20,000 Leagues Under the Sea\" (1866) and Modern Oceanography (2025)</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's novel, Captain Nemo's Nautilus showcased advanced technology for its time, including underwater propulsion, diving capabilities, and a built-in library that contained extensive scientific knowledge. However, the science behind these technologies was purely fictional. Today, we have submarines, sonar systems, and deep-sea exploration vehicles like the remotely operated submersibles (ROVs) and manned submersibles, which are based on real-world physics and engineering principles.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n
