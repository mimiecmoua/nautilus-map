d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North America Contour</h5>\n                <p>Card 4 — under development.</p>"}}, "23": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Île Lucayes</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Île Lucayes</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Lucayes</h5>\n                <p><strong>Contexte de l'escale :</strong> Entrée dans le Gulf Stream.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île Lucayes</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Lucayan Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>For several days the _Nautilus_ kept off from the American coast.</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Evidently it did not wish to risk the tides of the Gulf of Mexico or of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>the sea of the Antilles. April 16th, we sighted Martinique and</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Guadaloupe from a distance of about thirty miles. I saw their tall</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Lucayan Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Lucayan Island</h5>\n                <p><strong>Context:</strong> Entering the Gulf Stream.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Lucayan Island</h5>\n                <p>Card 4 — under development.</p>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Cap Hatteras</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n                <p><strong>Contexte de l'escale :</strong> Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cap Hatteras</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Cape Hatteras</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n                <p><strong>Context:</strong> Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wide and two hundred and ten miles deep.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cape Hatteras</h5>\n                <p>Card 4 — under development.</p>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Long Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Contexte de l'escale :</strong> Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The _Abraham Lincoln_ answered by hoisting the American colours three times, whose thirty-nine stars shone resplendent from the mizzen-peak; then modifying its speed to take the narrow channel marked by buoys placed in the inner bay formed by Sandy Hook Point, it coasted the long sandy beach, where some thousands of spectators gave it one final cheer. The escort of boats and tenders still followed the frigate, and did not leave her until they came abreast of the lightship, whose two lights marked the entrance of New York Channel. Six bells struck, the pilot got into his boat, and rejoined the little schooner which was waiting under our lee, the fires were made up, the screw beat the waves more rapidly, the frigate skirted the low yellow coast of Long Island; and at eight bells, after having lost sight in the north-west of the lights of Fire Island, she ran at full steam on to the dark waters of the Atlantic. CHAPTER IV NED LAND Captain Farragut was a good seaman, worthy of the frigate he commanded. His vessel and he were one.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Long Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Context:</strong> Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Card 4 — under development.</p>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Terre Neuve</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n                <p><strong>Contexte de l'escale :</strong> Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Terre Neuve</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Newfoundland</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Newfoundland</h5>\n                <p><strong>Context:</strong> Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Newfoundland</h5>\n                <p>Card 4 — under development.</p>"}}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Irlande</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Irlande</h5>\n                <p><strong>Contexte de l'escale :</strong> Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Irlande</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Ireland</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Ireland</h5>\n                <p><strong>Context:</strong> The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Ireland</h5>\n                <p>Card 4 — under development.</p>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Manche</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Manche</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Manche</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>English Channel</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The man with the soft calm eyes listened to me quietly, even politely, and with extreme attention; but nothing in his countenance indicated that he had understood my story. When I finished, he said not a word. There remained one resource, to speak English. Perhaps they would know this almost universal language. I knew it, as well as the German language,—well enough to read it fluently, but not to speak it correctly.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>English Channel</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 English Channel</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ English Channel</h5>\n                <p>Card 4 — under development.</p>"}}, "29": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Angleterre Sud</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Angleterre Sud</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Sud</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Sud</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>South of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Was Captain Nemo going to land on the British Isles? No. To my great</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>surprise he made for the south, once more coming back towards European</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>seas. In rounding the Emerald Isle, for one instant I caught sight of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Cape Clear, and the light which guides the thousands of vessels leaving</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>South of England Coast</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South of England Coast</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ South of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Angleterre Nord</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Nord</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>North of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>North of England Coast</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>«Maelstrom! Maelstrom!» s'écriait-il!</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>ces dangereux parages de la côte norwégienne? Le _Nautilus_ était-il</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Côtes de la Norvège</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Côtes de la Norvège</h5>\n                <p><strong>Contexte de l'escale :</strong> Fin du voyage pour le professeur Aronnax, Conseil et Ned Land</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Côtes de la Norvège</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Coast of Norway</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>“The maelstrom! the maelstrom!” Could a more dreadful word in a more dreadful situation have sounded in our ears! We were then upon the dangerous coast of Norway. Was the Nautilus being drawn into this gulf at the moment our boat was going to leave its sides? We knew that at the tide the pent-up waters between the islands of Ferroe and Loffoden rush with irresistible violence, forming a whirlpool from which no vessel ever escapes.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Coast of Norway</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Coast of Norway</h5>\n                <p><strong>Context:</strong> End of the journey for Professor Aronnax, Conseil, and Ned Land</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Coast of Norway</h5>\n                <p>Card 4 — under development.</p>"}}};

    if (l) l.style.display = "flex";

function hideLoader() {
    const l = document.getElementById("dataLoaderOverlay");
    if (l) l.style.display = "none";
}
function openModalWithContent(title, content) {
    document.getElementById("logbookModalLabel").innerHTML = title;
    document.getElementById("logbookModalBody").innerHTML  = content;
    const modal = new bootstrap.Modal(document.getElementById("logbookModal"));
    modal.show();
}

document.addEventListener("click", function(e) {

    // Bouton toggle (Journal de bord / Explorations IA)
    const toggleBtn = e.target.closest(".submenu-toggle-btn");
    if (toggleBtn) {
        const menuId = toggleBtn.getAttribute("data-menu-id");
        const menu   = document.getElementById(menuId);
        if (menu) {
            menu.style.display = (menu.style.display === "none" || menu.style.display === "")
                ? "block" : "none";
        }
        return;
    }

    // Bouton action (Extrait du livre, Espèces, etc.)
    const actionBtn = e.target.closest(".submenu-action");
    if (actionBtn) {
        const stop   = actionBtn.getAttribute("data-stop");
        const lang   = actionBtn.getAttribute("data-lang") || "fr";
        const action = actionBtn.getAttribute("data-action");
        const group  = actionBtn.getAttribute("data-group");

        const titles = {
            fr: {
                book_excerpt:       "📖 Extrait du livre",
                marine_species:     "🐙 Espèces maritimes mentionnées",
                science_19c:        "🔬 Découvertes scientifiques du XIXe siècle",
                compare_1866_today: "⚗️ Comparaison entre 1866 et aujourd'hui"
            },
            en: {
                book_excerpt:       "📖 Book excerpt",
                marine_species:     "🐙 Marine species mentioned",
                science_19c:        "🔬 19th-century scientific discoveries",
                compare_1866_today: "⚗️ Comparison between 1866 and today"
            }
        };

        const fallback = lang === "fr"
            ? "<p>Contenu disponible bientôt.</p>"
            : "<p>Content coming soon.</p>";

        const content = (
            DETAILED_CONTENT[stop] &&
            DETAILED_CONTENT[stop][lang] &&
            DETAILED_CONTENT[stop][lang][action]
        ) ? DETAILED_CONTENT[stop][lang][action] : fallback;

        if (group === "ai") {
            showLoader();
            setTimeout(() => {
                hideLoader();
                openModalWithContent(titles[lang][action] || "Exploration IA", content);
            }, 2400);
        } else {
            openModalWithContent(titles[lang][action] || "Journal de bord vivant", content);
        }
        return;
    }
});
