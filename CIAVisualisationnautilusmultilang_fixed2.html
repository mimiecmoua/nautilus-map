<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l'île Crespo. Il espère que rien n'empêchera monsieur le professeur d'y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Île de Crespo</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n                <p><strong>Contexte de l'escale :</strong> Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île de Crespo</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Crespo Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n                <p><strong>Context:</strong> Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Crespo Island</h5>\n                <p>Card 4 — under development.</p>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Archipel des Pomotou</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n                <p><strong>Contexte de l'escale :</strong> Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d'îles.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Archipel des Pomotou</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Pomotou Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Pomotou Archipelago</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n                <p><strong>Context:</strong> This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Pomotou Archipelago</h5>\n                <p>Card 4 — under development.</p>"}}, "2": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Archipel des nouvelles Hébrides</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Archipel des nouvelles Hébrides</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des nouvelles Hébrides</h5>\n                <p><strong>Contexte de l'escale :</strong> Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>New Hebrides Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>New Hebrides Archipelago</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 New Hebrides Archipelago</h5>\n                <p><strong>Context:</strong> Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ New Hebrides Archipelago</h5>\n                <p>Card 4 — under development.</p>"}}, "3": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>La Pouasie</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>C'est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n'en ayons jamais d'autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>La Pouasie</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 La Pouasie</h5>\n                <p><strong>Contexte de l'escale :</strong> Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ La Pouasie</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Papua</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Papua</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Papua</h5>\n                <p><strong>Context:</strong> Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Papua</h5>\n                <p>Card 4 — under development.</p>"}}, "4": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Cap Wessel</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n'avait plus de bornes, et de l'appareil, elle remontait aussitôt à l'ingénieur qui l'avait créé. Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Cap Wessel</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Wessel</h5>\n                <p><strong>Contexte de l'escale :</strong> Forme la pointe du golfe de Carpentarie.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cap Wessel</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Cape Wessel</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>If you are not located in the United States, you will have to check the laws of the country where you are located before using this eB 'color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Wessel</h5>\n                <p><strong>Context:</strong> Forms the tip of the Gulf of Carpentaria.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cape Wessel</h5>\n                <p>Card 4 — under development.</p>"}}, "5": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Mer de Timor</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Mer de Timor</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mer de Timor</h5>\n                <p><strong>Contexte de l'escale :</strong> Un homme de l'équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Mer de Timor</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Timor Sea</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Timor Sea</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Timor Sea</h5>\n                <p><strong>Context:</strong> A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Timor Sea</h5>\n                <p>Card 4 — under development.</p>"}}, "6": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Île Keeling</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Île Keeling</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Keeling</h5>\n                <p><strong>Contexte de l'escale :</strong> Visitée par Darwin et le capitaine Fitz-Roy.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île Keeling</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Keeling Island</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Keeling Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Keeling Island</h5>\n                <p><strong>Context:</strong> Visited by Darwin and Captain Fitz-Roy.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Keeling Island</h5>\n                <p>Card 4 — under development.</p>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Golfe du Bengale</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n                <p><strong>Contexte de l'escale :</strong> Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C'était la mort des villes indiennes.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Golfe du Bengale</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Bay of Bengal</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGUR t:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>East Africa Coast</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 East Africa Coast</h5>\n                <p><strong>Context:</strong> Intermediate point.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ East Africa Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "9": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Sous l'isthme de Suez</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l'isthme de Suez n'est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Sous l'isthme de Suez</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Sous l'isthme de Suez</h5>\n                <p><strong>Contexte de l'escale :</strong> Passage par l'Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l'isthme de Suez, puis chasse du dugong.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Sous l'isthme de Suez</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Beneath the Isthmus of Suez</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Beneath the Isthmus of Suez</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Beneath the Isthmus of Suez</h5>\n                <p><strong>Context:</strong> Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Beneath the Isthmus of Suez</h5>\n                <p>Card 4 — under development.</p>"}}, "10": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>L'archipel grec</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Ils venaient retirer les filets qui avaient été mis à la traîne pendant la nuit. Ces marins appartenaient évidemment à des nations différentes, bien que le type européen fût indiqué chez tous. Je reconnus, à ne pas me tromper, des Irlandais, des Français, quelques Slaves, un Grec ou un Candiote. Du reste, ces hommes étaient sobres de paroles, et n'employaient entre eux que ce bizarre idiome dont je ne pouvais pas même soupçonner l'origine. Aussi, je dus renoncer à les interroger.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>L'archipel grec</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'archipel grec</h5>\n                <p><strong>Contexte de l'escale :</strong> Passage du Nautilus dans l'archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l'ancienne île de Crète.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ L'archipel grec</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>The Greek Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>The Greek Archipelago</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 The Greek Archipelago</h5>\n                <p><strong>Context:</strong> The Nautilus passes through the Greek Archipelago; Aronnax observes the fish of these waters, with an evocation of the ancient island of Crete.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ The Greek Archipelago</h5>\n                <p>Card 4 — under development.</p>"}}, "11": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Méditerranée</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Voici une conserve d'holoturies qu'un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d'anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu'en gourmet, tandis que le capitaine Nemo m'enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j'extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l'Océan.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Méditerranée</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Méditerranée</h5>\n                <p><strong>Contexte de l'escale :</strong> La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Méditerranée</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Mediterranean Sea</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will        <h3 style='color:#0a3d62;'>Mediterranean Sea</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n                <p><strong>Context:</strong> The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Mediterranean Sea</h5>\n                <p>Card 4 — under development.</p>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>L'Atlantide</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'Atlantide</h5>\n                <p><strong>Contexte de l'escale :</strong> Vision de l'Atlantide, localisation cartographique approximative d'après le trajet du roman.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ L'Atlantide</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Atlantis</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Atlantis</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Atlantis</h5>\n                <p><strong>Context:</strong> Vision of Atlantis; approximate cartographic location based on the novel's route.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Atlantis</h5>\n                <p>Card 4 — under development.</p>"}}, "13": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>La mer des Sargasses</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>La mer des Sargasses</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 La mer des Sargasses</h5>\n                <p><strong>Contexte de l'escale :</strong> Traversée de la mer des Sargasses par le Nautilus.</p>\n                <p>Fic e='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Afrique Nord</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Afrique Nord</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; elopment.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North Africa Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "15": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Amérique Sud</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Amérique Sud</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Sud</h5>\n                <p><strong>Contexte de l'escale :</strong> Point intermédiaire</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujo Coastline (return)</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South America Coastline (return)</h5>\n                <p><strong>Context:</strong> Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ South America Coastline (return)</h5>\n                <p>Card 4 — under development.</p>"}}, "20": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Amérique Sud centrale</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Cependant, personne ne doutait encore du succès, et pas un matelot du bord n'eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l'équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Amérique Sud centrale</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Sud centrale</h5>\n                <p><strong>Contexte de l'escale :</strong> Point intermédiaire</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Amérique Sud centrale</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Central South America Coastline</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps because there was not enough water for him! suggested the greater part of the crew).</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Central South America Coastline</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Central South America Coastline</h5>\n                <p><strong>Context:</strong> Intermediate point</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Central South America Coastline</h5>\n                <p>Card 4 — under development.</p>"}}, "21": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Martinique et Guadeloupe</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l'eau n'eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d'îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J'aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d'une île à l'autre, fut très-décontenancé.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Martinique et Guadeloupe</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Martinique et Guadeloupe</h5>\n                <p><strong>Contexte de l'escale :</strong> Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Martinique et Guadeloupe</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Martinique and Guadeloupe</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Martinique and Guadeloupe</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Martinique and Guadeloupe</h5>\n                <p><strong>Context:</strong> Attack by a colossal giant squid, eight meters long.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Martinique and Guadeloupe</h5>\n                <p>Card 4 — under development.</p>"}}, "22": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Amérique Nord</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Amérique Nord</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Nord</h5>\n                <p><strong>Contexte de l'escale :</strong> Point intermédiaire</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Amérique Nord</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>North America Contour</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>North America Contour</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North America Contour</h5>\n                <p><strong>Context:</strong> Intermediate point</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North America Contour</h5>\n                <p>Card 4 — under development.</p>"}}, "23": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Île Lucayes</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Île Lucayes</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Lucayes</h5>\n                <p><strong>Contexte de l'escale :</strong> Entrée dans le Gulf Stream.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île Lucayes</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Lucayan Island</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Excerpt unavailable for this stop.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Lucayan Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Lucayan Island</h5>\n                <p><strong>Context:</strong> Entering the Gulf Stream.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Lucayan Island</h5>\n                <p>Card 4 — under development.</p>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Cap Hatteras</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n                <p><strong>Contexte de l'escale :</strong> Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cap Hatteras</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and fo
