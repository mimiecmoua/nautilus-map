#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n                <p><strong>Context:</strong> Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wide and two hundred and ten miles deep.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cape Hatteras</h5>\n                <p>Card 4 — under development.</p>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Long Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Contexte de l'escale :</strong> Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . .</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Long Island</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Context:</strong> Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Card 4 — under development.</p>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Terre Neuve</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n                <p><strong>Contexte de l'escale :</strong> Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Terre Neuve</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Newfoundland</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Newfoundland</h5>\n                <p><strong>Context:</strong> Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Newfoundland</h5>\n                <p>Card 4 — under development.</p>"}}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Irlande</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Irlande</h5>\n                <p><strong>Contexte de l'escale :</strong> Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Irlande</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Ireland</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Ireland</h5>\n                <p><strong>Context:</strong> The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Ireland</h5>\n                <p>Card 4 — under development.</p>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Manche</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Manche</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Manche</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>English Channel</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>You may copy it, give it away or re-use it under the terms of the Pro RDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . .</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>English Channel</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 English Channel</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ English Channel</h5>\n                <p>Card 4 — under development.</p>"}}, "29": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Angleterre Sud</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Angleterre Sud</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Sud</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Sud</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>South of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE tween 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ South of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Contour Angleterre Nord</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Nord</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>North of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>North of England Coast</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>Extrait indisponible pour cette escale.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Côtes de la Norvège</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Espèces maritimes mentionnées</h5>\n                <p>Fiche 2 — en cours de développement.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Côtes de la Norvège</h5>\n                <p><strong>Contexte de l'escale :</strong> Fin du voyage pour le professeur Aronnax, Conseil et Ned Land</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Côtes de la Norvège</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.1rem; margin-bottom:6px;'>Coast of Norway</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:10px; line-height:1.65;'>And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.</p>", "marine_species": "\n                <h3 style='color:#0a3d62;'>Coast of Norway</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🐙 Marine species mentioned</h5>\n                <p>Card 2 — under development.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Coast of Norway</h5>\n                <p><strong>Context:</strong> End of the journey for Professor Aronnax, Conseil, and Ned Land</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Coast of Norway</h5>\n                <p>Card 4 — under development.</p>"}}};

function showLoader() {
    const l = document.getElementById("dataLoaderOverlay");
    if (l) l.style.display = "flex";
}
function hideLoader() {
    const l = document.getElementById("dataLoaderOverlay");
    if (l) l.style.display = "none";
}
function openModalWithContent(title, content) {
    document.getElementById("logbookModalLabel").innerHTML = title;
    document.getElementById("logbookModalBody").innerHTML  = content;
    const modal = new bootstrap.Modal(document.getElementById("logbookModal"));
    modal.show();
}

document.addEventListener("click", function(e) {

    // Bouton toggle (Journal de bord / Explorations IA)
    const toggleBtn = e.target.closest(".submenu-toggle-btn");
    if (toggleBtn) {
        const menuId = toggleBtn.getAttribute("data-menu-id");
        const menu   = document.getElementById(menuId);
        if (menu) {
            menu.style.display = (menu.style.display === "none" || menu.style.display === "")
                ? "block" : "none";
        }
        return;
    }

    // Bouton action (Extrait du livre, Espèces, etc.)
    const actionBtn = e.target.closest(".submenu-action");
    if (actionBtn) {
        const stop   = actionBtn.getAttribute("data-stop");
        const lang   = actionBtn.getAttribute("data-lang") || "fr";
        const action = actionBtn.getAttribute("data-action");
        const group  = actionBtn.getAttribute("data-group");

        const titles = {
            fr: {
                book_excerpt:       "📖 Extrait du livre",
                marine_species:     "🐙 Espèces maritimes mentionnées",
                science_19c:        "🔬 Découvertes scientifiques du XIXe siècle",
                compare_1866_today: "⚗️ Comparaison entre 1866 et aujourd'hui"
            },
            en: {
                book_excerpt:       "📖 Book excerpt",
                marine_species:     "🐙 Marine species mentioned",
                science_19c:        "🔬 19th-century scientific discoveries",
                compare_1866_today: "⚗️ Comparison between 1866 and today"
            }
        };

        const fallback = lang === "fr"
            ? "<p>Contenu disponible bientôt.</p>"
            : "<p>Content coming soon.</p>";

        const content = (
            DETAILED_CONTENT[stop] &&
            DETAILED_CONTENT[stop][lang] &&
            DETAILED_CONTENT[stop][lang][action]
        ) ? DETAILED_CONTENT[stop][lang][action] : fallback;

        if (group === "ai") {
            showLoader();
            setTimeout(() => {
                hideLoader();
                openModalWithContent(titles[lang][action] || "Exploration IA", content);
            }, 2400);
        } else {
            openModalWithContent(titles[lang][action] || "Journal de bord vivant", content);
        }
        return;
    }
});
