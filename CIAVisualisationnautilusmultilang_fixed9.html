nglish Channel</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The man with the soft calm eyes listened to me quietly, even politely, and with extreme attention; but nothing in his countenance indicated that he had understood my story. When I finished, he said not a word. There remained one resource, to speak English. Perhaps they would know this almost universal language. I knew it, as well as the German language,—well enough to read it fluently, but not to speak it correctly.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 English Channel</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ English Channel</h5>\n                <p>Card 4 — under development.</p>"}}, "29": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Angleterre Sud</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Sud</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Sud</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>South of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Was Captain Nemo going to land on the British Isles? No. To my great</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>surprise he made for the south, once more coming back towards European</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>seas. In rounding the Emerald Isle, for one instant I caught sight of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Cape Clear, and the light which guides the thousands of vessels leaving</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South of England Coast</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ South of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n                <p><strong>Contexte de l'escale :</strong> Complot d'évasion</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Angleterre Nord</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>North of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n                <p><strong>Context:</strong> Escape plot</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North of England Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>«Maelstrom! Maelstrom!» s'écriait-il!</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>ces dangereux parages de la côte norwégienne? Le _Nautilus_ était-il</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐴 Hippocampe</span><span sty
