<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Une douzaine d'appareils de scaphandres, suspendus à la paroi, attendaient les promeneurs. Ned Land, en les voyant, manifesta une répugnance évidente à s'en revêtir. «Mais, mon brave Ned, lui dis-je, les forêts de l'île de Crespo ne sont que des forêts sous-marines! —Bon! fit le harponneur désappointé, qui voyait s'évanouir ses rêves de viande fraîche.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦀 Crabe</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n                <p><strong>Contexte de l'escale :</strong> Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île de Crespo</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦀 Crab</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n                <p><strong>Context:</strong> Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Crespo Island</h5>\n                <p>Card 4 — under development.</p>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le Nautilus devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait. Cependant, toujours entraînés par ce Nautilus, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n                <p><strong>Contexte de l'escale :</strong> Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d'îles.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Archipel des Pomotou</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Pomotou Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n                <p><strong>Context:</strong> This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Pomotou Archipelago</h5>\n                <p>Card 4 — under development.</p>"}}, "2": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Archipel des nouvelles Hébrides</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des nouvelles Hébrides</h5>\n                <p><strong>Contexte de l'escale :</strong> Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>New Hebrides Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 New Hebrides Archipelago</h5>\n                <p><strong>Context:</strong> Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ New Hebrides Archipelago</h5>\n                <p>Card 4 — under development.</p>"}}, "3": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>La Pouasie</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>C'est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n'en ayons jamais d'autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 La Pouasie</h5>\n                <p><strong>Contexte de l'escale :</strong> Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ La Pouasie</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Papua</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Papua</h5>\n                <p><strong>Context:</strong> Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Papua</h5>\n                <p>Card 4 — under development.</p>"}}, "4": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Cap Wessel</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n'avait plus de bornes, et de l'appareil, elle remontait aussitôt à l'ingénieur qui l'avait créé. Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Wessel</h5>\n                <p><strong>Contexte de l'escale :</strong> Forme la pointe du golfe de Carpentarie.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cap Wessel</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Cape Wessel</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The rapidity of her screw was such that I could neither follow nor count its revolutions. When I reflected that this marvellous electric agent, after having afforded motion, heat, and light to the Nautilus, still protected her from outward attack, and transformed her into an ark of safety which no profane hand might touch without being thunderstricken, my admiration was unbounded, and from the structure it extended to the engineer who had called it into existence. Our course was directed to the west, and on the 11th of January we doubled Cape Wessel, situation in 135° long. and 10° north lat., which forms the east point of the Gulf of Carpentaria. The reefs were still numerous, but more equalised, and marked on the chart with extreme precision.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Wessel</h5>\n                <p><strong>Context:</strong> Forms the tip of the Gulf of Carpentaria.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cape Wessel</h5>\n                <p>Card 4 — under development.</p>"}}, "5": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Mer de Timor</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mer de Timor</h5>\n                <p><strong>Contexte de l'escale :</strong> Un homme de l'équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Mer de Timor</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Timor Sea</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Timor Sea</h5>\n                <p><strong>Context:</strong> A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Timor Sea</h5>\n                <p>Card 4 — under development.</p>"}}, "6": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Île Keeling</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Keeling</h5>\n                <p><strong>Contexte de l'escale :</strong> Visitée par Darwin et le capitaine Fitz-Roy.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Île Keeling</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Keeling Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Keeling Island</h5>\n                <p><strong>Context:</strong> Visited by Darwin and Captain Fitz-Roy.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Keeling Island</h5>\n                <p>Card 4 — under development.</p>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n                <p><strong>Contexte de l'escale :</strong> Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C'était la mort des villes indiennes.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Golfe du Bengale</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Bay of Bengal</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>He wanted to go to the surface and harpoon the monsters, particularly certain smooth-hound sharks, whose mouth is studded with teeth like a mosaic; and large tiger-sharks nearly six yards long, the last named of which seemed to excite him more particularly. But the Nautilus, accelerating her speed, easily left the most rapid of them behind. The 27th of January, at the entrance of the vast Bay of Bengal, we met repeatedly a forbidding spectacle, dead bodies floating on the surface of the water. They were the dead of the Indian villages, carried by the Ganges to the level of the sea, and which the vultures, the only undertakers of the country, had not been able to devour. But the sharks did not fail to help them at their funeral work.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Bay of Bengal</h5>\n                <p><strong>Context:</strong> A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Bay of Bengal</h5>\n                <p>Card 4 — under development.</p>"}}, "8": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Afrique Est</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Afrique Est</h5>\n                <p><strong>Contexte de l'escale :</strong> Point intermédiaire.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Afrique Est</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin radius:20px;font-size:0.9rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Oyster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Giant clam</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦪 Bivalve</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐚 Testacean</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Beneath the Isthmus of Suez</h5>\n                <p><strong>Context:</strong> Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Beneath the Isthmus of Suez</h5>\n                <p>Card 4 — under development.</p>"}}, "10": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>L'archipel grec</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Pour les uns, c'est un polypier, et pour d'autres tels que M. Milne Edwards, c'est un individu isolé et unique. La classe des spongiaires contient environ trois cents espèces qui se rencontrent dans un grand nombre de mers, et même dans certains cours d'eau où elles ont reçu le nom de «fluviatiles.» Mais leurs eaux de prédilection sont celles de la Méditerranée, de l'archipel grec, de la côte de Syrie et de la mer Rouge. Là se reproduisent et se développent ces éponges fines-douces dont la valeur s'élève jusqu'à cent cinquante francs, l'éponge blonde de Syrie, l'éponge dure de Barbarie, etc. Mais puisque je ne pouvais espérer d'étudier ces zoophytes dans les échelles du Levant, dont nous étions séparés par l'infranchissable isthme de Suez, je me contentai de les observer dans les eaux de la mer Rouge.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cachalot</span><span style='display:inline- ugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🌿 Algue</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'archipel grec</h5>\n                <p><strong>Contexte de l'escale :</strong> Passage du Nautilus dans l'archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l'ancienne île de Crète.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ L'archipel grec</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>The Greek Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>CHAPTER VI</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>THE GRECIAN ARCHIPELAGO</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The next day, the 12th of February, at the dawn of day, the _Nautilus_</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>rose to the surface. I hastened on to the platform. Three miles to the</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,15  <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n                <p><strong>Context:</strong> The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Mediterranean Sea</h5>\n                <p>Card 4 — under development.</p>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; fl loppement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Atlantis</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Swordfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Sea Bream</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Afrique Nord</h5>\n                <p><strong>Contexte de l'escale :</strong> Direction le pôle Sud.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Contour Afrique Nord</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>North Africa Coast</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North Africa Coast</h5>\n                <p><strong>Context:</strong> Heading towards the South Pole.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North Africa Coast</h5>\n                <p>Card 4 — under development.</p>"}}, "15": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Contour Amérique Sud</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun n the novel.</p>", "marine_species": "<p>🗺️ Intermediate stop — no novel passage associated.</p>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North America Contour</h5>\n                <p><strong>Context:</strong> Intermediate point</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ North America Contour</h5>\n                <p>Card 4 — under development.</p>"}}, "23": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Île Lucayes</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans x oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n                <p><strong>Contexte de l'escale :</strong> Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cap Hatteras</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n                <p><strong>Context:</strong> Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wide and two hundred and ten miles deep.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Cape Hatteras</h5>\n                <p>Card 4 — under development.</p>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Contexte de l'escale :</strong> Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>The _Abraham Lincoln_ answered by hoisting the American colours three times, whose thirty-nine stars shone resplendent from the mizzen-peak; then modifying its speed to take the narrow channel marked by buoys placed in the inner bay formed by Sandy Hook Point, it coasted the long sandy beach, where some thousands of spectators gave it one final cheer. The escort of boats and tenders still followed the frigate, and did not leave her until they came abreast of the lightship, whose two lights marked the entrance of New York Channel. Six bells struck, the pilot got into his boat, and rejoined the little schooner which was waiting under our lee, the fires were made up, the screw beat the waves more rapidly, the frigate skirted the low yellow coast of Long Island; and at eight bells, after having lost sight in the north-west of the lights of Fire Island, she ran at full steam on to the dark waters of the Atlantic. CHAPTER IV NED LAND Captain Farragut was a good seaman, worthy of the frigate he commanded. His vessel and he were one.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n                <p><strong>Context:</strong> Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n                <p>Card 4 — under development.</p>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Corail</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n                <p><strong>Contexte de l'escale :</strong> Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Terre Neuve</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Coral</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Newfoundland</h5>\n                <p><strong>Context:</strong> Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Newfoundland</h5>\n                <p>Card 4 — under development.</p>"}}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐴 Hippocampe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦀 Crabe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Corail</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Irlande</h5>\n                <p><strong>Contexte de l'escale :</strong> Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.</p>\n                <p>Fiche 3 — en cours de développement.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparaison entre 1866 et aujourd'hui</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Irlande</h5>\n                <p>Fiche 4 — en cours de développement.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "<p style='color:#607080; font-size:0.85rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🦀 Crab</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:0.9rem;'>🪸 Coral</span></div>", "science_19c": "\n                <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Ireland</h5>\n                <p><strong>Context:</strong> The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast.</p>\n                <p>Card 3 — under development.</p>", "compare_1866_today": "\n                <h3 style='color:#0a3d62;'>Comparison between 1866 and today</h3>\n                <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>⚗️ Ireland</h5>\n                <p>Card 4 — under development.</p>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:1.3rem; margin-bottom:8px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:1rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.2rem;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphan
