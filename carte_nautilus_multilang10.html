const ENRICHED_CONTENT = {"0": {"fr": "\n            <h3>Île de Crespo</h3>\n            <p><b>Lecture enrichie :</b> Cette escale ouvre véritablement l’odyssée du Nautilus. Elle installe le ton du roman : fascination scientifique, puissance du regard naturaliste et sentiment de basculement dans un monde sous-marin autonome.</p>\n            <p><b>Contexte littéraire :</b> Jules Verne fait ici sentir que l’aventure n’est pas seulement géographique ; elle est aussi intellectuelle. Le lecteur entre dans une cartographie poétique où chaque étape devient un fragment de savoir et d’imaginaire.</p>\n            <p><b>Piste d’interprétation :</b> On peut lire ce moment comme l’entrée dans un musée vivant des mers, où Aronnax devient à la fois témoin, savant et narrateur.</p>\n        ", "en": "\n            <h3>Crespo Island</h3>\n            <p><b>Enhanced reading:</b> This stop truly opens the Nautilus odyssey. It sets the tone of the novel: scientific wonder, the strength of the naturalist gaze, and the feeling of entering a self-contained underwater world.</p>\n            <p><b>Literary context:</b> Jules Verne suggests that the adventure is not only geographic but also intellectual. The reader enters a poetic cartography where each stop becomes a fragment of knowledge and imagination.</p>\n            <p><b>Interpretive path:</b> This moment can be read as the entrance into a living museum of the seas, where Aronnax becomes witness, scholar, and storyteller at once.</p>\n        "}, "1": {"fr": "\n            <h3>Archipel des Pomotou</h3>\n            <p><b>Lecture enrichie :</b> Cette étape développe l’idée d’immensité océanique. L’archipel apparaît comme une constellation insulaire qui transforme l’espace marin en réseau de repères dispersés.</p>\n            <p><b>Contexte géopoétique :</b> Verne donne à voir le Pacifique comme un ensemble de mondes minuscules mais reliés, où la mer devient un tissu d’îles, de récits et de trajectoires.</p>\n        ", "en": "\n            <h3>Pomotou Archipelago</h3>\n            <p><b>Enhanced reading:</b> This stop deepens the sense of oceanic vastness. The archipelago appears as an insular constellation, turning marine space into a network of scattered landmarks.</p>\n            <p><b>Geopoetic context:</b> Verne presents the Pacific as a set of tiny yet connected worlds, where the sea becomes a fabric of islands, stories, and trajectories.</p>\n        "}, "2": {"fr": "\n            <h3>Archipel des Nouvelles-Hébrides</h3>\n            <p><b>Lecture enrichie :</b> Ici, le voyage du Nautilus croise l’histoire des grandes explorations. L’escale relie le roman vernien aux récits de découverte européens et à la mémoire des navigateurs.</p>\n            <p><b>Contexte historique :</b> La mention de Quiros, Bougainville et Cook inscrit le parcours fictif dans une archive réelle de la navigation mondiale.</p>\n        ", "en": "\n            <h3>New Hebrides Archipelago</h3>\n            <p><b>Enhanced reading:</b> Here, the Nautilus journey intersects with the history of major explorations. This stop connects Verne’s fiction to European discovery narratives and the memory of navigators.</p>\n            <p><b>Historical context:</b> The mention of Quiros, Bougainville, and Cook anchors the fictional route within the real archive of global navigation.</p>\n        "}};

document.addEventListener("click", function(e) {
    const btn = e.target.closest(".living-logbook-btn");
    if (!btn) return;

    const stop = btn.getAttribute("data-stop");
    const lang = btn.getAttribute("data-lang") || "fr";

    const title = lang === "fr" ? "Journal de bord vivant" : "Living Logbook";
    const fallback = lang === "fr"
        ? "<p>Contenu enrichi bientôt disponible pour cette escale.</p>"
        : "<p>Enhanced content coming soon for this stop.</p>";

    const modalTitle = document.getElementById("logbookModalLabel");
    const modalBody = document.getElementById("logbookModalBody");

    modalTitle.innerHTML = title;
    modalBody.innerHTML =
        (ENRICHED_CONTENT[stop] && ENRICHED_CONTENT[stop][lang])
            ? ENRICHED_CONTENT[stop][lang]
            : fallback;

    const modal = new bootstrap.Modal(document.getElementById("logbookModal"));
    modal.show();
});
</script>
