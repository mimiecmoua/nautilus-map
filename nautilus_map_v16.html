<script>
const EXTRAITS = {"0": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce billet était libellé en ces termes:</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Monsieur le professeur Aronnax, à bord du <em>Nautilus</em>.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>»Le capitaine Nemo invite monsieur le professeur Aronnax à une     partie de chasse qui aura lieu demain matin dans ses forêts     de l'île Crespo. Il espère que rien n'empêchera monsieur le     professeur d'y assister, et il verra avec plaisir que ses     compagnons se joignent à lui.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Le commandant du <em>Nautilus</em>,                                            «Capitaine NEMO.»</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Et dans ses forêts de l'île Crespo! ajouta Conseil.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Mais il va donc à terre, ce particulier-là? reprit Ned Land.</p>", "1": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le <em>Nautilus</em> devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cependant, toujours entraînés par ce <em>Nautilus</em>, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes. Un soulèvement lent, mais continu, provoqué par le travail des polypes, les reliera un jour entre elles. Puis, cette nouvelle île se soudera plus tard aux archipels voisins, et un cinquième continent s'étendra depuis la Nouvelle-Zélande et la Nouvelle-Calédonie jusqu'aux Marquises.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le jour où je développai cette théorie devant le capitaine Nemo, il me répondit froidement:</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Ce ne sont pas de nouveaux continents qu'il faut à la terre, mais de nouveaux hommes!»</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Les hasards de sa navigation avaient précisément conduit le <em>Nautilus</em> vers l'île Clermont-Tonnerre, l'une des plus curieuses du groupe, qui fut découvert en 1822, par le capitaine Bell, de <em>la Minerve</em>. Je pus alors étudier ce système madréporique auquel sont dues les îles de cet Océan.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Les madrépores, qu'il faut se garder de confondre avec les coraux, ont un tissu revêtu d'un encroûtement calcaire, et les modifications de sa structure ont amené M. Milne-Edwards, mon illustre maître, à les classer en cinq sections. Les petits animalcules qui sécrètent ce polypier vivent par milliards au fond de leurs cellules. Ce sont leurs dépôts calcaires qui deviennent rochers, récifs, îlots, îles. Ici, ils forment un anneau circulaire, entourant un lagon ou petit lac intérieur, que des brèches mettent en communication avec la mer. Là, ils figurent des barrières de récifs semblables à celles qui existent sur les côtes de la Nouvelle-Calédonie et de diverses îles des Pomotou. En d'autres endroits, comme à la Réunion et à Maurice, ils élèvent des récifs frangés, hautes murailles droites, près desquelles les profondeurs de l'Océan sont considérables.</p>", "2": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 25 décembre, le <em>Nautilus</em> naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce jour-là, c'était Noël, et Ned Land me sembla regretter vivement la célébration du «Christmas», la véritable fête de la famille, dont les protestants sont fanatiques.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je n'avais pas aperçu le capitaine Nemo depuis une huitaine de jours, quand le 27, au matin, il entra dans le grand salon, ayant toujours l'air d'un homme qui vous a quitté depuis cinq minutes. J'étais occupé à reconnaître sur le planisphère la route du <em>Nautilus</em>. Le capitaine s'approcha, posa un doigt sur un point de la carte, et prononça ce seul mot:</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce nom fut magique. C'était le nom des îlots sur lesquels vinrent se perdre les vaisseaux de La Pérouse. Je me relevai subitement.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Le <em>Nautilus</em> nous porte à Vanikoro? demandai-je.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Oui, monsieur le professeur, répondit le capitaine.</p>", "3": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Deux jours après avoir traversé la mer de Corail, le 4 janvier, nous eûmes connaissance des côtes de la Papouasie. A cette occasion, le capitaine Nemo m'apprit que son intention était de gagner l'Océan Indien par le détroit de Torrès. Sa communication se borna là. Ned vit avec plaisir que cette route le rapprochait des mers européennes.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce détroit de Torrès est regardé comme non moins dangereux par les écueils qui le hérissent que par les sauvages habitants qui fréquentent ses côtes. Il sépare de la Nouvelle-Hollande la grande île de la Papouasie, nommée aussi Nouvelle-Guinée.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>La Papouasie a quatre cents lieues de long sur cent trente lieues de large, et une superficie de quarante mille lieues géographiques. Elle est située, en latitude, entre 0° 19′ et 10° 2′ sud, et en longitude, entre 128° 23′ et 146° 15′. A midi, pendant que le second prenait la hauteur du soleil, j'aperçus les sommets des monts Arfalxs, élevés par plans et terminés par des pitons aigus.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cette terre, découverte en 1511 par le Portugais Francisco Serrano, fut visitée successivement par don José de Menesès en 1526, par Grijalva en 1527, par le général espagnol Alvar de Saavedra en 1528, par Juigo Ortez en 1545, par le hollandais Schouten en 1616, par Nicolas Sruick en 1753, par Tasman, Dampier, Fumel, Carteret, Edwards, Bougainville, Cook, Forrest, Mac Cluer, par d'Entrecasteaux en 1792, par Duperrey en 1823, et par Dumont d'Urville en 1827. «C'est le foyer des noirs qui occupent toute la Malaisie,» a dit M. de Rienzi, et je ne me doutais guère que les hasards de cette navigation allaient me mettre en présence des redoutables Andamènes.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le <em>Nautilus</em> se présenta donc à l'entrée du plus dangereux détroit du globe, de celui que les plus hardis navigateurs osent à peine à franchir, détroit que Louis Paz de Torrès affronta en revenant des mers du Sud dans la Mélanésie, et dans lequel, en 1840, les corvettes échouées de Dumont d'Urville furent sur le point de se perdre corps et biens. Le <em>Nautilus</em> lui-même, supérieur à tous les dangers de la mer, allait, cependant, faire connaissance avec les récifs coralliens.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le détroit de Torrès a environ trente-quatre lieues de large, mais il est obstrué par une innombrable quantité d'îles, d'îlots, de brisants, de rochers, qui rendent sa navigation presque impraticable. En conséquence, le capitaine Nemo prit toutes les précautions voulues pour le traverser. Le <em>Nautilus</em>, flottant à fleur d'eau, s'avançait sous une allure modérée. Son hélice, comme une queue de cétacé, battait les flots avec lenteur.</p>", "4": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le <em>Nautilus</em> évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre. Aussi, ces ancêtres écailleux foisonnent dans les rivières de l'île, et sont l'objet d'une vénération particulière. On les protége, on les gâte, on les adule, on les nourrit, on leur offre des jeunes filles en pâture, et malheur à l'étranger qui porte la main sur ces lézards sacrés.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Mais le <em>Nautilus</em> n'eut rien à démêler avec ces vilains animaux. Timor ne fut visible qu'un instant, à midi, pendant que le second relevait sa position. Également, je ne fis qu'entrevoir cette petite île Rotti, qui fait partie du groupe, et dont les femmes ont une réputation de beauté très-établie sur les marchés malais.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>A partir de ce point, la direction du <em>Nautilus</em>, en latitude, s'infléchit vers le sud-ouest. Le cap fut mis sur l'océan Indien. Où la fantaisie du capitaine Nemo allait-elle nous entraîner? Remonterait-il vers les côtes de l'Asie? Se rapprocherait-il des rivages de l'Europe? Résolutions peu probables de la part d'un homme qui fuyait les continents habités? Descendrait-il donc vers le sud? Irait-il doubler le cap de Bonne-Espérance, puis le cap Horn, et pousser au pôle antarctique? Reviendrait-il enfin vers ses mers du Pacifique, où son <em>Nautilus</em> trouvait une navigation facile et indépendante? L'avenir devait nous l'apprendre.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Après avoir prolongé les écueils de Cartier, d'Hibernia, de Seringapatam, de Scott, derniers efforts de l'élément solide contre l'élément liquide, le 14 janvier, nous étions au delà de toutes terres. La vitesse du <em>Nautilus</em> fut singulièrement ralentie, et, très-capricieux dans ses allures, tantôt il nageait au milieu des eaux, et tantôt il flottait à leur surface.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant cette période du voyage, le capitaine Nemo fit d'intéressantes expériences sur les diverses températures de la mer à des couches différentes. Dans les conditions ordinaires, ces relevés s'obtiennent au moyen d'instruments assez compliqués, dont les rapports sont au moins douteux, que ce soient des sondes thermométriques, dont les verres se brisent souvent sous la pression des eaux, ou des appareils basés sur la variation de résistance de métaux aux courants électriques. Ces résultats ainsi obtenus ne peuvent être suffisamment contrôlés. Au contraire, le capitaine Nemo allait lui-même chercher cette température dans les profondeurs de la mer, et son thermomètre, mis en communication avec les diverses nappes liquides, lui donnait immédiatement et sûrement le degré recherché.</p>", "5": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre. Aussi, ces ancêtres écailleux foisonnent dans les rivières de l'île, et sont l'objet d'une vénération particulière. On les protége, on les gâte, on les adule, on les nourrit, on leur offre des jeunes filles en pâture, et malheur à l'étranger qui porte la main sur ces lézards sacrés.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Mais le <em>Nautilus</em> n'eut rien à démêler avec ces vilains animaux. Timor ne fut visible qu'un instant, à midi, pendant que le second relevait sa position. Également, je ne fis qu'entrevoir cette petite île Rotti, qui fait partie du groupe, et dont les femmes ont une réputation de beauté très-établie sur les marchés malais.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>A partir de ce point, la direction du <em>Nautilus</em>, en latitude, s'infléchit vers le sud-ouest. Le cap fut mis sur l'océan Indien. Où la fantaisie du capitaine Nemo allait-elle nous entraîner? Remonterait-il vers les côtes de l'Asie? Se rapprocherait-il des rivages de l'Europe? Résolutions peu probables de la part d'un homme qui fuyait les continents habités? Descendrait-il donc vers le sud? Irait-il doubler le cap de Bonne-Espérance, puis le cap Horn, et pousser au pôle antarctique? Reviendrait-il enfin vers ses mers du Pacifique, où son <em>Nautilus</em> trouvait une navigation facile et indépendante? L'avenir devait nous l'apprendre.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Après avoir prolongé les écueils de Cartier, d'Hibernia, de Seringapatam, de Scott, derniers efforts de l'élément solide contre l'élément liquide, le 14 janvier, nous étions au delà de toutes terres. La vitesse du <em>Nautilus</em> fut singulièrement ralentie, et, très-capricieux dans ses allures, tantôt il nageait au milieu des eaux, et tantôt il flottait à leur surface.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant cette période du voyage, le capitaine Nemo fit d'intéressantes expériences sur les diverses températures de la mer à des couches différentes. Dans les conditions ordinaires, ces relevés s'obtiennent au moyen d'instruments assez compliqués, dont les rapports sont au moins douteux, que ce soient des sondes thermométriques, dont les verres se brisent souvent sous la pression des eaux, ou des appareils basés sur la variation de résistance de métaux aux courants électriques. Ces résultats ainsi obtenus ne peuvent être suffisamment contrôlés. Au contraire, le capitaine Nemo allait lui-même chercher cette température dans les profondeurs de la mer, et son thermomètre, mis en communication avec les diverses nappes liquides, lui donnait immédiatement et sûrement le degré recherché.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>[Illustration: Son œil restait fixé sur l'horizon. (Page 189.)]</p>", "6": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le <em>Nautilus</em> prolongea à peu de distance les accores de cette île déserte. Ses dragues rapportèrent de nombreux échantillons de polypes et d'échinodermes, et des tests curieux de l'embranchement des mollusques. Quelques précieux produits de l'espèce des dauphinules accrurent les trésors du capitaine Nemo, auquel je joignis une astrée punctifère, sorte de polypier parasite souvent fixé sur une coquille.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Bientôt l'île Keeling disparut sous l'horizon, et la route fut donnée au nord-ouest vers la pointe de la péninsule indienne.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Des terres civilisées, me dit ce jour-là Ned Land. Cela vaudra mieux que ces îles de la Papouasie, où l'on rencontre plus de sauvages que de chevreuils! Sur cette terre indienne, monsieur le professeur, il y a des routes, des chemins de fer, des villes anglaises, françaises et indoues. On ne ferait pas cinq milles sans y rencontrer un compatriote. Hein! est-ce que le moment n'est pas venu de brûler la politesse au capitaine Nemo?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Non, Ned, non, répondis-je d'un ton très-déterminé. Laissons courir, comme vous dites, vous autres marins. Le <em>Nautilus</em> se rapproche des continents habités. Il revient vers l'Europe, qu'il nous y conduise. Une fois arrivés dans nos mers, nous verrons ce que la prudence nous conseillera de tenter. D'ailleurs, je ne suppose pas que le capitaine Nemo nous permette d'aller chasser sur les côtes du Malabar ou de Coromandel comme dans les forêts de la Nouvelle-Guinée.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Eh bien! monsieur, ne peut-on se passer de sa permission?»</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je ne répondis pas au Canadien. Je ne voulais pas discuter. Au fond, j'avais à cœur d'épuiser jusqu'au bout les hasards de la destinée qui m'avait jeté à bord du <em>Nautilus</em>.</p>", "7": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 27 janvier, à l'ouvert du vaste golfe du Bengale, nous rencontrâmes à plusieurs reprises, spectacle sinistre! des cadavres qui flottaient à la surface des flots. C'étaient les morts des villes indiennes, charriés par le Gange jusqu'à la haute mer, et que les vautours, les seuls ensevelisseurs du pays, n'avaient pas achevé de dévorer. Mais les squales ne manquaient pas pour les aider dans leur funèbre besogne.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Vers sept heures du soir, le <em>Nautilus</em> à demi-immergé navigua au milieu d'une mer de lait. A perte de vue l'Océan semblait être lactifié. Était-ce l'effet des rayons lunaires? Non, car la lune, ayant deux jours à peine, était encore perdue au-dessous de l'horizon dans les rayons du soleil. Tout le ciel, quoique éclairé par le rayonnement sidéral, semblait noir par contraste avec la blancheur des eaux.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Conseil ne pouvait en croire ses yeux, et il m'interrogeait sur les causes de ce singulier phénomène. Heureusement, j'étais en mesure de lui répondre.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«C'est ce qu'on appelle une mer de lait, lui dis-je, vaste étendue de flots blancs qui se voit fréquemment sur les côtes d'Amboine et dans ces parages.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Mais, demanda Conseil, monsieur peut-il m'apprendre quelle cause produit un pareil effet, car cette eau ne s'est pas changée en lait, je suppose!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Non, mon garçon, et cette blancheur qui te surprend n'est due qu'à la présence de myriades de bestioles infusoires, sortes de petits vers lumineux, d'un aspect gélatineux et incolore, de l'épaisseur d'un cheveu, et dont la longueur ne dépasse pas un cinquième de millimètre. Quelques-unes de ces bestioles adhèrent entre elles pendant l'espace de plusieurs lieues.</p>", "8": "<p><em>Point de navigation intermédiaire — aucun chapitre spécifique dans le roman.</em></p>", "9": "<p><em>Ancre non trouvée pour cette escale.</em></p>", "10": "<p><em>Ancre non trouvée pour cette escale.</em></p>", "11": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>La Méditerranée, la mer bleue par excellence, «la grande mer» des Hébreux, la «mer» des Grecs, le «mare nostrum» des Romains, bordée d'orangers, d'aloës, de cactus, de pins maritimes, embaumée du parfum des myrtes, encadrée de rudes montagnes, saturée d'un air pur et transparent, mais incessamment travaillée par les feux de la terre, est un véritable champ de bataille où Neptune et Pluton se disputent encore l'empire du monde. C'est là, sur ses rivages et sur ses eaux, dit Michelet, que l'homme se retrempe dans l'un des plus puissants climats du globe.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Mais si beau qu'il soit, je n'ai pu prendre qu'un aperçu rapide de ce bassin, dont la superficie couvre deux millions de kilomètres carrés. Les connaissances personnelles du capitaine Nemo me firent même défaut, car l'énigmatique personnage ne parut pas une seule fois pendant cette traversée à grande vitesse. J'estime à six cents lieues environ le chemin que le <em>Nautilus</em> parcourut sous les flots de cette mer, et ce voyage, il l'accomplit en deux fois vingt-quatre heures. Partis le matin du 16 février des parages de la Grèce, le 18, au soleil levant, nous avions franchi le détroit de Gibraltar.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Il fut évident pour moi que cette Méditerranée, resserrée au milieu de ces terres qu'il voulait fuir, déplaisait au capitaine Nemo. Ses flots et ses brises lui rapportaient trop de souvenirs, sinon trop de regrets. Il n'avait plus ici cette liberté d'allures, cette indépendance de manœuvres que lui laissaient les océans, et son <em>Nautilus</em> se sentait à l'étroit entre ces rivages rapprochés de l'Afrique et de l'Europe.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Aussi, notre vitesse fut-elle de vingt-cinq milles à l'heure, soit douze lieues de quatre kilomètres. Il va sans dire que Ned Land, à son grand ennui, dut renoncer à ses projets de fuite. Il ne pouvait se servir du canot entraîné à raison de douze à treize mètres par seconde. Quitter le <em>Nautilus</em> dans ces conditions, c'eût été sauter d'un train marchant avec cette rapidité, manœuvre imprudente s'il en fut. D'ailleurs, notre appareil ne remontait que la nuit à la surface des flots, afin de renouveler sa provision d'air, et il se dirigeait seulement suivant les indications de la boussole et les relèvements du loch.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je ne vis donc de l'intérieur de cette Méditerranée que ce que le voyageur d'un express aperçoit du paysage qui fuit devant ses yeux, c'est-à-dire les horizons lointains, et non les premiers plans qui passent comme un éclair. Cependant, Conseil et moi, nous pûmes observer quelques-uns de ces poissons méditerranéens, que la puissance de leurs nageoires maintenait quelques instants dans les eaux du <em>Nautilus</em>. Nous restions à l'affût devant les vitres du salon, et nos notes me permettent de refaire en quelques mots l'ichtyologie de cette mer.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Des divers poissons qui l'habitent, j'ai vu les uns, entrevu les autres, sans parler de ceux que la vitesse du <em>Nautilus</em> déroba à mes yeux. Qu'il me soit donc permis de les classer d'après cette classification fantaisiste. Elle rendra mieux mes rapides observations.</p>", "12": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le soir, vers onze heures, je reçus la visite très-inattendue du capitaine Nemo. Il me demanda fort gracieusement si je me sentais fatigué d'avoir veillé la nuit précédente. Je répondis négativement.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Alors, monsieur Aronnax, je vous proposerai une curieuse excursion.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Vous n'avez encore visité les fonds sous-marins que le jour et sous la clarté du soleil. Vous conviendrait-il de les voir par une nuit obscure?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Cette promenade sera fatigante, je vous en préviens. Il faudra marcher longtemps et gravir une montagne. Les chemins ne sont pas très bien entretenus.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Ce que vous me dites là, capitaine, redouble ma curiosité. Je suis prêt à vous suivre.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Venez donc, monsieur le professeur, nous allons revêtir nos scaphandres.»</p>", "13": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Toute cette journée du 22 février se passa dans la mer de Sargasses, où les poissons, amateurs de plantes marines et de crustacés, trouvent une abondante nourriture. Le lendemain, l'Océan avait repris son aspect accoutumé.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Depuis ce moment, pendant dix-neuf jours, du 23 février au 12 mars, le <em>Nautilus</em>, tenant le milieu de l'Atlantique, nous emporta avec une vitesse constante de cent lieues par vingt-quatre heures. Le capitaine Nemo voulait évidemment accomplir son programme sous-marin, et je ne doutais pas qu'il ne songeât, après avoir doublé le cap Horn, à revenir vers les mers australes du Pacifique.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ned Land avait donc eu raison de craindre. Dans ces larges mers, privées d'îles, il ne fallait plus tenter de quitter le bord. Nul moyen non plus de s'opposer aux volontés du capitaine Nemo. Le seul parti était de se soumettre; mais ce qu'on ne devait plus attendre de la force ou de la ruse, j'aimais à penser qu'on pourrait l'obtenir par la persuasion. Ce voyage terminé, le capitaine Nemo ne consentirait-il pas à nous rendre la liberté sous serment de ne jamais révéler son existence? Serment d'honneur que nous aurions tenu. Mais il fallait traiter cette délicate question avec le capitaine. Or, serais-je bien venu à réclamer cette liberté? Lui-même n'avait-il pas déclaré, dès le début et d'une façon formelle, que le secret de sa vie exigeait notre emprisonnement perpétuel à bord du <em>Nautilus</em>? Mon silence, depuis quatre mois, ne devait-il pas lui paraître une acceptation tacite de cette situation? Revenir sur ce sujet n'aurait-il pas pour résultat de donner des soupçons qui pourraient nuire à nos projets, si quelque circonstance favorable se présentait plus tard de les reprendre? Toutes ces raisons, je les pesais, je les retournais dans mon esprit, je les soumettais à Conseil qui n'était pas moins embarrassé que moi. En somme, bien que je ne fusse pas facile à décourager, je comprenais que les chances de jamais revoir mes semblables diminuaient de jour en jour, surtout en ce moment où le capitaine Nemo courait en téméraire vers le sud de l'Atlantique!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant les dix-neuf jours que j'ai mentionnés plus haut, aucun incident particulier ne signala notre voyage. Je vis peu le capitaine. Il travaillait. Dans la bibliothèque je trouvais souvent des livres qu'il laissait entr'ouverts, et surtout des livres d'histoire naturelle. Mon ouvrage sur les fonds sous-marins, feuilleté par lui, était couvert de notes en marge, qui contredisaient parfois mes théories et mes systèmes. Mais le capitaine se contentait d'épurer ainsi mon travail, et il était rare qu'il discutât avec moi. Quelquefois, j'entendais résonner les sons mélancoliques de son orgue, dont il jouait avec beaucoup d'expression, mais la nuit seulement, au milieu de la plus secrète obscurité, lorsque le <em>Nautilus</em> s'endormait dans les déserts de l'Océan.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant cette partie du voyage, nous naviguâmes des journées entières à la surface des flots. La mer était comme abandonnée. A peine quelques navires à voiles, en charge pour les Indes, se dirigeant vers le cap de Bonne-Espérance. Un jour nous fûmes poursuivis par les embarcations d'un baleinier qui nous prenait sans doute pour quelque énorme baleine d'un haut prix. Mais le capitaine Nemo ne voulut pas faire perdre à ces braves gens leur temps et leurs peines, et il termina la chasse en plongeant sous les eaux. Cet incident avait paru vivement intéresser Ned Land. Je ne crois pas me tromper en disant que le Canadien avait dû regretter que notre cétacé de tôle ne pût être frappé à mort par le harpon de ces pêcheurs.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Les poissons observés par Conseil et par moi, pendant cette période, différaient peu de ceux que nous avions déjà étudiés sous d'autres latitudes. Les principaux furent quelques échantillons de ce terrible genre de cartilagineux, divisé en trois sous-genres qui ne comptent pas moins de trente-deux espèces: des squales-galonnés, longs de cinq mètres, à tête déprimée et plus large que le corps, à nageoire caudale arrondie, et dont le dos porte sept grandes bandes noires parallèles et longitudinales; puis des squales-perlons, gris-cendrés, percés de sept ouvertures branchiales et pourvus d'une seule nageoire dorsale placée à peu près vers le milieu du corps.</p>", "14": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je demandai au capitaine Nemo s'il avait observé des poissons à des profondeurs plus considérables.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Des poissons? me répondit-il, rarement. Mais dans l'état actuel de la science, que présume-t-on, que sait-on?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Le voici, capitaine. On sait que en allant vers les basses couches de l'Océan, la vie végétale disparaît plus vite que la vie animale. On sait que, là où se rencontrent encore des êtres animés, ne végète plus une seule hydrophyte. On sait que les pèlerines, les huîtres vivent par deux mille mètres d'eau, et que Mac Clintock, le héros des mers polaires, a retiré une étoile vivante d'une profondeur de deux mille cinq cent mètres. On sait que l'équipage du <em>Bull-Dog</em>, de la Marine Royale, a pêché une astérie par deux mille six cent vingt brasses, soit plus d'une lieue de profondeur. Mais, capitaine Nemo, peut-être me direz vous qu'on ne sait rien?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Non, monsieur le professeur, répondit le capitaine, je n'aurai pas cette impolitesse. Toutefois, je vous demanderai comment vous expliquez que des êtres puissent vivre à de telles profondeurs?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Je l'explique par deux raisons, répondis-je. D'abord, parce que les courants verticaux, déterminés par les différences de salure et de densité des eaux, produisent un mouvement qui suffit à entretenir la vie rudimentaire des encrines et des astéries.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Ensuite, parce que, si l'oxygène est la base de la vie, on sait que la quantité d'oxygène dissous dans l'eau de mer augmente avec la profondeur au lieu de diminuer, et que la pression des couches basses contribue à l'y comprimer.</p>", "15": "<p><em>Point de navigation intermédiaire — aucun chapitre spécifique dans le roman.</em></p>", "16": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant la nuit du 13 au 14 mars, le <em>Nautilus</em> reprit sa direction vers le sud. Je pensais qu'à la hauteur du cap Horn, il mettrait le cap à l'ouest afin de rallier les mers du Pacifique et d'achever son tour du monde. Il n'en fit rien et continua de remonter vers les régions australes. Où voulait-il donc aller? Au pôle? C'était insensé. Je commençai à croire que les témérités du capitaine justifiaient suffisamment les appréhensions de Ned Land.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>[Illustration: Quand Ned rencontrait le capitaine..... (Page 321.)]</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le Canadien, depuis quelque temps, ne me parlait plus de ses projets de fuite. Il était devenu moins communicatif, presque silencieux. Je voyais combien cet emprisonnement prolongé lui pesait. Je sentais ce qui s'amassait de colère en lui. Lorsqu'il rencontrait le capitaine, ses yeux s'allumaient d'un feu sombre, et je craignais toujours que sa violence naturelle ne le portât à quelque extrémité.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ce jour-là, 14 mars, Conseil et lui vinrent me trouver dans ma chambre. Je leur demandai la raison de leur visite.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Une simple question à vous poser, monsieur, me répondit le Canadien.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Combien d'hommes croyez-vous qu'il y ait à bord du <em>Nautilus</em>?</p>", "17": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le lendemain 19 mars, à cinq heures du matin, je repris mon poste dans le salon. Le loch électrique m'indiqua que la vitesse du <em>Nautilus</em> avait été modérée. Il remontait alors vers la surface, mais prudemment, en vidant lentement ses réservoirs.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Mon cœur battait. Allions-nous émerger et retrouver l'atmosphère libre du pôle?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Non. Un choc m'apprit que le <em>Nautilus</em> avait heurté la surface inférieure de la banquise, très-épaisse encore, à en juger par la matité du bruit. En effet, nous avions «touché» pour employer l'expression marine, mais en sens inverse et par mille pieds de profondeur. Ce qui donnait deux mille pieds de glaces au-dessus de nous, dont mille émergeaient. La banquise présentait alors une hauteur supérieure à celle que nous avions relevée sur ses bords. Circonstance peu rassurante.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant cette journée, le <em>Nautilus</em> recommença plusieurs fois cette même expérience, et toujours il vint se heurter contre la muraille qui plafonnait au-dessus de lui. A de certains instants, il la rencontra par neuf cents mètres, ce qui accusait douze cents mètres d'épaisseur dont deux cents mètres s'élevaient au-dessus de la surface de l'Océan. C'était le double de sa hauteur au moment où le <em>Nautilus</em> s'était enfoncé sous les flots.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je notai soigneusement ces diverses profondeurs, et j'obtins ainsi le profil sous-marin de cette chaîne qui se développait sous les eaux.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le soir, aucun changement n'était survenu dans notre situation. Toujours la glace entre quatre cents et cinq cents mètres de profondeur. Diminution évidente, mais quelle épaisseur encore entre nous et la surface de l'Océan!</p>", "18": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le lendemain, premier avril, lorsque le <em>Nautilus</em> remonta à la surface des flots, quelques minutes avant midi, nous eûmes connaissance d'une côte à l'ouest. C'était la Terre du Feu, à laquelle les premiers navigateurs donnèrent ce nom en voyant les fumées nombreuses qui s'élevaient des huttes indigènes. Cette Terre du Feu forme une vaste agglomération d'îles qui s'étend sur trente lieues de long et quatre-vingts lieues de large, entre 53° et 56° de latitude australe, et 67° 50′ et 77° 15′ de longitude ouest. La côte me parut basse, mais au loin se dressaient de hautes montagnes. Je crus même entrevoir le mont Sarmiento, élevé de deux mille soixante-dix mètres au-dessus du niveau de la mer, bloc pyramidal de schiste, à sommet très-aigu, qui, suivant qu'il est voilé ou dégagé de vapeurs, «annonce le beau ou le mauvais temps,» me dit Ned Land.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Un fameux baromètre, mon ami.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Oui, monsieur, un baromètre naturel, qui ne m'a jamais trompé quand je naviguais dans les passes du détroit de Magellan.»</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>En ce moment, ce pic nous parut nettement découpé sur le fond du ciel. C'était un présage de beau temps. Il se réalisa.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le <em>Nautilus</em>, rentré sous les eaux, se rapprocha de la côte qu'il prolongea à quelques milles seulement. Par les vitres du salon, je vis de longues lianes, et des fucus gigantesques, ces varechs porte-poires, dont la mer libre du pôle renfermait quelques échantillons; avec leurs filaments visqueux et polis, ils mesuraient jusqu'à trois cents mètres de longueur; véritables câbles, plus gros que le pouce, très-résistants, ils servent souvent d'amarres aux navires. Une autre herbe, connue sous le nom de velp, à feuilles longues de quatre pieds, empâtées dans les concrétions coralligènes, tapissait les fonds. Elle servait de nid et de nourriture à des myriades de crustacés et de mollusques, des crabes, des seiches. Là, les phoques et les loutres se livraient à de splendides repas, mélangeant la chair du poisson et les légumes de la mer, suivant la méthode anglaise.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Sur ces fonds gras et luxuriants, le <em>Nautilus</em> passait avec une extrême rapidité. Vers le soir, il se rapprocha de l'archipel des Malouines, dont je pus, le lendemain, reconnaître les âpres sommets. La profondeur de la mer était médiocre. Je pensai donc, non sans raison, que ces deux îles, entourées d'un grand nombre d'îlots, faisaient autrefois partie des terres magellaniques. Les Malouines furent probablement découvertes par le célèbre John Davis, qui leur imposa le nom de Davis-Southern Islands. Plus tard, Richard Hawkins les appela Maiden-Islands, îles de la Vierge. Elles furent ensuite nommée Malouines, au commencement du dix-huitième siècle, par des pêcheurs de Saint-Malo, et enfin Falkland par les Anglais auxquels elles appartiennent aujourd'hui.</p>", "19": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Jusqu'au 3 avril, nous ne quittâmes pas les parages de la Patagonie, tantôt sous l'Océan, tantôt à sa surface. Le <em>Nautilus</em> dépassa le large estuaire formé par l'embouchure de la Plata, et se trouva, le 4 avril, par le travers de l'Uruguay, mais à cinquante milles au large. Sa direction se maintenait au nord, et il suivait les longues sinuosités de l'Amérique méridionale. Nous avions fait alors seize mille lieues depuis notre embarquement dans les mers du Japon.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Vers onze heures du matin, le tropique du Capricorne fut coupé sur le trente-septième méridien, et nous passâmes au large du cap Frio. Le capitaine Nemo, au grand déplaisir de Ned Land, n'aimait pas le voisinage de ces côtes habitées du Brésil, car il marchait avec une vitesse vertigineuse. Pas un poisson, pas un oiseau, des plus rapides qui soient, ne pouvaient nous suivre, et les curiosités naturelles de ces mers échappèrent à toute observation.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cette rapidité se soutint pendant plusieurs jours, et le 9 avril, au soir, nous avions connaissance de la pointe la plus orientale de l'Amérique du Sud qui forme le cap San-Roque. Mais alors le <em>Nautilus</em> s'écarta de nouveau, et il alla chercher à de plus grandes profondeurs une vallée sous-marine qui se creuse entre ce cap et Sierra Leone sur la côte africaine. Cette vallée se bifurque à la hauteur des Antilles et se termine au nord par une énorme dépression de neuf mille mètres. En cet endroit, la coupe géologique de l'Océan figure jusqu'aux petites Antilles une falaise de six kilomètres, taillée à pic, et, à la hauteur des îles du cap Vert, une autre muraille non moins considérable, qui enferment ainsi tout le continent immergé de l'Atlantide. Le fond de cette immense vallée est accidenté de quelques montagnes qui ménagent de pittoresques aspects à ces fonds sous-marins. J'en parle surtout d'après les cartes manuscrites que contenait la bibliothèque du <em>Nautilus</em>, cartes évidemment dues à la main du capitaine Nemo et levées sur ses observations personnelles.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant deux jours, ces eaux désertes et profondes furent visitées au moyen des plans inclinés. Le <em>Nautilus</em> fournissait de longues bordées diagonales qui le portaient à toutes les hauteurs. Mais, le 11 avril, il se releva subitement, et la terre nous réapparut à l'ouvert du fleuve des Amazones, vaste estuaire dont le débit est si considérable qu'il dessale la mer sur un espace de plusieurs lieues.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>L'Équateur était coupé. A vingt milles dans l'ouest restaient les Guyanes, une terre française sur laquelle nous eussions trouvé un facile refuge. Mais le vent soufflait en grande brise, et les lames furieuses n'auraient pas permis à un simple canot de les affronter. Ned Land le comprit sans doute, car il ne me parla de rien. De mon côté, je ne fis aucune allusion à ses projets de fuite, car je ne voulais pas le pousser à quelque tentative qui eût infailliblement avorté.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je me dédommageai facilement de ce retard par d'intéressantes études. Pendant ces deux journées des 11 et 12 avril, le <em>Nautilus</em> ne quitta pas la surface de la mer, et son chalut lui ramena toute une pêche miraculeuse en zoophytes, en poissons et en reptiles.</p>", "20": "<p><em>Point de navigation intermédiaire — aucun chapitre spécifique dans le roman.</em></p>", "21": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>De ces plantes colossales dont nous parlions, Conseil, Ned et moi, nous fûmes naturellement amenés à citer les animaux gigantesques de la mer. Les unes sont évidemment destinées à la nourriture des autres. Cependant, par les vitres du <em>Nautilus</em> presque immobile, je n'apercevais encore sur ces longs filaments que les principaux articulés de la division des brachioures, des lambres à longues pattes, des crabes violacés, des clios particuliers aux mers des Antilles.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Il était environ onze heures, quand Ned Land attira mon attention sur un formidable fourmillement qui se produisait à travers les grandes algues.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Eh bien, dis-je, ce sont-là de véritables cavernes à poulpes, et je ne serais pas étonné d'y voir quelques-uns de ces monstres.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Quoi! fit Conseil, des calmars, de simples calmars, de la classe des céphalopodes?</p>", "22": "<p><em>Point de navigation intermédiaire — aucun chapitre spécifique dans le roman.</em></p>", "23": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cette terrible scène du 20 avril, aucun de nous ne pourra jamais l'oublier. Je l'ai écrite sous l'impression d'une émotion violente. Depuis, j'en ai revu le récit. Je l'ai lu à Conseil et au Canadien. Ils l'ont trouvé exact comme fait, mais insuffisant comme effet. Pour peindre de pareils tableaux, il faudrait la plume du plus illustre de nos poëtes, l'auteur des <em>Travailleurs de la Mer</em>.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>J'ai dit que le capitaine Nemo pleurait en regardant les flots. Sa douleur fut immense. C'était le second compagnon qu'il perdait depuis notre arrivée à bord. Et quelle mort! Cet ami, écrasé, étouffé, brisé par le formidable bras d'un poulpe, broyé sous ses mandibules de fer, ne devait pas reposer avec ses compagnons dans les paisibles eaux du cimetière de corail!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pour moi, au milieu de cette lutte, c'était ce cri de désespoir poussé par l'infortuné qui m'avait déchiré le cœur. Ce pauvre Français, oubliant son langage de convention, s'était repris à parler la langue de son pays et de sa mère, pour jeter un suprême appel! Parmi cet équipage du <em>Nautilus</em>, associé de corps et d'âme au capitaine Nemo, fuyant comme lui le contact des hommes, j'avais donc un compatriote! Était-il seul à représenter la France dans cette mystérieuse association, évidemment composée d'individus de nationalités diverses? C'était encore un de ces insolubles problèmes qui se dressaient sans cesse devant mon esprit!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le capitaine Nemo rentra dans sa chambre, et je ne le vis plus pendant quelque temps. Mais qu'il devait être triste, désespéré, irrésolu, si j'en jugeais par ce navire dont il était l'âme et qui recevait toutes ses impressions! Le <em>Nautilus</em> ne gardait plus de direction déterminée. Il allait, venait, flottait comme un cadavre au gré des lames. Son hélice avait été dégagée, et cependant, il s'en servait à peine. Il naviguait au hasard. Il ne pouvait s'arracher du théâtre de sa dernière lutte, de cette mer qui avait dévoré l'un des siens!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Dix jours se passèrent ainsi. Ce fut le 1er mai seulement que le <em>Nautilus</em> reprit franchement sa route au nord, après avoir eu connaissance des Lucayes à l'ouvert du canal de Bahama. Nous suivions alors le courant du plus grand fleuve de la mer, qui a ses rives, ses poissons et sa température propres. J'ai nommé le Gulf-Stream.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>C'est un fleuve, en effet, qui coule librement au milieu de l'Atlantique, et dont les eaux ne se mélangent pas aux eaux océaniennes. C'est un fleuve salé, plus salé que la mer ambiante. Sa profondeur moyenne est de trois mille pieds, sa largeur moyenne de soixante milles. En de certains endroits, son courant marche avec une vitesse de quatre kilomètres à l'heure. L'invariable volume de ses eaux est plus considérable que celui de tous les fleuves du globe.</p>", "24": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le <em>Nautilus</em> continuait d'errer à l'aventure. Toute surveillance semblait bannie du bord. Je conviendrai que dans ces conditions, une évasion pouvait réussir. En effet, les rivages habités offraient partout de faciles refuges. La mer était incessamment sillonnée de nombreux steamers qui font le service entre New-York ou Boston et le golfe du Mexique, et nuit et jour parcourue par ces petites goëlettes chargées du cabotage sur les divers points de la côte américaine. On pouvait espérer d'être recueilli. C'était donc une occasion favorable, malgré les trente milles qui séparaient le <em>Nautilus</em> des côtes de l'Union.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>[Illustration: Un grand navire capéyait à petite vapeur. (Page 406.)]</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Mais une circonstance fâcheuse contrariait absolument les projets du Canadien. Le temps était fort mauvais. Nous approchions de ces parages où les tempêtes sont fréquentes, de cette patrie des trombes et des cyclones, précisément engendrés par le courant du Gulf-Stream. Affronter une mer souvent démontée sur un frêle canot, c'était courir à une perte certaine. Ned Land en convenait lui-même. Aussi rongeait-il son frein, pris d'une furieuse nostalgie que la fuite seule eût pu guérir.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Monsieur, me dit-il ce jour-là, il faut que cela finisse. Je veux en avoir le cœur net. Votre Nemo s'écarte des terres et remonte vers le nord. Mais je vous le déclare, j'ai assez du pôle Sud, et je ne le suivrai pas au pôle Nord.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—Que faire, Ned, puisqu'une évasion est impraticable en ce moment?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>—J'en reviens à mon idée. Il faut parler au capitaine. Vous n'avez rien dit, quand nous étions dans les mers de votre pays. Je veux parler, maintenant que nous sommes dans les mers du mien. Quand je songe qu'avant quelques jours, le <em>Nautilus</em> va se trouver à la hauteur de la Nouvelle-Écosse, et que là, vers Terre-Neuve, s'ouvre une large baie, que dans cette baie se jette le Saint-Laurent, et que le Saint-Laurent, c'est mon fleuve à moi, le fleuve de Québec, ma ville natale; quand je songe à cela, la fureur me monte au visage, mes cheveux se hérissent. Tenez, monsieur, je me jetterai plutôt à la mer! Je ne resterai pas ici! J'y étouffe!»</p>", "25": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>La tempête éclata dans la journée du 18 mai, précisément lorsque le <em>Nautilus</em> flottait à la hauteur de Long-Island, à quelques milles des passes de New-York. Je puis décrire cette lutte des éléments, car au lieu de la fuir dans les profondeurs de la mer, le capitaine Nemo, par un inexplicable caprice, voulut la braver à sa surface.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le vent soufflait du sud-ouest, d'abord en grand frais, c'est-à-dire avec une vitesse de quinze mètres à la seconde, qui fut portée à vingt-cinq mètres vers trois heures du soir. C'est le chiffre des tempêtes.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le capitaine Nemo, inébranlable sous les rafales, avait pris place sur la plate-forme. Il s'était amarré à mi-corps pour résister aux vagues monstrueuses qui déferlaient. Je m'y étais hissé et attaché aussi, partageant mon admiration entre cette tempête et cet homme incomparable qui lui tenait tête.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>La mer démontée était balayée par de grandes loques de nuages qui trempaient dans ses flots. Je ne voyais plus aucune de ces petites lames intermédiaires qui se forment au fond des grands creux. Rien que de longues ondulations fuligineuses, dont la crête ne déferle pas, tant elles sont compactes. Leur hauteur s'accroissait. Elles s'excitaient entre elles. Le <em>Nautilus</em>, tantôt couché sur le côté, tantôt dressé comme un mât, roulait et tanguait épouvantablement.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Vers cinq heures, une pluie torrentielle tomba, qui n'abattit ni le vent ni la mer. L'ouragan se déchaîna avec une vitesse de quarante-cinq mètres à la seconde, soit près de quarante lieues à l'heure. C'est dans ces conditions qu'il renverse des maisons, qu'il enfonce des tuiles de toits dans des portes, qu'il rompt des grilles de fer, qu'il déplace des canons de vingt-quatre. Et pourtant le <em>Nautilus</em>, au milieu de la tourmente, justifiait cette parole d'un savant ingénieur: «Il n'y a pas de coque bien construite qui ne puisse défier à la mer!» Ce n'était pas un roc résistant, que ces lames eussent démoli, c'était un fuseau d'acier, obéissant et mobile, sans gréement, sans mâture, qui bravait impunément leur fureur.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cependant j'examinais attentivement ces vagues déchaînées. Elles mesuraient jusqu'à quinze mètres de hauteur sur une longueur de cent cinquante à cent soixante quinze mètres, et leur vitesse de propagation, moitié de celle du vent, était de quinze mètres à la seconde. Leur volume et leur puissance s'accroissaient avec la profondeur des eaux. Je compris alors le rôle de ces lames qui emprisonnent l'air dans leurs flancs et le refoulent au fond des mers où elles portent la vie avec l'oxygène. Leur extrême force de pression,—on l'a calculée,—peut s'élever jusqu'à trois mille kilogrammes par pied carré de la surface qu'elles contrebattent. Ce sont de telles lames qui, aux Hébrides, ont déplacé un bloc pesant quatre-vingt-quatre mille livres. Ce sont elles qui, dans la tempête du 23 décembre 1864, après avoir renversé une partie de la ville de Yéddo, au Japon, faisant sept cents kilomètres à l'heure, allèrent se briser le même jour sur les rivages de l'Amérique.</p>", "26": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 15 mai, nous étions sur l'extrémité méridionale du banc de Terre-Neuve. Ce banc est un produit des alluvions marines, un amas considérable de ces détritus organiques, amenés soit de l'Équateur par le courant du Gulf-Stream, soit du pôle boréal, par ce contre-courant d'eau froide qui longe la côte américaine. Là aussi s'amoncellent les blocs erratiques charriés par la débâcle des glaces. Là s'est formé un vaste ossuaire de poissons, de mollusques ou de zoophytes qui y périssent par milliards.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>La profondeur de la mer n'est pas considérable au banc de Terre-Neuve. Quelques centaines de brasses au plus. Mais vers le sud se creuse subitement une dépression profonde, un trou de trois mille mètres. Là s'élargit le Gulf-Stream. C'est un épanouissement de ses eaux. Il perd de sa vitesse et de sa température, mais il devient une mer.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Parmi les poissons que le <em>Nautilus</em> effaroucha à son passage, je citerai le cycloptère d'un mètre, à dos noirâtre, à ventre orange, qui donne à ses congénères un exemple peu suivi de fidélité conjugale, un unernack de grande taille, sorte de murène émeraude, d'un goût excellent, des karraks à gros yeux, dont la tête a quelque ressemblance avec celle du chien, des blennies, ovovivipares comme les serpents, des gobies-boulerots ou goujons noirs de deux décimètres, des macroures à longue queue, brillant d'un éclat argenté, poissons rapides, aventurés loin des mers hyperboréennes.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Les filets ramassèrent aussi un poisson hardi, audacieux, vigoureux, bien musclé, armé de piquants à la tête et d'aiguillons aux nageoires, véritable scorpion de deux à trois mètres, ennemi acharné des blennies, des gades et des saumons; c'était le cotte des mers septentrionales, au corps tuberculeux, brun de couleur, rouge aux nageoires. Les pêcheurs du <em>Nautilus</em> eurent quelque peine à s'emparer de cet animal, qui, grâce à la conformation de ses opercules, préserve ses organes respiratoires du contact desséchant de l'atmosphère et peut vivre quelque temps hors de l'eau.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je cite maintenant,—pour mémoire,—des bosquiens, petits poissons qui accompagnent longtemps les navires dans les mers boréales, des ables-oxyrhinques, spéciaux à l'Atlantique septentrional, des rascasses, et j'arrive aux gades, principalement à l'espèce morue, que je surpris dans ses eaux de prédilection, sur cet inépuisable banc de Terre-Neuve.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>On peut dire que ces morues sont des poissons de montagnes, car Terre-Neuve n'est qu'une montagne sous-marine. Lorsque le <em>Nautilus</em> s'ouvrit un chemin à travers leurs phalanges pressées, Conseil ne put retenir cette observation:</p>", "27": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Or, le 25 mai, le <em>Nautilus</em>, immergé par trois mille huit cent trente-six mètres de profondeur, se trouvait précisément en cet endroit où se produisit la rupture qui ruina l'entreprise. C'était à six cent trente huit milles de la côte d'Irlande. On s'aperçut, à deux heures après-midi, que les communications avec l'Europe venaient de s'interrompre. Les électriciens du bord résolurent de couper le câble avant de le repêcher, et à onze heures du soir, ils avaient ramené la partie avariée. On refit un joint et une épissure; puis le câble fut immergé de nouveau. Mais, quelques jours plus tard, il se rompit et ne put être ressaisi dans les profondeurs de l'Océan.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Les Américains ne se découragèrent pas. L'audacieux Cyrus Field, le promoteur de l'entreprise, qui y risquait toute sa fortune, provoqua une nouvelle souscription. Elle fut immédiatement couverte. Un autre câble fut établi dans de meilleures conditions. Le faisceau de fils conducteurs isolés dans une enveloppe de gutta-percha, était protégé par un matelas de matières textiles contenu dans une armature métallique. Le <em>Great-Eastern</em> reprit la mer le 13 juillet 1866.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>L'opération marcha bien. Cependant un incident arriva. Plusieurs fois, en déroulant le câble, les électriciens observèrent que des clous y avaient été récemment enfoncés dans le but d'en détériorer l'âme. Le capitaine Anderson, ses officiers, ses ingénieurs, se réunirent, délibérèrent, et firent afficher que si le coupable était surpris à bord, il serait jeté à la mer sans autre jugement. Depuis lors, la criminelle tentative ne se reproduisit plus.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le 23 juillet, le <em>Great-Eastern</em> n'était plus qu'à huit cents kilomètres de Terre-Neuve, lorsqu'on lui télégraphia d'Irlande la nouvelle de l'armistice conclu entre la Prusse et l'Autriche après Sadowa. Le 27, il relevait au milieu des brumes le port de Heart's Content. L'entreprise était heureusement terminée, et par sa première dépêche, la jeune Amérique adressait à la vieille Europe ces sages paroles si rarement comprises: «Gloire à Dieu dans le ciel, et paix aux hommes de bonne volonté sur la terre.»</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je ne m'attendais pas à trouver le câble électrique dans son état primitif, tel qu'il était en sortant des ateliers de fabrication. Le long serpent, recouvert de débris de coquilles, hérissé de foraminifères, était encroûté dans un empâtement pierreux qui le protégeait contre les mollusques perforants. Il reposait tranquillement, à l'abri des mouvements de la mer, et sous une pression favorable à la transmission de l'étincelle électrique qui passe de l'Amérique à l'Europe en trente-deux centièmes de seconde. La durée de ce câble sera infinie sans doute, car on a observé que l'enveloppe de gutta-percha s'améliore par son séjour dans l'eau de mer.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>D'ailleurs, sur ce plateau si heureusement choisi, le câble n'est jamais immergé à des profondeurs telles qu'il puisse se rompre. Le <em>Nautilus</em> le suivit jusqu'à son fond le plus bas, situé par quatre mille quatre cent trente et un mètres, et là, il reposait encore sans aucun effort de traction. Puis, nous nous rapprochâmes de l'endroit où avait eu lieu l'accident de 1863.</p>", "28": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>S'il voulait entrer en Manche, il lui fallait prendre franchement à l'est. Il ne le fit pas.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Pendant toute la journée du 31 mai, le <em>Nautilus</em> décrivit sur la mer une série de cercles qui m'intriguèrent vivement. Il semblait chercher un endroit qu'il avait quelque peine à trouver. A midi, le capitaine Nemo vint faire son point lui-même. Il ne m'adressa pas la parole. Il me parut plus sombre que jamais. Qui pouvait l'attrister ainsi? Était-ce sa proximité des rivages européens? Sentait-il quelque ressouvenir de son pays abandonné? Qu'éprouvait-il alors? des remords ou des regrets? Longtemps cette pensée occupa mon esprit, et j'eus comme un pressentiment que le hasard trahirait avant peu les secrets du capitaine.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le lendemain, 31 juin, le <em>Nautilus</em> conserva les mêmes allures. Il était évident qu'il cherchait à reconnaître un point précis de l'Océan. Le capitaine Nemo vint prendre la hauteur du soleil, ainsi qu'il avait fait la veille. La mer était belle, le ciel pur. A huit milles dans l'est, un grand navire à vapeur se dessinait sur la ligne de l'horizon. Aucun pavillon ne battait à sa corne, et je ne pus reconnaître sa nationalité.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le capitaine Nemo, quelques minutes avant que le soleil passât au méridien, prit son sextant et observa avec une précision extrême. Le calme absolu des flots facilitait son opération. Le <em>Nautilus</em> immobile ne ressentait ni roulis ni tangage.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>J'étais en ce moment sur la plate-forme. Lorsque son relèvement fut terminé, le capitaine prononça ces seuls mots:</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Il redescendit par le panneau. Avait-il vu le bâtiment qui modifiait sa marche et semblait se rapprocher de nous? Je ne saurais le dire.</p>", "29": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je revins au salon. Le panneau se ferma, et j'entendis les sifflements de l'eau dans les réservoirs. Le <em>Nautilus</em> commença de s'enfoncer, suivant une ligne verticale, car son hélice entravée ne lui communiquait plus aucun mouvement.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Quelques minutes plus tard, il s'arrêtait à une profondeur de huit cent trente-trois mètres et reposait sur le sol.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le plafond lumineux du salon s'éteignit alors, les panneaux s'ouvrirent, et à travers les vitres, j'aperçus la mer vivement illuminée par les rayons du fanal dans un rayon d'un demi-mille.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je regardai à bâbord et je ne vis rien que l'immensité des eaux tranquilles.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Par tribord, sur le fond, apparaissait une forte extumescence qui attira mon attention. On eût dit des ruines ensevelies sous un empâtement de coquilles blanchâtres comme sous un manteau de neige. En examinant attentivement cette masse, je crus reconnaître les formes épaissies d'un navire, rasé de ses mâts, qui devait avoir coulé par l'avant. Ce sinistre datait certainement d'une époque reculée. Cette épave, pour être ainsi encroûtée dans le calcaire des eaux, comptait déjà bien des années passées sur ce fond de l'Océan.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Quel était ce navire? Pourquoi le <em>Nautilus</em> venait-il visiter sa tombe? N'était-ce donc pas un naufrage qui avait entraîné ce bâtiment sous les eaux?</p>", "30": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Puis, une pensée soudaine me terrifia. Le capitaine Nemo avait quitté sa chambre. Il était dans ce salon que je devais traverser pour fuir. Là, je le rencontrerais une dernière fois. Il me verrait, il me parlerait peut-être! Un geste de lui pouvait m'anéantir, un seul mot, m'enchaîner à son bord!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Cependant, dix heures allaient sonner. Le moment était venu de quitter ma chambre et de rejoindre mes compagnons.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Il n'y avait pas à hésiter, dût le capitaine Nemo se dresser devant moi. J'ouvris ma porte avec précaution, et cependant, il me sembla qu'en tournant sur ses gonds, elle faisait un bruit effrayant. Peut-être ce bruit n'existait-il que dans mon imagination!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je m'avançai en rampant à travers les coursives obscures du <em>Nautilus</em>, m'arrêtant à chaque pas pour comprimer les battements de mon cœur.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>J'arrivai à la porte angulaire du salon. Je l'ouvris doucement. Le salon était plongé dans une obscurité profonde. Les accords de l'orgue résonnaient faiblement. Le capitaine Nemo était là. Il ne me voyait pas. Je crois même qu'en pleine lumière, il ne m'eût pas aperçu, tant son extase l'absorbait tout entier.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Je me traînai sur le tapis, évitant le moindre heurt dont le bruit eût pu trahir ma présence. Il me fallut cinq minutes pour gagner la porte du fond qui donnait sur la bibliothèque.</p>", "31": "<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur ces dangereux parages de la côte norwégienne? Le <em>Nautilus</em> était-il entraîné dans ce gouffre, au moment ou notre canot allait se détacher de ses flancs?</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>On sait qu'au moment du flux, les eaux resserrées entre les îles Féroë et Loffoden sont précipitées avec une irrésistible violence. Elles forment un tourbillon dont aucun navire n'a jamais pu sortir. De tous les points de l'horizon accourent des lames monstrueuses. Elles forment ce gouffre justement appelé le «Nombril de l'Océan,» dont la puissance d'attraction s'étend jusqu'à une distance de quinze kilomètres. Là sont aspirés non-seulement les navires, mais les baleines, mais aussi les ours blancs des régions boréales.</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>C'est là que le <em>Nautilus</em>,—involontairement ou volontairement peut-être,—avait été engagé par son capitaine. Il décrivait une spirale dont le rayon diminuait de plus en plus. Ainsi que lui, le canot, encore accroché à son flanc, était emporté avec une vitesse vertigineuse. Je le sentais. J'éprouvais ce tournoiement maladif qui succède à un mouvement de giration trop prolongé. Nous étions dans l'épouvante, dans l'horreur portée à son comble, la circulation suspendue, l'influence nerveuse annihilée, traversés de sueurs froides comme les sueurs de l'agonie! Et quel bruit autour de notre frêle canot! Quels mugissements que l'écho répétait à une distance de plusieurs milles! Quel fracas que celui de ces eaux brisées sur les roches aiguës du fond, là où les corps les plus durs se brisent, là où les troncs d'arbres s'usent et se font «une fourrure de poils,» selon l'expression norvégienne!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>[Illustration: Le canot lancé au milieu du tourbillon. (Page 432.)]</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>Quelle situation! Nous étions ballottés affreusement. Le <em>Nautilus</em> se défendait comme un être humain. Ses muscles d'acier craquaient. Parfois il se dressait, et nous avec lui!</p>\n<p style='margin-bottom:1.5rem;line-height:2.0;font-size:1.25rem;'>«Il faut tenir bon, dit Ned, et revisser les écrous! En restant attachés au <em>Nautilus</em>, nous pouvons nous sauver encore...!»</p>"};

    btn.classList.remove("loading");

    }
    document.getElementById("hudModalTitle").innerHTML = titre;
    openHudModal(content);
  }, 1800);
});
