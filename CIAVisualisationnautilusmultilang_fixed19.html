pan><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Manchot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Pétrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pôle Sud</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, de nombreuses découvertes scientifiques ont été réalisées par des savants tels que Georges Cuvier, Jean-Baptiste Lamarck, Charles Darwin et Henri Marie Ducrotay de Broglie (Lacépède) dans les domaines de la zoologie marine, de la géographie, de la chimie et de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la zoologie marine, des expéditions scientifiques ont permis de découvrir de nouvelles espèces d'animaux marins, notamment dans les eaux du Pacifique Sud. En 1869, l'expédition française de Jules Dumont d'Urville a exploré la Terre Adélie et la Terre Louis-Philippe en Antarctique, découvrant une grande variété de faune marine inconnue jusqu'alors.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué des recherches pionnières sur les électroaimants et la génération d'électricité à partir de sources naturelles telles que les courants marins. En 1865, il a démontré que l'électricité pouvait être utilisée pour produire des effets mécaniques, ce qui a ouvert la voie à de nombreuses applications pratiques de l'électricité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les progrès ont été faits dans le domaine des analyses chimiques et de la synthèse de nouveaux composés. En 1867, Jean-Baptiste Dumas a découvert l'azote az</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pôle Sud</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Dans le roman \"20 000 lieues sous les mers\", Jules Verne décrit Nemo comme un homme savant qui a mis au point une machine extraordinaire, le Nautilus, capable de plonger dans l'océan et de se déplacer à grande vitesse. Aujourd'hui, les sous-marins existent réellement et sont utilisés pour des recherches scientifiques, la guerre navale ou l'exploration marine profonde. Mais contrairement au Nautilus fictif, les sous-marins modernes nécessitent un équipage, ont une structure plus conventionnelle et ne disposent pas de toutes les caractéristiques fantastiques que possède le Nautilus dans le roman. Par exemple, il n'y a pas encore de sous-marin qui puisse se déplacer à la vitesse du Nautilus ou qui puisse rester en mer pendant des siècles sans être ravitaillé.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Dans le roman, les océans sont décrits comme étant peu connus et peu explorés, avec de nombreuses espèces marines inconnues pour les humains. Aujourd'hui, l'exploration marine est beaucoup plus avancée et nous connaissons bien plus sur les océans et leurs habitants. Cependant, les océans sont actuellement menacés par plusieurs facteurs, tels que le réchauffement climatique, la pollution, la surpêche et l'introduction d'espèces invasives. Par exemple, le réchauffement global a déjà entraîné une augmentation des températures de l'océan, ce qui peut avoir des effets négatifs sur les espèces marines et les écosystèmes marins. De plus, la pollution marine est un problème majeur, avec de nombreux déchets plastiques et autres polluants qui se retrouvent dans l'océan et ont des effets négatifs sur les espèces marines et les humains. Enfin, la surpêche peut également avoir des effets négatifs sur les populations de poissons et d'autres animaux marins, avec une surpêche excessive pouvant entraîner l'extinction de certaines espèces.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En comparant le monde marin décrit dans \"20 000 lieues sous les mers\" à celui de nos jours, il est clair que nous avons beaucoup plus de connaissances sur les océans et leurs habitants aujourd'hui, mais que les océans sont également menacés par plusieurs facteurs. Les découvertes scientifiques dans le domaine de la marine ont permis d'améliorer notre compréhension des océans et de leur biodiversité, mais nous avons également besoin de prendre des mesures pour protéger les océans et leurs habitants contre les menaces que font face.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>South Pole</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“This D’Urville was one of your great sailors,” said the Captain to me,</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“one of your most intelligent navigators. He is the Captain Cook of you</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Frenchmen. Unfortunate man of science, after having braved the icebergs</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>of the South Pole, the coral reefs of Oceania, the cannibals of the</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Fin Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Triton shell</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Sea butterfly</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>⭐ Starfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Jellyfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Soft coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral formation</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Walrus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Manatee</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Sea lion</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatross</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South Pole</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the most influential figures in natural history was Georges Cuvier, a French zoologist and paleontologist who played a crucial role in establishing comparative anatomy as a discipline. He made numerous contributions to marine zoology, including classifying over 40,000 species during his career.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin's groundbreaking work \"On the Origin of Species\" was published in 1859, but its ideas were already shaping scientific thought in the 1860s. Darwin proposed the theory of evolution by natural selection, which revolutionized understanding of life on Earth and had far-reaching implications for geography, biology, and anthropology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable scientist was Jean Baptiste de Lamarck, who developed the concept of inheritance of acquired characteristics, although his ideas were later disproven. Nonetheless, he contributed to the development of evolutionary theory.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of electricity, Michael Faraday conducted extensive research on electromagnetism and electrochemistry in the 1830s and 1840s. His discoveries included the principles of electromagnetic induction and the creation of the first electric motor and generator.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in advancing knowledge during this period. The French explorer Jules Dumont d'Urville, mentioned in the passage, led several voyages of discovery, including two to the Antarctic region (1837-1840 and 1840-1842). His second voyage resulted in the first confirmed sighting of the Antarctic continent by a European.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ South Pole</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Comparison between Jules Verne's depiction of science, technology, and marine ecology in 1866 (as portrayed in \"20,000 Leagues Under the Sea\") and current scientific reality (2025) can be broken down into two main axes:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- In 1866, Nemo's Nautilus was an imaginative representation of advanced technology for its time, featuring underwater exploration capabilities, advanced weaponry, and a library filled with books on various scientific disciplines. Today, the real-world counterpart to this would be modern submarines equipped with sonar systems, deep-sea robots, and high-tech laboratories. However, unlike Nemo's Nautilus, these vessels are powered by electricity rather than mysterious energy sources like 'crystal gas.'</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- In the novel, Captain Nemo is portrayed as a brilliant but misunderstood scientist who has mastered various scientific fields, including marine biology and geology. Today, such multidisciplinary expertise would be more common among teams of researchers rather than individuals due to the sheer complexity and vastness of these fields. Additionally, modern science relies heavily on computers, artificial intelligence, and satellite technology for data collection and analysis, which were not available in 1866.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- In 1866, Verne's description of the marine life encountered by Nemo's Nautilus primarily focused on various whale species (whale, porpoise, cetacean), a ray, mussels, triton shell, and sea butterflies. While these organisms do exist in today's oceans, their populations have significantly changed due to factors such as warming, pollution, overfishing, and habitat destruction. For instance, fin whales were once hunted almost to extinction but are now recovering thanks to international conservation efforts.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Today, the state of the world's oceans is a cause for concern. Overfishing has depleted many fish stocks, leading to declines in biodiversity and disrupting food chains. Pollution, particularly plastic waste, poses a significant threat to marine life, with estimates suggesting that there could be more plastic than fish in the sea by 2050 if current trends continue. Climate change has also resulted in ocean warming and acidification, which negatively impact marine ecosystems and contribute to coral reef degradation.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's depiction of science and technology in \"20,000 Leagues Under the Sea\" was imaginative and forward-thinking for its time, modern advancements have surpassed these ideas in many ways. On the other hand, the state of today's oceans and marine life has drastically changed due to human activities such as overfishing, pollution, and climate change, posing significant challenges that need to be addressed through conservation efforts and sustainable practices.</p></div>\n          </div>\n        </div>"}}, "18": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Horn (retour)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>L'Atlantique! vaste étendue d'eau dont la superficie couvre vingt-cinq</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>millions de milles carrés, longue de neuf mille milles sur une</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>largeur moyenne de deux mille sept cents. Importante mer presque</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ignorée des anciens, sauf peut-être  color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Formation coralligène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Dugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Tortue marine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le XIXe siècle a vu de nombreuses découvertes scientifiques remarquables sur la base du passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Des explorations marines ont été menées pour étudier la faune et la flore des océans, notamment l'Atlantique. Les naturalistes français comme Cuvier, Lacépède et Duméril ont contribué à la connaissance de la biodiversité marine en collectant et classifiant des milliers d'espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le XIXe siècle a également vu de nombreuses avancées dans le domaine de l'électricité, notamment grâce aux travaux de Michael Faraday. Il a découvert les lois électromagnétiques et a inventé le générateur électrique à aimant permanent, qui a permis d'utiliser l'énergie électrique pour alimenter des lampes électriques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Les explorations scientifiques ont également contribué à la connaissance de la géographie mondiale. Des expéditions telles que celle de Charles Darwin sur le Beagle ont permis de découvrir et de documenter de nouvelles terres, notamment en Amérique du Sud. De plus, les cartes marines ont été améliorées grâce à des instruments tels que la sonde marine et le théodolite.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chimie : Les avancées dans le domaine de la chimie ont également eu un impact important sur la connaissance du monde. Des scientifiques comme Lavoisier, Gay-Lussac et Berzelius ont contribué à la compréhension des lois chimiques et des équations chim</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn (retour)</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo avait une connaissance approfondie de l'océan Atlantique pour son temps, mais il ignorait certaines caractéristiques importantes que nous avons découvertes aujourd'hui grâce à la science moderne. Par exemple, il ne savait pas que l'Atlantique est divisé en trois principaux bassins : le Nord-Atlantique, le Sud-Atlantique et le Bassin Antarctique. Aujourd'hui, grâce à des technologies telles que les sonars et les sondages océanographiques, nous avons une connaissance plus précise de la géographie sous-marine de l'océan Atlantique, y compris ses fonds marins, montagnes sous-marines et plateaux continentaux.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière de navigation, Nemo utilisait des instruments tels que le chronomètre nautique pour déterminer sa position, mais il ignorait l'existence de la technologie GPS qui est largement utilisée aujourd'hui pour naviguer sur mer. De plus, Nemo ne savait pas que les océans sont pleins d'écosystèmes marins profonds qui ont été découverts grâce à des expéditions sous-marines et des robots sous-marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, l'océan Atlantique était relativement peu connu et peu étudié, et il est probable que Nemo n'ait pas été au courant de la pollution ou des problèmes environnementaux qui affectent les océans aujourd'hui. Aujourd'hui, nous savons que l'océan Atlantique est menacé par la pollution marine, le réchauffement climatique et la surpêche. Par exemple, il y a une grande quantité de déchets plastiques qui ont été jetés dans les océans et qui peuvent être mortels pour les espèces marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière d'espèces, Nemo observait des espèces telles que la baleine, le requin, le squale, la raie, le saumon, la morue, la rémora et le labre. Aujourd'hui, certains de ces animaux sont menacés ou ont disparu entièrement en raison de la pollution, du réchauffement climatique et de la surpêche. Par exemple, certaines espèces de baleines ont été chassées presque jusqu'à l'extinction au XIXe siècle, mais grâce aux efforts de conservation, leur population a commencé à se reconstituer. Cependant, d'autres espèces telles que les tortues marines et les manchots sont toujours menacées par la pollution marine et le réchauffement climatique.</p><p style='margin:0 0 14px 0; font-size:1.3r 9f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's novel \"20,000 Leagues Under the Sea,\" published in 1866, Captain Nemo had a remarkable understanding of marine science for his time. He was familiar with various marine species such as whales, sharks, rays, and salmon, and he had a basic knowledge of oceanography, geology, and hydrography. However, compared to the present day (2025), the scientific advancements are significant.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 2025, our understanding of the oceans has grown exponentially. Modern submarines, remotely operated vehicles (ROVs), and autonomous underwater vehicles (AUVs) have allowed us to explore deeper parts of the ocean than Nemo ever imagined. These advanced technologies have led to groundbreaking discoveries such as hydrothermal vents, deep-sea ecosystems, and even new species yet undiscovered in 1866. Furthermore, advancements in marine biology, genetics, and oceanography have provided a wealth of knowledge about marine life, their behaviors, and the complex interconnections between various marine ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, when Verne wrote \"20,000 Leagues Under the Sea,\" the state of the oceans was relatively pristine compared to today (2025). At that time, the ocean's ecosystems were largely unaffected by human activities. However, over the past 150 years, numerous threats have emerged that have significantly impacted marine life and the overall health of the world's oceans.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Today, the oceans face numerous challenges such as global warming, pollution, overfishing, and habitat destruction. Rising ocean temperatures are causing coral reef bleaching events, which devastate entire ecosystems and threaten countless species with extinction. Pollution, both from land-based sources and marine activities, is also a significant issue, with plastic waste posing a major threat to marine life. Overfishing has depleted many fish populations, disrupting food chains and leading to the decline of various species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to Nemo's time, today's oceans are home to numerous endangered species, including blue whales, sea turtles, and polar bears. The loss of these iconic creatures would have far-reaching consequences for the global ecosystem, highlighting the urgent need for conservation efforts to protect our oceans and the life they support.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Captain Nemo had a remarkable understanding of marine science for his time in Jules Verne's novel \"20,000 Leagues Under the Sea,\" published in 1866, modern advancements in technology and scientific knowledge have greatly expanded our understanding of the oceans. However, today's oceans face numerous challenges such as global warming, pollution, overfishing, and habitat destruction, which have led to the decline of many marine species and the need for increased conservation e ; border-radius:20px;font-size:1.3rem;'>🌿 Pentacrine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Troque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Fissurelle</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Physalie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Laminaire</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Hydrophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annélide</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Martinique et Guadeloupe</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, la zoologie marine a connu de nombreuses avancées grâce aux explorations marines et à l'étude de nouvelles espèces. Le naturaliste français Georges Cuvier (1769-1832) est considéré comme le père de la paléontologie et de la comparative anatomie, mais son travail a également eu une influence significative sur la zoologie marine. En Amérique du Nord, le naturaliste américain Louis Agassiz (1807-1873) a étudié la faune maritime des États-Unis et a découvert de nombreuses nouvelles espèces de poissons, crustacés et mollusques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday (1791-1867) est considéré comme un des plus grands scientifiques du XIXe siècle. Il a découvert les lois de l'électrolyse et a inventé plusieurs appareils électriques tels que la dynamo, le générateur à induction et la pile Faraday. Ses travaux ont été fondamentaux pour le développement des technologies électriques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière de géographie marine, l'exploration du golfe du Mexique et des Antilles a été menée par plusieurs expéditions scientifiques au cours du XIXe siècle. En 1864, l'expédition américaine de la United States Coast Survey a exploré les côtes du golfe du Mexique et a cartographié les eaux profondes des Caraïbes. L'expédition française de l'Académie</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Martinique et Guadeloupe</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo possédait une connaissance avancée de la profondeur des mers car il mentionne la moyenne de 1800 mètres pour les mers des Antilles et du Golfe du Mexique, ce qui correspond à des mesures modernes. Cependant, son navire, le Nautilus, est équipé d'une technologie fictive, tels que l'antigravité, la propulsion électrique et les rayons de la Lunette, qui n'existent pas dans notre monde réel.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 2025, nous avons acquis une connaissance plus approfondie des océans et de leur géographie, grâce à l'utilisation de sonars et de satellite. Les mers des Antilles et du Golfe du Mexique sont bien connues pour leur biodiversité exceptionnelle, mais aussi pour leurs risques écologiques tels que la surpêche, la pollution marine et le réchauffement climatique.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Jules Verne décrit une variété de espèces marines telles que le narval, le cétacé, la raie, le spare, le poisson perroquet, le gobie, le poulpe, et le calmar. Cependant, il n'y a pas de preuves d'une attaque de calamar géant colossal de huit mètres de longueur comme décrit dans le roman.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Aujourd'hui, les océans sont en voie de dégradation en raison du réchauffement climatique, de la pollution marine et de la surpêche. De nombreuses espèces marines sont menacées ou ont disparu entièrement, comme le narval qui est classé vulnérable par l'Union internationale pour la conservation de la nature (UICN). Les cétacés, les raies et les poissons perroquets sont également soumis à des pressions importantes. En revanche, les poupons, les calmar et les gobi sont plus résistants aux changements environnementaux.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Martinique and Guadeloupe</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of th ctricity and electromagnetism. He discovered electromagnetic induction, which is essential for transforming mechanical energy into electrical energy and vice versa. His work laid the foundation for electric power generation and transmission systems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: During the 19th century, geographical expeditions were crucial for exploring and mapping new territories, including the islands of Martinique and Guadeloupe mentioned in the passage. Notable expeditions include those led by British explorer Charles Darwin (1809-1882) on the HMS Beagle and French explorer Jules Dumont d'Urville (1790-1842). Their work contributed to our understanding of geography, geology, and biogeography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: German chemist Friedrich</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Martinique and Guadeloupe</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: What Nemo knew/imagined versus current discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine technology: In 20,000 Leagues Under the Sea (1866), Jules Verne depicted Captain Nemo's Nautilus as a highly advanced submarine equipped with innovative features like underwater propulsion and sonar-like capabilities to detect marine life. While Nemo's Nautilus was a work of fiction, modern-day submersibles share some similarities in terms of underwater exploration and navigation. However, contemporary submersibles are even more advanced, utilizing cutting-edge technology such as high-resolution imaging systems, robotic arms for sample collection, and autonomous operation for extended periods underwater.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine biology: Verne described various marine species encountered by the Nautilus crew, including giant squid, narwhals, cetaceans, rays, sparidae, parrotfish, goby, octopus, and squid. In 1866, knowledge about these creatures was limited compared to today's understanding. For instance, the giant squid mentioned by Verne was not officially described until 1925, more than half a century after the publication of the novel. Today, scientists have made significant advancements in marine biology, particularly through the use of DNA sequencing and non-invasive tagging techniques to study species' behavior and population dynamics.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of oceans and species in 1866 vs today (warming, pollution, overfishing, endangered species)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Ocean health: In 1866, the state of the world's oceans was relatively unknown compared to today. The industrial revolution had not yet reached its peak, and human activities like pollution and overfishing were less prevalent. However, Verne did hint at environmental concerns through his descriptions of marine life-threatening organisms (e.g., giant squid) and the impact they might have on ecosystems. Today, oceans face numerous threats due to climate change, pollution, overfishing, and habitat destruction, leading to declining populations of many marine species and altering ocean ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Endangered species: In 1866, there were no global conservation efforts or legal protections for endangered marine species. Today, numerous organizations and international agreements work to protect threatened marine life, such as the Convention on International Trade in Endangered Species of Wild Fauna and Flora (CITES) and the Marine Mammal Protection Act. Despite these efforts, many marine species remain endangered or vulnerable due to ongoing threats like overfishing, pollution, and climate change.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's 1866 depiction of underwater life and technology in 20,000 Leagues Under the Sea was imaginative and prescient in some ways, contemporary science and marine ecology have made significant advancements that far surpass Nemo's Nautilus and our understanding of ocean ecosystems. However, modern oceans face numerous challenges like climate change, pollution, overfishing, and habitat destruction, which threaten the health and biodiversity of marine environments.</p></div>\n          </div>\n        </div>"}}, "22": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Amérique Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <
