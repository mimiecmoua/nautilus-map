5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Manche</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont marqué l'histoire des sciences. Dans ce passage, on peut identifier trois disciplines : la zoologie marine, l'électricité et la géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Le passage fait référence à des vêtements spécifiques pour plonger dans les eaux profondes, qui sont différents de ceux inventés au XVIIIe siècle. À cette époque, les savants comme Cuvier et Lacépède ont contribué à la connaissance de la faune maritime en réalisant de nombreuses descriptions et classifications d'espèces marines. En 1862, un biologiste français, Alphonse Milne-Edwards, a fondé le Muséum national d'histoire naturelle de Toulon pour étudier les espèces méditerranéennes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le passage mentionne des lamelles de cuivre qui protègent contre la poussée des eaux, ce qui peut être lié à l'utilisation de matériaux isolants pour protéger les humains lorsqu'ils travaillent avec de l'électricité. Michael Faraday, un scientifique anglais célèbre pour ses travaux sur l'électricité et le magnétisme, a découvert la loi de Faraday en 1834 qui établit une relation entre la force électromotrice et l'intensité du courant électrique.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Le passage suggère que les vêtements sont adaptés pour naviguer dans des eaux profondes, ce qui implique une</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Manche</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences et technologie : Nemo, le capitaine du Nautilus dans \"20 000 lieues sous les mers\" de Jules Verne, imaginait des vêtements de plongée très avancés pour son époque en 1866.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Il s'agissait d'une combinaison de cuir et de métal qui permettait à l'utilisateur de respirer sous l'eau.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Aujourd'hui, les vêtements de plongée ont évolué considérablement grâce aux progrès de la technologie.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les combinaisons modernes sont en matériaux synthétiques, plus légers et plus résistants que le cuir.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Elles sont équipées de systèmes de respiration autonome (AID) qui permettent à l'utilisateur de rester sous l'eau pendant des périodes prolongées sans avoir besoin d'un tuyau relié à la surface.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les combinaisons modernes sont également équipées de lumière, de caméras et de systèmes de communication pour faciliter les plongées profondes.\n2.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Écologie marine : en 1866, lorsque Jules Verne écrivait \"20 000 lieues sous les mers\", les océans étaient beaucoup plus sains que ce qu'ils sont aujourd'hui.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les niveaux de pollution et de surpêche étaient relativement bas, et il y avait encore une grande diversité d'espèces marines dans les eaux profondes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Aujourd'hui, les océans sont menacés par le réchauffement climatique, la pollution marine, la surpêche et les espèces invasives.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les niveaux de CO2 dans l'atmosphère ont entraîné un élevage des températures océaniques, ce qui a provoqué la disparition de nombreuses espèces marines sensibles aux changements climatiques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>La pollution marine est également une grande préoccupation car elle peut avoir des effets nocifs sur les espèces marines et les écosystèmes océaniques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les déchets plastiques, en particulier, sont une source importante de pollution marine car ils peuvent être ingérés par les animaux marins et entraîner leur mort.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>La surpêche est également un problème important car elle peut entraîner la disparition de certaines espèces marines et perturber les écosystèmes océaniques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les espèces invasives sont également une source importante de perturbation des écosystèmes océaniques car elles peuvent concurrencer les espèces indigènes pour la nourriture, l'habitat et les ressources.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>English Channel</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The man with the soft calm eyes listened to me quietly, even politely, and with extreme attention; but nothing in his countenance indicated that he had understood my story. When I finished, he said not a word. There remained one resource, to speak English. Perhaps they would know this almost universal language. I knew it, as well as the German language,—well enough to read it fluently, but not to speak it correctly.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inli  was later disproven.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: Michael Faraday (1791-1867), a British scientist, made groundbreaking contributions to the field of electricity and magnetism. He discovered electromagnetic induction, which is the basis for transformers and generators used in electric power stations today. His experiments with electrolysis led to the isolation of elements like iodine and chlorine.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Scientific Expeditions: In the context of the passage, it's worth mentioning the Challenger Expedition (1872-1876), a British scientific expedition that aimed to</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ English Channel</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Comparison between Jules Verne's description of the Nautilus submarine in 1866 and contemporary science and technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 2025, the advancements in underwater technology significantly surpass those imagined by Jules Verne in his novel \"20,000 their behavior, ecology, and interactions with their environment was limited.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Today, the state of marine ecosystems is significantly impacted by human activities such as climate change, pollution, overfishing, and habitat destruction. Warming ocean temperatures are causing coral bleaching events, acidification, and shifts in species distributions. Pollution, particularly plastic waste, poses a significant threat to marine life, with numerous species ingesting or becoming entangled in discarded materials. Overfishing has led to the depletion of many fish populations, threatening food security and ecosystem balance. Endangered species lists have grown significantly due to these factors, highlighting the need for conservation efforts to protect marine biodiversity.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to Verne's time, modern marine biology employs advanced technology such as satellite tagging, DNA barcoding, and remote sensing to study marine ecosystems. This allows scientists to monitor species populations, track migration patterns, and assess the impacts of human activities on marine life. However, much work remains to be done to address the pressing challenges facing our oceans today.</p></div>\n          </div>\n        </div>"}}, "29": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Angleterre Sud</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Sud</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, la découverte scientifique a connu une forte impulsion, notamment en zoologie marine, géographie et chimie. Louis Agassiz, un savant suisse, a étudié les glaciers et les fossiles marins dans le Nord de l'Amérique du Nord, apportant des preuves significatives de la théorie de la glaciations. En Angleterre, Charles Darwin a publié son ouvrage majeur \"L'Origine des espèces\" en 1859, qui a établi les bases de l'évolution par sélection naturelle. Au même moment, en France, Georges Cuvier et Jean-Baptiste Lamarck ont également contribué à la compréhension de l'évolution des espèces.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière d'électricité, Michael Faraday a effectué des expériences importantes sur les électroaimants et la génération d'électricité. Il a notamment inventé le premier transformateur électrique en 1831. Dans le domaine de la géographie, l'expédition du HMS Challenger (1872-1876) a exploré les océans et les mers profondes à travers le monde, dé 95; color:#c8d8e8;'>Modern submarines, like the nuclear-powered vessels used by naval forces, can dive deeper and stay submerged for longer periods than the Nautilus. Additionally, the use of sonar technology allows current submarines to map the ocean floor, detect underwater objects, and navigate with precision. Furthermore, advancements in robotics have led to the development of autonomous underwater vehicles (AUVs) capable of conducting extensive research missions without human intervention.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of science, Nemo's understanding of marine biology is limited, as he only exhibits knowledge about a few marine species. In contrast, contemporary marine scientists have made significant strides in understanding ocean ecosystems and the behavior of various marine organisms, thanks to advancements in genetics, biochemistry, and marine ecology.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>The state of the oceans and marine life in 1866, as depicted by Verne, is largely pristine, with diverse marine species thriving in their natural habitats. However, the reality of today's oceans presents a stark contrast due to human activities such as overfishing, pollution, and climate change.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Overfishing has led to depleted fish stocks and altered ecosystem dynamics, threatening numerous marine species. In 2025, many fish populations are still overexploited, while others have become endangered or extinct. Marine pollution, particularly plastic waste, poses a significant threat to ocean health, with microplastics found in various marine organisms and habitats.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Climate change has also had profound effects on the oceans, leading to rising sea temperatures, ocean acidification, and altered current patterns. These changes have disrupted marine ecosystems, causing coral bleaching events, shifts in species distributions, and impacts on food webs.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Captain Nemo's submarine and knowledge of marine technology in Jules Verne's novel are impressive for their time, they pale in comparison to the advancements made in the 169 years since its publication. Similarly, the pristine oceans described by Verne contrast sharply with the degraded state of today's oceans due to human activities such as overfishing, pollution, and climate change.</p></div>\n          </div>\n        </div>"}}, "30": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Angleterre Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Les savants de l'époque ont fait des avancées importantes dans le domaine de la zoologie marine, notamment Louis Agassiz en Suisse et Jean-Baptiste Lamarck en France. Ils ont étudié les cétacés et ont décrit des espèces nouvelles, comme le baleine bleue et le rorqual.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière d'électricité, Michael Faraday en Angleterre a effectué de nombreuses expériences sur l'induction électromagnétique et la pile électrique. Il a inventé le générateur électromotrice et a étudié les propriétés des courants électriques alternatifs et continus.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la géographie, l'expédition Challenger (1872-1876) a collecté des données sur les mers du monde entier, incluant celles du Pacifique. Elle a étudié les profondeurs, la topographie marine et la faune marine, y compris les cétacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la chimie, Marcellin Berthelot en France a effectué des recherches sur la chimie organique et la chimie physique. Il a étudié les réactions chimiques et a développé des méthodes pour déterminer les compositions de certains gaz.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant cette période, les expéditions scientifiques ont utilisé divers instruments, tels que les microscopes, les thermomètres, les baromètres</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Contour Angleterre Nord</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, était un pionnier de la science-fiction dans son utilisation de technologies avancées pour l'exploration marine. Il possédait une connaissance avancée des sciences marines de son époque, mais il imaginait des technologies qui n'existaient pas encore ou étaient encore au stade théorique. Par exemple, le Nautilus pouvait plonger à des profondeurs considérables et se déplacer à une vitesse impressionnante pour l'époque (jusqu'à 16 nœuds), grâce à son hélice interne à aubes. De nos jours, les sous-marins modernes sont capables de plonger jusqu'à des profondeurs de plusieurs milliers de mètres et de déplacer eux aussi à une vitesse élevée, mais grâce à des technologies plus sophistiquées telles que les réacteurs nucléaires ou les turbines électriques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- De plus, Nemo avait une connaissance avancée de la géologie marine et de la paléontologie, ce qui lui permettait d'identifier les roches et les fossiles qu'il observait lors des plongées du Nautilus. Aujourd'hui, les techniques de prospection géologique maritime ont évolué considérablement grâce à l'utilisation de sonars, de robots sous-marins et d'autres technologies permettant une exploration plus précise et détaillée des fonds marins.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque Jules Verne écrivait le Contre-Courant de la Terre du Milieu, l'état des océans était largement inconnu et les connaissances sur les espèces marines étaient limitées. Les océans étaient considérés comme un espace inexploré et mystérieux, et les humains n'avaient que peu de connaissance sur les écosystèmes marins et leurs interactions complexes. Aujourd'hui, grâce aux progrès technologiques et scientifiques, nous avons une connaissance plus approfondie des océans et de leurs espèces. Cependant, l'état actuel des océans est préoccupant : le réchauffement climatique, la pollution, la surpêche et les effets de la pollution plastique ont tous un impact négatif sur les écosystèmes marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Les espèces observées par Nemo dans son voyage autour du monde étaient diverses, mais il est important de noter que certaines d'entre elles sont aujourd'hui menacées ou ont disparu complètement. Par exemple, les baleines bleues, qui étaient observées par le Nautilus lors de son voyage dans l'Atlantique Nord, sont aujourd'hui considérées comme une espèce en danger critique d'extinction. De plus, certaines espèces ont été découvertes depuis 1866, telles que les espèces de cétacés à dents telles que le requin-mâle et la baleine à bosse qui n'avaient pas encore été découvertes lorsque Jules Verne écrivait son roman.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En conclusion, alors que Nemo était un pionnier dans l</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>North of England Coast</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 North of England Coast</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the key figures in marine zoology was Georges Cuvier, who classified over 40,000 species and established the principles of comparative anatomy. His work laid the foundation for understanding the diversity of life in the oceans.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of biology, Charles Darwin's \"On the Origin of Species\" was published in 1859, proposing the theory of evolution by natural selection. Although not directly mentioned in the passage, this theory would have a profound impact on the understanding of marine life and its evolution.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Jean-Baptiste Lamarck's work on invertebrates, such as the \"Hydre\" (1802), also contributed to the study of marine zoology. Meanwhile, in chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, including his work on electromagnetic induction and the development of the first electric motor.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in these advancements. The HMS Challenger expedition (1872-1876) was one of the most significant, mapping the ocean floor, discovering new species, and collecting samples to study. These expeditions often used advanced instruments like diving bells, nets, and sounding lines to collect data about the oceans and their inhabitants.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In terms of communication, the laying of the Atlantic cable in 1866, as hinted at in the passage, marked a significant milestone in the era, facilitating rapid global communication and potentially contributing to the spread of news about marine discoveries.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ North of England Coast</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Title: Comparison of Jules Verne's \"20,000 Leagues Under the Sea\" (1866) and Modern Marine Science and Ecology (2025)</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology: What Nemo knew/imagined vs current discoveries</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Jules Verne's Nautilus was equipped with advanced technology for the time, such as an electric torch, diving apparatus, and a periscope. However, these inventions were mere speculations compared to the technological advancements of today. The Nautilus' underwater propulsion system, powered by a mysterious energy source, is unlike any modern submarine that operates on diesel-electric or nuclear power.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, contemporary submarines are capable of diving deeper and staying submerged for longer periods. They use sonar systems to locate objects underwater and have advanced navigation systems. Additionally, the field of oceanography has significantly evolved with the development of remote sensing technologies, autonomous underwater vehicles (AUVs), and satellite-tracking systems that provide detailed information about the oceans' depths, currents, temperatures, and marine life.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology: State of Oceans and Species in 1866 vs Today</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Jules Verne described various marine species observed during the Nautilus' journey, but his depiction was limited by the scientific knowledge available at the time. The ocean was largely unexplored, and many species were yet to be discovered or classified.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Fast forward to 2025, the state of the oceans is significantly different due to various human-induced factors. Overfishing has depleted many fish populations, leading to a decline in biodiversity. Warming ocean temperatures caused by climate change have resulted in coral bleaching events, threatening the survival of coral reef ecosystems that support a multitude of marine species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Moreover, pollution, particularly plastic waste, has become a major concern. Microplastics, tiny fragments of plastic debris, are now found throughout the world's oceans, posing a threat to marine life and entering the food chain, potentially affecting human health as well.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to the pristine waters described in 1866, today's oceans face numerous challenges that require urgent attention and action from the global community. The advancements in marine science and technology have provided us with a better understanding of these issues and tools to address them, but much work remains to be done to restore and protect our oceans for future generations.</p></div>\n          </div>\n        </div>"}}, "31": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Côtes de la Norvège</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>«Maelstrom! Maelstrom!» s'écriait-il!</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le Maelstrom! Un nom plus effrayant dans une situation plus effrayante</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>pouvait-il retentir à notre oreille? Nous trouvions-nous donc sur</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>ces dangereux parages de la côte norwégienne? Le _Nautilus_ était-il</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Hippocampe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sciène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pintadine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Alcyon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasse</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Côtes de la Norvège</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les découvertes scientifiques ont été abondantes et ont apporté de nombreuses avancées dans divers domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, le naturaliste français Jean-Baptiste Lamarck avait déjà identifié plusieurs espèces marines en Norvège au début du siècle. En 1864, l'expédition Challenger a exploré les mers norvégiennes et a découvert de nouvelles espèces marines, notamment des cétacés et des crustacés.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En électricité, Michael Faraday a effectué de nombreuses expériences à Londres en 1864, découvrant les lois de l'induction électromagnétique et inventant le générateur électrique à aimant permanent. En Norvège, Kristian Birkeland a également réalisé des recherches sur la magnétisme terrestre et a découvert les auroras polaires en 1869.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition norvégienne de Fridtjof Nansen à travers le pôle Nord a commencé en 1866. Cette expédition a permis d'avancer notre compréhension de la glaciation et du climat polaire.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Jean-Baptiste Dumas a effectué des recherches sur les lois atomiques dans les années 1860. En Norvège, le chimiste Christian Christiansen a également travaillé sur la chimie organique et a découvert plusieurs nouvelles molécules.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Côtes de la Norvège</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de l'océan pour son époque, découvrant des espèces marines telles que la baleine, le cachalot, le narval, la raie, l'hippocampe, la sciène, la pintadine et le poulet de mer. Mais il manquait d'une compréhension scientifique moderne des phénomènes naturels tels que les courants marins, la géologie sous-marine et l'écologie marine. Aujourd'hui (2025), grâce aux progrès de la science et de la technologie, nous avons une connaissance plus approfondie des océans. Les scientifiques utilisent des outils tels que les sonars, les robots sous-marins et les satellites pour explorer et étudier l'océan profond. Nous pouvons également décrire précisément les courants marins, comprendre la géologie sous-marine et étudier l'écologie marine en détail.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Nemo utilisait le Nautilus pour explorer l'océan profond grâce à sa conception innovante, mais il n'avait pas accès aux technologies modernes telles que la technologie de pointe, les systèmes d'information et la communication. Aujourd'hui (2025), nous avons des sous-marins modernes équipés de technologie de pointe tels que des sonars à haute résolution, des robots sous-marins autonomes et des systèmes informatiques pour analyser les données collectées. Nous pouvons également communiquer instantanément avec d'autres chercheurs et collaborer en temps réel sur nos recherches.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque le Nautilus naviguait dans les eaux norvégiennes, l'océan était relativement peu pollué et la surpêche n'était pas encore un problème majeur. Aujourd'hui (2025), les océans sont souvent pollués par des déchets plastiques, des produits chimiques toxiques et des effluents industriels. La surpêche est également un problème majeur, avec de nombreuses espèces menacées ou en voie de disparition.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Nemo observait des espèces marines telles que la baleine, le cachalot et le narval qui étaient abondantes dans l'océan Arctique. Aujourd'hui (2025), ces espèces sont menacées par la chasse commerciale illégale, la pollution et le réchauffement climatique. Les baleines en particulier ont été particulièrement touchées par les effets du réchauffement climatique, avec une augmentation des températures océaniques qui affectent leur nourriture et leur habitat.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, Nemo observait également des espèces marines telles que la raie et l'hippocampe qui étaient abondantes dans les eaux norvégiennes. Aujourd'hui (2025), ces espèces sont en vo</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Coast of Norway</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“The maelstrom! the maelstrom!” Could a more dreadful word in a more dreadful situation have sounded in our ears! We were then upon the dangerous coast of Norway. Was the Nautilus being drawn into this gulf at the moment our boat was going to leave its sides? We knew that at the tide the pent-up waters between the islands of Ferroe and Loffoden rush with irresistible violence, forming a whirlpool from which no vessel ever escapes.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Sperm Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Croaker</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Soft coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasso</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Coast of Norway</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: Georges Cuvier (1769-1832) and Henri Marie Ducrotay de Blainville (1777-1850) were prominent figures in marine zoology during this period. They made important contributions to the classification of marine life, including fish species. The study of fishes was particularly significant as it helped expand our understanding of aquatic ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography and Oceanography: In 1864, the Challenger Expedition took place, a British scientific voyage that explored the world's oceans. Its primary goal was to map the ocean floor and study marine life. The expedition provided valuable data about the geography of the seabed, deep-sea organisms, and the distribution of coral reefs.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: Michael Faraday (1791-1867) was a British scientist who made significant contributions to the understanding of electromagnetism and electrochemistry. His discoveries included the principles behind the electric motor, generator, and the chemistry of diamagnetic materials. Faraday's work paved the way for future advancements in electricity-related technologies.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: Jean-Baptiste de Lamarck (1744-1829) and Charles Darwin (1809-1882) were influential figures in the field of chemistry and biology, respectively. Although primarily known for his work on evolution, Darwin also made contributions to marine biogeography through his studies of coral reefs. Jean-Baptiste L</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Coast of Norway</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Comparison between Nemo's Knowledge and Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine Technology: In 1866, Jules Verne's Nautilus was a work of fiction, representing an advanced submarine capable of diving to great depths and navigating underwater. Today, real-life submarines exist that share some similarities with the Nautilus, such as the Russian Mir-1, which can reach depths of over 1000 meters. However, modern submarines are significantly larger and more complex, equipped with sonar systems, remote operated vehicles (ROVs), and advanced navigation systems that were beyond Nemo's imagination.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Underwater Exploration: In the novel, Nemo used his knowledge to explore the ocean floor, discovering various marine species and geological formations. While Verne's descriptions were based on the scientific understanding of his time, modern underwater exploration has advanced significantly. Today, robotic submarines and remotely operated vehicles (ROVs) are used for deep-sea exploration, providing high-definition images and data that reveal a wealth of information about the ocean floor, its geology, and the diverse ecosystems it supports.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Oceanography: Nemo's understanding of the ocean was limited by the scientific knowledge of his time. He was aware of currents, tides, and whirlpools but lacked the tools to fully comprehend the complex processes that govern our oceans. Today, we have satellites, buoys, and underwater sensors that allow us to monitor ocean currents, temperatures, salinity, and even sea level changes on a global scale. This data is crucial for understanding climate change, predicting weather patterns, and managing marine resources sustainably.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine Biodiversity: In 1866, the ocean was largely unexplored, and Verne's descriptions of marine species were based on limited scientific knowledge. Today, we have a much more comprehensive understanding of marine biodiversity, with over 200,000 known species of fish, millions of invertebrates, and countless other organisms living in our oceans. However, this diversity is under threat due to human activities such as overfishing, pollution, and climate change.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Overfishing: In Verne's time, overfishing was not a significant concern, as fishing technologies were less advanced and populations of many species were larger. Today, overfishing remains a major problem, with many fish stocks depleted or at risk of collapse. This is due to the increased efficiency of modern fishing fleets, illegal fishing, and the demand for seafood in an ever-growing global population.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Pollution: In 1866, pollution was not a significant issue in the ocean, as industrialization had not yet reached the scale it has today. Today, our oceans face numerous pollutants, including plastic waste, chemicals, and nutrient runoff from agriculture. These pollutants can harm marine life directly, through ingestion or entanglement, and indirectly by disrupting ecosystems and food chains.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Climate Change: In Verne's time, the concept of climate change was not yet understood. Today, we know that human activities are causing global warming, which is having a profound impact on our oceans. Rising temperatures are causing ocean acidification, melting polar ice caps, and leading to more frequent and severe weather events. These changes are threatening marine ecosystems and the livelihoods of</p></div>\n          </div>\n        </div>"}}};
