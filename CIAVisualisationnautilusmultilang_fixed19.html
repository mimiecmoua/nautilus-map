f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐴 Seahorse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Wrasse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sparidae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Oyster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Scallop</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Sea hare</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Spiny lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦐 Mantis shrimp</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦔 Sea urchin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Sea anemone</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Seal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Sea turtle</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🧽 Sponge</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annelid</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the context of the passage, several significant scientific discoveries and advancements occurred during the mid-19th century that relate to marine zoology, geography, chemistry, and electricity:</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck's work on invertebrates (early 19th century) paved the way for further studies in marine biology. Georges Cuvier, a prominent figure of the time, made significant contributions to comparative anatomy and paleontology, classifying various species found in the Mediterranean Sea. Louis Agassiz, another notable zoologist, was instrumental in the study of fish and fossil fishes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw advancements in oceanographic studies. Alexander von Humboldt's work on geography and natural sciences contributed to our understanding of the Mediterranean Sea's geographical features, climate, and geology. Mathew Maury, known as the \"Pathfinder of the Seas,\" mapped ocean currents and weather patterns, providing valuable information for navigation in the Mediterranean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, which had implications for understanding the chemical composition of seawater and its interaction with marine organisms. Justus von Liebig's work on organic chemistry was also crucial in understanding the nutrient cycles within marine ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Scientific Expeditions: The 19th century witnessed numerous scientific expeditions, such as the Challenger expedition (1872-1876), which aimed to explore the world's oceans and gather data on geology, zoology, and chemistry. These expeditions greatly contributed to our understanding of the Mediterranean Sea and its ecosystems.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Comparison Between Jules Verne's Imagination (1866) and Current Discoveries (2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine Technology: In \"Twenty Thousand Leagues Under the Sea,\" Captain Nemo's Nautilus was a marvel of advanced technology for its time, capable of diving to great depths and traveling at high speeds underwater. Today, while the Nautilus remains an iconic representation of undersea exploration, modern submarines greatly surpass it in capabilities. Modern subs employ sonar systems for navigation and detection, can withstand extreme pressures at greater depths, and are equipped with advanced communication and research equipment.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Oceanographic Research: In the novel, Nemo's Nautilus was used to explore the ocean's depths and uncover various marine species. While Verne's descriptions of underwater life were largely accurate for his time, modern oceanography has made significant advancements in understanding marine ecosystems. Today, we use satellite imagery, remote sensing technology, and advanced diving equipment to study marine habitats, track species movements, and monitor changes in the ocean environment.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine Biodiversity: In the Mediterranean Sea during Verne's time, marine life was abundant and diverse, as described in the novel with the presence of various fish species such as Sperm Whales, Dolphins, Sharks, Rays, Tuna, Salmon, Herring, and Moray. Today, while these same species still inhabit the Mediterranean, their populations have been significantly impacted by human activities. Overfishing, pollution, and climate change have led to declines in many marine populations, with some species becoming endangered or even extinct.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Ocean Warming and Pollution: In 1866, the Mediterranean Sea was largely unaffected by anthropogenic activities such as greenhouse gas emissions and pollution. However, today, the Mediterranean is one of the most polluted seas in the world due to runoff from agricultural and industrial activities, as well as plastic waste. Additionally, climate change has caused ocean warming, leading to changes in marine ecosystems and increased vulnerability for many species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's descriptions of the Mediterranean Sea and underwater life in \"Twenty Thousand Leagues Under the Sea\" were largely accurate for his time, modern scientific advancements have greatly expanded our understanding of oceanography and marine ecology. However, human activities such as overfishing, pollution, and climate change have had negative impacts on marine ecosystems, particularly in the Mediterranean Sea.</p></div>\n          </div>\n        </div>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Espadon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Dorade</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Coquillage</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Anémone de mer</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Hydrophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'Atlantide</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à l'extrait cité de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les explorations océanographiques ont permis de découvrir de nombreuses espèces marines inconnues jusqu'alors, notamment en Méditerranée et dans les eaux autour des îles Canaries, où le Nautilus aurait pu naviguer selon l'intrigue du roman. Des savants tels que Lacépède ont contribué à la connaissance de ces espèces.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Géographie : Les cartes et les recherches géographiques ont permis d'avancer dans la compréhension de la géographie mondiale et des régions inexplorées, notamment en ce qui concerne l'Atlantique, où se trouve l'Atlantide selon le roman. Des géographes tels que D'Anville, Malte-Brun et Humboldt ont contribué à la cartographie et à la compréhension de ces régions.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Électricité : Les progrès dans l'étude de l'électricité ont permis de comprendre les phénomènes électriques naturels, notamment ceux liés aux phénomènes océaniques. Des savants tels que Faraday ont contribué à la compréhension de ces phénomènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expéditions scientifiques : Les expéditions scientifiques ont permis d'explorer des régions inconnues et de recueillir des données sur la faune, la flore, la géologie et la météorologie</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ L'Atlantide</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de son époque sur la géographie marine et la cartographie. Il pouvait naviguer avec précision grâce à ses instruments de mesure tels que les baromètres, thermomètres et chronomètres. Cependant, il n'avait pas accès aux technologies modernes telles que l'écholocation, la sonar ou les satellites GPS qui permettent aujourd'hui une navigation plus fiable et précise.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le domaine de la science marine, Nemo avait un intérêt pour la biologie marine et l'étude des espèces marines. Il observait plusieurs espèces telles que les cétacés, requins, raies, éponges, dorades, pouples, coquillages et homards. Cependant, il n'avait pas accès aux techniques modernes de génomique, qui permettent aujourd'hui d'analyser la biodiversité marine avec une précision et un détail inégalés.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Enfin, Nemo avait une connaissance avancée des technologies sous-marines telles que l'utilisation de plongées en apnée ou l'utilisation de ballons remplis d'azote pour explorer les fonds marins. Cependant, il n'avait pas accès aux sous-marins modernes qui sont équipés de caméras et de robots sous-marins permettant une exploration plus poussée des océans.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, l'état des océans était relativement peu connu car la technologie n'était pas encore suffisamment avancée pour explorer les fonds marins avec précision. Les océans étaient considérés comme un espace inexploré et mystérieux. Aujourd'hui, grâce aux technologies modernes telles que les sous-marins robotiques, nous avons une connaissance plus approfondie de l'état des océans. Nous savons maintenant que la pollution marine est un problème majeur, notamment du fait de la déchets plastique et des polluants chimiques.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les espèces marines étaient relativement peu connues car la biologie marine était encore à ses balbutiements. Les espèces observées par Nemo étaient souvent considérées comme des curiosités plutôt que comme une partie intégrante de l'écosystème marine. Aujourd'hui, grâce aux techniques modernes de génomique et de biologie marine, nous avons une connaissance plus approfondie des espèces marines et de leur rôle dans les écosystèmes marins. Nous savons maintenant que certaines espèces sont menacées par la surpêche, le réchauffement climatique et la pollution marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Enfin, il est important de noter que l'écologie marine a connu des progrès significatifs depuis 1866. Les scientifiques travaillent maintenant à préserver les océans et les espèces marines en mettant en place des mesures telles que la protection des zones marines protégées, la réglementation de la pêche et l'élimination de la pollution marine. Cependant, il y a encore beauc</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Atlantis</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Swordfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sea Bream</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Shell</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Jellyfish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Sea anemone</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Kelp</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Aquatic plant</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Atlantis</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 1866-1870 period, several significant scientific discoveries and advancements were made that relate to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: French naturalist Jean Louis Rodolphe Agassiz (1807-1873) was a pioneer in marine zoology, particularly focusing on glacial theory and the study of fossilized fish. His work contributed to the understanding of geological changes and the evolution of life forms. In 1864, he led an expedition to the United States to investigate glaciation and the distribution of freshwater fish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: English chemist Michael Faraday (1791-1867) made groundbreaking contributions to the field of electrochemistry during this period. He discovered electromagnetic induction, dielectric and diamagnetic effects, and established the principles of electrolysis. His work laid the foundation for the development of electric motors, generators, and batteries.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: British scientist William Thomson (Lord Kelvin) (1824-1907) made significant advancements in the understanding of electricity and thermodynamics. He formulated a mathematical model for electromagnetic fields and developed the first practical electric telegraph system. In 1862, he proposed the absolute zero temperature theory, which is essential to understanding the behavior of matter at low temperatures.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Geology: French naturalist Georges Cuvier (1769-1832) and French zoologist Henri Marie Ducrotay de Lacépède (1756-1825) made significant contributions to the field of geology during an earlier period but were still influential in the 1860s. C</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Atlantis</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In the novel \"20,000 Leagues Under the Sea,\" Jules Verne portrayed Captain Nemo as a visionary with advanced knowledge of science and technology for his time in 1866. For instance, Nemo's Nautilus submarine exhibited an understanding of underwater propulsion, navigation, and living quarters that were decades ahead of their actual development. Today, submersibles like the Deepsea Challenger and Aquatica are designed with similar features, demonstrating how Verne's imagination anticipated some aspects of modern marine technology.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>However, there are significant differences between Nemo's technological capabilities and today's reality. In 1866, Nemo had access to advanced weaponry like torpedoes and electric cannons, which were not available until the late 19th and early 20th centuries. Today, we have developed sonar systems, remotely operated vehicles (ROVs), and autonomous underwater vehicles (AUVs) for exploration, mapping, and monitoring the ocean floor. Furthermore, Nemo's Nautilus was powered by an unspecified source of energy, while modern submersibles rely on batteries or fuel cells.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Regarding marine ecology, Verne's depiction of the ocean in 1866 contrasts starkly with its current state. In the novel, Nemo observed various marine species such as cetaceans, sharks, rays, swordfish, sea bream, octopuses, shells, and lobsters, which were accurately described for the time. However, today's oceans face numerous threats that were not present in Verne's era. Overfishing has depleted many fish populations, endangering species like bluefin tuna, swordfish, and sharks. Pollution from plastic waste, industrial runoff, and oil spills poses a significant threat to marine life, with microplastics found even in the deepest parts of the ocean.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Climate change has also caused widespread damage to marine ecosystems. Rising temperatures have led to coral bleaching events, threatening the survival of coral reefs and the diverse species that depend on them for shelter and food. Ocean acidification, another consequence of increased carbon dioxide levels, affects the shell-building abilities of organisms like mollusks and crustaceans. Furthermore, ocean warming has disrupted migration patterns and feeding habits of various marine species, leading to population declines and ecosystem imbalances.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's depiction of marine technology in \"20,000 Leagues Under the Sea\" was visionary for its time, modern submersibles and ocean exploration tools have surpassed Nemo's Nautilus in capabilities. On the other hand, the oceans that Nemo sailed through in 1866 are vastly different from today's oceans, which face numerous challenges due to overfishing, pollution, climate change, and ocean acidification. These contrasting realities highlight both Verne's foresight and the urgent need for conservation efforts to protect our oceans and marine life.</p></div>\n          </div>\n        </div>"}}, "13": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>La mer des Sargasses</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radiu  solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Alcyon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌸 Actinie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Sargasse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Hydrophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 La mer des Sargasses</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le zoologiste français Jean-Baptiste Lamarck avait déjà décrit la mer des Sargasses dans les années 1800, mais c'est au cours des expéditions scientifiques du XIXe siècle que ces eaux ont été étudiées plus profondément. En 1854, l'expédition de Charles Wyville Thomson sur le HMS Challenger a collecté des échantillons de sargasses dans l'Atlantique Nord et a découvert une grande diversité de vie marine y résidant.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière de zoologie marine, les scientifiques ont également étudié les espèces de poissons, de crustacés et d'autres animaux marins présents dans la mer des Sargasses. En 1862, le naturaliste français Henri Marie Ducrotay de Blainville a décrit une nouvelle espèce de requin, le requin-baleine à longues dents (Rhincodon typus), qui est communément trouvé dans ces eaux.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En outre, la mer des Sargasses a également été un sujet d'intérêt pour les scientifiques en matière de géographie et de chimie. En 1867, l'expédition française de l'Astrolabe a exploré cette région et a collecté des données sur la circulation océanique dans l'Atlantique. De plus, les scientifiques ont également étudié la composition chimique de la sargasse elle-même, qui</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ La mer des Sargasses</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus dans \"20 000 lieues sous les mers\" de Jules Verne (1866), possédait un navire submersible avancé pour l'époque, équipé d'un canon à rayons et d'une machine permettant la navigation sous-marine sans aucune surface visible. Aujourd'hui, les technologies ont évolué considérablement : les sous-marins modernes sont capables de plonger jusqu'à des profondeurs supérieures à celles atteintes par le Nautilus, et utilisent des systèmes de navigation GPS pour déterminer leur position exacte. Les armes du Nautilus, notamment son canon à rayons, sont aujourd'hui considérées comme purement fictives.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière d'écologie marine, Nemo avait une connaissance générale des espèces marines observées lors de la traversée de la mer des Sargasses (baleine, dauphin, marsouin, cétacé, squale, raie, thon, poisson volant). Cependant, il n'avait aucune connaissance des impacts humains sur les océans et leurs espèces. Aujourd'hui, nous sommes bien plus conscients de ces impacts : le réchauffement climatique entraîne la dégradation des écosystèmes marins, notamment par la hausse du niveau des océans et l'augmentation de la température de l'eau. La pollution marine est également un problème majeur, avec une accumulation croissante de déchets plastiques dans les océans. La surpêche menace plusieurs espèces marines, notamment certaines espèces de cétacés et de poissons tels que le thon bleu.</p></div>\n          </div>\n          <div st .</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday (1791-1867) was a British scientist who made groundbreaking discoveries in the fields of electromagnetism, electrochemistry, and chemistry. His work on electrolysis, published in 1834, helped</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ The Sargasso Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Comparison between Nemo's Imagination and Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Navigation and Communication: In Jules Verne's \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus was equipped with advanced technology for navigation and communication, including an electric compass, a periscope, and an underwater printing telegraph. While these inventions were works of fiction in 1866, modern submarines do possess similar technologies for navigation and communication. However, the significant advancements are in the areas of sonar systems, GPS, and advanced computer systems that enable precise positioning, mapping, and data analysis underwater.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Power Source: The Nautilus was powered by a mysterious energy source, which Nemo referred to as \"galvanic cells.\" While this was a fictional device in the novel, contemporary submarines are powered by nuclear reactors or batteries, providing them with an extended range and endurance underwater.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Sonar and Underwater Exploration: The Nautilus had sonar capabilities that allowed it to detect marine life and obstacles underwater. While this was a work of fiction in 1866, modern submarines use sophisticated sonar systems for mapping the seafloor, locating underwater objects, and even communicating with other vessels. Additionally, remotely operated vehicles (ROVs) and autonomous underwater vehicles (AUVs) are now widely used for deep-sea exploration and research, allowing scientists to study marine life and geological features in greater detail than ever before.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine Biodiversity: In the Sargasso Sea as described by Jules Verne, there was a rich diversity of marine life, including various species of whales, dolphins, sharks, rays, tuna, and flying fish. While this description reflects the abundance of marine life in the Sargasso Sea at that time, modern studies show that overfishing, pollution, and climate change have led to a decline in many marine populations and an alteration of ecosystems. For instance, certain species such as bluefin tuna and some shark species are now endangered due to overfishing, while others like the great white shark have seen their ranges shift due to warming ocean waters.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Pollution: In 1866, pollution in the oceans was not a significant concern as industrialization had not yet reached its peak. However, today, marine ecosystems face numerous threats from pollution, including plastic waste, chemical spills, and oil spills. These pollutants can have devastating effects on marine life, causing harm to individual organisms, altering food chains, and even affecting the overall health of entire ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Ocean Warming: The Sargasso Sea in 1866 was a relatively stable environment, with temperatures that supported a diverse range of marine species. Today, however, ocean warming due to climate change is causing significant changes in marine ecosystems worldwide. Warmer waters can lead to coral bleaching events, shifts in species distributions, and alterations in the timing and success of various life stages for many marine organisms.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's depiction of the Sargasso Sea in \"20,000 Leagues Under the Sea\" was remarkably accurate for its time regarding the diversity of marine life, modern scientific research reveals that human activities have significantly impacted ocean health and biodiversity. Advancements in technology have also enabled more detailed exploration and study of the deep sea,</p></div>\n          </div>\n        </div>"}}, "14": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Afrique Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Afrique Nord</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à ce passage de l'extrait du roman. À cette époque, les savants tels que Georges Cuvier, Jean-Baptiste Lamarck et Louis Agassiz travaillaient sur la zoologie marine en Europe. En Amérique du Nord, Charles Darwin était un naturaliste célèbre pour ses travaux sur l'évolution des espèces, notamment son livre \"L'Origine des Espèces\" publié en 1859.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En matière de zoologie marine, les observations de cet animal étrange ont été faites à plusieurs reprises par différents navires, comme le Cristobal-Colon, l'Helvetia et le Shannon. Cet animal est probablement un cétacé, mais sa vitesse extraordinaire, qui permettrait au même individu d'être observé sur deux points séparés par plus de 700 lieues marines à trois jours d'intervalle, n'a pas été confirmée par les scientifiques de l'époque.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En outre, la découverte de l'électricité et ses applications sont également importantes dans ce contexte. Michael Faraday, un chimiste britannique, a travaillé sur l'électrochimie et l'électromagnétisme au cours des années 1830 et 1840. Les navires de la West India and Pacific steam navigation Company et de la Compagnie Nationale utilisaient peut-être des instruments électriques pour faciliter leur navigation, ce qui permettrait d'expliquer comment différents navires ont pu observer cet</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Contour Afrique Nord</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div  at mapping the world and exploring uncharted territories. For instance, the French expedition led by Jules Dumont d'Urville (1790-1842) discovered Adélie Land in Antarctica in 1840. Meanwhile, the British Challenger Expedition (1872-1876) was instrumental in collecting data on marine life and geology from various parts of the world's oceans.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The understanding and application of electricity were also advancements of the 19th century. Michael Faraday (1791-1867), a British scientist, made significant contributions to electromagnetism and electrochemistry. He discovered electromagnetic induction in</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ North Africa Coast</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison of Science and Technology: Jules Verne's Imagination vs Current Discoveries (1866 vs 2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Communication: In 1866, as depicted by Jules Verne in \"20,000 Leagues Under the Sea,\" the Atlantic cable was a marvel of technology, symbolizing global interconnectivity. Fast forward to 2025, this concept has evolved dramatically with the advent of satellite communication systems, fiber optics, and quantum entanglement, enabling instantaneous global data transmission. The Nautilus' fictional ability to send messages underwater is yet to be realized, but advances in underwater acoustic communication networks are bringing us closer to that reality.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Navigation and Exploration: In 1866, Nemo's Nautilus was equipped with advanced technology for its time, including a periscope, electric torpedoes, and an undersea exploration vessel. Today, deep-sea submersibles like the DEEPSEA CHALLENGE and JAMES ROSS are far more sophisticated, capable of diving to unprecedented depths and equipped with advanced sensors for mapping the ocean floor, studying marine life, and collecting samples. Additionally, autonomous underwater vehicles (AUVs) and remotely operated vehicles (ROVs) are now common tools in ocean exploration and research.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Marine Technology: In 1866, Nemo's fishing apparatus was formidable for its time, but today's marine technology is vastly superior. Modern deep-sea trawling nets can catch enormous quantities of fish, but they also indiscriminately capture and destroy other marine life and habitat, leading to overfishing and environmental degradation. In 2025, more selective fishing methods such as pole-and-line fishing, hook-and-line fishing, and trolling are being promoted to reduce bycatch and support sustainable fisheries.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison of Marine Ecology: State of Oceans and Species in 1866 vs Today (2025)**</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Warming: In 1866, the ocean's warming was not a significant concern. However, today, global warming is causing ocean temperatures to rise, leading to coral bleaching, sea-level rise, and shifts in marine species distributions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Pollution: In 1866, pollution was minimal compared to today. The Industrial Revolution had just begun, and the impact on the oceans was not yet apparent. Today, plastic pollution, chemical pollutants, and noise pollution are significant issues affecting marine ecosystems worldwide.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Overfishing: In 1866, overfishing was not a major concern as fishing technology was not as advanced as it is today. However, by the early 21st century, overfishing became a global problem, leading to depleted fish stocks and altered marine food webs. Today, in 2025, efforts are underway to promote sustainable fishing practices, restore depleted fish populations, and protect critical habitats.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Endangered Species: In 1866, the concept of endangered species was not widely recognized. Today, numerous marine species are threatened by human activities, including climate change, pollution, overfishing, and habitat destruction. Conservation efforts focus on protecting critical habitats, reducing threats, and promoting sustainable practices to help these species recover.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's imagination in 1866 was remarkably prescient about some aspects of ocean technology, the reality of today's oceans is mark -block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Morse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Otarie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Albatros</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Pingouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Manchot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Pétrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les découvertes scientifiques ont connu une croissance spectaculaire. Dans le domaine de la zoologie marine, des expéditions ont été menées pour explorer les mers inexplorées, notamment autour de l'Antarctique et du cap Horn. Un des principaux biologistes marins de l'époque était Jean-Baptiste Lamarck, qui a décrit de nombreuses espèces marines nouvelles. En outre, le naturaliste français Isidore Geoffroy Saint-Hilaire a mené une expédition autour du monde pour étudier la faune marine.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses découvertes importantes. Il a inventé le générateur électromagnétique et a étudié les propriétés des courants électriques. Son travail a été crucial pour la compréhension de l'électricité et de ses applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, Alexander von Humboldt a mené une expédition dans les Andes sud-américaines pour étudier le climat, la flore et la faune de cette région. Ses recherches ont conduit à des avancées significatives en géologie, botanique et zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, John Dalton a développé la théorie atomique, qui explique la composition des éléments chimiques et leur comportement chimique. Cette théorie a été cruciale pour l'avancement de la chimie et a permis de comprendre les réactions chimiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les découvertes scient</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>* Nemo, le commandant du Nautilus dans 20,000 Lieues sous les mers de Jules Verne, possédait une connaissance avancée de la marine et de l'océanographie pour son époque. Il disposait d'un sous-marin équipé de divers instruments scientifiques, tels que des microscopes, des thermomètres, des baromètres et un appareil permettant de mesurer la profondeur. Cependant, ses connaissances restent limitées par les connaissances scientifiques de son époque. Aujourd'hui (2025), nous avons accès à des technologies et des instruments beaucoup plus avancés. Les sous-marins actuels sont équipés de systèmes de navigation GPS, de sonars et d'imagerie infrarouge qui permettent une exploration plus détaillée et précise des océans. De plus, les scientifiques disposent d'outils de communication et de calcul performants qui leur permettent de collecter et analyser rapidement des données sur l'océanographie, la géologie marine et la biodiversité marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>* En 1866, Nemo était intrigué par le narval, un cétacé dont il n'avait jamais entendu parler. Aujourd'hui (2025), nous a :12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: The study of marine life was a major focus during this period. Georges Cuvier (1769-1832), a French naturalist, is renowned for his work on comparative anatomy and paleontology. He classified many marine species and laid the foundations for modern vertebrate taxonomy. Jean-Baptiste de Lamarck (1744-1829) proposed the theory of evolution before Charles Darwin, suggesting that organisms change over time in response to their environment.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable figure is Henri Marie Ducrotay de Blainville (1777-1850), who described several marine species, including the narwhal mentioned in the passage. The narwhal, a large whale with a distinctive long, spiraled tusk, was often associated with myths and legends, leading some sailors to believe it could not pass through narrow straits like the Straits of Magellan or Cape Horn.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: Exploration and mapping of remote regions, such as the Straits of Magellan and Cape Horn, were significant during this era. The Straits of Magellan, discovered by Ferdinand Magellan in 1520, became a major shipping route connecting the Atlantic and Pacific Oceans. In the 19th century, expeditions led by explorers like Robert FitzRoy (1805-1865) continued to chart these waters, improving understanding of the region's geography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cape Horn</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Comparison of Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. In 1866, as described by Jules Verne in \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus was a fictional submarine equipped with advanced technology for its time, such as an electric propulsion system and sonar-like capabilities. In contrast, modern submarines like the U.S. Navy's Virginia-class submarines are nuclear-powered and utilize sophisticated sonars, radar systems, and unmanned underwater vehicles (UUVs) for navigation and exploration.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. The Nautilus was also equipped with advanced weaponry, including torpedoes and cannons. In the real world, today's submarines carry a variety of weapons, including missiles capable of striking targets on land or at sea. Additionally, modern science has led to the development of autonomous underwater vehicles (AUVs) for exploration and research purposes, which are not present in Verne's novel.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Marine Ecology:</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. In 1866, the state of marine ecology was largely unknown due to limited technology and exploration capabilities. The Nautilus crew encountered various marine species such as whales, porpoises, and mussels during their journey. Today, scientists have a much better understanding of marine ecosystems, thanks to advancements in technology, research methods, and conservation efforts.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Regarding the state of oceans today compared to 1866, there are significant contrasts due to human activities such as pollution, overfishing, and climate change. In the past century, the world has witnessed a rapid increase in ocean pollution, primarily from plastic waste and chemical runoff. Overfishing has depleted many fish populations, leading to declines in biodiversity and disrupting food chains. Climate change has resulted in rising sea temperatures, acidification of oceans, and melting of polar ice caps, all of which have profound impacts on marine life and ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Endangered species: In 1866, the existence of certain marine species was not well-known, and some, like the narwhal mentioned in the novel, were considered mythical or legendary. Today, however, scientists have a better understanding of various endangered marine species, such as the blue whale, leatherback sea turtle, and the vaquita, a critically endangered porpoise found in the Gulf of California. Human activities like overfishing, pollution, and climate change continue to threaten these species' survival.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's novel \"20,000 Leagues Under the Sea\" provided an imaginative portrayal of advanced underwater technology in 1866, modern submarines and marine exploration tools have surpassed those depicted in the book. In terms of marine ecology, the world has faced significant challenges due to pollution, overfishing, and climate change since the novel's publication, with many endangered species now facing extinction.</p></div>\n          </div>\n        </div>"}}, "17": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pôle Sud</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>C'est votre capitaine Cook, à vous autres, Français. Infortuné savant! Avoir bravé les banquises du pôle Sud, les coraux de l'Océanie, les cannibales du Pacifique, pour périr misérablement dans un train de chemin de fer! Si cet homme énergique a pu réfléchir pendant les dernières secondes de son existence, vous figurez-vous quelles ont dû être ses suprêmes pensées!» En parlant ainsi, le capitaine Nemo semblait ému, et je porte cette émotion à son actif. Puis, la carte à la main, nous revîmes les travaux du navigateur français, ses voyages de circumnavigation, sa double tentative au pôle Sud qui amena la découverte des terres Adélie et Louis-Philippe, enfin ses levés hydrographiques des principales îles de l'Océanie.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c
