des scientifiques tels que Georges Cuvier, Jean-</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île Keeling</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Sciences et technologie : Nemo, le capitaine du Nautilus dans le roman de Jules Verne, possédait une connaissance avancée pour son époque sur la science marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Il utilisait des instruments comme le chronomètre, le baromètre, le thermomètre et l'hygromètre pour naviguer et explorer les océans.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>De plus, il avait une compréhension de l'électricité maritime qui lui permettait de propulser son sous-marin à grande vitesse.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Aujourd'hui en 2025, les découvertes scientifiques ont évolué considérablement.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les navires d'exploration modernes utilisent des systèmes de positionnement global (GPS), des sonars et des caméras sous-marines pour explorer les océans.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>La technologie permet également de mesurer la température, la salinité et la composition chimique de l'eau en temps réel.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les sous-marins modernes sont équipés de robots sous-marins autonomes (ASV) qui peuvent explorer des zones difficiles à atteindre pour les humains.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En comparaison, Nemo avait une connaissance avancée pour son époque mais les technologies actuelles sont bien plus sophistiquées et permettent d'explorer les océans de manière plus détaillée et plus efficace.\n2.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Écologie marine : En 1866, lorsque Jules Verne décrivait l'île Keeling dans son roman, il ne parlait pas des problèmes environnementaux actuels que rencontrent les océans.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Aujourd'hui en 2025, les océans sont confrontés à de nombreux défis environnementaux tels que le réchauffement climatique, la pollution marine et la surpêche.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les océans ont absorbé près du quart des émissions de CO2 humaines depuis 1866, ce qui a contribué au réchauffement global.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>La pollution marine provient principalement des déchets plastiques, des polluants chimiques et des déchets radioactifs.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les espèces marines sont également menacées par la surpêche, qui fait disparaître certaines espèces avant même que leur population ne soit en mesure de se reproduire à nouveau.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En comparaison, lorsque Jules Verne décrivait l'île Keeling en 1866, il n'y avait pas encore ces problèmes environnementaux qui menacent aujourd'hui les océans.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Les défis actuels sont considérables et nécessitent des actions urgentes pour préserver les océans et leurs espèces.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Keeling Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Keeling Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: During this period, marine biologists like Jean-Baptiste de Lamarck, Georges Cuvier, and Pierre-Joseph van Beneden conducted extensive studies on marine life. Cuvier (1769-1832), a prominent comparative anatomist, was instrumental in the classification of fish species. Van Beneden (1844-1900) made significant contributions to the study of cephalopods, including squids and cuttlefish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw a surge in exploration and mapping of remote islands and regions, such as Keeling Island mentioned in your passage. Notable figures include Charles Darwin (1809-1882), who visited the island with Captain Robert FitzRoy during the voyage of HMS Beagle between 1831 and 1836. Their expedition contributed to the development of evolutionary theory, particularly Darwin's work on natural selection.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The understanding and application of electricity also progressed substantially during this time. Michael Faraday (1791-1867), an English scientist, made groundbreaking discoveries in electromagnetism and electrochemistry. His inventions included the electric motor and the dynamo, which were crucial for advancing technology and scientific research.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Chemistry: Instruments like the spectroscope, developed by William Wollaston (1766-1828) and Joseph von Fraunhofer (1787-1826), played a significant role in chemical analysis during this period. These devices allowed scientists to study the composition of substances by</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Keeling Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination versus Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Electric Light**: In 1866, Jules Verne described the Nautilus using electric light, a technology that was still in its infancy. Today, advances in LED technology have made energy-efficient and long-lasting electric lights commonplace. However, Verne's concept of an underwater propulsion system powered by electricity was ahead of its time. Modern submarines use nuclear power for propulsion, while electric propulsion is used primarily for smaller vessels and underwater robots.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. **Submarine Technology**: The Nautilus, with its ability to dive deep into the ocean, was a fictional marvel in 1866. Today, manned submersibles like Deepsea Challenger and remotely operated vehicles (ROVs) can plunge to greater depths than Verne's submarine, providing valuable data for marine research and exploration. Additionally, autonomous underwater vehicles (AUVs) are now used for long-duration missions in harsh environments, a capability beyond the Nautilus' reach.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. **Communication and Navigation**: In 1866, Verne's Nautilus had a means of communication with the surface via electric signals. Today, advanced satellite technology allows for real-time communication between submarines and surface vessels, enabling precise navigation and data transmission. Global Positioning System (GPS) technology, which was non-existent in 1866, is now essential for marine navigation.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Ocean Health**: In 1866, the ocean's health was relatively unknown. Verne described various marine species without mentioning any signs of pollution or overfishing. Today, unfortunately, the situation is grim. Ocean warming, acidification, pollution, and overfishing have led to mass coral bleaching events, loss of biodiversity, and disrupted ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. **Species Preservation**: In 1866, species extinction was not a major concern. Verne observed various marine species without mentioning any endangered or threatened species. Today, many marine species are endangered due to human activities. For example, the vaquita, the world's smallest porpoise, is critically endangered with fewer than 20 individuals remaining.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. **Understanding Marine Ecosystems**: In 1866, our understanding of marine ecosystems was limited. Verne observed various species but had no way to understand their roles in the ecosystem or how they were interconnected. Today, thanks to advances in oceanography, biology, and technology, we have a much deeper understanding of marine ecosystems and the threats they face. However, this knowledge has not always led to effective conservation efforts.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's imagination was remarkable in predicting some aspects of underwater technology, the reality of today's oceans is starkly different due to human-induced environmental changes and overexploitation of marine resources.</p></div>\n          </div>\n        </div>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, les progrès considérables de la science ont permis de découvrir et d'explorer plus profondément le monde marin et les courants océaniques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le zoologiste français Georges Cuvier a été un des premiers à étudier les courants marins en définissant ceux du Golfe du Bengale, du Pacifique nord et du Pacifique sud. En 1822, il publie une carte de la circulation des eaux dans l'océan Indien, qui montre le Kuro-Siwo, le courant noir décrit par Verne, se déroulant à partir du golfe du Bengale et traversant le détroit de Malacca.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1839, le naturaliste anglais Charles Darwin a également contribué aux connaissances sur les courants marins en explorant l'océan Pacifique sud lors de son voyage à bord du HMS Beagle. Il décrit les courants océaniques et leur importance pour la circulation des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1837, le naturaliste français Jean-Baptiste de Lamarck publie une carte des courants marins dans l'océan Atlantique nord, qui montre un courant se déplaçant vers l'ouest.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les progrès technologiques ont également permis d'améliorer les instruments utilisés pour la recherche océanographique. En 1865, William Thompson (Lord Kelvin) a inventé le thermomètre de mer qui permettait de mesurer la température de l'eau à différentes profondeurs.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, dans son Nautilus, possédait une connaissance détaillée des courants marins principaux, notamment ceux de l'Océan indien sud (le Kuro-Shio des Japonais). Aujourd'hui, grâce aux avancées technologiques, nous disposons d'outils tels que les satellites et les modèles numériques pour suivre la circulation des eaux océaniques à travers le monde avec une précision inégalée. Les courants marins sont maintenant mieux compris en termes de leur amplitude, de leur direction et de leur influence sur l'écologie marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo utilise la technologie du Nautilus pour explorer les fonds marins et observer diverses espèces marines. Aujourd'hui, nous avons développé des technologies plus avancées comme les sous-marins robotisés et les caméras subaquatiques qui nous permettent d'explorer les mers à des profondeurs encore plus grandes et de documenter plus de 200 000 espèces différentes.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque Jules Verne décrit le Golfe du Bengale, il observe une grande diversité d'espèces marines comme les marsouins, requins, astérides, méduses, coraux, alcyonaires, polypes et zoophytes. Cependant, aujourd'hui, la pollution, le réchauffement climatique, la surpêche et d'autres facteurs ont entraîné une diminution significative de la diversité des espèces marines dans cette région. Par exemple, les populations de requins sont en déclin, tandis que certaines espèces comme le corail bleu sont menacées à l'extinction.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans son Nautilus, Nemo observe un golfe du Bengale en proie à une catastrophe écologique avec des cadavres de villes flottant sur la surface. Aujourd'hui, bien que nous ayons encore des zones côtières polluées et des épidémies occasionnelles de mortalité massive d'espèces marines, les problèmes écologiques sont mieux compris et les efforts de conservation ont été mis en place pour préserver la biodiversité marine.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Bay of Bengal</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>He wanted to go to the surface and harpoon the monsters, particularly certain smooth-hound sharks, whose mouth is studded with teeth like a mosaic; and large tiger-sharks nearly six yards long, the last named of which seemed to excite him more particularly. But the Nautilus, accelerating her speed, easily left the most rapid of them behind. The 27th of January, at the entrance of the vast Bay of Bengal, we met repeatedly a forbidding spectacle, dead bodies floating on the surface of the water. They were the dead of the Indian villages, carried by the Ganges to the level of the sea, and which the vultures, the only undertakers of the country, had not been able to devour. But the sharks did not fail to help them at their funeral work.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Bay of Bengal</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced substantial growth during this period. French zoologist Louis Jean Pierre Vieillot de Lacépède (1756-1825) and Georges Cuvier (1769-1832), a pioneer in comparative anatomy, made important contributions to marine biology. They classified numerous species of sharks, including the smooth-hound shark and tiger-shark mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The Bay of Bengal, where the passage takes place, was extensively explored during the 19th century. British hydrographers conducted numerous surveys and charted the region's coastline, providing valuable information about its geographical features and currents.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday (1791-1867) made groundbreaking discoveries in electrochemistry. He developed the concept of anions and cations, which helped explain the behavior of electricity in chemical reactions. This understanding could potentially be relevant to the passage's mention of sharks being attracted to electrical discharges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expeditions: Scientific expeditions played a crucial role in advancing knowledge during this era. For instance, the Challenger expedition (1872-1876) was a British scientific voyage that aimed to study the world's oceans and their geology, zoology, and chemistry. The findings from this expedition significantly contributed to our understanding of marine life and the ocean floor.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Bay of Bengal</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison: Science and Technology**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine technology: In Jules Verne's 27th of January scenario from \"20,000 Leagues Under the Sea,\" published in 1866, Nemo's Nautilus is a highly advanced submarine, capable of diving to great depths and traveling at remarkable speeds. This was a work of fiction, but today, submarine technology has evolved significantly. Modern submersibles are used for deep-sea exploration, scientific research, military operations, and even tourism. They employ sonar systems, robotic arms, and advanced propulsion systems that far surpass the capabilities of Nemo's Nautilus.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Harpoon guns: Verne describes Nemo wanting to harpoon sharks with a muzzle-loading harpoon gun. Today, harpoons are still used for fishing and scientific research but have evolved significantly. Modern harpoons often use compressed air or electric power for deployment and retrieval. They also incorporate satellite tracking devices, allowing researchers to study the behavior of tagged marine animals over extended periods.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison: Marine Ecology**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. State of oceans: In 1866, Verne describes the Bay of Bengal as carrying the dead bodies of Indian villages into the sea. This suggests significant pollution and waste disposal issues, which were not uncommon during that era due to a lack of modern waste management systems. Today, while some improvements have been made in waste management, the oceans continue to face numerous environmental challenges. Overfishing, pollution (particularly plastic waste), climate change, and habitat destruction are significant threats to marine ecosystems worldwide.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine species: Verne's description includes various marine species such as porpoises, sharks, starfish, jellyfish, coral, soft coral, polyps, and zoophytes. Many of these species still exist today, but their populations and habitats have been significantly impacted by human activities. Overfishing has led to the decline or extinction of numerous species, while climate change has caused shifts in distribution patterns, coral bleaching events, and increased ocean acidification. Additionally, plastic pollution poses a significant threat to marine life, with millions of tons of plastic waste entering the oceans each year.</p></div>\n          </div>\n        </div>"}}, "8": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Afrique Est</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; fon  "9": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Sous l'isthme de Suez</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l'isthme de Suez n'est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Requin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pintadine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Huître</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Tridacne</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Bivalve</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Testacé</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Sous l'isthme de Suez</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent au passage de l'extrait cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. En zoologie marine, une expédition française menée par Alphonse Milne-Edwards et Jules Antoine Cantino (1867-1869) a exploré la mer Rouge. Ils ont découvert de nombreuses espèces marines inconnues jusqu'alors, dont le dugong, un cétacé herbivore que Nemo chasse dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Dans le domaine de la géographie, les travaux de Charles Lyell ont eu une influence majeure sur la compréhension de la formation des reliefs et des roches. Son livre \"Principles of Geology\" (1830-1833) a été largement lu par les savants de l'époque, y compris Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Michael Faraday, un chimiste britannique, a effectué des recherches importantes sur l'électricité et la lumière. Il a découvert l'électrolyse en 1834, qui consiste à utiliser une électrode pour séparer les éléments d'une substance chimique dissoute dans un liquide.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Enfin, l'expédition de la Challenger (1872-1876) a été une expédition scientifique internationale qui a exploré les océans du monde entier. Elle a récolté des données sur la géologie marine, la zoologie et l'océanographie, et a permis de confirmer plusieurs</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Sous l'isthme de Suez</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus dans \"20 000 lieues sous les mers\" de Jules Verne (1866), imaginait l'existence d'un tunnel souterrain sous l'isthme de Suez pour permettre la traversée entre la mer Rouge et la Méditerranée. Aujourd'hui en 2025, cette idée est devenue réalité avec le Canal de Suez, un canal artificiel qui a été construit entre 1859 et 1869, permettant ainsi la navigation entre les deux mers.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo possède une connaissance avancée des espèces marines observées (requin, squale, turbot, pintadine, huître, moule, tridacne, bivalve), mais il n'a pas accès aux découvertes scientifiques actuelles telles que la génétique moléculaire ou l'écologie marine. Aujourd'hui, grâce à ces connaissances, nous avons une meilleure compréhension de la biodiversité marine et des interactions entre les espèces.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, le Nautilus est un sous-marin technologiquement avancé pour l'époque, capable de plonger à grande profondeur et de naviguer sous l'eau sans être détecté par les humains. Aujourd'hui, les sous-marins modernes sont encore plus avancés, avec des systèmes de navigation GPS, de communication satellite et d'imagerie haute résolution.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque \"20 000 lieues sous les mers\" est publié, l'écologie marine était encore peu connue et les connaissances sur la biodiversité marine étaient limitées. Aujourd'hui en 2025, nous avons une meilleure compréhension de la biodiversité marine et des interactions entre les espèces grâce à des recherches scientifiques telles que l'étude de la génétique moléculaire.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, le réchauffement climatique n'était pas encore reconnu comme un problème majeur pour l'environnement marin. Aujourd'hui en 2025, nous sommes conscients que le réchauffement climatique a des effets négatifs sur les océans, tels que la hausse de la température, la pollution par les gaz à effet de serre et l'acidification des eaux.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, la pollution marine était également peu connue. Aujourd'hui en 2025, nous sommes conscients que la pollution marine est un problème majeur pour l'environnement marin, avec des pollutions plastiques, chimiques et radioactives qui ont des effets négatifs sur les espèces marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, la surpêche était également un problème, mais pas encore reconnu comme tel. Aujourd'hui en 2025, nous sommes conscients que la surpêche est un problème majeur pour l'environnement marin, avec des espèces menacées</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Beneath the Isthmus of Suez</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Turbot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pearl oyster fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Oyster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Giant clam</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Bivalve</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Testacean</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Beneath the Isthmus of Suez</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that relate to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Ichthyology: Georges Cuvier (1769-1832) and Jean-Baptiste de Lamarck (1744-1829) were pioneers in marine zoology and ichthyology, respectively. Cuvier's work on comparative anatomy helped classify fish species, while Lamarck proposed theories about the evolution of aquatic life forms.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw a surge in exploratory expeditions aimed at mapping and understanding the world's oceans. One notable example is the Challenger Expedition (1872-1876), which used advanced equipment to collect data on marine life, geology, and oceanography from various parts of the globe.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electrochemistry: Michael Faraday (1791-1867) made significant contributions to the field of electrochemistry. His work on electromagnetic induction, electrolysis, and the relationship between electricity and chemistry laid the groundwork for understanding the properties of various elements found in the ocean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments played a crucial role in advancing our knowledge of the deep sea during this period. For instance, the invention of the bathymeter (a device used to measure water depth) and the improvement of the diving bell allowed scientists to explore deeper parts of the ocean and collect samples from previously unexplored regions.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Beneath the Isthmus of Suez</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: What Nemo knew/imagined vs current discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Deep-sea exploration: In 1866, Nemo's Nautilus was capable of diving to great depths, a feat that was largely fictional at the time. Today, deep-sea submersibles and remotely operated vehicles (ROVs) have made real what was once imagined by Verne. These advanced technologies allow scientists to explore the deep ocean floor, study hydrothermal vents, and discover new species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Sonar technology: In the novel, soundings could not reach the great depths of the ocean, leaving the mysteries of those regions largely unknown. Today, sonar technology has significantly advanced, enabling scientists to map the seafloor and identify underwater features, such as mountains, canyons, and trenches. Sonar is also used for tracking marine life and monitoring changes in the ocean environment.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Communication and navigation: The Nautilus was equipped with a sophisticated communication system that allowed Nemo to send messages across vast distances. In reality, at the time of the novel's publication, wireless communication was still in its infancy. Today, satellite technology allows for global communication and precise navigation systems that aid in ocean exploration and conservation efforts.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of oceans and species in 1866 vs today (warming, pollution, overfishing, endangered species)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Ocean health: In 1866, the state of the world's oceans was generally unknown due to limited exploration and understanding of marine ecosystems. Today, however, it is clear that human activities have significantly impacted ocean health. Warming waters, pollution, overfishing, and habitat destruction are major concerns that threaten marine biodiversity and ecosystem services.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine species: The marine life observed by Nemo in the Red Sea during his hunt for dugongs was diverse but largely unremarkable compared to today's discoveries. Since then, thousands of new marine species have been identified, many of which live at great depths or in extreme environments such as hydrothermal vents. Unfortunately, many of these unique species are now endangered due to human activities.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Overfishing and endangered species: In 1866, overfishing was not a significant concern, as fishing technology was less advanced and global fish stocks were more abundant. Today, however, overfishing is a major threat to marine ecosystems, with many fish populations depleted or at risk of collapse. Additionally, climate change and habitat destruction have led to the endangerment or extinction of numerous marine species, including iconic ones like the vaquita porpoise and the giant sea turtle.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In summary, while Jules Verne's Nautilus and its exploration of the deep ocean in 1866 were largely fictional, today's technologies have made many of Nemo's imaginings a reality. However, the state of the world's oceans has significantly deteriorated due to human activities such as overfishing, pollution, and climate change, leading to declines in marine biodiversity and ecosystem services.</p></div>\n          </div>\n        </div>"}}, "10": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'archipel grec</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Pour les uns, c'est un polypier, et pour d'autres tels que M. Milne Edwards, c'est un individu isolé et unique. La classe des spongiaires contient environ trois cents espèces qui se rencontrent dans un grand nombre de mers, et même dans certains cours d'eau où elles ont reçu le nom de «fluviatiles.» Mais leurs eaux de prédilection sont celles de la Méditerranée, de l'archipel grec, de la côte de Syrie et de la mer Rouge. Là se reproduisent et se développent ces éponges fines-douces dont la valeur s'élève jusqu'à cent cinquante francs, l'éponge blonde de Syrie, l'éponge dure de Barbarie, etc. Mais puisque je ne pouvais espérer d'étudier ces zoophytes dans les échelles du Levant, dont nous étions séparés par l'infranchissable isthme de Suez, je me contentai de les observer dans les eaux de la mer Rouge.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Requin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Rémora</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Spare</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Lamantin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Dugong</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'archipel grec</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, la zoologie marine a connu plusieurs avancées importantes, notamment en ce qui concerne l'étude des éponges marines. L'éminent naturaliste français Jean-Baptiste de Lamarck (1744-1829) avait déjà classé les éponges dans le règne animal au début du XIXe siècle, mais c'est à partir des années 1850 que la connaissance scientifique sur ces organismes a commencé à progresser rapidement.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Un des premiers naturalistes à s'intéresser aux éponges fut le français Georges Cuvier (1769-1832), qui les avait décrites pour la première fois en 1817 dans son ouvrage \"Le Règne Animal Distribué d'après son Organisation\". Mais c'est au milieu du XIXe siècle que l'étude des éponges a vraiment commencé à prendre de l'importance, notamment grâce aux travaux de Henri Milne-Edwards (1800-1885), un zoologiste français qui a consacré une grande partie de sa carrière à leur étude.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Milne-Edwards a identifié plusieurs centaines d'espèces d'éponges et a décrit leurs caractéristiques morphologiques et anatomiques. Il a également étudié leur répartition géographique, notamment en Méditerranée, dans les eaux de l'archipel grec, de Syrie et de la mer Rouge, comme mentionné dans le passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En plus des recherches menées par Milne-</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ L'archipel grec</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, était un personnage fictif possédant une connaissance avancée de son temps sur la biologie marine. Il savait par exemple distinguer les espèces de cétacés (baleine, cachalot) et reconnaître des espèces rares comme l'éponge blonde de Syrie. Aujourd'hui, grâce aux progrès de la génétique et des techniques d'imagerie, nous pouvons identifier et classer plus de 250 000 espèces marines différentes, dont certaines encore inconnues du grand public.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les découvertes scientifiques étaient limitées par la technologie disponible. Par exemple, Nemo utilisait des instruments optiques pour observer la vie marine, mais il ne disposait pas de sonar ou de techniques d'imagerie sous-marine avancées comme celles que nous utilisons aujourd'hui. Aujourd'hui, grâce à ces technologies, nous pouvons explorer les fonds marins et étudier la vie marine avec une précision et un détail inimaginables pour Nemo.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque le Nautilus passait par l'archipel grec, les océans étaient relativement peu pollués et la surpêche n'était pas encore un problème majeur. Aujourd'hui, les océans sont souvent contaminés par des déchets plastiques, des produits chimiques toxiques et d'autres pollutions industrielles. La surpêche a également eu des effets négatifs sur la biodiversité marine, avec une augmentation de la pêche illégale et la disparition de nombreuses espèces.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les espèces marines observées par Nemo étaient relativement abondantes dans leurs habitats naturels. Aujourd'hui, beaucoup d'espèces sont menacées par la pollution, la surpêche et le réchauffement climatique. Par exemple, la baleine bleue, qui était observée par Nemo, est maintenant en danger critique d'extinction. Les raies, les requins et les murènes ont également vu leur population diminuer drastiquement au cours des dernières décennies.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En conclusion, même si Jules Verne avait une connaissance avancée de la biologie marine pour son temps, les progrès de la science et la technologie ont permis d'explorer et d'étudier l'océan avec une précision et un détail inimaginables pour Nemo. Cependant, les océans sont aujourd'hui plus pollués que lors du passage du Nautilus dans l'archipel grec, et beaucoup d'espèces marines sont menacées par la surpêche et le réchauffement climatique.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>The Greek Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>CHAPTER VI</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>THE GRECIAN ARCHIPELAGO</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The next day, the 12th of February, at the dawn of day, the _Nautilus_</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5 focusing on invertebrates.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The exploration of the Greek Archipelago was part of a broader trend of geographical discovery and mapping during the 19th century. Scientists like Alexander von Humboldt (1769-1859) and Charles Lyell (1797-1875) made significant contributions to our understanding of the Earth's geography, geology, and climate.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the 1800s, Michael Faraday (1791-1867) conducted groundbreaking research in electromagnetism and electrochemistry. His experiments on electrolysis led to the discovery of new elements and laid the foundation for the field of electrical chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century saw significant advancements in the understanding and application of electricity. Instruments like the galvanometer, invented by William Thomas Thornold (1820-1855), were used to measure electric currents, contributing</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ The Greek Archipelago</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Science and Technology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In Jules Verne's \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus showcases advanced technology for its time, including underwater propulsion, diving capabilities, and a built-in library of marine knowledge. Today, while we don't have submarines like the Nautilus, our understanding of the ocean has expanded significantly due to advancements in technology. Modern oceanographic research vessels are equipped with sonar systems, remotely operated submersibles, and advanced sensors that allow scientists to explore deeper parts of the ocean, map the seafloor, and study marine life in greater detail than was possible in 1866. Additionally, technological advancements have led to the development of tools for monitoring and understanding climate change, pollution, and overfishing, which were not concerns during Verne's time.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, marine ecology was in its infancy, with limited scientific knowledge about the ocean's depths, species diversity, and ecosystem dynamics. Jules Verne's descriptions of various marine species like whales, sharks, rays, and moray eels are accurate for their time but lack the level of detail and understanding we have today. For example, Verne mentions sparidae (seabasses) as a common sight in the Greek Archipelago, which is true, but modern marine biology has since classified over 500 species within this family, with many more yet to be discovered.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Today, however, our understanding of marine ecology is far more comprehensive. We know that the oceans are facing numerous threats, including climate change-induced warming, pollution, overfishing, and habitat destruction. These factors have led to a decline in many marine species populations, with some becoming endangered or even extinct. For instance, sperm whales, which Verne's characters observe, are now listed as vulnerable by the International Union for Conservation of Nature (IUCN). In contrast, in 1866, these magnificent creatures were abundant and not yet threatened by human activities.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Furthermore, while Verne's characters express awe at the beauty and diversity of marine life, they do not acknowledge the importance of maintaining balance within marine ecosystems or the consequences of disrupting that balance. Today, we understand that every organism plays a crucial role in its ecosystem, and human actions can have far-reaching and often devastating impacts on marine biodiversity.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's descriptions of marine life and oceanography in \"20,000 Leagues Under the Sea\" were accurate for their time, our current understanding of marine ecology is vastly more comprehensive due to advancements in science and technology. However, these advancements also reveal the extent to which human activities have negatively impacted marine ecosystems over the past century.</p></div>\n          </div>\n        </div>"}}, "11": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Méditerranée</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style=' 95,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦭 Phoque</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Tortue marine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🧽 Éponge</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annélide</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Méditerranée</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à ce passage du roman de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les savants de l'époque ont effectué des recherches sur les espèces marines méditerranéennes, notamment les holoturies, les cétacés et les coquillages. Georges Cuvier (1769-1832), un naturaliste français considéré comme le père de la paléontologie, a étudié de nombreuses espèces marines. En 1848, Henri Milne-Edwards (1800-1885) et Alphonse Grandidier (1839-1921), deux zoologistes français, ont créé la Société Zoologique de France pour promouvoir les études en zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le passage fait référence à l'électricité, puisque le byssus des coquillages est utilisé pour tisser les étoffes. Les progrès de la science de l'électricité ont été significatifs au XIXe siècle. Michael Faraday (1791-1867), un chimiste et physicien britannique, a effectué des recherches importantes sur les propriétés électriques des matériaux. En 1831, il a inventé le générateur électromagnétique à aimant permanent.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : La découverte de la Méditerranée comme une \"nourrice prodigieuse\" peut être interprétée comme un hommage à sa richesse en res</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Méditerranée</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo savait/imaginait : Dans le roman, Nemo possède une connaissance avancée des sciences, notamment de la marine et de l'électricité, qui lui permettent de naviguer dans son sous-marin Nautilus. Il dispose également d'une alimentation sophistiquée, avec des conserves d'holoturies fournies par un Malais, une crème fournie par les cétacés et du sucre provenant des grands fucus de la mer du Nord. Enfin, il fabrique des confitures d'anémones.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Les découvertes actuelles : Aujourd'hui, bien que nous ne possédions pas un sous-marin équipé comme le Nautilus dans le roman, les progrès de la technologie ont permis de développer des engins autonomes de recherche sous-marine capables d'explorer les fonds marins à grande profondeur. En matière de nutrition, nous avons découvert que certains animaux marins peuvent être une source importante de protéines et d'autres nutriments, mais cela nécessite des processus de culture et de transformation complexes. Par ailleurs, la technologie permet maintenant de fabriquer du sucre à partir de sources renouvelables telles que le maïs ou les algues. Enfin, il est possible de produire des confitures d'anémones, mais cela nécessite un processus de conservation spécifique pour éviter leur dégradation.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- État des océans et des espèces en 1866 : Dans le roman, la Méditerranée est décrite comme une mer prodigieuse, fournissant une nourriture abondante et variée aux animaux marins. Les espèces observées par Nemo sont variées, allant du cachalot au saumon en passant par le dauphin, la raie, le squale, le thon, l'hareng et la murène.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Aujourd'hui : La situation est bien différente aujourd'hui. Les océans sont menacés par le réchauffement climatique, qui provoque une augmentation des températures de l'eau, une acidification des eaux et un dérèglement des courants marins. Cette situation a des effets négatifs sur les espèces marines, qui peuvent être menacées par la pollution, la surpêche et le réchauffement climatique lui-même. Par exemple, les cétacés sont souvent victimes de la chasse illégale ou accidentelle, ce qui menace leur population. Les raies sont également en danger, car elles ont une croissance lente et une faible taux de reproduction, ce qui les rend vulnérables aux prélèvements excessifs. Enfin, les espèces marines peuvent être affectées par la pollution plastique, qui provoque des morts accidentelles ou des dommages à leur santé.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Mediterranean Sea</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>CHAPTER VII</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>THE MEDITERRANEAN IN FORTY-EIGHT HOURS</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The Mediterranean, the blue sea par excellence, “the great sea” of the</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Hebrews, “the sea” of the Greeks, the “mare nostrum” of the Romans,</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); bor
