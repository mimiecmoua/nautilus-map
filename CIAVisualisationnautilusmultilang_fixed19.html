termediate navigation stop — no novel passage associated.</p>"}}, "23": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île Lucayes</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Labre</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Spare</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sciène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Coriphène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Blémie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Centronote</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Mugilomor</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Poulpe</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Lucayes</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été effectuées qui correspondent au passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les savants ont effectué de nombreuses expéditions pour étudier la vie maritime à des profondeurs considérables. Ainsi, en 1866, HMS Challenger a exploré les eaux autour des îles Lucayes (actuellement les Bahamas) et y a découvert de nouvelles espèces marines telles que les encrines, des étoiles de mer, des pentacrines, des troques, des quenottes sanglantes et des fissurelles. Les scientifiques ont également observé des mollusques littoraux de grande taille et des herbes marines géantes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Électricité : Le physicien Michael Faraday a conduit des recherches importantes sur l'électricité à cette époque, notamment sur la production d'énergie électrique par induction. Il a également découvert les lois de l'électrolyse et a inventé le générateur électromagnétique. Les savants ont commencé à utiliser des rayons électriques pour explorer les eaux profondes, comme dans ce passage où ils ont utilisé des rayons électriques pour éclairer des trous noirs sous-marins.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Géographie : Les expéditions scientifiques ont également contribué à la cartographie de l'océan Atlantique et aux connaissances sur les courants marins tels que le Gulf Stream, qui est mentionné dans ce passage. En 1</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île Lucayes</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, était conscient de la puissance des courants marins, notamment lors de l'entrée dans le Gulf Stream, mais sa compréhension de ces phénomènes était limitée par les connaissances scientifiques de son époque. Aujourd'hui, grâce aux progrès de la technologie et des sciences, nous avons une meilleure compréhension de ces courants marins, notamment leur rôle dans le réchauffement climatique global. Les satellites météorologiques permettent de suivre en temps réel les courants marins, tandis que les modèles numériques permettent de prédire leur comportement futur.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Nemo utilise des instruments tels que la loupe et le thermomètre pour observer la vie marine. Aujourd'hui, nous disposons d'instruments plus avancés tels que les sonars, les caméras sous-marines et les drones sous-marins qui permettent une observation plus détaillée de l'environnement marin.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque le Nautilus naviguait dans les eaux des îles Lucayes, la vie marine était abondante et diversifiée. Aujourd'hui, en raison du réchauffement climatique, de la pollution et de la surpêche, la biodiversité marine est menacée. Les espèces telles que les cétacés, les squales, les raies, les saumons, les morues, les murènes, les labres, les spares et bien d'autres sont en danger.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- La pollution marine est également un problème majeur aujourd'hui. Les déchets plastiques et autres polluants contaminent les océans et menacent la vie marine. En 1866, Nemo ne faisait pas mention de ce type de pollution, mais aujourd'hui, il est nécessaire d'agir pour protéger les océans de cette menace.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- La surpêche est également un problème majeur aujourd'hui. Les pêcheurs utilisent des techniques telles que la pêche à la dynamite et le dragage qui détruisent l'habitat marine et tuent les espèces en grand nombre. En 1866, Nemo ne faisait pas mention de cette pratique, mais aujourd'hui, il est nécessaire d'agir pour protéger la vie marine des effets néfastes de la surpêche.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Les espèces marines observées par Nemo sont encore présentes dans les océans aujourd'hui, mais leur population a beaucoup diminué en raison du réchauffement climatique, de la pollution et de la surpêche. Il est donc nécessaire d'agir pour protéger ces espèces et préserver leur habitat marine.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Lucayan Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>For several days the _Nautilus_ kept off from the American coast.</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Evidently it did not wish to risk the tides of the Gulf of Mexico or of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>the sea of the Antilles. April 16th, we sighted Martinique and</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Guadaloupe from a distance of about thirty miles. I saw their tall</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Ray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Wrasse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Sparidae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Croaker</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Mahi-mahi</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Blenny</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Pilot fish</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Mullet</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Lucayan Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, numerous expeditions were organized to explore and document marine life, particularly in tropical regions like the Caribbean. French naturalist Louis Agassiz led several expeditions to study glaciers and the geology of North America, while Alexander Agassiz, his son, focused on marine biology, especially in the Gulf Stream region where the Nautilus was traveling.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Biology and Evolution: Charles Darwin published \"On the Origin of Species\" in 1859, proposing the theory of evolution by natural selection. His work, based on his voyage aboard HMS Beagle, greatly influenced the understanding of life's diversity and the relationship between species. Another influential figure was Georges Cuvier, a comparative anatomist who classified many marine organisms and introduced the concept of extinction.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British chemist and physicist, made significant contributions to the understanding of electromagnetism and electrochemistry. He discovered the principles underlying electric motors, generators, and transformers, which would later be crucial for marine navigation and exploration.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was essential during this era. For instance, the hydrographic barometer, a device used to measure atmospheric pressure and air temperature, was crucial for navigating the open sea. Additionally, the invention of the microscope allowed scientists like Agassiz to study marine organisms in greater detail.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Lucayan Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Submarine Technology:** In 1866, Jules Verne imagined the _Nautilus_, a marvel of submarine technology powered by an unidentified source (later revealed as nuclear power in later novels). Today, while we don't have nuclear-powered submarines like the _Nautilus_, we do have advanced deep-sea submersibles and remotely operated vehicles (ROVs) that are used for exploration, research, and industrial purposes. These modern vessels are equipped with sonar systems, cameras, and robotic arms, enabling them to gather detailed information about marine life and the ocean floor.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. **Communication and Navigation:** In Verne's time, long-range communication and navigation were still in their infancy. The _Nautilus_ had an advanced onboard library but no means of instantaneous communication with the outside world. Today, we have satellite communication systems that allow ships to stay connected anywhere on Earth, and Global Positioning Systems (GPS) for precise navigation. Additionally, sonar technology has advanced significantly, allowing vessels to map the ocean floor in detail.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. **Underwater Life:** Verne's descriptions of marine life were based on the knowledge available at the time. He correctly identified several species such as sharks, rays, and cod, but his understanding of their behavior and ecological roles was limited. Today, our understanding of marine biology is vastly superior. We have discovered thousands of new species, understand complex ecosystems, and are aware of the intricate relationships between marine life and the environment.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. **Ocean Warming:** In 1866, the concept of global warming was not yet recognized. The Gulf Stream, which the _Nautilus_ entered, was known for its warm waters but its role in global climate was not understood. Today, we know that ocean warming is a major contributor to climate change, with the Gulf Stream playing a significant role in this process.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. **Pollution:** In Verne's time, pollution of the oceans was not a major concern. Industrialization was just beginning and waste disposal methods were rudimentary. Today, marine pollution is a serious issue, with plastic debris, chemical pollutants, and noise pollution affecting marine life and ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. **Overfishing and Endangered Species:** Overfishing has been a problem since the industrial revolution but was not widely recognized in 1866. Today, many fish species are overfished, leading to declining populations and altered ecosystem dynamics. Additionally, climate change and pollution have led to the endangerment or extinction of numerous marine species. For example, the vaquita, a small porpoise found in the Gulf of California, is critically endangered with fewer than 20 individuals remaining.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's imagination was remarkable, our understanding of science, technology, and marine ecology has advanced significantly since his time. We now have more powerful tools for exploration, communication, and conservation, but face new challenges such as climate change, pollution, and overfishing.</p></div>\n          </div>\n        </div>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques remarquables ont été effectuées dans le domaine de la zoologie marine, de l'électricité et de la géographie, correspondant au passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz (Suisse), un des plus grands naturalistes de son temps, a étudié les poissons osseux marins, notamment en Amérique du Nord. Il a décrit plusieurs espèces, dont certains labres-grisons et sciènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les sparidés, qui comprennent les spares-synagres, étaient l'objet d'études de Georges Cuvier (France) au début du XIXe siècle. Les chercheurs ont découvert que ces poissons possédaient un iris brillant comme un feu, ce qui est mentionné dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les coriphènes bleus relevés d'or et d'argent sont en fait des poissons-chats (Sphoeroides sp.), découverts par Louis Agassiz et John Richardson (Canada) au XIXe siècle.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne les perroquets vrais arcs-en-ciel de l'Océan, il s'agit probablement des poissons-arc-en-ciel (Hemirhamphus sp.), connus pour leur magnifique couleur.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cap Hatteras</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, était un pionnier de la connaissance marine pour son époque en 1866. Il utilisait des instruments de mesure tels que le baromètre, le thermomètre et l'hygromètre pour observer les conditions météorologiques et hydrologiques. Aujourd'hui, ces instruments ont évolué et sont remplacés par des systèmes plus sophistiqués tels que les satellites météorologiques, les profondeurs sonores, les radars et les sondes océanographiques qui permettent de mesurer précisément la température, la salinité, la pression et les courants marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo avait également une connaissance approfondie des espèces marines observées lors de son voyage. Cependant, sa compréhension des écosystèmes marins était limitée par le niveau de connaissances scientifiques de l'époque. Aujourd'hui, grâce aux progrès dans les domaines de la génétique et de la biologie moléculaire, nous avons une meilleure compréhension des relations entre les espèces marines, leur adaptation à différents environnements et leur évolution.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Enfin, Nemo utilisait le Nautilus pour explorer les fonds marins. Aujourd'hui, la technologie permet d'explorer les profondeurs de l'océan avec des engins autonomes tels que les sous-marins robotisés ou les drones sous-marins qui peuvent parcourir des distances plus grandes et collecter des données plus précises.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lors du voyage de Nemo à travers le Cap Hatteras, il observait une variété d'espèces marines telles que les saumons, les morues, les murènes, les gobies et les zoophytes. Cependant, l'époque était marquée par un manque de connaissance sur la pollution marine et le réchauffement climatique. Aujourd'hui, nous sommes au courant des impacts négatifs que ces phénomènes ont sur les écosystèmes marins tels que la destruction de l'habitat, la mortalité massive d'espèces et la migration des espèces invasives.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, le réchauffement climatique n'était pas encore un problème majeur pour les écosystèmes marins. Cependant, aujourd'hui, les océans sont en train de se réchauffer à cause du dérèglement climatique et cela a des conséquences graves sur les espèces marines telles que la mortalité massive d'espèces sensibles aux changements de température, la migration des espèces invasives et l'augmentation de la pollution marine.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, le réchauffement climatique n'était pas encore un problème majeur pour les écosystèmes marins. Cependant, aujourd'hui, les océans sont en train de se réchauffer à cause du dérèglement climatique et cela a des conséquences graves sur les espèces marines telles que la mortalité massive d'espèces sensibles aux</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: Renowned naturalists of the era, such as Georges Cuvier and Jean-Baptiste de Lamarck, made significant contributions to marine zoology. Cuvier, a pioneer in comparative anatomy, described numerous marine species, including sharks and whales. Lamarck proposed the concept of evolution, although his theories were later refined by Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations that expanded geographical knowledge, particularly of the oceans. Matthew Maury, known as the \"Pathfinder of the Seas,\" developed ocean current charts based on data collected from hundreds of ships' logbooks. His work contributed to understanding the Gulf Stream mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British scientist, made significant contributions to the fields of electromagnetism and electrochemistry. He discovered the principles of electromagnetic induction and invented various devices such as the Bunsen burner and the Faraday cage. His work laid the foundation for electric lighting and power generation, which may have influenced Verne's depiction of the Nautilus' advanced technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial during this period. For example, the marine chronometer, invented by John Harrison in the 18th century, improved navigation at sea. Additionally, the development of the dip net, dredge, and trawl enabled scientists to collect marine organisms more efficiently for study.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Cape Hatteras</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Comparison Between Jules Verne's Imagination (1866) and Current Discoveries (2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Navigation and Underwater Exploration: In 1866, Jules Verne described the Nautilus as a submarine capable of diving to great depths and navigating the ocean currents, including the Gulf Stream. While this was a work of fiction, modern-day submersibles and deep-sea exploration vehicles share some similarities with Verne's Nautilus in terms of their ability to explore the ocean depths. However, today's technology is far more advanced, allowing for higher resolution imaging, greater depth capabilities, and real-time communication with surface vessels.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Power Source: The power source of the Nautilus remains one of Verne's most intriguing inventions - a mysterious force that allowed the submarine to travel vast distances underwater without any external fuel or propulsion system. In contrast, modern submersibles and deep-sea exploration vehicles are powered by batteries, electric motors, or even nuclear reactors. These power sources enable extended underwater missions and allow for precise control over the vessels' movements.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Sonar and Mapping: Verne did not have access to sonar technology, which is essential for navigating underwater environments and mapping the ocean floor. Today, advanced sonar systems are used extensively in deep-sea exploration to create high-resolution maps of the seafloor and to locate marine life. These technologies have greatly expanded our understanding of the ocean's depths and the diversity of life that exists there.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (2025)**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine Biodiversity: In 1866, Verne observed various marine species during the Nautilus's journey, including salmon, cod, moray eels, goby, and zoophytes. While these species are still present in today's oceans, their populations have been significantly impacted by human activities such as overfishing, pollution, and climate change. Many marine species are now endangered or threatened, and efforts are underway to conserve and protect them.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Ocean Warming: In Verne's time, the Gulf Stream was a natural phenomenon that helped maintain relatively warm waters along the eastern coast of North America. Today, however, global warming has exacerbated this effect, causing ocean temperatures to rise at an alarming rate. This warming has far-reaching consequences for marine ecosystems, including coral bleaching, shifts in species distributions, and changes in ocean currents.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Pollution: In 1866, pollution was not a significant concern in the world's oceans. Today, however, plastic waste, chemical pollutants, and noise pollution pose serious threats to marine ecosystems. Plastic debris has been found in even the most remote parts of the ocean, posing a danger to both wildlife and human health. Chemical pollutants, such as heavy metals and persistent organic pollutants (POPs), can accumulate in marine organisms and biomagnify up the food chain, leading to significant health impacts for both humans and wildlife.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Overfishing: In 1866, overfishing was not yet a major concern, as fishing technologies were less advanced than they are today. However, overfishing has since become a significant problem, with many fish stocks being depleted or overexploited. This has led to declines in biodiversity, disruptions</p></div>\n          </div>\n        </div>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la période 1866-1870, les progrès scientifiques ont été significatifs dans plusieurs domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, des expéditions telles que celle de l'HMS Challenger (1872-1876) ont permis d'étendre notre connaissance sur les espèces marines et leur habitat. Des scientifiques tels que Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont contribué à la classification des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses expériences sur les électroaimants, les batteries et les réactions chimiques électriques. Ses travaux ont permis d'améliorer la compréhension des phénomènes électriques et ont ouvert la voie à de nouvelles applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition de Nils Adolf Erik Nordenskiöld (1870-1874) a permis de cartographier les régions polaires et d'étendre nos connaissances sur la glaciation. Des scientifiques tels que Alexander von Humboldt et Charles Lyell ont également contribué à l'avancement des connaissances en géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les travaux de Dmitri Mendeleev ont abouti à la création de la table périodique des éléments, qui a permis d'organiser les éléments chimiques et de prédire leurs propriétés. Les expériences de Louis Pasteur ont également contribu</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Long Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo possédait une connaissance avancée de la navigation et des instruments marins pour le Nautilus, notamment l'hélice, les feux, et le canot du pilote. Aujourd'hui, ces technologies ont évolué considérablement avec l'utilisation de GPS, radars, sonars et autres systèmes d'aide à la navigation plus avancés.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo avait également des connaissances en hydrodynamique pour amener le Nautilus à plonger et remonter rapidement dans l'eau, ce qui est aujourd'hui possible grâce aux sous-marins modernes équipés de propulseurs électriques. Cependant, Nemo n'avait pas d'idée des processus physiques sous-jacents tels que la thermodynamique ou les lois de l'hydrodynamique.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En matière de science marine, Nemo avait une connaissance limitée des espèces marines observées lorsqu'il ait décrit le narval, le cétacé, le saumon, la morue, la murène, le gobie, le corail et le zoophyte. Aujourd'hui, la science marine a avancée considérablement avec l'utilisation de techniques telles que la génomique pour étudier les espèces marines et comprendre leur évolution, leur écologie et leur comportement.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, lorsque Jules Verne a écrit \"20 000 lieues sous les mers\", la pollution des océans n'était pas encore un problème majeur. Aujourd'hui, les océans sont menacés par la pollution plastique et chimique, qui ont des effets néfastes sur les espèces marines ainsi que sur l'équilibre écologique global.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, il y avait probablement une surpêche dans certaines régions, mais aucune mention n'est faite du phénomène dans le roman. Aujourd'hui, la surpêche est un problème majeur pour de nombreuses espèces marines, qui sont menacées par la pêche illégale et la pêche à grande échelle.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les espèces marines observées dans le roman étaient probablement abondantes dans leur habitat naturel. Aujourd'hui, de nombreuses espèces marines sont menacées d'extinction, notamment les tortues marines et les dauphins, en raison du réchauffement climatique, de la pollution, de la surpêche et de la destruction de leur habitat.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Ainsi, alors que Nemo avait une connaissance avancée de la navigation et des instruments marins pour le Nautilus, les progrès de la science marine aujourd'hui ont permis d'avancer considérablement dans l'étude des espèces marines et leur écologie. Cependant, les océans sont menacés par la pollution plastique et chimique, la surpêche et le réchauffement climatique, qui ont des effets néfastes sur de nombreuses espèces marines.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The _Abraham Lincoln_ answered by hoisting the American colours three times, whose thirty-nine stars shone resplendent from the mizzen-peak; then modifying its speed to take the narrow channel marked by buoys placed in the inner bay formed by Sandy Hook Point, it coasted the long sandy beach, where some thousands of spectators gave it one final cheer. The escort of boats and tenders still followed the frigate, and did not leave her until they came abreast of the lightship, whose two lights marked the entrance of New York Channel. Six bells struck, the pilot got into his boat, and rejoined the little schooner which was waiting under our lee, the fires were made up, the screw beat the waves more rapidly, the frigate skirted the low yellow coast of Long Island; and at eight bells, after having lost sight in the north-west of the lights of Fire Island, she ran at full steam on to the dark waters of the Atlantic. CHAPTER IV NED LAND Captain Farragut was a good seaman, worthy of the frigate he commanded. His vessel and he were one.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><s arkable invention for its time, featuring advanced technologies such as electric propulsion, diving capabilities, and an internal air supply system. While these elements were purely fictional, modern submarines share some similarities in terms of functionality. However, contemporary submarines are far more sophisticated, with sonar systems, missile launchers, and advanced navigation systems that Nemo could not have imagined.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Sonar and Navigation: The Nautilus's ability to navigate underwater using buoys was a fascinating concept for the 19th century. Today, sonar technology has evolved significantly, allowing submarines and ships to use active or passive sonar systems for navigation, object detection, and communication with other vessels. Additionally, Global Positioning System (GPS) technology has revolutionized marine navigation, providing accurate location information that was not available in Nemo's era.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Communication: In the novel, Captain Nemo communicated with shore stations using electric signals, a concept that was ahead of its time. Today, underwater communication has advanced dramatically, with acoustic modems, optical communication systems, and even undersea cables connecting continents. These advancements have significantly improved our ability to gather data from the ocean depths and communicate with submerged vessels.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Ocean Warming: In 1866, the concept of global warming was not yet recognized. Today, however, it is a significant concern, with ocean temperatures rising at nearly twice the rate of atmospheric temperatures. This warming has profound effects on marine ecosystems, causing coral bleaching, shifts in species distributions, and alterations to food webs.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Pollution: In the 19th century, pollution was not a major issue in the oceans as it is today. However, industrialization and urban development have led to significant increases in marine pollution, particularly plastic waste, heavy metals, and chemical pollutants. These pollutants pose threats to marine life, with many species ingesting or becoming entangled in waste materials.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Overfishing and Endangered Species: In 1866, overfishing was not a significant concern due to less advanced fishing technologies and smaller human populations. Today, however, overfishing is a major issue, with many fish stocks depleted or at risk of collapse. This has led to the endangerment or extinction of numerous species, including the Narwhal, which Nemo observed during his surface storm encounter. Climate change and habitat destruction have also contributed to the decline of many marine species.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's Nautilus and its technologies were ahead of their time, they pale in comparison to the sophisticated submarines and underwater technology of today. Similarly, the state of the oceans and marine life has drastically changed since 1866, with significant challenges posed by ocean warming, pollution, overfishing, and endangered species. These contrasts highlight both the imagination and foresight of Verne's work, as well as the need for continued efforts to protect and understand our oceans.</p></div>\n          </div>\n        </div>"}}, "26": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Terre Neuve</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Louis Agassiz, un zoologiste suisse, a étudié la glaciation et la théorie de la dérive des continents. Il a également contribué à la classification des poissons marins. En marine, le naturaliste français Jean-Baptiste Lamarck, ainsi que son compatriote Georges Cuvier, ont décrit de nombreuses espèces marines, y compris celles que le Professeur Aronnax note dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la géographie et la météorologie, les chercheurs ont commencé à comprendre le rôle des courants marins, notamment le Gulf Stream, décrit ici comme un courant chaud qui traverse l'Atlantique et se divise en deux bras vers le 43e degré. Le physicien Michael Faraday a également étudié la thermodynamique des courants marins et leur influence sur les climats.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, pendant cette période, l'utilisation d'instruments scientifiques tels que les baromètres, les thermomètres et les instruments de navigation ont permis aux expéditions scientifiques telles que celle du HMS Challenger (1872-1876) de collecter des données précises sur la géographie, la zoologie marine, la chimie et l'électricité des océans. Ces expéditions ont permis d'étendre notre connaissance du monde marin et ont contribué à la révolution scientifique de cette époque.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Terre Neuve</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de son époque pour la navigation et l'exploration marine. Il utilisait des instruments tels que le chronomètre, la boussole et la carte maritime pour déterminer leur position. Aujourd'hui, les technologies ont considérablement évolué avec l'utilisation de GPS, sonar et satellites pour la navigation et l'exploration marine. Les sous-marins modernes sont équipés de systèmes avancés de communication et de recherche scientifique échauffement climatique qui affecte leur habitat. Les cétacés sont également menacés par la pollution plastique, les baleines à bosse ont été particulièrement touchées par cette pollution. Le corail est une espèce clé pour l'équilibre des écosystèmes marins et sa mort peut entraîner une cascade d'effets négatifs sur la vie marine.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Newfoundland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,1 }}, "27": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Irlande</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;back approfondie de la dynamique des écosystèmes coralliens et des menaces qui les menacent, tels que le réchauffement climatique et l'acidification océaniques. De plus, la technologie a permis d'effectuer des explorations sous-marines plus profondes grâce aux sous-marins robotisés et à l'utilisation de sonar pour cartographier les fonds marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le domaine de la navigation, Nemo utilisait des instruments optiques tels que des lunettes et des télescopes pour observer les phénomènes météorologiques et géographiques. Aujourd'hui, nous utilisons des satellites météorologiques pour prédire le temps et cartographier la Terre avec une précision inégalée.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les océans étaient relativement peu connus et mal explorés. Jules Verne décrit une abondance de diverses espèces marines telles que baleine, squale, hippocampe, poule d'eau, crabe, corail, etc. Cependant, aujourd'hui, les océans sont menacés par le réchauffement climatique qui entraîne la dégradation des écosystèmes coralliens et la disparition de nombreuses espèces marines. La pollution marine est également un problème majeur, avec des déchets plastiques qui contaminent les océans et tuent des milliers d'animaux marins chaque année.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Surpêche est également un problème majeur aujourd'hui, avec certaines espèces menacées à la disparition. Par exemple, la baleine bleue est en danger critique d'extinction et son nombre a diminué de plus de 90% depuis le début du XXe siècle.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En revanche, la connaissance des océans a grandement progressé aujourd'hui grâce à l'utilisation de technologies telles que les satellites et les sous-marins robotisés pour étudier les phénomènes marins et les écosystèmes. Cela permet une meilleure compréhension des menaces qui les menacent et un meilleur suivi de leur évolution.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Ireland</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Porpoise</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Shark</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3r e of marine technology for his time, as the Nautilus is equipped with innovative features such as an electric torpedo, a periscope, and underwater propulsion. However, in contrast to 1866, today's scientific reality has seen significant advancements in marine technology. Modern submarines utilize sonar systems for navigation and detection of underwater objects, including marine life. Additionally, deep-sea exploration vessels like the Nautilus (a real research vessel operated by Ocean Exploration Trust) are equipped with advanced robotics, remote operated vehicles (ROVs), and autonomous underwater vehicles (AUVs) that can collect high-resolution data about the ocean floor and its inhabitants.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Furthermore, Nemo's Nautilus was powered by an unknown source of energy, while today's submarines run on nuclear power or batteries. The development of renewable energy sources, such as hydrogen fuel cells, is a promising direction for future underwater vehicles to minimize environmental impact. In terms of communication, the Nautilus had a telegraph system to send and receive messages, whereas modern submersibles use satellite communication systems for real-time data transmission.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Marine Ecology:</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>The marine environment described by Verne in 1866 is relatively pristine compared to today's oceans. In the novel, Nemo takes the crew on a tour of the Ceylon pearl fisheries, which were likely sustainable at that time due to limited human impact and overfishing. However, in 2025, marine ecosystems face numerous threats such as climate change, pollution, overfishing, and habitat destruction.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Warming oceans have led to coral bleaching events, threatening the survival of reef-building corals and impacting biodiversity within these ecosystems. Pollution from land-based sources, including plastic waste, heavy metals, and nutrient runoff, also poses a significant threat to marine life. Overfishing has depleted many fish populations, leading to declines in biodiversity and disrupting food webs. Endangered species like the blue whale, once hunted nearly to extinction, are now protected but still face challenges from pollution, noise pollution from shipping, and climate change.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast, conservation efforts have improved since 1866, with the establishment of marine protected areas (MPAs) to protect vulnerable ecosystems and species. Additionally, international agreements like the United Nations Convention on the Law of the Sea aim to manage and conserve marine resources sustainably. However, more action is needed to address the ongoing threats facing our oceans and ensure their health for future generations.</p></div>\n          </div>\n        </div>"}}, "28": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Manche</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cachalot</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐬 Marsouin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20
