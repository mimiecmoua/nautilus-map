<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Une douzaine d'appareils de scaphandres, suspendus à la paroi, attendaient les promeneurs. Ned Land, en les voyant, manifesta une répugnance évidente à s'en revêtir. «Mais, mon brave Ned, lui dis-je, les forêts de l'île de Crespo ne sont que des forêts sous-marines! —Bon! fit le harponneur désappointé, qui voyait s'évanouir ses rêves de viande fraîche.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1866-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne. Les savants de l'époque ont exploré la zoologie marine, l'électricité, la chimie et la géographie pour comprendre les forêts sous-marines et les créatures marines étranges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz, un zoologiste suisse, a étudié la vie marine dans les eaux profondes. Il a découvert des espèces de poissons et d'autres animaux inconnus jusqu'alors. En France, Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont également contribué à la connaissance de la zoologie marine en décrivant de nouveaux genres et espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'électricité, Michael Faraday a effectué des recherches importantes sur les propriétés électriques des matériaux. Il a inventé le générateur électrique à aimant permanent, qui a permis de produire de l'électricité en grande quantité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les expéditions scientifiques ont également joué un rôle important dans la découverte de nouvelles espèces marines et des forêts sous-marines. La Royal Society a organisé une expédition à bord du HMS Challenger entre 1872 et 1876, qui a exploré les océans du monde entier et a collecté de nombreuses données sur la géographie marine, la zoologie, la chimie et l'élect</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Île de Crespo</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de la marine pour son époque, avec des connaissances sur les espèces marines telles que les baleines, narvals et cétacés. Cependant, il manquait d'une compréhension complète de l'océan, notamment en matière de biologie marine, écologie et géologie sous-marine. Aujourd'hui, nos connaissances ont grandement évolué grâce aux avancées technologiques telles que les sonars, la robotique sous-marine et l'exploration spatiale qui nous permettent d'en apprendre plus sur le fond marin. Par exemple, les sonars permettent de détecter des espèces rares ou endémiques, tandis que la robotique sous-marine peut collecter des données sur l'environnement et les écosystèmes marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, Ned Land utilise un scaphandre pour explorer la forêt sous-marine de l'île Crespo. Bien que les scaphandres soient connus depuis plusieurs siècles, ceux utilisés aujourd'hui sont bien plus avancés et permettent une exploration plus profonde et plus longue. Aujourd'hui, les scaphandres sont équipés de systèmes de respiration autonome, de caméras sous-marines et d'autres instruments de mesure pour collecter des données sur l'environnement marin.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les océans étaient peu connus et peu explorés, ce qui a permis à Jules Verne de créer une forêt sous-marine fantastique sur l'île Crespo. Aujourd'hui, nous connaissons bien plus sur les océans et leurs écosystèmes, mais la situation n'est pas aussi optimiste. Les océans sont menacés par le réchauffement climatique, la pollution marine, la surpêche et la pollution sonore. Par exemple, le réchauffement climatique fait que les océans deviennent plus acides, ce qui peut avoir des effets néfastes sur les espèces marines telles que les coraux.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Dans le roman, les espèces marines sont abondantes et variées, avec des baleines, narvals, moules, homards et crabes. Aujourd'hui, beaucoup de ces espèces sont menacées ou en voie de disparition. Par exemple, certaines espèces de baleine sont en danger d'extinction à cause de la surpêche et du bruit des navires. De plus, les océans sont pollués par des déchets plastiques qui peuvent tuer des animaux marins ou les empêcher de se nourrir.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En conclusion, bien que Jules Verne ait décrit une forêt sous-marine fantastique dans son roman de 1866, la réalité scientifique d'aujourd'hui montre que les océans sont menacés par plusieurs facteurs tels que le réchauffement climatique, la pollution marine et la surpêche. Les avancées technologiques ont permis de mieux comprendre l</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced rapid growth during this period. French naturalist Georges Cuvier (1769-1832), although his work was mainly in the 18th century, laid the foundation for comparative anatomy and paleontology, which were crucial for understanding marine species. In the later part of the 19th century, Jean Baptiste de Lamarck (1744-1829) and Louis Agassiz (1807-1873) made significant contributions to marine biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>One notable figure in this context is French zoologist Henri Marie Ducrotay de Blainville (1777-1850), who described several deep-sea organisms, including the anglerfish and the vampire squid. His work provided valuable insights into the biodiversity of deep-sea environments.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Electrical Science: The 19th century saw a surge in understanding electricity, with Michael Faraday (1791-1867) being one of its most prominent figures. He made groundbreaking contributions to electromagnetism and electrochemistry. His inventions, such as the electric motor and the dynamo, laid the foundation for electrical technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: Exploration and mapping of new territories were ongoing during this period. The Royal Geographical Society, established in 1830, played a significant role in funding expeditions and promoting geographical research. In marine geography, Matthew Maury (1806-1873) made substantial contributions to the</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Crespo Island</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In the context of Jules Verne's \"20,000 Leagues Under the Sea,\" set in 1866, Captain Nemo's submarine, the Nautilus, showcases an impressive level of advanced technology for its time. The Nautilus was capable of diving deep into the ocean, navigating underwater currents, and even launching harpoons for hunting purposes. However, in comparison to today's scientific reality (2025), the technology described by Verne pales in comparison to modern submarines and underwater exploration vehicles. Modern submersibles can withstand extreme pressure, travel much deeper, and are equipped with advanced sonar systems, cameras, and robotic arms for research and exploration purposes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In terms of marine ecology, the state of oceans and species in 1866 contrasts significantly with today's reality. In Verne's novel, Professor Aronnax and his companions observe various marine species such as whales, narwhals, cetaceans, mussels, lobsters, and crabs. While these species still exist today, the state of their populations and the overall health of our oceans have dramatically changed due to human activities.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Overfishing has depleted many fish stocks worldwide, leading to the decline or extinction of certain species. For example, bluefin tuna, a species observed by Aronnax, is now critically endangered due to overfishing. Additionally, pollution and climate change have caused significant damage to marine ecosystems. Warming ocean temperatures have led to coral bleaching events, which destroy fragile reef ecosystems and impact the biodiversity they support. Pollution, particularly plastic waste, has also become a major issue, with millions of tons of plastic debris accumulating in our oceans, harming marine life and disrupting ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In contrast to the pristine underwater forests and abundant wildlife described by Verne, today's oceans face numerous challenges that threaten their health and the survival of many species. While technology has advanced significantly since 1866, addressing these environmental issues remains a critical challenge for scientists, policymakers, and society as a whole.</p></div>\n          </div>\n        </div>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le Nautilus devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait. Cependant, toujours entraînés par ce Nautilus, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Alexandre Dumas et Jules Verne ont popularisé l'archipel des Pomotou en publiant leurs romans respectivement en 1864 et 1870, mais il s'agit d'une fiction car cet archipel n'existe pas réellement. Cependant, dans le contexte de l'époque, les savants ont exploré les mers plus fréquentées et ont découvert des coques naufragées et des objets de fer dégradés par la rouille, ce qui peut être comparé au passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Pour les découvertes scientifiques, Charles Darwin a publié son ouvrage \"L'Origine des espèces\" en 1859, dans lequel il propose sa théorie de l'évolution par sélection naturelle. Il a également exploré la région du Pacifique Sud pendant son voyage sur le HMS Beagle entre 1831 et 1836.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, Henri Milne-Edwards a décrit de nombreuses espèces de crustacés et d'autres animaux marins durant cette période. Il a également fondé la Société zoologique de France en 1860.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Michael Faraday a effectué des recherches importantes sur l'électrolyse, les électrochimie et la physique des gaz. Son travail a permis d'expliquer la structure moléculaire de l'eau et du chlorure de sod</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de son temps pour l'époque (1866) sur la navigation sous-marine et les technologies marines. Il maîtrisait par exemple les techniques de plongée en apnée, l'utilisation d'un sous-marin à propulsion électrique, et avait une certaine compréhension des phénomènes océaniques tels que la marée et le courant. Cependant, il n'avait pas de connaissance sur les découvertes actuelles (2025) telles que l'utilisation de la sonar pour la détection d'objets sous-marins, la cartographie océanique par satellite, ou encore la technologie des robots sous-marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- De plus, Nemo avait une connaissance limitée sur les espèces marines qu'il observait, alors que nous avons maintenant un accès à de nombreuses informations grâce aux bases de données mondiales sur la biodiversité marine et aux études génétiques.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les océans étaient encore peu connus et explorés, et il n'y avait pas encore d'alerte sur le réchauffement climatique ou la pollution des mers. Les espèces marines observées par Nemo étaient abondantes et variées, mais il n'y avait pas encore de problèmes majeurs de surpêche ou de dégradation de l'environnement sous-marin.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Aujourd'hui (2025), les océans sont plus connus et mieux explorés, mais nous avons également une alerte sur le réchauffement climatique et la pollution des mers. Les espèces marines ont été touchées par ces problèmes, avec des espèces menacées d'extinction, des zones de dégradation écologique, et une surpêche excessive qui pèse lourd sur les populations de poissons. Nous avons également maintenant un accès à des informations sur la biodiversité marine et les problèmes environnementaux grâce aux études scientifiques et aux bases de données mondiales.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pomotou Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck and Georges Cuvier, both influential naturalists of the time, contributed significantly to marine zoology. Lamarck proposed a theory of evolution, although it was later replaced by Charles Darwin's theory of natural selection. Cuvier, known as the \"father of paleontology,\" made important contributions to the study of fossilized marine life.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw numerous expeditions aimed at mapping and exploring remote regions, including the Pacific islands mentioned in the passage. One such expedition was led by Louis Antoine de Bougainville, who discovered the Pomotou Archipelago in 1768. Another notable figure was Alexander von Humboldt, a German polymath who explored South America and made significant contributions to geography, geology, and biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday, an English chemist and physicist, conducted groundbreaking research on electrochemistry and electromagnetism during this period. He discovered benzene and invented the first electric motor and generator. His work laid the foundation for future developments in electricity and chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century was a time of significant advancements in the field of electricity. André-Marie Ampère, a French physicist, made important contributions to electrodynamics and magnetic circuits. He formulated Ampere's law, which describes how electric currents generate magnetic fields.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Submarine technology: In 20,000 Leagues Under the Sea (1866), Jules Verne imagined the Nautilus as a technologically advanced submarine, capable of diving to great depths and navigating underwater with an internal propulsion system. While the Nautilus was a work of fiction, modern submarines share some similarities in their ability to operate underwater for extended periods. However, current submarines are significantly more sophisticated, equipped with sonar systems, satellite communication, and advanced navigation technology that far surpasses Verne's descriptions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Underwater exploration: Verne's Nautilus was capable of exploring the ocean depths and discovering various marine species, as well as sunken ships and artifacts. In reality, deep-sea exploration has come a long way since 1866. Today, robotic submarines (ROVs) and human-occupied vehicles (HOVs) are used for scientific research and industrial applications, allowing us to explore the deep sea more effectively and safely than the Nautilus could in Verne's novel. Additionally, advancements in oceanography have led to a better understanding of marine ecosystems, geology, and biology.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Marine species: In the Pomotou Archipelago described by Verne, various marine species such as cetaceans, sharks, rays, tuna, herring, lamprey, goby, and squid were observed. While these species are still present in today's oceans, their populations have been affected by human activities like overfishing, pollution, and climate change. For example, many fish species are now endangered or overexploited due to overfishing, and the decline of certain marine mammals, such as whales, is linked to historical hunting practices.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Ocean health: In 1866, Verne's Nautilus encountered sunken ships and artifacts that were rotting in the depths, a sign of pollution not yet widespread at that time. Today, ocean pollution has become a significant concern due to plastic waste, chemical spills, and other forms of marine debris. Additionally, climate change has led to rising sea temperatures, acidification, and altered current patterns, all of which have negative impacts on marine ecosystems and species distribution. The Pomotou Archipelago today would likely show evidence of these environmental changes, with potentially different marine species compositions and habitat degradation compared to Verne's time.</p></div>\n          </div>\n        </div>"}}, "2": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des nouvelles Hébrides</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, le naturaliste français Jean-Baptiste Lamarck a étudié les mollusques en détail, notamment les huîtres. Il a classifié plus de 100 espèces différentes et a décrit leur anatomie, leur physiologie et leur écologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'expédition dans les Nouvelles-Hébrides, le naturaliste français Louis Antoine de Bougainville a exploré ces îles en 1768. Plus tard, en 1773, le navigateur britannique James Cook a renommé ce groupe d'îles pour l'honorer.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, Michael Faraday a découvert les propriétés électrochimiques des solutions et a inventé le premier électrolyte. Il a également étudié l'électricité et les gaz, notamment l'hydrogène et l'oxygène.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la géographie, le naturaliste français Georges Cuvier a contribué à la cartographie des régions du monde en explorant l'Amérique du Sud et l'Afrique. Il a également étudié les fossiles et a développé une théorie sur l'extinction des espèces.</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo, le capitaine du Nautilus dans le roman de Jules Verne, possédait une connaissance avancée de son temps sur les espèces marines. Par exemple, il savait que l'huître était un aliment sans risque d'indigestion pour les humains, alors qu'aujourd'hui nous savons que certains types d'huîtres peuvent contenir des bactéries toxiques telles que V ry energy sources for submarines today are nuclear power and batteries, with research ongoing into alternative technologies such as fuel cells and solar panels.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Communication Systems: Verne's Nautilus had a telegraphic communication system that allowed Captain Nemo to send messages to various parts of the world. Today, submarines have advanced communication systems that enable real-time data transmission, navigation aid, and emergency distress calls. Additionally, modern submarines use sonar systems for underwater exploration and navigation.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Warming: In 1866, the oceans were relatively cooler compared to today due to less industrial activity and greenhouse gas emissions. The increase in global temperatures since then has led to ocean warming, causing coral bleaching, sea-level rise, and changes in marine species distribution.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Pollution: In 1866, the oceans were relatively cleaner compared to today due to less industrial waste and plastic pollution. The rapid industrialization since then has led to an increase in ocean pollution, with plastic debris posing a significant threat to marine life.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>3. Overfishing: In 1866, overfishing was not as prevalent as it is today. The increasing demand for seafood and unsustainable fishing practices have depleted many fish stocks worldwide, threatening the balance of marine ecosystems.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>4. Endangered Species: Many marine species that were abundant in 1866 are now endangered or threatened due to habitat loss, pollution, overfishing, and climate change. For example, parrotfish, one of the species observed during the Nautilus' stop at Cape Wessel, is now listed as vulnerable by the International Union for Conservation of Nature (IUCN).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Jules Verne's vision of technology in 20,000 Leagues Under the Sea was remarkably prescient, the state of marine ecology today presents a stark contrast to what it was in 1866 due to human activities. The challenges posed by ocean warming, pollution, overfishing, and endangered species require urgent attention and action for the preservation of our oceans.</p></div>\n          </div>\n        </div>"}}, "5": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Mer de Timor</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mer de Timor</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les progrès considérables ont été réalisés dans de nombreux domaines scientifiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, des expéditions telles que celle de l'Albatros (1864-1867) menée par Henri de Lacépède et Charles-Alexandre Lesueur ont permis d'étudier en détail les espèces marines du Pacifique Sud, y compris la mer de Timor. Ils ont découvert de nombreuses nouvelles espèces, dont certaines étaient inconnues jusqu'alors.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En électricité, Michael Faraday a effectué des recherches importantes sur les propriétés électriques et magnétiques du fer, ce qui a conduit à l'invention de la dynamo en 1831. Cette invention a permis de produire de l'électricité en mouvement, ce qui était particulièrement utile pour les navires à vapeur comme le Nautilus dans le roman de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, Jean-Baptiste Dumas a développé la théorie des combinaisons chimiques et a découvert plusieurs nouveaux éléments chimiques, dont l'iode en 1811. Les progrès dans la chimie ont permis de comprendre les propriétés et le comportement des substances marines, ce qui a été utile pour l'exploration marine.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la géographie, Charles Darwin a effectué une expédition autour du monde sur la HMS Beagle entre 1831 et 183</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Mer de Timor</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Généré par Mistral (IA locale)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>1. Sciences et technologie :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo possédait une connaissance remarquable des océans, notamment de la géographie maritime et de la position exacte du Nautilus. Il utilisait un cartographe sous-marin pour déterminer les positions des récifs, ce qui était extrêmement avancé pour l'époque. Aujourd'hui, nous disposons de systèmes de navigation GPS et de cartes numériques très précises qui permettent une localisation plus fine et plus rapide. De plus, la technologie sous-marine a évolué considérablement avec l'utilisation de sonars et de robots sous-marins pour explorer les fonds marins.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- Nemo disposait d'une connaissance avancée des espèces marines observées dans le roman, notamment du cétacé, du poisson perroquet, de la huître, du moule, des coquillages, des gastéropodes, des coraux et des zoophytes. Cependant, il n'avait pas connaissance de leur classification scientifique ou de leurs relations écologiques. Aujourd'hui, grâce aux progrès de la biologie marine, nous disposons d'une compréhension plus profonde de ces espèces et de leur rôle dans l'écosystème marin.</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Aujourd'hui</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>2. Écologie marine :</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, les océans étaient peu connus et peu explorés, ce qui a permis à Nemo de naviguer dans des zones inexplorées. Aujourd'hui, nous avons une connaissance plus approfondie des océans, mais ils sont menacés par le réchauffement climatique, la pollution, la surpêche et les espèces invasives. Les changements climatiques ont entraîné une augmentation de la température des océans, ce qui a un impact négatif sur les espèces marines et la biodiversité marine. La pollution est également un problème majeur pour les océans avec l'accumulation de déchets plastiques et d'autres polluants dans les eaux marines.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>- En 1866, il n'y avait pas encore de préoccupations sérieuses concernant la surpêche ou les espèces menacées. Aujourd'hui, plusieurs espèces marines sont menacées par la surpêche et la pollution, notamment le grand requin blanc, le dauphin à bec court et le tortue verte. Les efforts pour protéger ces espèces comprennent des zones marines protégées et des réglementations de pêche strictes.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>En conclusion, les connaissances scientifiques de Nemo sur les océans étaient avancées pour l'époque, mais nous avons maintenant une compréhension plus approfondie des océans et de leurs problèmes actuels. Les changements climatiques et la pollution sont des problèmes majeurs pour les océans aujourd'hui, alors que Nemo navigait dans un monde encore peu exploré.</p></div>\n          </div>\n        </div>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Timor Sea</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Timor Sea</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Systematics: Georges Cuvier (1769-1832) and Jean-Baptiste de Lamarck (1744-1829), although their work predated the specified time frame, laid the foundation for modern comparative anatomy and systematics. Their studies contributed to a better understanding of marine life, including fish, mollusks, and corals. Another notable figure was Henri Marie Ducrotay de Blainville (1777-1850), who described numerous species of cephalopods, such as the octopus and squid.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive exploration of the Pacific Ocean, including the Timor Sea region mentioned in your passage. James Cook (1728-1779) and Charles Darwin (1809-1882) were among those who made significant contributions to our understanding of this region through their voyages. In 1836, Dumont d'Urville discovered the island of Timor during his expedition.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1867) was a prominent chemist and physicist who made significant contributions to electrochemistry and electromagnetism. His work on electrolysis, published in 1834, laid the foundation for battery technology and the study of electricity in seawater.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments played a crucial role in advancing knowledge during this period. For example, the invention of the marine chronometer by John Harrison (1693-1776) allowed for precise</p>", "compare_1866_today": "\n        <h3 style='color:#c8d8e8; font-size:1.85rem; margin-bottom:6px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.3rem; margin-bottom:4px;'>⚗️ Timor Sea</h5>\n        <div style='color:#607080; font-size:1rem; margin-bottom:18px;'>✨ Generated by Mistral (local AI)</div>\n        <div style='display:grid; grid-template-columns:1fr 1fr; gap:16px;'>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🕰️ 1866 — Jules Verne</div>\n            <div style='padding:16px 18px; background:rgba(39,195,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**Comparison of Jules Verne's description in \"20,000 Leagues Under the Sea\" (1866) and contemporary marine reality (2025) on the axes of science and technology, and marine ecology:**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**1. Science and Technology: What Nemo knew/imagined vs current discoveries**</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, Jules Verne's character Captain Nemo showcased an advanced understanding of oceanography for his time, navigating the Nautilus by longitude and latitude, and even mentioning underwater geographical features like Money reefs and Victoria reefs. However, compared to 2025, modern technology has significantly advanced. The Nautilus' propulsion system, while seemingly advanced for its time, pales in comparison to today's submarines that use nuclear power or electric motors for silent, efficient navigation.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Moreover, Nemo's knowledge of marine life was also limited compared to current understanding. While he correctly identified several species such as cetaceans, parrotfish, oysters, mussels, and gastropods, his lack of awareness about deeper-dwelling organisms like deep-sea fish and cephalopods is evident. In contrast, modern oceanography has made significant strides in understanding and exploring these depths using advanced submersibles and remotely operated vehicles (ROVs).</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>**2. Marine Ecology: State of oceans and species in 1866 vs today**</p></div>\n          </div>\n          <div style='border-radius:10px; overflow:hidden; border:1px solid rgba(39,195,159,0.25);'>\n            <div style='padding:11px 16px; background:rgba(39,195,159,0.18);\n                        color:#27c39f; font-size:1.15rem; font-weight:600;'>🌍 2025 — Today</div>\n            <div style='padding:16px 18px; background:rgba(39,100,159,0.05);'><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In 1866, the Timor Sea as described by Verne was relatively pristine, with diverse marine life such as cetaceans, parrotfish, oysters, mussels, and corals. However, fast-forward to 2025, the state of the world's oceans is significantly different due to various anthropogenic pressures.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Warming: The Timor Sea, like many other ocean regions, has experienced warming due to climate change. This rise in temperature poses threats to marine life, causing coral bleaching and altering ecosystem dynamics.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Pollution: In 1866, the Timor Sea was free of pollution. Today, however, it faces significant pollution from various sources, including plastic waste, chemical spills, and noise pollution from shipping activities. This pollution poses threats to marine life, with plastic waste often ingested by marine animals, leading to fatalities or long-term health issues.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Overfishing: Overfishing has significantly impacted the marine ecosystem in the Timor Sea. In 1866, overfishing was not yet a major issue due to less advanced fishing technology and smaller human populations. Today, however, overfishing is a significant concern, leading to depleted fish stocks and altered ecosystem dynamics.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>Endangered Species: Many marine species that Nemo would have observed in 1866 are now endangered or threatened due to various factors including overfishing, pollution, and climate change. For example, the humpback whale, a cetacean mentioned by Verne, was once heavily hunted but is now protected and recovering in some regions.</p><p style='margin:0 0 14px 0; font-size:1.3rem; line-height:1.95; color:#c8d8e8;'>In conclusion, while Captain Nemo's knowledge and technology were advanced for his time, they pale in comparison to modern oceanography. The Timor Sea of 1866 was relatively pristine compared to the impacted state it faces today due to climate change, pollution, overfishing, and endangered species.</p></div>\n          </div>\n        </div>"}}, "6": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île Keeling</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p>", "m
