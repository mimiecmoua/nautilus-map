const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "Ce billet était libellé en ces termes:\n\n «Monsieur le professeur Aronnax, à bord du _Nautilus_.\n\n «16 novembre 1867.\n\n »Le capitaine Nemo invite monsieur le professeur Aronnax à une\n partie de chasse qui aura lieu demain matin dans ses forêts\n de l'île Crespo. Il espère que rien n'empêchera monsieur le\n professeur d'y assister, et il verra avec plaisir que ses\n compagnons se joignent à lui.\n\n «Le commandant du _Nautilus_,\n «Capitaine NEMO.»\n\n«Une chasse! s'écria Ned.\n\n—Et dans ses forêts de l'île Crespo! ajouta Conseil.\n\n—Mais il va donc à terre, ce particulier-là? reprit Ned Land.\n\n—Cela me paraît clairement indiqué, dis-je en relisant la lettre.\n\n—Eh bien! il faut accepter, répliqua le Canadien. Une fois sur la\nterre ferme, nous aviserons à prendre un parti. D'ailleurs, je ne serai\npas fâché de manger quelques morceaux de venaison fraîche.»\n\nSans chercher à concilier ce qu'il y avait de contradictoire entre\nl'horreur manifeste du capitaine Nemo pour les continents et les îles,\net son invitation de chasser en forêt, je me contentai de répondre:\n\n«Voyons d'abord ce que c'est que l'île Crespo.»\n\nJe consultai le planisphère, et, par 32° 40′ de latitude nord et 167°\n50′ de longitude ouest, je trouvai un îlot qui fut reconnu en 1801 par\nle capitaine Crespo, et que les anciennes cartes espagnoles nommaient\nRocca de la Plata, c'est-à-dire «Roche d'Argent.» Nous étions donc à\ndix-huit cents milles environ de notre point de départ, et la direction\nun peu modifiée du _Nautilus_ le ramenait vers le sud-est.\n\nJe montrai à mes compagnons ce petit roc perdu au milieu du Pacifique\nnord.\n\n«Si le capitaine Nemo va quelquefois à terre, leur dis-je, il choisit\ndu moins des îles absolument désertes!»\n\nNed Land hocha la tête sans répondre, puis Conseil et lui me\nquittèrent. Après un souper qui me fut servi par le stewart muet et\nimpassible, je écouvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': \"Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.\", 'en': 'Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.'}. Cette rubrique relie l’extrait aux savoirs du XIXe siècle : océanographie, cartographie, plongée, classification du vivant et imaginaires scientifiques chez Jules Verne."}, "compare_1866_today": {"title": "Comparaison entre 1866 et aujourd’hui", "content": "Cette fiche met en regard la vision vernienne de 1866 avec les connaissances actuelles : localisation plus précise, sciences marines contemporaines, cartographie numérique, imagerie bathymétrique, suivi satellitaire et écologie des milieux océaniques."}}, "en": {"book_excerpt": {"title": "Book excerpt", "content": "The note was worded as follows—\n\n16th of _November_, 1867.\n\nTO PROFESSOR ARONNAX, On board the _Nautilus_.\n\nCaptain Nemo invites Professor Aronnax to a hunting-party, which will\ntake place to-morrow morning in the forests of the island of Crespo. He\nhopes that nothing will prevent the Professor from being present, and\nhe will with pleasure see him joined by his companions.\n\nCAPTAIN NEMO, Commander of the _Nautilus_.\n\n“A hunt!” exclaimed Ned.\n\n“And in the forests of the island of Crespo!” added Conseil.\n\n“Oh! then the gentleman is going on _terra firma?_” replied Ned Land.\n\n“That seems to me to be clearly indicated,” said I, reading the letter\nonce more.\n\n“Well, we must accept,” said the Canadian. “But once more on dry\nground, we shall know what to do. Indeed, I shall not be sorry to eat a\npiece of fresh venison.”\n\nWithout seeking to reconcile what was contradictory between Captain\nNemo’s manifest aversion to islands and continents, and his invitation\nto hunt in a forest, I contented myself with replying—\n\n“Let us first see where the island of Crespo is.”\n\nI consulted the planisphere, and in 32° 40′ north lat. and 157° 50′\nwest long., I found a small island, recognised in 1801 by Captain\nCrespo, and marked in the ancient Spanish maps as Rocca de la Plata,\nthe meaning of which is “The Silver Rock.” We were then about eighteen\nhundred miles from our starting-point, and the course of the\n_Nautilus_, a little changed, was bringing it back towards the\nsouth-east.\n\nI showed this little rock lost in the midst of the North Pacific to my\ncompanions.\n\n“If Captain Nemo does sometimes go on dry ground,” said I, “he at least\nchooses desert islands.”\n\nNed Land shrugged his shoulders without speaking, and Conseil and he\nleft me.\n\nAfter supper, which was served by the steward mute and impassive, I\nwent to bed, not without some anxiety.\n\nThe next morning, the 17th of November, on awakening, I felt that the\n_Nautilus_ was perfectly still. I dressed quickly and entered the\nsaloon.\n\nCaptain Nemo was there, waiting for me. He rose, bowed, and asked me if\nit was convenient for me to accompany him. As he made no allusion to\nhis absence during the last eight days, I did not mention it, and\nsimply answered that my companions and myself were ready to follow him.\n\nWe entered the dining-room, where breakfast was served.\n\n“M. Aronnax,” said the Captain, “pray, share my breakfast without\nceremony; we will chat as we eat. For though I promised you a walk in\nthe forest, I did not undertake to find hotels there. So breakfast as a\nman who will most likely not have his dinner till very late.”\n\nI did honour to the repast. It was composed of several kinds of fish,\nand slices of holothuridæ (excellent zoophytes), and different sorts of\nsea-weed. Our drink consisted of pure water, to which the Captain added\nsome drops of a fermented liquor, extracted by the Kamschatcha method\nfrom a sea-weed known under the name of _Rhodomenia palmata_. Captain\nNemo ate at first without saying a word. Then he began—\n\n“Sir, when I proposed to you to hunt in my submarine forest of Crespo,\nyou evidently thought me mad. Sir, you should never judge lightly of\nany man.”\n\n“But Captain, believe me——”\n\n“Be kind enough to listen, and you will then see whether you have any\ncause to accuse me of folly and contradiction.”\n\n“I listen.”\n\n“You know as well as I do, Professor, that man can live under water,\nproviding he carries with him a sufficient supply of breathable air. In\nsubmarine works, the workman, clad in an impervious dress, with his\nhead in a metal helmet, receives air from above by means of forcing\npumps and regulators.”\n\n“That is a diving apparatus,” said I.\n\n“Just so, but under these conditions the man is not at liberty; he is\nattached to the pump which sends him air through an india-rubb"}, "marine_species": {"title": "Marine species mentioned", "content": "This card lists marine species, organisms, or natural elements mentioned in the passage associated with this stop. You can enrich it progressively with your annotations in the notebook."}, "science_19c": {"title": "19th-century scientific discoveries", "content": "Context of the stop: {'fr': \"Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.\", 'en': 'Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider.'}. This section connects the excerpt to 19th-century knowledge: oceanography, cartography, diving technology, classification of living beings, and Jules Verne’s scientific imagination."}, "compare_1866_today": {"title": "Comparison between 1866 and today", "content": "This card compares Verne’s 1866 vision with present-day knowledge: more precise location data, modern marine sciences, digital cartography, bathymetric imagery, satellite monitoring, and ocean ecosystem research."}}}, "1": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "The Project Gutenberg eBook of Vingt mille lieues sous les mers\n \nThis eBook is mon grave, at the bottom of this unreachable ocean.'}. This section connects the excerpt to 19th-century knowledge: oceanography, cartography, diving technology, classification of living beings, and Jules Verne’s scientific imagination."}, "compare_1866_today": {"title": "Comparison between 1866 and today", "content": "This card compares Verne’s 1866 vision with present-day knowledge: more precise location data, modern marine sciences, digital cartography, bathymetric imagery, satellite monitoring, and ocean ecosystem research."}}}, "6": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "{'fr': \"Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.\", 'en': 'If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.'}"}, "marine_species": {"title": "Espèce nced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance.'}"}, "marine_species": {"title": "Marine species mentioned", "content": "This card lists marine species, organisms, or natural elements mentioned in the passage associated with this stop. You can enrich it progressively with your annotations in the notebook."}, "science_19c": {"title": "19th-century scientific discoveries", "content": "Context of the stop: {'fr': 'Visitée par Darwin et le capitaine Fitz-Roy.', 'en': 'Visited by Darwin and Captain Fitz-Roy.'}. This section connects the excerpt to 19th-century knowledge: oceanography, cartography, diving technology, classification of living beings, and Jules Verne’s scientific imagination."}, "compare_1866_today": {"title": "Comparison between 1866 and today", "content": "This card compares Verne’s 1866 vision with present-day knowledge: more precise location data, modern marine sciences, digital cartography, bathymetric imagery, satellite monitoring, and ocean ecosystem research."}}}, "7": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "{'fr': \"La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.\", 'en': 'You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': \"Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C'était la mort des villes indiennes.\", 'en': 'A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.'}. Cette rubrique relie l’extrait aux savoirs du XIXe siècle : océanographie, cartographie, plongée, classification du vivant et imaginaires scientifiques chez Jules Verne."}, "compare_1866_today": {"title": "Comparaison entre 1866 et aujourd’hui", "content": "Cette fiche met en regard la vision vernienne de 1866 avec les connaissances actuelles : localisation plus précise, sciences marines contemporaines, cartographie numérique, imagerie bathymétrique, suivi satellitaire et écologie des mili urface des flots. C'était la mort des villes indiennes.\", 'en': 'A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities.'}. This section connects the excerpt to 19th-century knowledge: oceanography, cartography, diving technology, classification of living beings, and Jules Verne’s scientific imagination."}, "compare_1866_today": {"title": "Comparison between 1866 and today", "content": "This card compares Verne’s 1866 vision with present-day knowledge: more precise location data, modern marine sciences, digital cartography, bathymetric imagery, satellite monitoring, and ocean ecosystem research."}}}, "8": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "{'fr': 'This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.', 'en': 'And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.'}"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': 'Point intermédiaire.', 'en': 'Intermediate point.'}. Cette rubrique relie l’extrait aux savoirs du XIXe siècle : océanographie, cartographie, plongée, classification du vivant et imaginaires scientifiques chez Jules Verne."}, "compare_1866_today": {"title": "Comparaison entre 1866 et aujourd’hui", "content": "Cette fiche met en regard la vision vernienne de 1866 avec les connaissances actuelles : localisation plus précise, sciences marines contemporaines, cartographie numérique, imagerie bathymétrique, suivi satellitaire et écologie des milieux océaniques."}}, "en": {"book_excerpt": {"title": "Book excerpt", "content": "{'fr': 'This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.', 'en': 'And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of Ju est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe.\", 'en': '“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not.'}"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': \"Passage par l'Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l'isthme de Suez, puis chasse du dugong.\", 'en': 'Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt.'}. Cette rubrique relie l’extrait aux savoirs du XIXe siècle : océanographie, cartographie, plongée, classification du vivant et imaginaires scientifiques chez Jules Verne."}, "compare_1866_today": {"title": "Comparaison entre 1866 et aujourd’hui", "content": "Cette fiche met en regard la vision vernienne de 1866 avec les connaissances actuelles : localisation plus précise, sciences marines contemporaines, cartographie numérique, imagerie bathymétrique, suivi satellitaire et écologie des milieux océaniques."}}, "en": {"book_excerpt": {"title": "Book excerpt", "content": "{'fr': \"—Eh bien! nous reviendrons, maîtr {"book_excerpt": {"title": "Extrait du livre", "content": "{'fr': \"Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.\", 'en': 'Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales.'}"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': \"Vision de l'Atlantide, localisation cartographique approximative d'après le trajet du roman.\", 'en': \"Vision of Atlantis; approximate cartographic location based on the novel's route.\"}. Cette rubrique relie l’extrait aux savoirs du XIXe s par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.\", 'en': 'It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when t"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': \"Complot d'évasion\", 'en': 'Escape plot'}. Cette rubrique relie l’extrait aux savoirs du XIXe siècle : océanographie, cartographie, plongée, classification du vivant et imaginaires scientifiques chez Jules Verne."}, "compare_1866_today": {"title": "Comparaison entre 1866 et aujourd’hui", "content": "Cette fiche met en regard la vision vernienne de 1866 avec les connaissances actuelles : localisation plus précise, sciences marines contemporaines, cartographie numérique, imagerie bathymétrique, suivi satellitaire et écologie d This section connects the excerpt to 19th-century knowledge: oceanography, cartography, diving technology, classification of living beings, and Jules Verne’s scientific imagination."}, "compare_1866_today": {"title": "Comparison between 1866 and today", "content": "This card compares Verne’s 1866 vision with present-day knowledge: more precise location data, modern marine sciences, digital cartography, bathymetric imagery, satellite monitoring, and ocean ecosystem research."}}}, "31": {"fr": {"book_excerpt": {"title": "Extrait du livre", "content": "{'fr': None, 'en': 'And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour.'}"}, "marine_species": {"title": "Espèces marines mentionnées", "content": "Cette fiche recense les espèces, organismes marins ou éléments naturels cités dans le passage associé à cette escale. Elle peut être enrichie au fur et à mesure de tes annotations dans le notebook."}, "science_19c": {"title": "Découvertes scientifiques du XIXe siècle", "content": "Contexte de l’escale : {'fr': 'Fin du voyage pour const ROWS_DATA = [{"Escales du Nautilus": {"fr": "Île de Crespo", "en": "Crespo Island"}, "Date": {"fr": "1er Décembre 1866", "en": "December 1st, 1866"}, "Latitude_Décimal": 33.18497, "Longitude_Décimal": 169.85446, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Début de l'aventure - Première chasse sous-marine - Une forêt sous-marine - Une monstrueuse araignée de mer.", "en": "Beginning of the adventure - First underwater hunt - A submarine forest - A monstrous sea spider."}, "passage_roman": {"fr": "Ce billet était libellé en ces termes: «Monsieur le professeur Aronnax, à bord du Nautilus. «16 novembre 1867. »Le capitaine Nemo invite monsieur le professeur Aronnax à une partie de chasse qui aura lieu demain matin dans ses forêts de l'île Crespo. Il espère que rien n'empêchera monsieur le professeur d'y assister, et il verra avec plaisir que ses compagnons se joignent à lui. «Le commandant du Nautilus, «Capitaine NEMO.» «Une chasse!", "en": "The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Archipel des Pomotou", "en": "Pomotou Archipelago"}, "Date": {"fr": "11 Décembre 1866", "en": "December 11th, 1866"}, "Latitude_Décimal": 9.48786, "Longitude_Décimal": 177.83569, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Cette archipel couvre une superficie de trois cent soixante-dix lieues carrées, dont une soixantaine de groupes d'îles.", "en": "This archipelago covers an area of three hundred seventy square leagues, including about sixty island groups."}, "passage_roman": {"fr": "Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine. Nous étions enfin sur le théâtre des derniers ébats du monstre! Et, pour tout dire, on ne vivait plus à bord.", "en": "However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Archipel des nouvelles Hébrides", "en": "New Hebrides Archipelago"}, "Date": {"fr": "25 Décembre 1866", "en": "December 25th, 1866"}, "Latitude_Décimal": -16.0667, "Longitude_Décimal": 164.5333, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Découverte par Quiros en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773.", "en": "Discovered by Quiros in 1606, explored by Bougainville in 1768, and named by Cook in 1773."}, "passage_roman": {"fr": "Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.", "en": "At length an article in a well-known satirical journal by a favourite contributor, the chief of the staff, settled the monster, like Hippolytus, giving it the death-blow amidst an universal burst of laughter. Wit had conquered science. During the first months of the year 1867 the question seemed buried, never to revive, when new facts were brought before the public. It was then no longer a scientific problem to be solved, but a real danger seriously to be avoided. The question took quite another shape."}, "DistanceCentreTerre": 6370999}, {"Escales du Nautilus": {"fr": "La Pouasie", "en": "Papua"}, "Date": {"fr": "4 Janvier 1867", "en": "January 4th, 1867"}, "Latitude_Décimal": -0.3167, "Longitude_Décimal": 128.3833, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Découverte en 1511 par le Portugais Francisco Serrano - Vue sur les sommets des monts Arfak - Quatre jours sur terre - Bataille avec les Papouas.", "en": "Discovered in 1511 by the Portuguese Francisco Serrano - View of the Arfak Mountains - Four days on land - Battle with the Papuans."}, "passage_roman": {"fr": "C'est une tranquille tombe que cette tombe de corail, et fasse le ciel que, mes compagnons et moi, nous n'en ayons jamais d'autre!» CHAPITRE XX LE DÉTROIT DE TORRÈS. Pendant la nuit du 27 au 28 décembre, le Nautilus abandonna les parages de Vanikoro avec une vitesse excessive. Sa direction était sud-ouest, et, en trois jours, il franchit les sept cent cinquante lieues qui séparent le groupe de La Pérouse de la pointe sud-est de la Papouasie. Le 1er janvier 1863, de grand matin, Conseil me rejoignit sur la plateforme. «Monsieur, me dit ce brave garçon, monsieur me permettra-t-il de lui souhaiter une bonne année?", "en": "it is a fine death for a sailor!” said Captain Nemo, at last. “A coral tomb makes a quiet grave; and I trust that I and my comrades will find no other.” CHAPTER XIX TORRES STRAITS During the night of the 27th or 28th of December, the Nautilus left the shores of Vanikoro with great speed. Her course was south-westerly, and in three days she had gone over the 750 leagues that separated it from La Perouse’s group and the south-east point of Papua. Early on the 1st of January, 1863, Conseil joined me on the platform. “Master, will you permit me to wish you a happy New Year?” “What!"}, "DistanceCentreTerre": 6370999}, {"Escales du Nautilus": {"fr": "Cap Wessel", "en": "Cape Wessel"}, "Date": {"fr": "11 janvier 1867", "en": "January 11th, 1867"}, "Latitude_Décimal": -10.7, "Longitude_Décimal": 136.7667, "Océan/Mer": {"fr": "Océan Pacifique Sud", "en": "South Pacific Ocean"}, "Event": {"fr": "Forme la pointe du golfe de Carpentarie.", "en": "Forms the tip of the Gulf of Carpentaria."}, "passage_roman": {"fr": "La rapidité de son hélice était telle que je ne pouvais ni suivre ses tours ni les compter. Quand je songeais que ce merveilleux agent électrique, après avoir donné le mouvement, la chaleur, la lumière au Nautilus, le protégeait encore contre les attaques extérieures, et le transformait en une arche sainte à laquelle nul profanateur ne touchait sans être foudroyé, mon admiration n'avait plus de bornes, et de l'appareil, elle remontait aussitôt à l'ingénieur qui l'avait créé. Nous marchions directement vers l'ouest, et, le 11 janvier, nous doublâmes ce cap Wessel, situé par 135° de longitude et 10° de latitude nord, qui forme la pointe est du golfe de Carpentarie. Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement.", "en": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Mer de Timor", "en": "Timor Sea"}, "Date": {"fr": "13 janvier 1867", "en": "January 13th, 1867"}, "Latitude_Décimal": -8.6833, "Longitude_Décimal": 125.7333, "Océan/Mer": {"fr": "Océan Indien", "en": "Indian Ocean"}, "Event": {"fr": "Un homme de l'équipage mort dans la nuit est enterré dans le cimetière sous-marin. Le capitaine Nemo et les siens venaient enterrer leur compagnon dans cette demeure commune, au fond de cet inaccessible océan.", "en": "A crew member who died during the night was buried in the underwater cemetery. Captain Nemo and his men came to lay their companion to rest in this common grave, at the bottom of this unreachable ocean."}, "passage_roman": {"fr": "Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.", "en": "The Nautilus easily avoided the breakers of Money to port and the Victoria reefs to starboard, placed at 130° long. and on the 10th parallel, which we strictly followed. On the 13th of January, Captain Nemo arrived in the Sea of Timor, and recognised the island of that name in 122° long. From this point the direction of the Nautilus inclined towards the south-west. Her head was set for the Indian Ocean."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Île Keeling", "en": "Keeling Island"}, "Date": {"fr": "24 Janvier 1867", "en": "January 24th, 1867"}, "Latitude_Décimal": -12.0833, "Longitude_Décimal": 94.55, "Océan/Mer": {"fr": "Océan Indien", "en": "Indian Ocean"}, "Event": {"fr": "Visitée par Darwin et le capitaine Fitz-Roy.", "en": "Visited by Darwin and Captain Fitz-Roy."}, "passage_roman": {"fr": "Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.", "en": "If we recognised so many different varieties of fish, it was because, attracted by the electric light, they tried to follow us; the greater part, however, were soon distanced by our speed, though some kept their place in the waters of the Nautilus for a time. The morning of the 24th, in 12° 5′ S. lat., and 94° 33′ long., we observed Keeling Island, a coral formation, planted with magnificent cocos, and which had been visited by Mr. Darwin and Captain Fitzroy. The Nautilus skirted the shores of this desert island for a little distance."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Golfe du Bengale", "en": "Bay of Bengal"}, "Date": {"fr": "27 janvier 1867", "en": "January 27th, 1867"}, "Latitude_Décimal": 5.9167, "Longitude_Décimal": 79.7, "Océan/Mer": {"fr": "Océan Indien", "en": "Indian Ocean"}, "Event": {"fr": "Spectacle sinistre ! Des cadavres flottaient à la surface des flots. C'était la mort des villes indiennes.", "en": "A grim spectacle! Corps were floating on the surface of the waves. It was the death of the Indian cities."}, "passage_roman": {"fr": "La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.", "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "DistanceCentreTerre": 6370999}, {"Escales du Nautilus": {"fr": "Contour Afrique Est", "en": "East Africa Coast"}, "Date": {"fr": "28 Janvier 1867", "en": "January 28th, 1867"}, "Latitude_Décimal": 10.99809, "Longitude_Décimal": 56.614067, "Océan/Mer": {"fr": "Océan Indien", "en": "Indian Ocean"}, "Event": {"fr": "Point intermédiaire.", "en": "Intermediate point."}, "passage_roman": {"fr": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook.", "en": "And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Sous l'isthme de Suez", "en": "Beneath the Isthmus of Suez"}, "Date": {"fr": "30 Janvier 1867", "en": "January 30th, 1867"}, "Latitude_Décimal": 29.95, "Longitude_Décimal": 32.55, "Océan/Mer": {"fr": "Mer Rouge", "en": "Red Sea"}, "Event": {"fr": "Passage par l'Arabian Tunnel, le corridor souterrain imaginé par Nemo sous l'isthme de Suez, puis chasse du dugong.", "en": "Passage through the Arabian Tunnel, the underground corridor imagined by Nemo beneath the Isthmus of Suez, followed by the dugong hunt."}, "passage_roman": {"fr": "—Eh bien! nous reviendrons, maître Land, et si après le golfe Persique, le Nautilus veut visiter la mer Rouge, le détroit de Babel-Mandeb est toujours là pour lui livrer passage. —Je ne vous apprendrai pas, monsieur, répondit Ned Land, que la mer Rouge est non moins fermée que le golfe, puisque l'isthme de Suez n'est pas encore percé, et, le fût-il, un bateau mystérieux comme le nôtre ne se hasarderait pas dans ses canaux coupés d'écluses. Donc, la mer Rouge n'est pas encore le chemin qui nous ramènera en Europe. —Aussi, n'ai-je pas dit que nous reviendrions en Europe.", "en": "“The great depths of the ocean are entirely unknown to us. Soundings cannot reach them. What passes in those remote depths—what beings live, or can live, twelve or fifteen miles beneath the surface of the waters—what is the organisation of these animals, we can scarcely conjecture. However, the solution of the problem submitted to me may modify the form of the dilemma. Either we do know all the varieties of beings which people our planet, or we do not."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "L'archipel grec", "en": "The Greek Archipelago"}, "Date": {"fr": "12 Février 1867", "en": "February 12th, 1867"}, "Latitude_Décimal": 35.0, "Longitude_Décimal": 24.0, "Océan/Mer": {"fr": "Mer Égée", "en": "Aegean Sea"}, "Event": {"fr": "Passage du Nautilus dans l'archipel grec ; Aronnax observe les poissons de ces eaux, avec une évocation de l'ancienne île de Crète.", "en": "The Nautilus passes through the Greek Archipelago; Aronnax observes the fish of these waters, with an evocation of the ancient island of Crete."}, "passage_roman": {"fr": "Ils venaient retirer les filets qui avaient été mis à la traîne pendant la nuit. Ces marins appartenaient évidemment à des nations différentes, bien que le type européen fût indiqué chez tous. Je reconnus, à ne pas me tromper, des Irlandais, des Français, quelques Slaves, un Grec ou un Candiote. Du reste, ces hommes étaient sobres de paroles, et n'employaient entre eux que ce bizarre idiome dont je ne pouvais pas même soupçonner l'origine. Aussi, je dus renoncer à les interroger.", "en": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Méditerranée", "en": "Mediterranean Sea"}, "Date": {"fr": "16 Février 1867", "en": "February 16th, 1867"}, "Latitude_Décimal": 39.2833, "Longitude_Décimal": 6.7, "Océan/Mer": {"fr": "Mer Méditerranée", "en": "Mediterranean Sea"}, "Event": {"fr": "La Méditerranée en quarante-huit heures - Ned Land, à son grand ennui, dut renoncer à ses projets de fuite - Observation des poissons méditerranéens.", "en": "The Mediterranean in forty-eight hours - To his great annoyance, Ned Land had to abandon his escape plans - Observation of Mediterranean fish."}, "passage_roman": {"fr": "Voici une conserve d'holoturies qu'un Malais déclarerait sans rivale au monde, voilà une crème dont le lait a été fourni par la mamelle des cétacés, et le sucre par les grands fucus de la mer du Nord, et enfin, permettez-moi de vous offrir des confitures d'anémones qui valent celles des fruits les plus savoureux.» Et je goûtais, plutôt en curieux qu'en gourmet, tandis que le capitaine Nemo m'enchantait par ses invraisemblables récits. «Mais cette mer, monsieur Aronnax, me dit-il, cette nourrice prodigieuse, inépuisable, elle ne me nourrit pas seulement; elle me vêtit encore. Ces étoffes qui vous couvrent sont tissées avec le byssus de certains coquillages; elles sont teintes avec la pourpre des anciens et nuancées de couleurs violettes que j'extrais des aplysis de la Méditerranée. Les parfums que vous trouverez sur la toilette de votre cabine sont le produit de la distillation des plantes marines. Votre lit est fait du plus doux zostère de l'Océan.", "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "L'Atlantide", "en": "Atlantis"}, "Date": {"fr": "19 Février 1867", "en": "February 19th, 1867"}, "Latitude_Décimal": 20.0, "Longitude_Décimal": -30.0, "Océan/Mer": {"fr": "Océan Atlantique", "en": "Atlantic Ocean"}, "Event": {"fr": "Vision de l'Atlantide, localisation cartographique approximative d'après le trajet du roman.", "en": "Vision of Atlantis; approximate cartographic location based on the novel's route."}, "passage_roman": {"fr": "Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.", "en": "Where was I? I must know at any cost. I tried to speak, but Captain Nemo stopped me by a gesture, and, picking up a piece of chalk-stone, advanced to a rock of black basalt, and traced the one word: ATLANTIS What a light shot through my mind! Atlantis! the Atlantis of Plato, that continent denied by Origen and Humbolt, who placed its disappearance amongst the legendary tales."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "La mer des Sargasses", "en": "The Sargasso Sea"}, "Date": {"fr": "22 Février 1867", "en": "February 22nd, 1867"}, "Latitude_Décimal": 21.5, "Longitude_Décimal": -31.5, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Traversée de la mer des Sargasses par le Nautilus.", "en": "Crossing of the Sargasso Sea by the Nautilus."}, "passage_roman": {"fr": "Peut-être. Quoi qu'il en soit, le lendemain, le Nautilus, ayant quitté son port d'attache, naviguait au large de toute terre, et à quelques mètres au-dessous des flots de l'Atlantique. CHAPITRE XI LA MER DE SARGASSES. La direction du Nautilus ne s'était pas modifiée. Tout espoir de revenir vers les mers européennes devait donc être momentanément rejeté.", "en": "This eBook is for the use of anyone anywhere in the United States and most other parts of the world at no cost and with almost no restrictions whatsoever. You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Contour Afrique Nord", "en": "North Africa Coast"}, "Date": {"fr": "23 Février 1867", "en": "February 23th, 1867"}, "Latitude_Décimal": -10.1775, "Longitude_Décimal": -17.738, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Direction le pôle Sud.", "en": "Heading towards the South Pole."}, "passage_roman": {"fr": "Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.", "en": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Contour Amérique Sud", "en": "South America Outline"}, "Date": {"fr": "13 Mars 1867", "en": "March 13th, 1867"}, "Latitude_Décimal": -54.8, "Longitude_Décimal": -50.4, "Océan/Mer": {"fr": "Océan Atlantique Sud", "en": "South Atlantic Ocean"}, "Event": {"fr": "Point intermédiaire", "en": "Intermediate point"}, "passage_roman": {"fr": "Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.", "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Cap Horn", "en": "Cape Horn"}, "Date": {"fr": "14 Mars 1867", "en": "March 14th, 1867"}, "Latitude_Décimal": -61.6, "Longitude_Décimal": -64.8, "Océan/Mer": {"fr": "Mers du Pacifique", "en": "Pacific Seas"}, "Event": {"fr": "Direction la Banquise - Le Nautilus avait repris son imperturbable direction vers le sud.", "en": "Heading towards the Ice Pack - The Nautilus had resumed its unwavering course southward."}, "passage_roman": {"fr": "La frégate prolongea la côte sud-est de l'Amérique avec une rapidité prodigieuse. Le 3 juillet, nous étions à l'ouvert du détroit de Magellan, à la hauteur du cap des Vierges. Mais le commandant Farragut ne voulut pas prendre ce sinueux passage, et manœuvra de manière à doubler le cap Horn. L'équipage lui donna raison à l'unanimité. Et en effet, était-il probable que l'on pût rencontrer le narwal dans ce détroit resserré?", "en": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX
