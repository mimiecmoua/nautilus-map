AGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Contour Amérique Sud (retour)", "en": "South America Coastline (return)"}, "Date": {"fr": "5 Avril 1867", "en": "April 5th, 1867"}, "Latitude_Décimal": -40.0, "Longitude_Décimal": -50.0, "Océan/Mer": {"fr": "Océan Atlantique Sud", "en": "South Atlantic Ocean"}, "Event": {"fr": "Point intermédiaire - Patagonie, Uruguay - Le Nautilus maintient sa direction au Nord.", "en": "Intermediate point - Patagonia, Uruguay - The Nautilus keeps heading north."}, "passage_roman": {"fr": null, "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "DistanceCentreTerre": 6370999}, {"Escales du Nautilus": {"fr": "Contour Amérique Sud centrale", "en": "Central South America Coastline"}, "Date": {"fr": "10 Avril 1867", "en": "March 1st, 1867"}, "Latitude_Décimal": -6.96056, "Longitude_Décimal": -32.08735, "Océan/Mer": {"fr": "Océan Atlantique Sud", "en": "South Atlantic Ocean"}, "Event": {"fr": "Point intermédiaire", "en": "Intermediate point"}, "passage_roman": {"fr": "Cependant, personne ne doutait encore du succès, et pas un matelot du bord n'eût parié contre le narwal et contre sa prochaine apparition. Le 20 juillet, le tropique du Capricorne fut coupé par 105° de longitude, et le 27 du même mois, nous franchissions l'équateur sur le cent dixième méridien. Ce relèvement fait, la frégate prit une direction plus décidée vers l'ouest, et s'engagea dans les mers centrales du Pacifique. Le commandant Farragut pensait, avec raison, qu'il valait mieux fréquenter les eaux profondes, et s'éloigner des continents ou des îles dont l'animal avait toujours paru éviter l'approche, «sans doute parce qu'il n'y avait pas assez d'eau pour lui!» disait le maître d'équipage. La frégate passa donc au large des Pomotou, des Marquises, des Sandwich, coupa le tropique du Cancer par 132° de longitude, et se dirigea vers les mers de Chine.", "en": "It was then the bad season in Australia, the July of that zone corresponding to our January in Europe, but the sea was beautiful and easily scanned round a vast circumference. The 20th of July, the tropic of Capricorn was cut by 105° of longitude, and the 27th of the same month we crossed the equator on the 110th meridian. This passed, the frigate took a more decided westerly direction, and scoured the central waters of the Pacific. Commander Farragut thought, and with reason, that it was better to remain in deep water, and keep clear of continents or islands, which the beast itself seemed to shun (perhaps because there was not enough water for him! suggested the greater part of the crew)."}, "DistanceCentreTerre": 6370999}, {"Escales du Nautilus": {"fr": "Martinique et Guadeloupe", "en": "Martinique and Guadeloupe"}, "Date": {"fr": "18 Avril 1867", "en": "April 20th, 1867"}, "Latitude_Décimal": 15.3167, "Longitude_Décimal": -59.9667, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Attaque du calamar géant de dimensions colossales, ayant huit mètres de longueur.", "en": "Attack by a colossal giant squid, eight meters long."}, "passage_roman": {"fr": "Il ne voulait pas, évidemment, fréquenter les flots du golfe du Mexique ou de la mer des Antilles. Cependant, l'eau n'eût pas manqué sous sa quille, puisque la profondeur moyenne de ces mers est de dix huit cents mètres; mais, probablement ces parages, semés d'îles et sillonnés de steamers, ne convenaient pas au capitaine Nemo. Le 16 avril, nous eûmes connaissance de la Martinique et de la Guadeloupe, à une distance de trente milles environ. J'aperçus un instant leurs pitons élevés. Le Canadien, qui comptait mettre ses projets à exécution dans le golfe, soit en gagnant une terre, soit en accostant un des nombreux bateaux qui font le cabotage d'une île à l'autre, fut très-décontenancé.", "en": "Then, infested with poulps, medusæ, and cuttle-fish, they would become immense centres of infection, since their waves would not possess ‘these vast stomachs that God had charged to infest the surface of the seas.’” CHAPTER XVIII THE POULPS For several days the Nautilus kept off from the American coast. Evidently it did not wish to risk the tides of the Gulf of Mexico or of the sea of the Antilles. April 16th, we sighted Martinique and Guadaloupe from a distance of about thirty miles. I saw their tall peaks for an instant. The Canadian, who counted on carrying out his projects in the Gulf, by either landing or hailing one of the numerous boats that coast from one island to another, was quite disheartened."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Contour Amérique Nord", "en": "North America Contour"}, "Date": {"fr": "20 Avril 1867", "en": "April 18th, 1867"}, "Latitude_Décimal": 20.0, "Longitude_Décimal": -70.0, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Point intermédiaire", "en": "Intermediate point"}, "passage_roman": {"fr": "Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.", "en": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Île Lucayes", "en": "Lucayan Island"}, "Date": {"fr": "20 Avril 1867", "en": "April 20th, 1867"}, "Latitude_Décimal": 23.6833, "Longitude_Décimal": -75.3167, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Entrée dans le Gulf Stream.", "en": "Entering the Gulf Stream."}, "passage_roman": {"fr": "Alors la vie animale n'était plus représentée que par des encrines, des étoiles de mer, de charmantes pentacrines tête de méduse, dont la tige droite supportait un petit calice, des troques, des quenottes sanglantes et des fissurelles, mollusques littoraux de grande espèce. Le 20 avril, nous étions remontés à une hauteur moyenne de quinze cents mètres. La terre la plus rapprochée était alors cet archipel des îles Lucayes, disséminées comme un tas de pavés à la surface des eaux. Là s'élevaient de hautes falaises sous-marines, murailles droites faites de blocs frustes disposés par larges assises, entre lesquels se creusaient des trous noirs que nos rayons électriques n'éclairaient pas jusqu'au fond. Ces roches étaient tapissées de grandes herbes, de laminaires géants, de fucus gigantesques, un véritable espalier d'hydrophytes digne d'un monde de Titans.", "en": null}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Cap Hatteras", "en": "Cape Hatteras"}, "Date": {"fr": "8 Mai 1867", "en": "May 8th, 1867"}, "Latitude_Décimal": 35.1, "Longitude_Décimal": -74.8667, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Travers du Cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix milles mètres.", "en": "Passing by Cape Hatteras, at the height of North Carolina. The Gulf Stream here is seventy-five miles wide and two hundred and ten miles deep."}, "passage_roman": {"fr": "Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.", "en": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Long Island", "en": "Long Island"}, "Date": {"fr": "10 Mai 1867", "en": "May 10th, 1867"}, "Latitude_Décimal": 41.0833, "Longitude_Décimal": -72.8667, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Lutte des éléments, le capitaine Nemo, par un inexplicable caprice, voulut braver la tempête à la surface.", "en": "Struggle of the elements, Captain Nemo, by an inexplicable whim, wanted to brave the storm on the surface."}, "passage_roman": {"fr": "Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.", "en": "If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Terre Neuve", "en": "Newfoundland"}, "Date": {"fr": "15 Mai 1867", "en": "May 15th, 1867"}, "Latitude_Décimal": 47.1333, "Longitude_Décimal": -57.9167, "Océan/Mer": {"fr": "Océan Atlantique Nord", "en": "North Atlantic Ocean"}, "Event": {"fr": "Extrémité méridionale du banc de Terre Neuve - Professeur Aronnax consigne dans son journal les différentes espèces marines.", "en": "Southern tip of the Newfoundland bank - Professor Aronnax records in his journal the various marine species."}, "passage_roman": {"fr": "Il descend au sud, longe l'Afrique équatoriale, échauffe ses flots aux rayons de la zone torride, traverse l'Atlantique, atteint le cap San-Roque sur la côte Brésilienne, et se bifurque en deux branches dont l'une va se saturer encore des chaudes molécules de la mer des Antilles. Alors, le Gulf-Stream, chargé de rétablir l'équilibre entre les températures et de mêler les eaux des tropiques aux eaux boréales, commence son rôle de pondérateur. Chauffé à blanc dans le golfe du Mexique, il s'élève au nord sur les côtes américaines, s'avance jusqu'à Terre-Neuve, dévie sous la poussée du courant froid du détroit de Davis, reprend la route de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.", "en": "What collisions between vessels, in spite of their warning lights, whistles, and alarm bells! And the bottoms of these seas look like a field of battle, where still lie all the conquered of the ocean; some old and already encrusted, others fresh and reflecting from their iron bands and copper plates the brilliancy of our lantern. On the 15th of May we were at the extreme south of the Bank of Newfoundland. This bank consists of alluvia, or large heaps of organic matter, brought either from the Equator by the Gulf Stream, or from the North Pole by the counter-current of cold water which skirts the American coast. There also are heaped up those erratic blocks which are carried along by the broken ice; and close by, a vast charnel-house of molluscs, which perish here by millions."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Irlande", "en": "Ireland"}, "Date": {"fr": "25 Mai 1867", "en": "May 25th, 1867"}, "Latitude_Décimal": 51.1, "Longitude_Décimal": -9.7, "Océan/Mer": {"fr": "Mer Celtique", "en": "Celtic Sea"}, "Event": {"fr": "Le Nautilus affronte un navire ennemi non identifié dans une zone située au large des côtes irlandaises.", "en": "The Nautilus confronts an unidentified enemy vessel in waters off the Irish coast."}, "passage_roman": {"fr": "Le sol était presque entièrement madréporique, mais certains lits de torrents desséchés, semés de débris granitiques, démontraient que cette île était due à une formation primordiale. Tout l'horizon se cachait derrière un rideau de forêts admirables. Des arbres énormes, dont la taille atteignait parfois deux cents pieds, se reliaient l'un à l'autre par des guirlandes de lianes, vrais hamacs naturels que berçait une brise légère. C'étaient des mimosas, des ficus, des casuarinas, des teks, des hibiscus, des pendanus, des palmiers, mélangés à profusion, et sous l'abri de leur voûte verdoyante, au pied de leur stype gigantesque, croissaient des orchidées, des légumineuses et des fougères. Mais, sans remarquer tous ces beaux échantillons de la flore papouasienne, le Canadien abandonna l'agréable pour l'utile.", "en": "“Faith, sir,” said Ned Land, “your Captain Nemo—the devil take him!—has just made us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Manche", "en": "English Channel"}, "Date": {"fr": "2 Juin 1867", "en": "June 2nd, 1867"}, "Latitude_Décimal": 50.0, "Longitude_Décimal": -2.2, "Océan/Mer": {"fr": "Manche", "en": "English Channel"}, "Event": {"fr": "Complot d'évasion", "en": "Escape plot"}, "passage_roman": {"fr": "Ces vêtements formaient pantalon et veste. Le pantalon se terminait par d'épaisses chaussures, garnies de lourdes semelles de plomb. Le tissu de la veste était maintenu par des lamelles de cuivre qui cuirassaient la poitrine, la défendaient contre la poussée des eaux, et laissaient les poumons fonctionner librement; ses manches finissaient en forme de gants assouplis, qui ne contrariaient aucunement les mouvements de la main. Il y avait loin, on le voit, de ces scaphandres perfectionnés aux vêtements informes, tels que les cuirasses de liége, les soubrevestes, les habits de mer, les coffres, etc., qui furent inventés et prônés dans le XVIIIe siècle. Le capitaine Nemo, un de ses compagnons,—sorte d'Hercule, qui devait être d'une force prodigieuse,—Conseil et moi, nous eûmes bientôt revêtu ces habits de scaphandres.", "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a n sage_roman": {"fr": "Il évitait même de traiter ce sujet, sur lequel je crus devoir l'entreprendre un jour. Par une magnifique soirée du 30 juillet, c'est-à-dire trois semaines après notre départ, la frégate se trouvait à la hauteur du cap Blanc, à trente milles sous le vent des côtes patagonnes. Nous avions dépassé le tropique du Capricorne, et le détroit de Magellan s'ouvrait à moins de sept cent milles dans le sud. Avant huit jours, l'Abraham-Lincoln sillonnerait les flots du Pacifique. Assis sur la dunette, Ned Land et moi, nous causions de choses et d'autres, regardant cette mystérieuse mer dont les profondeurs sont restées jusqu'ici inaccessibles aux regards de l'homme.", "en": "You may copy it, give it away or re-use it under the terms of the Project Gutenberg License included with this eBook or online at www.gutenberg.org. If you are not located in the United States, you will have to check the laws of the country where you are located before using this eBook. Title: Twenty Thousand Leagues under the Sea Author: Jules Verne Release date: September 1, 1994 [eBook #164] Most recently updated: March 18, 2025 Language: English Other information and formats: www.gutenberg.org/ebooks/164 Credits: a number of anonymous Gutenberg Project volunteers *** START OF Twenty Thousand Leagues under the Sea by Jules Verne Contents PART I CHAPTER I A SHIFTING REEF CHAPTER II PRO AND CON CHAPTER III I FORM MY RESOLUTION CHAPTER IV NED LAND CHAPTER V AT A VENTURE CHAPTER VI AT FULL STEAM CHAPTER VII AN UNKNOWN SPECIES OF WHALE CHAPTER VIII MOBILIS IN MOBILI CHAPTER IX NED LAND’S TEMPERS CHAPTER X THE MAN OF THE SEAS CHAPTER XI ALL BY ELECTRICITY CHAPTER XII SOME FIGURES CHAPTER XIII THE BLACK RIVER CHAPTER XIV A NOTE OF INVITATION CHAPTER XV A WALK ON THE BOTTOM OF THE SEA CHAPTER XVI A SUBMARINE FOREST CHAPTER XVII FOUR THOUSAND LEAGUES UNDER THE PACIFIC CHAPTER XVIII VANIKORO CHAPTER XIX TORRES STRAITS CHAPTER XX A FEW DAYS ON LAND CHAPTER XXI CAPTAIN NEMO’S THUNDERBOLT CHAPTER XXII “ÆGRI SOMNIA” CHAPTER XXIII THE CORAL KINGDOM PART II CHAPTER I THE INDIAN OCEAN CHAPTER II A NOVEL PROPOSAL OF CAPTAIN NEMO’S CHAPTER III A PEARL OF TEN MILLIONS CHAPTER IV THE RED SEA CHAPTER V THE ARABIAN TUNNEL CHAPTER VI THE GRECIAN ARCHIPELAGO CHAPTER VII THE MEDITERRANEAN IN FORTY-EIGHT HOURS CHAPTER VIII VIGO BAY CHAPTER IX A VANISHED CONTINENT CHAPTER X THE SUBMARINE COAL-MINES CHAPTER XI THE SARGASSO SEA CHAPTER XII CACHALOTS AND WHALES CHAPTER XIII THE ICEBERG CHAPTER XIV THE SOUTH POLE CHAPTER XV ACCIDENT OR INCIDENT? CHAPTER XVI WANT OF AIR CHAPTER XVII FROM CAPE HORN TO THE AMAZON CHAPTER XVIII THE POULPS CHAPTER XIX THE GULF STREAM CHAPTER XX FROM LATITUDE 47° 24′ TO LONGITUDE 17° 28′ CHAPTER XXI A HECATOMB CHAPTER XXII THE LAST WORDS OF CAPTAIN NEMO CHAPTER XXIII CONCLUSION List of Illustrations An old grey-bearded gunner . ."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Contour Angleterre Nord", "en": "North of England Coast"}, "Date": {"fr": "3 Juin 1867", "en": "June 3rd, 1867"}, "Latitude_Décimal": 61.541262, "Longitude_Décimal": 0.513488, "Océan/Mer": {"fr": "Mer du Nord", "en": "North Sea"}, "Event": {"fr": "Complot d'évasion", "en": "Escape plot"}, "passage_roman": {"fr": "Pareil fait fut également observé le 23 juillet de la même année, dans les mers du Pacifique, par le Cristobal-Colon, de _West India and Pacific steam navigation Company_. Donc, ce cétacé extraordinaire pouvait se transporter d'un endroit à un autre avec une vélocité surprenante, puisque à trois jours d'intervalle, le Governor-Higginson et le Cristobal-Colon l'avaient observé en deux points de la carte séparés par une distance de plus de sept cents lieues marines. Quinze jours plus tard, à deux mille lieues de là, l'Helvetia, de la Compagnie Nationale, et le Shannon, du Royal-Mail, marchant à contrebord dans cette portion de l'Atlantique comprise entre les États-Unis et l'Europe, se signalèrent respectivement le monstre par 42° 15′ de latitude nord, et 60° 35′ de longitude à l'ouest du méridien de Greenwich. Dans cette observation simultanée, on crut pouvoir évaluer la longueur minimum du mammifère à plus de trois cent cinquante pieds anglais[1], puisque le Shannon et l'Helvetia étaient de dimension inférieure à lui, bien qu'ils mesurassent cent mètres de l'étrave à l'étambot. Or, les plus vastes baleines, celles qui fréquentent les parages des îles Aléoutiennes, le Kulammak et l'Umgullick, n'ont jamais dépassé la longueur de cinquante-six mètres,—si même elles l'atteignent.", "en": "It had been so much talked of, even through the Atlantic cable, that jesters pretended that this slender fly had stopped a telegram on its passage and was making the most of it. So when the frigate had been armed for a long campaign, and provided with formidable fishing apparatus, no one could tell what course to pursue. Impatience grew apace, when, on the 2nd of July, they learned that a steamer of the line of San Francisco, from California to Shanghai, had seen the animal three weeks before in the North Pacific Ocean. The excitement caused by this news was extreme. The ship was revictualled and well stocked with coal."}, "DistanceCentreTerre": 6371000}, {"Escales du Nautilus": {"fr": "Côtes de la Norvège", "en": "Coast of Norway"}, "Date": {"fr": "Juin 1867", "en": "June 1867"}, "Latitude_Décimal": 62.86093, "Longitude_Décimal": 1.2103, "Océan/Mer": {"fr": "Mer du Nord", "en": "North Sea"}, "Event": {"fr": "Fin du voyage pour le professeur Aronnax, Conseil et Ned Land", "en": "End of the journey for Professor Aronnax, Conseil, and Ned Land"}, "passage_roman": {"fr": null, "en": "And that it did exist was an undeniable fact; and, with that tendency which disposes the human mind in favour of the marvellous, we can understand the excitement produced in the entire world by this supernatural apparition. As to classing it in the list of fables, the idea was out of the question. On the 20th of July, 1866, the steamer Governor Higginson, of the Calcutta and Burnach Steam Navigation Company, had met this moving mass five miles off the east coast of Australia. Captain Baker thought at first that he was in the presence of an unknown sandbank; he even prepared to determine its exact position, when two columns of water, projected by the inexplicable object, shot with a hissing noise a hundred and fifty feet up into the air. Now, unless the sandbank had been submitted to the intermittent eruption of a geyser, the _Governor Higginson_ had to do neither more nor less than with an aquatic mammal, unknown till then, which threw up from its blow-holes columns of water mixed with air and vapour."}, "DistanceCentreTerre": 6371000}];

function esc(s) {
    if (s === null || s === undefined) return "";
    return String(s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

}

        detailContent = esc(detail.content || "");

}

    if (!overlay) return;

        overlay.style.display = "none";

});

document.addEventListener("keydown", function(e) {

});
