; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleinoptère</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Triton</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐚 Ptéropode</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>⭐ Astérie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪼 Méduse</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Alcyon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 d rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Horn</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la seconde moitié du XIXe siècle, les découvertes scientifiques ont connu une croissance spectaculaire. Dans le domaine de la zoologie marine, des expéditions ont été menées pour explorer les mers inexplorées, notamment autour de l'Antarctique et du cap Horn. Un des principaux biologistes marins de l'époque était Jean-Baptiste Lamarck, qui a décrit de nombreuses espèces marines nouvelles. En outre, le naturaliste français Isidore Geoffroy Saint-Hilaire a mené une expédition autour du monde pour étudier la faune marine.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses découvertes importantes. Il a inventé le générateur électromagnétique et a étudié les propriétés des courants électriques. Son travail a été crucial pour la compréhension de l'électricité et de ses applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, Alexander von Humboldt a mené une expédition dans les Andes sud-américaines pour étudier le climat, la flore et la faune de cette région. Ses recherches ont conduit à des avancées significatives en géologie, botanique et zoologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, John Dalton a développé la théorie atomique, qui explique la composition des éléments chimiques et leur comportement chimique. Cette théorie a été cruciale pour l'avancement de la chimie et a permis de comprendre les réactions chimiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les découvertes scient</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Cap Horn</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Sciences et technologie : Nemo, le capitaine du Nautilus dans 20,000 Lieues sous les mers de Jules Verne, possédait une connaissance avancée de son époque sur la navigation et l'exploration marine.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>De plus, l'utilisation de drones sous-marins et de robots océaniques permet maintenant une exploration plus poussée et moins invasive des écosystèmes marins.\n2.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Écologie marine : Les océans en 1866 étaient relativement peu connus, et la plupart des espèces marines décrites dans le roman de Jules Verne n'avaient pas encore été découvertes par les scientifiques de l'époque.</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Écologie Marine</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Il utilisait des instruments de mesure et de cartographie pour déterminer leur position, la profondeur et la température de l'eau.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Aujourd'hui, les technologies ont évolué considérablement avec l'utilisation de GPS, sonars et satellites pour explorer les océans.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Les sous-marins modernes sont équipés d'instruments plus sophistiqués permettant de collecter des données sur la vie marine, la géologie et le climat marin.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Aujourd'hui, il existe une grande connaissance sur les écosystèmes marins et leur importance pour la biodiversité mondiale.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Cependant, les océans sont menacés par le réchauffement climatique, qui entraîne la dégradation des habitats marins, la mortalité massive de poissons et d'autres espèces, ainsi que l'élévation du niveau de la mer.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>La pollution marine est également un problème majeur</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Horn</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The frigate skirted the south-east coast of America with great</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>rapidity. The 3rd of July we were at the opening of the Straits of</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Magellan, level with Cape Vierges. But Commander Farragut would not</p><p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>take a tortuous passage, but doubled Cape Horn.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inlin display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐧 Penguin</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐦 Petrel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 South Pole</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage. One of the most influential figures in natural history was Georges Cuvier, a French zoologist and paleontologist who played a crucial role in establishing comparative anatomy as a discipline. He made numerous contributions to marine zoology, including classifying over 40,000 species during his career.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Charles Darwin's groundbreaking work \"On the Origin of Species\" was published in 1859, but its ideas were already shaping scientific thought in the 1860s. Darwin proposed the theory of evolution by natural selection, which revolutionized understanding of life on Earth and had far-reaching implications for geography, biology, and anthropology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Another notable scientist was Jean Baptiste de Lamarck, who developed the concept of inheritance of acquired characteristics, although his ideas were later disproven. Nonetheless, he contributed to the development of evolutionary theory.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the field of electricity, Michael Faraday conducted extensive research on electromagnetism and electrochemistry in the 1830s and 1840s. His discoveries included the principles of electromagnetic induction and the creation of the first electric motor and generator.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Scientific expeditions played a crucial role in advancing knowledge during this period. The French explorer Jules Dumont d'Urville, mentioned in the passage, led several voyages of discovery, including two to the Antarctic region (1837-1840 and 1840-1842). His second voyage resulted in the first confirmed sighting of the Antarctic continent by a European.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ South Pole</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Comparison of Science and Technology:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. In Jules Verne's 20,000 Leagues Under the Sea (1866), Captain Nemo, a brilliant inventor, commands a technologically advanced submarine, the Nautilus. He demonstrates knowledge of various marine species such as whales, porpoises, and mussels. However, his understanding of underwater life is limited compared to current scientific discoveries. For instance, Nemo's Nautilus could only travel at a maximum speed of 30 knots, whereas modern submarines can reach speeds up to 45 knots. Additionally, Nemo's knowledge about the ocean floor and deep-sea creatures was based on speculation, while today's scientific exploration has revealed diverse ecosystems and unique organisms like giant squids, deep-sea hydrothermal vents, and bioluminescent creatures.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. In terms of technology, the 1860s were marked by the early stages of marine science, with limited un ack the movements of individual animals across vast distances.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Warming: The Atlantic Ocean, like other global bodies of</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "19": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Amérique Sud (retour)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Sud (retour)</h5>\n                    <p>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>", "compare_1866_today": "\n                    <h3 style='color:#0a3d62; font-size:1.9rem;'>Comparaison 1866 / Aujourd'hui</h3>\n                    <h5 style='color:#27c39f; font-size:1.4rem;'>⚗️ Contour Amérique Sud (retour)</h5>\n                    <p style='font-size:1.35rem;'>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>South America Coastline (return)</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1 ine-height:1.7; font-size:0.95rem;'>En matière de géographie marine, l'exploration du golfe du Mexique et des Antilles a été menée par plusieurs expéditions scientifiques au cours du XIXe siècle. En 1864, l'expédition américaine de la United States Coast Survey a exploré les côtes du golfe du Mexique et a cartographié les eaux profondes des Caraïbes. L'expédition française de l'Académie</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Martinique et Guadeloupe</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; fo s knowledge of trophic dynamics and the interconnectedness of marine species.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. State of Oceans and Species in 1866 vs Today:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- In 1866, Verne describes the oceans as teeming with life, with species such as giant squid, narwhals, and various fish inhabiting the waters around Martinique and Guadeloupe. However, today's oceans face numerous threats that were largely unknown in Verne's time.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Warm</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "22": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Contour Amérique Nord</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce point est une escale intermédiaire de navigation, non mentionnée explicitement dans le roman.</p>", "marine_species": "<p>🗺️ Escale intermédiaire — aucun passage du roman associé.</p>", "science_19c": "\n                    <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n                    <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Contour Amérique Nord</h5>\n                    <p>🗺️ Escale de navigation intermédiaire — pas de passage du roman associé.</p>", "compare_1866_today": "\n                    <h3 style='color:#0a3d62; font-size:1.9rem;'>Comparaison 1866 / Aujourd'hui</h3>\n                    <h5 style='color:#27c39f; font-size:1.4rem;'>⚗️ Contour Amérique Nord</h5>\n                    <p style='fo st mentionné dans ce passage. En 1</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Île Lucayes</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo, le capitaine du N lay:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐙 Octopus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Lucayan Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, numerous expeditions were organized to explore and document marine life, particularly in tropical regions like the Caribbean. French naturalist Louis Agassiz led several expeditions to study glaciers and the geology of North America, while Alexander Agassiz, his son, focused on marine biology, especially in the Gulf Stream region where the Nautilus was traveling.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Biology and Evolution: Charles Darwin published \"On the Origin of Species\" in 1859, proposing the theory of evolution by natural selection. His work, based on his voyage aboard HMS Beagle, greatly influenced the understanding of life's diversity and the relationship between species. Another influential figure was Georges Cuvier, a comparative anatomist who classified many marine organisms and introduced the concept of extinction.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British chemist and physicist, made significant contributions to the understanding of electromagnetism and electrochemistry. He discovered the principles underlying electric motors, generators, and transformers, which would later be crucial for marine navigation and exploration.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was essential during this era. For instance, the hydrographic barometer, a device used to measure atmospheric pressure and air temperature, was crucial for navigating the open sea. Additionally, the invention of the microscope allowed scientists like Agassiz to study marine organisms in greater detail.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Lucayan Island</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Science and Technology: Comparison between Nemo's Imagination and Current Discoveries**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Submarine technology: In Jules Verne's 20,000 Leagues Under the Sea (1866), Captain Nemo's Nautilus was a remarkable submarine, equipped with advanced features such as electric propulsion, diving capabilities to great depths, and an internal air supply. While Nemo's Nautilus was a work of fiction, modern-day submarines share some similarities in terms of their ability to dive deep and remain submerged for extended periods. However, the technological advancements since 1866 are significant. Modern submarines use nuclear power for propulsion, have sophisticated sonar systems, and can communicate with surface vessels via radio or satellite links.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Sonar technology: In the novel, the Nautilus used a form of sonar to navigate and detect marine life. While this was a fictional device at the time, modern sonars are essential tools for ocean exploration and navigation. Today's sonars use advanced technologies like multi-beam echo sounders to produce high-resolution images of the seafloor and surrounding waters. Additionally, autonomous underwater vehicles (AUVs) equipped with sonar systems are used for deep-sea research, allowing scientists to explore areas that would be difficult or impossible for human-occupied submarines.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>3. Communication technology: In 1866, communication between the Nautilus and other vessels was not mentioned in the novel. Today, underwater communication systems are commonplace, enabling submarines to communicate with surface ships, satellites, and other submersibles. These systems use a variety of technologies, including acoustic modems, optical fiber links, and radio waves.</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Marine Ecology: State</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "24": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cap Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Parmi les poissons osseux, je notai des labres-grisons particuliers à ces mers, des spares-synagres dont l'iris brillait comme un feu, des sciènes longues d'un mètre, à large gueule hérissée de petites dents, qui faisaient entendre un léger cri, des centronotes-nègres dont j'ai déjà parlé, des coriphènes bleus, relevés d'or et d'argent, des perroquets, vrais arcs-en-ciel de l'Océan, qui peuvent rivaliser de couleur avec les plus beaux oiseaux des tropiques, des blémies-bosquiens à tête triangulaire, des rhombes bleuâtres dépourvus d'écailles, des batrachoïdes recouverts d'une bande jaune et transversale qui figure un t grec, des fourmillements de petits gobies-bos pointillés de taches brunes, des diptérodons à tête argentée et à queue jaune, divers échantillons de salmones, des mugilomores, sveltes de taille, brillant d'un éclat doux, que Lacépède a consacrés à l'aimable compagne de sa vie, enfin un beau poisson, le chevalier-américain, qui, décoré de tous les ordres et chamarré de tous les rubans, fréquente les rivages de cette grande nation où les rubans et les ordres sont si médiocrement estimés. J'ajouterai que, pendant la nuit, les eaux phosphorescentes du Gulf-Stream rivalisaient avec l'éclat électrique de notre fanal, surtout par ces temps orageux qui nous menaçaient fréquemment. Le 8 mai, nous étions encore en travers du cap Hatteras, à la hauteur de la Caroline du Nord. La largeur du Gulf-Stream est là de soixante-quinze milles, et sa profondeur de deux cent dix mètres. Le Nautilus continuait d'errer à l'aventure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques remarquables ont été effectuées dans le domaine de la zoologie marine, de l'électricité et de la géographie, correspondant au passage cité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz (Suisse), un des plus grands naturalistes de son temps, a étudié les poissons osseux marins, notamment en Amérique du Nord. Il a décrit plusieurs espèces, dont certains labres-grisons et sciènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les sparidés, qui comprennent les spares-synagres, étaient l'objet d'études de Georges Cuvier (France) au début du XIXe siècle. Les chercheurs ont découvert que ces poissons possédaient un iris brillant comme un feu, ce qui est mentionné dans le passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les coriphènes bleus relevés d'or et d'argent sont en fait des poissons-chats (Sphoeroides sp.), découverts par Louis Agassiz et John Richardson (Canada) au XIXe siècle.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne les perroquets vrais arcs-en-ciel de l'Océan, il s'agit probablement des poissons-arc-en-ciel (Hemirhamphus sp.), connus pour leur magnifique couleur.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Cap Hatteras</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de son temps pour l'époque (1866) sur les espèces marines observées dans le Gulf Stream. Il pouvait identifier des poissons tels que les labres-grisons, les spares-synagres, les sciènes, les centronotes-nègres et les coriphènes bleus, relevés d'or et d'argent. Cependant, il n'avait pas connaissance de la biologie moléculaire, des génomiques ou des technologies d'imagerie sous-marine qui existent aujourd'hui (2025). Par exemple, les scientifiques actuels utilisent l'ADN pour identifier et étudier les espèces marines, ainsi que des technologies de visionnement sous-marin à haute résolution pour observer les écosystèmes marins en profondeur.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- En outre, Nemo n'avait pas connaissance du réchauffement climatique et de la pollution marine qui ont grandement affecté les océans depuis 1866. Aujourd'hui, les scientifiques utilisent des satellites pour surveiller le changement climatique et les effets sur les océans, ainsi que des techniques d'analyse des échantillons marins pour détecter la pollution marine.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Écologie marine :</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Écologie Marine</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- En 1866, lorsque Nemo traversait le Gulf Stream, il observait une variété de poissons tels que les saumons, les morues, les murènes, les gobiés et les zoophytes.</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Cape Hatteras</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>It was on this ocean river that the Nautilus then sailed. I must add that, during the night, the phosphorescent waters of the Gulf Stream rivalled the electric power of our watch-light, especially in the stormy weather that threatened us so frequently. May 8th, we were still crossing Cape Hatteras, at the height of North Carolina. The width of the Gulf Stream there is seventy-five miles, and its depth 210 yards. The Nautilus still went at random; all supervision seemed abandoned.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cape Hatteras</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: Renowned naturalists of the era, such as Georges Cuvier and Jean-Baptiste de Lamarck, made significant contributions to marine zoology. Cuvier, a pioneer in comparative anatomy, described numerous marine species, including sharks and whales. Lamarck proposed the concept of evolution, although his theories were later refined by Charles Darwin.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive explorations that expanded geographical knowledge, particularly of the oceans. Matthew Maury, known as the \"Pathfinder of the Seas,\" developed ocean current charts based on data collected from hundreds of ships' logbooks. His work contributed to understanding the Gulf Stream mentioned in the passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry and Electricity: Michael Faraday, a British scientist, made significant contributions to the fields of electromagnetism and electrochemistry. He discovered the principles of electromagnetic induction and invented various devices such as the Bunsen burner and the Faraday cage. His work laid the foundation for electric lighting and power generation, which may have influenced Verne's depiction of the Nautilus' advanced technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments was crucial during this period. For example, the marine chronometer, invented by John Harrison in the 18th century, improved navigation at sea. Additionally, the development of the dip net, dredge, and trawl enabled scientists to collect marine organisms more efficiently for study.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Cape Hatteras</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Underwater Navigation: In 1866, Jules Verne described the Nautilus as a submarine vessel that could traverse the ocean depths with remarkable autonomy. While Verne's imagination was groundbreaking for its time, modern submersibles like the Alvin and the Japanese Shinkai 2000 are far more advanced, capable of diving deeper and staying underwater for longer periods. Additionally, advancements in robotics have led to the development of autonomous underwater vehicles (AUVs) that can explore vast areas without human intervention.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>3. Communication: Verne's Nautilus had no means of communication with the outside world, as wireless telegraphy was still over two decades away from being invented. In contrast, modern submarines are equipped with advanced communication systems that allow them to maintain contact with surface vessels and even satellite networks.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Power Sources: Verne's Nautilus was propelled by an unknown source of energy, which he referred to as \"electricity produced by a galvanic pile.\" In reality, the first practical electric battery was not invented until 1800, and it took several more decades for batteries to become a viable power source for submarines. Today, nuclear-powered submarines are common, providing them with virtually limitless underwater travel.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Ocean Warming: In Verne's time, the concept of global warming was unknown, and the Gulf Stream was observed as a natural phenomenon. Today, however, it is understood that human activities have led to an increase in ocean temperatures, causing significant impacts on marine ecosystems</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "25": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Trois heures sonnaient alors. Le pilote descendit dans son canot, et rejoignit la petite goëlette qui l'attendait sous le vent. Les feux furent poussés; l'hélice battit plus rapidement les flots; la frégate longea la côte jaune et basse de Long-Island, et, à huit heures du soir, après avoir perdu dans le nord-ouest les feux de Fire-Island, elle courut à toute vapeur sur les sombres eaux de l'Atlantique. CHAPITRE IV NED LAND. Le commandant Farragut était un bon marin, digne de la frégate qu'il commandait.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Saumon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Morue</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Murène</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Gobie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Durant la période 1866-1870, les progrès scientifiques ont été significatifs dans plusieurs domaines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, des expéditions telles que celle de l'HMS Challenger (1872-1876) ont permis d'étendre notre connaissance sur les espèces marines et leur habitat. Des scientifiques tels que Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont contribué à la classification des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué de nombreuses expériences sur les électroaimants, les batteries et les réactions chimiques électriques. Ses travaux ont permis d'améliorer la compréhension des phénomènes électriques et ont ouvert la voie à de nouvelles applications pratiques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'expédition de Nils Adolf Erik Nordenskiöld (1870-1874) a permis de cartographier les régions polaires et d'étendre nos connaissances sur la glaciation. Des scientifiques tels que Alexander von Humboldt et Charles Lyell ont également contribué à l'avancement des connaissances en géographie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, les travaux de Dmitri Mendeleev ont abouti à la création de la table périodique des éléments, qui a permis d'organiser les éléments chimiques et de prédire leurs propriétés. Les expériences de Louis Pasteur ont également contribu</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo possédait une connaissance avancée de l'océan pour son époque, avec la capacité d'utiliser des technologies comme le Nautilus sous-marin, équipé d'une hélice à aubes et d'un système de propulsion électrique. Aujourd'hui, les connaissances sur l'océan ont encore plus progressé avec la découverte de nouvelles espèces marines, le développement de robots sous-marins pour explorer les fonds océaniques et cartographier les océans, ainsi que des technologies de navigation satellitaires pour suivre les mouvements des navires.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- En revanche, Nemo ne savait rien sur la géologie marine ou l'écologie maritime, ce qui le rendait incapable d'apprécier les impacts humains sur les océans et leurs écosystèmes. Aujourd'hui, nous avons une meilleure compréhension de ces sujets grâce à des études sur la pollution marine, le réchauffement climatique et l'impact de la pêche sur les populations de poissons.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Écologie marine :</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Écologie Marine</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- En 1866, lorsque Jules Verne décrit la faune maritime autour de Long Island, il mentionne des espèces comme le narval, le cétacé, le saumon, la morue, la murène, le gobie, le corail et les zoophytes. Aujourd'hui, plusieurs de ces espèces sont menacées ou ont disparu entièrement en raison du réchauffement climatique</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Long Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The _Abraham Lincoln_ answered by hoisting the American colours three times, whose thirty-nine stars shone resplendent from the mizzen-peak; then modifying its speed to take the narrow channel marked by buoys placed in the inner bay formed by Sandy Hook Point, it coasted the long sandy beach, where some thousands of spectators gave it one final cheer. The escort of boats and tenders still followed the frigate, and did not leave her until they came abreast of the lightship, whose two lights marked the entrance of New York Channel. Six bells struck, the pilot got into his boat, and rejoined the little schooner which was waiting under our lee, the fires were made up, the screw beat the waves more rapidly, the frigate skirted the low yellow coast of Long Island; and at eight bells, after having lost sight in the north-west of the lights of Fire Island, she ran at full steam on to the dark waters of the Atlantic. CHAPTER IV NED LAND Captain Farragut was a good seaman, worthy of the frigate he commanded. His vessel and he were one.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Salmon</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Cod</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Moray</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Goby</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Coral</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Long Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the given passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: During this period, marine zoological explorations increased significantly, led by scientists like Jean-Baptiste de Lamarck, Georges Cuvier, and Henri Marie Ducrotay de Blainville. They made important contributions to the understanding of marine life, including the classification and description of numerous new species. In geography, Matthew Maury's hydrography studies contributed to the mapping of ocean currents, which would have been crucial for naval navigation, as seen in the passage with the _Abraham Lincoln_ navigating through New York Channel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: The 19th century witnessed the rise of organic chemistry, with chemists like Justus von Liebig and August Wilhelm von Hofmann making significant contributions to understanding the composition and reactions of organic compounds. In addition, Michael Faraday's work on electromagnetism and electrochemistry laid the foundation for future advancements in electricity and energy storage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: The 1860s saw several important breakthroughs in the field of electricity. James Clerk Maxwell formulated his famous equations that described how electric and magnetic fields interact, while Thomas Edison was working on improving the incandescent light bulb, a technology that would revolutionize lighting in the following decades.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Biology: Charles Darwin's \"On the Origin of Species\" was published in 1859, proposing the theory of evolution by natural selection. Although outside the given timeframe, it had a profound impact on the scientific community and our understanding of life on Earth. Similarly, French zoologist Louis</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Long Island</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Science and Technology: Comparison between Jules Verne's Imagination (1866) and Current Discoveries (2025)**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Submarine Technology: In \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus was a marvel of advanced technology for its time, capable of diving deep into the ocean and navigating underwater currents. Today, submarines have evolved significantly, with modern nuclear-powered vessels like the USS Florida or Russian Akula class able to dive deeper and stay submerged longer than Nemo's Nautilus. Additionally, autonomous underwater vehicles (AUVs) and remotely operated underwater vehicles (ROVs) are now common tools for scientific research and exploration, surpassing the capabilities of a single-occupant submarine.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Sonar Technology: In the novel, Nemo used sonar to detect icebergs and other obstacles, a concept that was not yet fully realized in 1866. Today, sonar technology has advanced dramatically, with active and passive systems used for navigation, mapping the ocean floor, and tracking marine life. Modern sonars can provide high-resolution images of underwater objects, allowing scientists to study marine ecosystems in greater detail than ever before.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>3. Communication: In the novel, communication between the Nautilus and other ships was limited to visual signals or the occasional message in a bottle. Today, underwater communication has advanced significantly with the development of acoustic modems, satellite-linked systems, and even optical fiber cables that can transmit data at high speeds across long distances.</p>\n              </td>\n            </tr de l'Océan en suivant sur un des grands cercles du globe la ligne loxodromique, se divise en deux bras vers le quarante-troisième degré, dont l'un, aidé par l'alizé du nord-est, revient au Golfe de Gascogne et aux Açores, et dont l'autre, après avoir attiédi les rivages de l'Irlande et de la Norvége, va jusqu'au-delà du Spitzberg, où sa température tombe à quatre degrés, former la mer libre du pôle. C'est sur ce fleuve de l'Océan que le Nautilus naviguait alors. A sa sortie du canal de Bahama, sur quatorze lieues de large, et sur trois cent cinquante mètres de profondeur, le Gulf-Stream marche à raison de huit kilomètres à l'heure.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪸 Corail</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Terre Neuve</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage du roman de Jules Verne. Louis Agassiz, un zoologiste suisse, a étudié la glaciation et la théorie de la dérive des continents. Il a également contribué à la classification des poissons marins. En marine, le naturaliste français Jean-Baptiste Lamarck, ainsi que son compatriote Georges Cuvier, ont décrit de nombreuses espèces marines, y compris celles que le Professeur Aronnax note dans l'extrait du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne la géographie et la météorologie, les chercheurs ont commencé à comprendre le rôle des courants marins, notamment le Gulf Stream, décrit ici comme un courant chaud qui traverse l'Atlantique et se divise en deux bras vers le 43e degré. Le physicien Michael Faraday a également étudié la thermodynamique des courants marins et leur influence sur les climats.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, pendant cette période, l'utilisation d'instruments scientifiques tels que les baromètres, les thermomètres et les instruments de navigation ont permis aux expéditions scientifiques telles que celle du HMS Challenger (1872-1876) de collecter des données précises sur la géographie, la zoologie marine, la chimie et l'électricité des océans. Ces expéditions ont permis d'étendre notre connaissance du monde marin et ont contribué à la révolution scientifique de cette époque.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Terre Neuve</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0. ne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo, le capitaine du Nautilus, possédait une connaissance avancée de la marine pour son époque, notamment sur les espèces marines qu'il observait. Cependant, il n'avait pas accès à la technologie que nous avons aujourd'hui. Par exemple, Nemo utilisait des lunettes de crocodile pour observer l'environnement marine, alors que nous utilisons maintenant des satellites et des sonars pour explorer les océans. De plus, il n'avait pas accès à la technologie de communication moderne, comme Internet ou les téléphones portables, qui permettent d'échanger rapidement des informations sur les découvertes scientifiques.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Au niveau des connaissances scientifiques, Nemo avait une bonne compréhension de la géologie e ade us a very pleasant offer.” “Ah!” said I, “you know?” “If agreeable to you, sir,” interrupted Conseil, “the commander of the Nautilus has invited us to visit the magnificent Ceylon fisheries to-morrow, in your company; he did it kindly, and behaved like a real gentleman.” “He said nothing more?” “Nothing more, sir, except that he had already spoken to you of this little walk.” “Sir,” said Conseil, “would you give us some details of the pearl fishery?” “As to the fishing itself,” I asked, “or the incidents, which?” “On the fishing,” replied the Canadian; “before entering upon the ground, it is as well to know something about it.” “Very well; sit down, my friends, and I will teach you.” Ned and Conseil seated themselves on an ottoman, and the first thing the Canadian asked was: “Sir, what is a pearl?” “My worthy Ned,” I answered, “to the poet, a pearl is a tear of the sea; to the Orientals, it is a drop of dew solidified; to the ladies, it is a jewel of an oblong shape, of a brilliancy of mother-of-pearl substance, which they wear on their fingers, their necks, or their ears; for the chemist it is a mixture of phosphate and carbonate of lime, with a little gelatine; and lastly, for naturalists, it is simply a morbid secretion of the organ that produces the mother-of-pearl amongst certain bivalves.” “Branch of molluscs,” said Conseil. “Precisely so, my learned Conseil; and, amongst these testacea the earshell, the tridacnae, the turbots, in a word, all those which secrete mother-of-pearl, that is, the blue, bluish, violet, or white substance which lines the interior of their shells, are capable of producing pearls.” “Mussels too?” asked the Canadian. “Yes, mussels of certain waters in Scotland, Wales, Ireland, Saxony, Bohemia, and France.” “Good! For the future I shall pay attention,” replied the Canadian. “But,” I continued, “the particular mollusc which secretes the pearl is the pearl-oyster, the meleagrina margaritifera, that precious pintadine.</p>", "marine_spe m;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the given passage.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biology: Renowned naturalists of the era such as Georges Cuvier (1769-1832), Jean-Baptiste de Lamarck (1744-1829), and Louis Agassiz (1807-1873) made significant contributions to marine zoology. Cuvier, a pioneer in comparative anatomy, was instrumental in classifying fish species based on their skeletal structures. Lamarck proposed the theory of evolution, although his ideas were later refined by Charles Darwin (1809-1882). Agassiz, who focused on freshwater organisms, was a key figure in establishing marine biology as an independent scientific field.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry and Geography: Michael Faraday (1791-1867) made groundbreaking discoveries in the field of electrochemistry, demonstrating the relationship between electricity and chemical reactions. His work laid the foundation for the development of batteries, electric motors, and other electrical devices. Meanwhile, scientists like Alexander von Humboldt (1769-1859) and Charles Lyell (1797-1875) contributed to geography by exploring remote regions, mapping previously uncharted territories, and formulating theories about the Earth's history and processes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Instruments: The development of scientific instruments played a crucial role in advancing knowledge during this period. For example, the invention of the microscope enabled scientists to observe minute details of living organisms, while the development of the barometer helped researchers understand atmospheric pressure and weather patterns. Additionally, improvements in navigation technology, such as the</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14 ubmersible technology, and marine biology. Modern submarines are capable of diving deeper and staying submerged for longer periods than the Nautilus. Furthermore, advancements in sonar technology allow for more precise mapping of underwater landscapes, while autonomous underwater vehicles (AUVs) are used extensively for research and exploration. Additionally, the development of genetic sequencing has provided a wealth of information about marine species, unlike Nemo's reliance on speculation and folklore.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Marine Ecology:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>In 1866, as depicted in Verne's novel, the state of the oceans and their inhabitants was relatively unknown to Nemo, who spoke of the Ceylon pearl fisheries with curiosity. Today, however, the impacts of climate change, pollution, overfishing, and habitat destruction on marine ecosystems are well-documented. The Irish Sea, where the Nautilus encountered an enemy vessel, has seen a decline in biodiversity due to factors such as warming waters, acidification, and pollution. Species like whales, porpoises, sharks, seahorses, octopuses, crabs, and corals mentioned in the novel are all affected by these issues. For instance, overfishing has led to the depletion of many fish stocks, while plastic pollution poses a significant threat to numerous marine species</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n
