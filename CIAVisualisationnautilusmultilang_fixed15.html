<script>
const DETAILED_CONTENT = {"0": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Île de Crespo</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Une douzaine d'appareils de scaphandres, suspendus à la paroi, attendaient les promeneurs. Ned Land, en les voyant, manifesta une répugnance évidente à s'en revêtir. «Mais, mon brave Ned, lui dis-je, les forêts de l'île de Crespo ne sont que des forêts sous-marines! —Bon! fit le harponneur désappointé, qui voyait s'évanouir ses rêves de viande fraîche.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Baleine</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narval</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Moule</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Homard</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crabe</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île de Crespo</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1866-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne. Les savants de l'époque ont exploré la zoologie marine, l'électricité, la chimie et la géographie pour comprendre les forêts sous-marines et les créatures marines étranges.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Louis Agassiz, un zoologiste suisse, a étudié la vie marine dans les eaux profondes. Il a découvert des espèces de poissons et d'autres animaux inconnus jusqu'alors. En France, Jean-Baptiste Lamarck, Georges Cuvier et Henri Marie Ducrotay de Blainville ont également contribué à la connaissance de la zoologie marine en décrivant de nouveaux genres et espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'électricité, Michael Faraday a effectué des recherches importantes sur les propriétés électriques des matériaux. Il a inventé le générateur électrique à aimant permanent, qui a permis de produire de l'électricité en grande quantité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les expéditions scientifiques ont également joué un rôle important dans la découverte de nouvelles espèces marines et des forêts sous-marines. La Royal Society a organisé une expédition à bord du HMS Challenger entre 1872 et 1876, qui a exploré les océans du monde entier et a collecté de nombreuses données sur la géographie marine, la zoologie, la chimie et l'élect</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Île de Crespo</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo était conscient de la nécessité d'équipements spéciaux pour explorer l'océan profond (scaphandres), mais sa connaissance des technologies sous-marines était limitée comparativement à celles d'aujourd'hui. Ainsi, les appareils de scaphandres qu'il utilisait étaient rudimentaires et ne permettaient pas de rester sous l'eau pendant longtemps. De nos jours, les technologies sous-marines ont évolué considérablement avec l'apparition de combinaisons autonomes qui permettent aux plongeurs d'explorer l'océan profond sans aucun risque pour eux-mêmes. De plus, les sous-marins modernes sont capables de plonger jusqu'à des profondeurs considérablement supérieures à celles atteintes par le Nautilus, grâce à des technologies de propulsion et de contrôle qui ont grandement évolué.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Quant aux connaissances scientifiques sur les espèces marines observées dans l'Île de Crespo, elles étaient limitées et imprécises comparativement à celles d'aujourd'hui. Par exemple, Nemo n'était pas conscient des liens génétiques entre les baleines, les narvals et les cétacés, qui ont été découverts plus tard par la science moderne. De nos jours, grâce à l'analyse de l'ADN et d'autres techniques, nous avons une connaissance plus précise des relations évolutives entre les différentes espèces marines.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Écologie</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Écologie Marine</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n            </tr>\n          </tbody>\n        </table>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Crespo Island</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>The note was worded as follows— 16th of November, 1867. TO PROFESSOR ARONNAX, On board the Nautilus. Captain Nemo invites Professor Aronnax to a hunting-party, which will take place to-morrow morning in the forests of the island of Crespo. He hopes that nothing will prevent the Professor from being present, and he will with pleasure see him joined by his companions. CAPTAIN NEMO, Commander of the Nautilus.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Species identified in the novel excerpt:</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Whale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦷 Narwhal</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cetacean</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦪 Mussel</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦞 Lobster</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦀 Crab</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Crespo Island</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: The study of marine life experienced rapid growth during this period. French naturalist Georges Cuvier (1769-1832), although his work was mainly in the 18th century, laid the foundation for comparative anatomy and paleontology, which were crucial for understanding marine species. In the later part of the 19th century, Jean Baptiste de Lamarck (1744-1829) and Louis Agassiz (1807-1873) made significant contributions to marine biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>One notable figure in this context is French zoologist Henri Marie Ducrotay de Blainville (1777-1850), who described several deep-sea organisms, including the anglerfish and the vampire squid. His work provided valuable insights into the biodiversity of deep-sea environments.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Electrical Science: The 19th century saw a surge in understanding electricity, with Michael Faraday (1791-1867) being one of its most prominent figures. He made groundbreaking contributions to electromagnetism and electrochemistry. His inventions, such as the electric motor and the dynamo, laid the foundation for electrical technology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Geography: Exploration and mapping of new territories were ongoing during this period. The Royal Geographical Society, established in 1830, played a significant role in funding expeditions and promoting geographical research. In marine geography, Matthew Maury (1806-1873) made substantial contributions to the</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Crespo Island</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Comparison of Science and Technology:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Submarine technology: In 1866, as described by Jules Verne in \"20,000 Leagues Under the Sea,\" Captain Nemo's Nautilus was a fictional submarine with advanced features for its time, such as an electric propulsion system and a periscope. Today, while not quite like the Nautilus, real-life submarines exist that can travel vast distances underwater, operate in extreme conditions, and possess sophisticated sonar systems for navigation and detection of marine life. The primary difference lies in the Nautilus's fictional technology being far ahead of its time, while modern submarines are based on scientific discoveries and technological advancements over the past century.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Underwater exploration: In 1866, underwater exploration was limited to diving equipment like diving bells and diving suits, which were cumbersome and provided only a brief glimpse of the underwater world. The Nautilus's ability to dive deep into the ocean and explore for extended periods was revolutionary for its time. Today, robotic submarines, remotely operated vehicles (ROVs), and autonomous underwater vehicles (AUVs) are used for deep-sea exploration, mapping, and data collection. These technologies allow scientists to study the ocean floor, monitor marine life, and gather valuable data about the world's oceans without putting human lives at risk.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>Comparison of Marine Ecology:</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. State of Oceans in 1866 vs Today: In 1866, the oceans were relatively pristine compared to today. The industrial revolution had not yet reached its peak, and pollution levels were significantly lower. Overfishing was not a major concern as fishing technologies were less advanced, and the global human population was smaller</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "1": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des Pomotou</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Ce terrible spectacle inaugurait la série des catastrophes maritimes, que le Nautilus devait rencontrer sur sa route. Depuis qu'il suivait des mers plus fréquentées, nous apercevions souvent des coques naufragées qui achevaient de pourrir entre deux eaux, et, plus profondément, des canons, des boulets, des ancres, des chaînes, et mille autres objets de fer, que la rouille dévorait. Cependant, toujours entraînés par ce Nautilus, où nous vivions comme isolés, le 11 décembre, nous eûmes connaissance de l'archipel des Pomotou, ancien «groupe dangereux» de Bougainville, qui s'étend sur un espace de cinq cents lieues de l'est-sud-est à l'ouest-nord-ouest, entre 13° 30′ et 23° 50′ de latitude sud, et 125° 30′ et 151° 30′ de longitude ouest, depuis l'île Ducie jusqu'à l'île Lazareff. Cet archipel couvre une superficie de trois cent soixante-dix lieues carrées, et il est formé d'une soixantaine de groupes d'îles, parmi lesquels on remarque le groupe Gambier, auquel la France a imposé son protectorat. Ces îles sont coralligènes.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Alexandre Dumas et Jules Verne ont popularisé l'archipel des Pomotou en publiant leurs romans respectivement en 1864 et 1870, mais il s'agit d'une fiction car cet archipel n'existe pas réellement. Cependant, dans le contexte de l'époque, les savants ont exploré les mers plus fréquentées et ont découvert des coques naufragées et des objets de fer dégradés par la rouille, ce qui peut être comparé au passage du roman.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Pour les découvertes scientifiques, Charles Darwin a publié son ouvrage \"L'Origine des espèces\" en 1859, dans lequel il propose sa théorie de l'évolution par sélection naturelle. Il a également exploré la région du Pacifique Sud pendant son voyage sur le HMS Beagle entre 1831 et 1836.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En zoologie marine, Henri Milne-Edwards a décrit de nombreuses espèces de crustacés et d'autres animaux marins durant cette période. Il a également fondé la Société zoologique de France en 1860.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En chimie, Michael Faraday a effectué des recherches importantes sur l'électrolyse, les électrochimie et la physique des gaz. Son travail a permis d'expliquer la structure moléculaire de l'eau et du chlorure de sod</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Archipel des Pomotou</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- Nemo, le capitaine du Nautilus dans le roman de Jules Verne, possédait une connaissance avancée de son époque pour l'époque (1866). Il disposait d'un sous-marin équipé de technologies innovantes telles que la propulsion par hélice et la lumière électrique. Cependant, il n'avait pas accès à des technologies telles que les radars, les sonars ou les systèmes informatiques de navigation qui sont aujourd'hui indispensables pour explorer les océans. Aujourd'hui, la technologie a évolué considérablement et nous disposons d'outils tels que des satellites, des robots sous-marins et des systèmes de communication sans fil qui permettent une exploration plus approfondie et précise des océans.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- De plus, Nemo avait une connaissance avancée des sciences marines pour son époque, mais il n'avait pas accès à la connaissance actuelle sur les océans profonds. Aujourd'hui, grâce aux avancées de la géophysique marine et de l'océanographie, nous disposons d'une compréhension plus approfondie des océans profonds, y compris leur structure, leur composition chimique et leur dynamique.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Écologie marine :</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Écologie Marine</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- En 1866, lorsque le Nautilus traversait l'archipel des Pomotou, il observait une grande diversité d'espèces marines telles que les cétacés, les requins, les raies, les thons, les hareng</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}, "en": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Pomotou Archipelago</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Book excerpt</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>However, the Nautilus, turning, went round the submerged vessel, and in one instant I read on the stern—“The Florida, Sunderland.” CHAPTER XVIII VANIKORO This terrible spectacle was the forerunner of the series of maritime catastrophes that the Nautilus was destined to meet with in its route. As long as it went through more frequented waters, we often saw the hulls of shipwrecked vessels that were rotting in the depths, and deeper down cannons, bullets, anchors, chains, and a thousand other iron materials eaten up by rust. However, on the 11th of December we sighted the Pomotou Islands, the old “dangerous group” of Bougainville, that extend over a space of 500 leagues at E.S.E. to W.N.W., from the Island Ducie to that of Lazareff. This group covers an area of 370 square leagues, and it is formed of sixty groups of islands, among which the Gambier group is remarkable, over which France exercises sway.</p>", "marine_species": "<p>No marine species identified in this passage.</p><p><em>Jules Verne describes geography or journey events here.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 19th century, significant advancements were made in various scientific disciplines that are relevant to the passage you provided.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck and Georges Cuvier, both influential naturalists of the time, contributed significantly to marine zoology. Lamarck proposed a theory of evolution, although it was later replaced by Charles Darwin's theory of natural selection. Cuvier, known as the \"father of paleontology,\" made important contributions to the study of fossilized marine life.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw numerous expeditions aimed at mapping and exploring remote regions, including the Pacific islands mentioned in the passage. One such expedition was led by Louis Antoine de Bougainville, who discovered the Pomotou Archipelago in 1768. Another notable figure was Alexander von Humboldt, a German polymath who explored South America and made significant contributions to geography, geology, and biology.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday, an English chemist and physicist, conducted groundbreaking research on electrochemistry and electromagnetism during this period. He discovered benzene and invented the first electric motor and generator. His work laid the foundation for future developments in electricity and chemistry.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Electricity: The 19th century was a time of significant advancements in the field of electricity. André-Marie Ampère, a French physicist, made important contributions to electrodynamics and magnetic circuits. He formulated Ampere's law, which describes how electric currents generate magnetic fields.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Pomotou Archipelago</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Science and Technology: Jules Verne's Imagination versus Current Discoveries**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Submarine technology: In 20,000 Leagues Under the Sea (1866), Jules Verne imagined the Nautilus as a highly advanced submarine with innovative features such as an external hull that could withstand immense pressure, internal compartments that could be flooded or emptied to control buoyancy, and propulsion by means of a nuclear-like power source (although it was not explicitly named as such). In contrast, modern submersibles like the Deepsea Challenger and Triton 36000/2 are designed with advanced materials and technology for deep-sea exploration, but they do not possess the same level of autonomy or speed as Verne's Nautilus. However, current submersibles can gather vast amounts of data using sophisticated sensors and imaging systems, which were not available in Verne's time.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Communication technology: In 1866, long-range communication underwater was not possible, making the Nautilus' ability to send messages to distant locations through electric signals a remarkable invention by Jules Verne. Today, underwater communication is facilitated through acoustic and optical systems, such as satellite-based systems for tracking submersibles and deep-sea buoys for monitoring ocean conditions. Additionally, the internet has revolutionized the sharing of scientific data, allowing researchers from around the world to collaborate on projects and rapidly disseminate their findings.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today**</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                \n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Warming and pollution: In 1866, ocean warming and pollution were not significant issues due to the relatively low levels of greenhouse gas emissions and industrial activity</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "2": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Archipel des nouvelles Hébrides</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Et si maître Ned Land n'eut pas à se repentir de sa gloutonnerie en cette circonstance, c'est que l'huître est le seul mets qui ne provoque jamais d'indigestion. En effet, il ne faut pas moins de seize douzaines de ces mollusques acéphales pour fournir les trois cent quinze grammes de substance azotée, nécessaires à la nourriture quotidienne d'un seul homme. Le 25 décembre, le Nautilus naviguait au milieu de l'archipel des Nouvelles-Hébrides, que Quiros découvrit en 1606, que Bougainville explora en 1768, et auquel Cook donna son nom actuel en 1773. Ce groupe se compose principalement de neuf grandes îles, et forme une bande de cent vingt lieues du nord-nord-ouest au sud-sud-est, comprise entre 15° et 2° de latitude sud, et entre 164° et 168° de longitude. Nous passâmes assez près de l'île d'Aurou, qui, au moment des observations de midi, m'apparut comme une masse de bois verts, dominée par un pic d'une grande hauteur.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont eu lieu qui correspondent à ce passage de l'œuvre de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, le naturaliste français Jean-Baptiste Lamarck a étudié les mollusques en détail, notamment les huîtres. Il a classifié plus de 100 espèces différentes et a décrit leur anatomie, leur physiologie et leur écologie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En ce qui concerne l'expédition dans les Nouvelles-Hébrides, le naturaliste français Louis Antoine de Bougainville a exploré ces îles en 1768. Plus tard, en 1773, le navigateur britannique James Cook a renommé ce groupe d'îles pour l'honorer.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la chimie, Michael Faraday a découvert les propriétés électrochimiques des solutions et a inventé le premier électrolyte. Il a également étudié l'électricité et les gaz, notamment l'hydrogène et l'oxygène.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la géographie, le naturaliste français Georges Cuvier a contribué à la cartographie des régions du monde en explorant l'Amérique du Sud et l'Afrique. Il a également étudié les fossiles et a développé une théorie sur l'extinction des espèces.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Archipel des nouvelles Hébrides</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:  marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Cap Wessel</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860-1870, plusieurs avancées scientifiques ont eu lieu dans divers domaines tels que la zoologie marine, l'électricité, la géographie et la chimie.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de la zoologie marine, des expéditions scientifiques telles que celle du HMS Challenger (1872-1876) ont permis de découvrir de nouvelles espèces marines, notamment dans les eaux australiennes comme le golfe de Carpentarie. Des savants tels que Louis Agassiz et Alexander Agassiz ont également contribué à la connaissance des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans le domaine de l'électricité, Michael Faraday a effectué des recherches importantes sur les électroaimants, qui ont permis d'améliorer la compréhension de ce phénomène naturel. Les électroaimants ont également été utilisés dans les navires pour améliorer leur navigation et leur sécurité.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En géographie, l'exploration du monde par des expéditions scientifiques a permis de cartographier précisément les régions peu connues, telles que le golfe de Carpentarie en Australie. Des savants tels que Charles Darwin ont également contribué à la compréhension de l'évolution des espèces et du climat dans ces régions.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Enfin, dans le domaine de la chimie, les travaux de Dmitri Mendeleev ont permis de créer la table périodique des éléments, qui a facilité la compréhension des propriétés chimiques des différents éléments</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Cap Wessel</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Sciences et technologie :</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>- L'hélice du Nautilus décrite par Jules Verne était une invention de science-fiction, car il s'agissait d'un dis ottom:12px; line-height:1.7; font-size:0.95rem;'>In the 19th century, significant advancements were made across various scientific disciplines that are relevant to the passage from Jules Verne's \"20,000 Leagues Under the Sea.\"</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Biogeography: During this period, marine zoologists like Jean-Baptiste de Lamarck, Georges Cuvier, and Achille Valenciennes made substantial contributions to our understanding of marine life. Cuvier, for instance, developed the concept of extinction and was a pioneer in comparative anatomy, which helped classify marine organisms. The Gulf of Carpentaria, mentioned in the passage, was extensively studied by naturalists on scientific expeditions like those led by Phillip Parker King and Matthew Flinders in the early 19th century, contributing to our understanding of its marine life and geography.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Electricity: The development of electricity as a scientific discipline was crucial during this period. Michael Faraday, a British scientist, made groundbreaking contributions to the field with his work on electromagnetism, electrochemistry, and electrolysis. His inventions included the electric motor, the dynamo, and the first battery for chemical analysis. The \"marvellous electric agent\" in the passage could be a reference to the use of electricity for propulsion or protection, although no such technology existed during this time.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the realm of chemistry, significant advancements were made. Justus von Liebig, a German chemist, is known for his work on organic chemistry and agricultural chemistry. His research on fertilizers had a profound impact on agriculture. The passage mentions the Nautilus' ability to produce heat, which could be a reference to chemical reactions occurring within the vessel, altho hat was powered by an unknown energy source and capable of incredible speeds. Today, while we do not have submarines powered by electricity generated from an unidentified source, modern submersibles use electric motors or fuel cells for propulsion. The technology has advanced significantly, allowing for more efficient and quieter operations compared to the Nautilus's rapid but unspecified speed.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>3. Navigation Systems: The Nautilus's navigation system in Verne's novel is not described in detail, but it appears to be advanced for its time, allowing the ship to travel vast distances underwater. Today, submarines use sophisticated navigation systems that include GPS, sonar, and other sensors to ensure safe and efficient navigation.</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (2025)**</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Energy Source: The energy source powering the Nautilus remains a mystery in Verne's novel. In contrast, today's submarines use nuclear reactors or batteries for power. While the Nautilus was depicted as having an invincible energy source that protected it from external attacks, modern submarines are vulnerable to sonar detection and other technological threats.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Marine Biodiversity: In 1866, when Captain Nemo was exploring the waters around Cape Wessel, the marine ecosystem was relatively pristine compared to today. The Gulf of Carpentaria was home to a diverse array of species such as parrot</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "5": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Mer de Timor</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Les récifs étaient encore nombreux, mais plus clair-semés, et relevés sur la carte avec une extrême précision. Le Nautilus évita facilement les brisants de Money à bâbord, et les récifs Victoria à tribord, placés par 130° de longitude, et sur ce dixième parallèle que nous suivions rigoureusement. Le 13 janvier, le capitaine Nemo, arrivé dans la mer de Timor, avait connaissance de l'île de ce nom par 122° de longitude. Cette île dont la superficie est de seize cent vingt-cinq lieues carrées est gouvernée par des radjahs. Ces princes se disent fils de crocodiles, c'est-à-dire issus de la plus haute origine à laquelle un être humain puisse prétendre.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 st -1850), who described numerous species of cephalopods, such as the octopus and squid.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw extensive exploration of the Pacific Ocean, including the Timor Sea region mentioned in your passage. James Cook (1728-1779) and Charles Darwin (1809-1882) were among those who made significant contributions to our understanding of this region through their voyages. In 1836, Dumont d'Urville discovered the island of Timor during his expedition.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: Michael Faraday (1791-1867) was a prominent chemist and physicist who made significant contributions to electrochemistry and electromagnetism. His work on electrolysis, published in 1834, laid the foundation for battery technology and the study of electricity in seawater.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Instruments: The development of scientific instruments played a crucial role in advancing knowledge during this period. For example, the invention of the marine chronometer by John Harrison (1693-1776) allowed for precise</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Timor Sea</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15) tyle='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Du 21 au 23 janvier, le Nautilus marcha à raison de deux cent cinquante lieues par vingt-quatre heures, soit cinq cent quarante milles, ou vingt-deux milles à l'heure. Si nous reconnaissions au passage les diverses variétés de poissons, c'est que ceux-ci, attirés par l'éclat électrique, cherchaient à nous accompagner; la plupart, distancés par cette vitesse, restaient bientôt en arrière; quelques-uns cependant parvenaient à se maintenir pendant un certain temps dans les eaux du Nautilus. Le 24 au matin, par 12° 5′ de latitude sud et 94° 33′ de longitude, nous eûmes connaissance de l'île Keeling, soulèvement madréporique planté de magnifiques cocos, et qui fut visitée par M. Darwin et le capitaine Fitz-Roy. Le Nautilus prolongea à peu de distance les accores de cette île déserte.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Île Keeling</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans les années 1860, plusieurs expéditions scientifiques ont eu lieu pour étudier la zoologie marine et l'électricité. L'une d'elles a conduit Charles Darwin et le capitaine Robert FitzRoy à visiter l'île Keeling dans l'océan Indien en 1842. Cette île est mentionnée dans le roman \"Vingt Mille Lieues sous les mers\" de Jules Verne, où elle est décrite comme étant visitée par un sous-marin fictif, le Nautilus.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En réalité, l'île Keeling est un atoll corallien qui a été découvert en 1606. Elle est ubmarine capable of traveling vast distances underwater. Today, we have nuclear-powered submarines that can remain submerged for extended periods and travel thousands of miles without surfacing. Furthermore, modern submarines are equipped with advanced sensors and communication systems, allowing them to gather data and transmit it back to shore in real time.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Coral Reefs: In 1866, Darwin and Fitz-Roy visited Keeling Island, a coral formation, much like the one described by Verne. Today, many coral reefs worldwide are under threat due to climate change, pollution, and overfishing</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "7": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>Golfe du Bengale</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>La science a déterminé, sur le globe, la direction de cinq courants principaux: un dans l'Atlantique nord, un second dans l'Atlantique sud, un troisième dans le Pacifique nord, un quatrième dans le Pacifique sud, et un cinquième dans l'Océan indien sud. Il est même probable qu'un sixième courant existait autrefois dans l'Océan indien nord, lorsque les mers Caspienne et d'Aral, réunies aux grands lacs de l'Asie, ne formaient qu'une seule et même étendue d'eau. Or, au point indiqué sur le planisphère, se déroulait l'un de ces courants, le Kuro-Scivo des Japonais, le Fleuve-Noir, qui, sorti du golfe du Bengale où le chauffent les rayons perpendiculaires du soleil des Tropiques, traverse le détroit de Malacca, prolonge la côte d'Asie, s'arrondit dans le Pacifique nord jusqu'aux îles Aléoutiennes, charriant des troncs de camphriers et autres produits indigènes, et tranchant par le pur indigo de ses eaux chaudes avec les flots de l'Océan. C'est ce courant que le Nautilus allait parcourir. Je le suivais du regard, je le voyais se perdre dans l'immensité du Pacifique, et je me sentais entraîner avec lui, quand Ned Land et Conseil apparurent à la porte du salon.</p>", "marine_species": "<p>Aucune espèce marine identifiée dans ce passage.</p><p><em>Jules Verne décrit ici plutôt la géographie ou les événements du voyage.</em></p>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, les progrès considérables de la science ont permis de découvrir et d'explorer plus profondément le monde marin et les courants océaniques.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Le zoologiste français Georges Cuvier a été un des premiers à étudier les courants marins en définissant ceux du Golfe du Bengale, du Pacifique nord et du Pacifique sud. En 1822, il publie une carte de la circulation des eaux dans l'océan Indien, qui montre le Kuro-Siwo, le courant noir décrit par Verne, se déroulant à partir du golfe du Bengale et traversant le détroit de Malacca.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1839, le naturaliste anglais Charles Darwin a également contribué aux connaissances sur les courants marins en explorant l'océan Pacifique sud lors de son voyage à bord du HMS Beagle. Il décrit les courants océaniques et leur importance pour la circulation des espèces marines.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>En 1837, le naturaliste français Jean-Baptiste de Lamarck publie une carte des courants marins dans l'océan Atlantique nord, qui montre un courant se déplaçant vers l'ouest.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Les progrès technologiques ont également permis d'améliorer les instruments utilisés pour la recherche océanographique. En 1865, William Thompson (Lord Kelvin) a inventé le thermomètre de mer qui permettait de mesurer la température de l'eau à différentes profondeurs.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Golfe du Bengale</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='p olid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐢 Sea turtle</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🧽 Sponge</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🪱 Annelid</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>In the context of the passage, several significant scientific discoveries and advancements occurred during the mid-19th century that relate to marine zoology, geography, chemistry, and electricity:</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology: Jean-Baptiste de Lamarck's work on invertebrates (early 19th century) paved the way for further studies in marine biology. Georges Cuvier, a prominent figure of the time, made significant contributions to comparative anatomy and paleontology, classifying various species found in the Mediterranean Sea. Louis Agassiz, another notable zoologist, was instrumental in the study of fish and fossil fishes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Geography: The 19th century saw advancements in oceanographic studies. Alexander von Humboldt's work on geography and natural sciences contributed to our understanding of the Mediterranean Sea's geographical features, climate, and geology. Mathew Maury, known as the \"Pathfinder of the Seas,\" mapped ocean currents and weather patterns, providing valuable information for navigation in the Mediterranean.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Chemistry: In the field of chemistry, Michael Faraday made groundbreaking discoveries in electrochemistry and electromagnetism, which had implications for understanding the chemical composition of seawater and its interaction with marine organisms. Justus von Liebig's work on organic chemistry was also crucial in understanding the nutrient cycles within marine ecosystems.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Scientific Expeditions: The 19th century witnessed numerous scientific expeditions, such as the Challenger expedition (1872-1876), which aimed to explore the world's oceans and gather data on geology, zoology, and chemistry. These expeditions greatly contributed to our understanding of the Mediterranean Sea and its ecosystems.</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Mediterranean Sea</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Science and Technology: Jules Verne's Imagination vs Current Discoveries**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Submarine technology: In 1866, Jules Verne described the Nautilus as a remarkable underwater vessel, equipped with advanced features such as an electric propulsion system, rotating spiral staircases, and a diving bell. While these elements were fictional at the time, modern submarines share some similarities in terms of their ability to navigate underwater and explore the ocean depths. However, current submarines are significantly more advanced, utilizing sonar systems for navigation and mapping, as well as sophisticated sensors for collecting data on marine life and oceanography.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>**Marine Ecology: State of Oceans and Species in 1866 vs Today (Warming, Pollution, Overfishing, Endangered Species)**</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Ocean warming: In Verne's description, the Mediterranean Sea is depicted as a \"perfect battlefield\" where Neptune and Pluto still dispute the empire of the world, suggesting a dynamic and ever-changing ocean. However, today's scientific understanding reveals that human activities, particularly greenhouse gas emissions, have led to global warming and rising sea temperatures, which are causing significant changes in marine ecosystems worldwide.</p>\n              </td>\n            </tr>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🌊 Marine Ecology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Underwater communication: In Verne's novel, the Nautilus had a telegraphic system that allowed Captain Nemo to communicate with other submarines and land-based stations. Although this was purely fictional in 1866, today's underwater communication systems are based on acoustic modems and optical fibers, enabling real-time data transmission between submerged vehicles and surface vessels or stations.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Pollution: In 1866, pollution was not a major concern in the Mediterranean Sea as it is</p>\n              </td>\n            </tr>\n          </tbody>\n        </table>"}}, "12": {"fr": {"book_excerpt": "\n        <h3 style='color:#0a3d62; font-size:2rem; margin-bottom:12px;'>L'Atlantide</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:16px; font-weight:600;'>📖 Extrait du livre</h5>\n        <p style='margin-bottom:14px; line-height:1.8; font-size:1.5rem;'>Puis, ramassant un morceau de pierre crayeuse, il s'avança vers un roc de basalte noire et traça ce seul mot: ATLANTIDE. Quel éclair traversa mon esprit! L'Atlantide, l'ancienne Méropide de Théopompe, l'Atlantide de Platon, ce continent nié par Origène, Porphyre, Jamblique, D'Anville, Malte-Brun, Humboldt, qui mettaient sa disparition au compte des récits légendaires, admis par Possidonius, Pline, Ammien-Marcellin, Tertullien, Engel, Sherer, Tournefort, Buffon, d'Avezac, je l'avais là sous les yeux, portant encore les irrécusables témoignages de sa catastrophe! C'était donc cette région engloutie qui existait en dehors de l'Europe, de l'Asie, de la Libye, au-delà des colonnes d'Hercule, où vivait ce peuple puissant des Atlantes, contre lequel se firent les premières guerres de l'ancienne Grèce! L'historien qui a consigné dans ses écrits les hauts faits de ces temps héroïques, c'est Platon lui-même.</p>", "marine_species": "<p style='color:#607080; font-size:1.3rem; margin-bottom:14px;'>Espèces identifiées dans l'extrait du roman :</p><div style='display:flex; flex-wrap:wrap; gap:4px;'><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐋 Cétacé</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🦈 Squale</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🐟 Raie</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39, ock; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Varech</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Hydrophyte</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>Découvertes scientifiques du XIXe siècle</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 L'Atlantide</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Généré par Mistral (IA locale)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>Dans la seconde moitié du XIXe siècle, plusieurs découvertes scientifiques ont été réalisées qui correspondent à l'extrait cité de Jules Verne.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Zoologie marine : Les explorations océanographiques ont permis de découvrir de nombreuses espèces marines inconnues jusqu'alors, notamment en Méditerranée et dans les eaux autour des îles Canaries, où le Nautilus aurait pu naviguer selon l'intrigue du roman. Des savants tels que Lacépède ont contribué à la connaissance de ces espèces.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Géographie : Les cartes et les recherches géographiques ont permis d'avancer dans la compréhension de la géographie mondiale et des régions inexplorées, notamment en ce qui concerne l'Atlantique, où se trouve l'Atlantide selon le roman. Des géographes tels que D'Anville, Malte-Brun et Humboldt ont contribué à la cartographie et à la compréhension de ces régions.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Électricité : Les progrès dans l'étude de l'électricité ont permis de comprendre les phénomènes électriques naturels, notamment ceux liés aux phénomènes océaniques. Des savants tels que Faraday ont contribué à la compréhension de ces phénomènes.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Expéditions scientifiques : Les expéditions scientifiques ont permis d'explorer des régions inconnues et de recueillir des données sur la faune, la flore, la géologie et la météorologie</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparaison 1866 / Aujourd'hui</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ L'Atlantide</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Généré par Mistral (IA locale)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Aujourd'hui</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Sciences & Technologie</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border und:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Zoophyte</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Algae</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Kelp</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Fucus</span><span style='display:inline-block; margin:4px; padding:5px 12px;background:rgba(39,195,159,0.12); color:#27c39f;border:1px solid rgba(39,195,159,0.3); border-radius:20px;font-size:1.3rem;'>🌿 Aquatic plant</span></div>", "science_19c": "\n        <h3 style='color:#0a3d62;'>19th-century scientific discoveries</h3>\n        <h5 style='color:#27c39f; font-size:0.85rem; margin-bottom:14px;'>🔬 Atlantis</h5>\n        <div style='color:#607080; font-size:0.8rem; margin-bottom:12px;'>\n            ✨ Generated by Mistral (local AI)\n        </div>\n        <p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>During the 1866-1870 period, several significant scientific discoveries and advancements were made that relate to the passage from Jules Verne's novel.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>1. Marine Zoology and Geography: French naturalist Jean Louis Rodolphe Agassiz (1807-1873) was a pioneer in marine zoology, particularly focusing on glacial theory and the study of fossilized fish. His work contributed to the understanding of geological changes and the evolution of life forms. In 1864, he led an expedition to the United States to investigate glaciation and the distribution of freshwater fish.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>2. Chemistry: English chemist Michael Faraday (1791-1867) made groundbreaking contributions to the field of electrochemistry during this period. He discovered electromagnetic induction, dielectric and diamagnetic effects, and established the principles of electrolysis. His work laid the foundation for the development of electric motors, generators, and batteries.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>3. Electricity: British scientist William Thomson (Lord Kelvin) (1824-1907) made significant advancements in the understanding of electricity and thermodynamics. He formulated a mathematical model for electromagnetic fields and developed the first practical electric telegraph system. In 1862, he proposed the absolute zero temperature theory, which is essential to understanding the behavior of matter at low temperatures.</p><p style='margin-bottom:12px; line-height:1.7; font-size:0.95rem;'>4. Geology: French naturalist Georges Cuvier (1769-1832) and French zoologist Henri Marie Ducrotay de Lacépède (1756-1825) made significant contributions to the field of geology during an earlier period but were still influential in the 1860s. C</p>", "compare_1866_today": "\n        <h3 style='color:#0a3d62; font-size:1.9rem; margin-bottom:14px;'>Comparison 1866 / Today</h3>\n        <h5 style='color:#27c39f; font-size:1.4rem; margin-bottom:14px;'>⚗️ Atlantis</h5>\n        <div style='color:#607080; font-size:1.1rem; margin-bottom:16px;'>✨ Generated by Mistral (local AI)</div>\n        <table style='width:100%; border-collapse:collapse; margin-bottom:20px;'>\n          <thead>\n            <tr>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🕰️ 1866 — Jules Verne</th>\n              <th style='width:50%; padding:12px 16px; background:rgba(39,195,159,0.15);\n                          color:#27c39f; border:1px solid rgba(39,195,159,0.3);\n                          font-size:1.25rem; text-align:left;'>🌍 2025 — Today</th>\n            </tr>\n          </thead>\n          <tbody>\n            <tr>\n              <td colspan='2' style='padding:10px 16px; background:rgba(39,195,159,0.08);\n                              color:#27c39f; font-size:1.15rem; font-weight:600;\n                              border:1px solid rgba(39,195,159,0.2);'>🔬 Science & Technology</td>\n            </tr>\n            <tr>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>1. Science and Technology:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>In Jules Verne's \"20,000 Leagues Under the Sea,\" Captain Nemo exhibited a remarkable understanding of oceanography for his time, as evidenced by his accurate navigation and knowledge of underwater geology. However, compared to 2025, Nemo's technological capabilities were rudimentary. His Nautilus was powered by electricity generated from an unknown source, while modern submarines use nuclear power or batteries. In addition, Nemo had access to advanced weaponry, but the level of technology in his submarine pales in comparison to today's sonar systems, remotely operated vehicles (ROVs), and deep-sea exploration technologies.</p>\n              </td>\n              <td style='padding:12px 16px; border:1px solid rgba(39,195,159,0.15);\n                          vertical-align:top; font-size:1.35rem; line-height:2.0;'>\n                <p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>2. Marine Ecology:</p><p style='margin-bottom:14px; font-size:1.35rem; line-height:2.0;'>In 1866, Verne described a diverse array of
